      // ============================================================
      // ML / Predict tab
      //
      // Three panels:
      //   1. Status + train (live progress over Socket.io 'ml_train_progress'
      //      and 'ml_train_complete' events).
      //   2. What-if mid-game predictor (slider-driven; debounced fetch
      //      to /api/analyzer/ml/predict).
      //   3. Pre-game predictor (history-based; calls /ml/pregame, with
      //      a per-component breakdown).
      //
      // The Python ML CLI behind these endpoints is spawned per request by
      // analyzer.js; training is the long-running case and runs detached.
      // ============================================================
      function MlTab({ dbRev }) {
        const [status, setStatus] = useState(null);
        const [statusErr, setStatusErr] = useState("");
        const [opts, setOpts] = useState({
          races: [],
          opponents: [],
          maps: [],
          strategies: [],
        });
        const [training, setTraining] = useState(false);
        const [progress, setProgress] = useState({ done: 0, total: 0, pct: 0 });
        const [trainMsg, setTrainMsg] = useState("");

        const refreshStatus = async () => {
          try {
            const r = await fetch(`${API}/ml/status`);
            const j = await r.json();
            setStatus(j);
            setStatusErr("");
            if (j && j.live && j.live.running) {
              setTraining(true);
              setProgress({
                done: j.live.done | 0,
                total: j.live.total | 0,
                pct: j.live.total
                  ? Math.round((100 * j.live.done) / j.live.total)
                  : 0,
              });
              setTrainMsg(j.live.lastMessage || "");
            }
          } catch (e) {
            setStatusErr(e.message);
          }
        };

        const refreshOptions = async () => {
          try {
            const r = await fetch(`${API}/ml/options`);
            const j = await r.json();
            setOpts(
              j || { races: [], opponents: [], maps: [], strategies: [] },
            );
          } catch (_) {
            /* keep defaults */
          }
        };

        useEffect(() => {
          refreshStatus();
          refreshOptions();
          // eslint-disable-next-line react-hooks/exhaustive-deps
        }, [dbRev]);

        // Subscribe to live training events.
        useEffect(() => {
          let sock;
          try {
            sock = io({ transports: ["websocket", "polling"] });
            sock.on("ml_train_progress", (p) => {
              setTraining(true);
              setProgress({
                done: p.done | 0,
                total: p.total | 0,
                pct: p.pct | 0,
              });
              setTrainMsg(`Parsing replay ${p.done}/${p.total} (${p.pct}%)`);
            });
            sock.on("ml_train_complete", (p) => {
              setTraining(false);
              setTrainMsg(
                p.message ||
                  (p.code === 0 ? "Training complete." : "Training failed."),
              );
              refreshStatus();
            });
          } catch (_) {}
          return () => {
            try {
              sock && sock.disconnect();
            } catch (_) {}
          };
        }, []);

        const startTraining = async () => {
          if (training) return;
          if (
            !confirm(
              "Train the WP model? This re-parses every replay (1-5 minutes typically).",
            )
          )
            return;
          setTraining(true);
          setTrainMsg("Starting...");
          setProgress({ done: 0, total: 0, pct: 0 });
          try {
            const r = await fetch(`${API}/ml/train`, { method: "POST" });
            const j = await r.json();
            if (!r.ok || !j.ok) {
              setTraining(false);
              setTrainMsg(j.message || "Training rejected.");
            }
          } catch (e) {
            setTraining(false);
            setTrainMsg("Failed: " + e.message);
          }
        };

        return (
          <div className="space-y-4">
            <MlStatusCard
              status={status}
              statusErr={statusErr}
              training={training}
              progress={progress}
              trainMsg={trainMsg}
              onTrain={startTraining}
              onRefresh={refreshStatus}
            />
            <MacroBackfillCard />
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <WhatIfPanel status={status} />
              <PregamePanel opts={opts} />
            </div>
          </div>
        );
      }

      // Card that triggers a bulk macro recompute on the server. Mirrors the
      // "Backfill Macro Scores" button from the desktop SC2ReplayAnalyzer.py
      // sidebar. Subscribes to Socket.io 'macro_backfill_progress' /
      // 'macro_backfill_done' events for live status.
      function MacroBackfillCard() {
        const [state, setState] = useState({
          running: false,
          phase: "idle",
          done: 0,
          total: 0,
          updated: 0,
          errors: 0,
          lastMessage: "",
        });
        const [error, setError] = useState("");
        // When checked, the backend re-parses every reachable replay even if
        // its macro_score/breakdown are already stored. Use after the macro
        // engine itself changes (e.g. fixed chrono/inject/MULE counting) so
        // existing stored breakdowns get refreshed with the new logic.
        const [force, setForce] = useState(false);

        const refresh = async () => {
          try {
            const r = await fetch(`${API}/macro/backfill/status`);
            const j = await r.json();
            if (j && j.ok) setState((s) => Object.assign({}, s, j));
          } catch (_) {
            /* ignore */
          }
        };

        useEffect(() => {
          refresh();
        }, []);
        useEffect(() => {
          let sock;
          try {
            sock = io({ transports: ["websocket", "polling"] });
            sock.on("macro_backfill_progress", (p) => {
              setState((s) =>
                Object.assign({}, s, {
                  running: true,
                  phase: "running",
                  done: p.i || s.done,
                  total: p.total || s.total,
                  updated: s.updated + (p.ok ? 1 : 0),
                  errors: s.errors + (p.ok ? 0 : 1),
                  lastMessage: `${p.i || 0}/${p.total || 0} ${p.file || ""}`,
                }),
              );
            });
            sock.on("macro_backfill_done", (d) => {
              setState((s) =>
                Object.assign({}, s, {
                  running: false,
                  phase: d.phase || "done",
                  lastMessage: `done · updated ${d.updated || 0} · errors ${d.errors || 0}`,
                }),
              );
            });
          } catch (_) {
            /* socket optional */
          }
          return () => {
            try {
              sock && sock.disconnect();
            } catch (_) {}
          };
        }, []);

        const start = async () => {
          setError("");
          try {
            const r = await fetch(`${API}/macro/backfill/start`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ force }),
            });
            const j = await r.json();
            if (!r.ok || !j.ok) {
              setError(j.error || "failed to start");
              return;
            }
            setState((s) =>
              Object.assign({}, s, {
                running: true,
                phase: "running",
                done: 0,
                total: 0,
                updated: 0,
                errors: 0,
                lastMessage: force ? "starting (force re-parse)…" : "starting…",
              }),
            );
          } catch (e) {
            setError(e.message);
          }
        };

        const pct =
          state.total > 0 ? Math.round((100 * state.done) / state.total) : 0;

        return (
          <div className="bg-base-800 ring-soft rounded-xl p-4">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div>
                <h2 className="text-lg font-semibold text-neutral-100">
                  Macro score backfill
                </h2>
                <div className="text-sm text-neutral-400 mt-1">
                  {force ? (
                    <>
                      <span className="text-gold-500 font-semibold">
                        Force mode:
                      </span>{" "}
                      re-parses <em>every</em> reachable replay and overwrites
                      existing macro scores. Use this after the macro engine
                      itself changes (e.g. chrono/inject/MULE fix). Slow.
                    </>
                  ) : (
                    <>
                      Default: only processes replays that don't yet have a
                      macro score. Cheap; runs after every batch of new games.
                      Writes results back to{" "}
                      <code className="text-neutral-300">
                        meta_database.json
                      </code>
                      .
                    </>
                  )}
                </div>
                {error && (
                  <div className="text-sm text-loss-500 mt-1">{error}</div>
                )}
              </div>
              <div className="flex gap-2 items-center">
                <button
                  onClick={refresh}
                  className="text-xs bg-base-700 hover:bg-base-600 ring-soft rounded px-3 py-1.5 text-neutral-300"
                >
                  Refresh
                </button>
                <button
                  onClick={start}
                  disabled={state.running}
                  className="text-sm bg-accent-500 hover:bg-accent-600 disabled:opacity-50 ring-soft rounded px-3 py-1.5 text-white font-semibold"
                >
                  {state.running
                    ? "Running…"
                    : force
                      ? "Force re-parse all"
                      : "Backfill new replays"}
                </button>
              </div>
            </div>

            <div className="mt-2">
              <label
                className="inline-flex items-center gap-2 text-xs text-neutral-500 cursor-pointer select-none"
                title="Edge case: re-parse every reachable replay even if its macro is already stored. Only needed after the macro engine itself changes so old stored breakdowns get refreshed. Leave OFF for the normal incremental backfill."
              >
                <input
                  type="checkbox"
                  checked={force}
                  onChange={(e) => setForce(e.target.checked)}
                  disabled={state.running}
                  className="accent-accent-500"
                />
                Force re-parse all{" "}
                <span className="text-neutral-600">(edge case)</span>
              </label>
            </div>

            {(state.running || state.total > 0) && (
              <div className="mt-3">
                <div className="flex items-center gap-3 text-xs text-neutral-400 mb-1">
                  <span>
                    {state.done}/{state.total} processed
                  </span>
                  <span className="text-win-500">+{state.updated} updated</span>
                  {state.errors > 0 && (
                    <span className="text-loss-500">{state.errors} errors</span>
                  )}
                  <span className="ml-auto truncate">{state.lastMessage}</span>
                </div>
                <div className="h-2 bg-base-700 rounded overflow-hidden">
                  <div
                    className="h-full bg-accent-500"
                    style={{ width: `${pct}%` }}
                  />
                </div>
              </div>
            )}
          </div>
        );
      }

      function MlStatusCard({
        status,
        statusErr,
        training,
        progress,
        trainMsg,
        onTrain,
        onRefresh,
      }) {
        const trained = status && status.trained;

                    {" · "}
                    <span className="tabular-nums">
                      {status.games_used}
                    </span>{" "}
                    games
                    {" · "}
                    <span className="tabular-nums">
                      {status.snapshots}
                    </span>{" "}
                    snapshots
                    {" · AUC "}
                    <b className="tabular-nums">{auc}</b>
                    {" · last trained "}
                    <span className="text-neutral-400">{last}</span>
                  </div>
                ) : (
                  <div className="text-sm text-neutral-300 mt-1">
                    <span className="text-loss-500 font-semibold">
                      Untrained
                    </span>
                    {" · "}
                    {status.message || ""}
                  </div>
                )}
              </div>
              <div className="flex gap-2 items-center">
                <button
                  onClick={onRefresh}
                  className="text-xs bg-base-700 hover:bg-base-600 ring-soft rounded px-3 py-1.5 text-neutral-300"
                >
                  Refresh
                </button>
                <button
                  onClick={onTrain}
                  disabled={training || need}
                  className={
                    "text-sm rounded px-4 py-1.5 transition " +
                    (training || need
                      ? "bg-base-700 text-neutral-500 cursor-not-allowed"
                      : "bg-accent-500 hover:bg-accent-500/90 text-white")
                  }
                >
                  {training
                    ? "Training..."
                    : trained
                      ? "Retrain Model"
                      : "Train Model"}
                </button>
              </div>
            </div>
            {(training || trainMsg) && (
              <div className="mt-3">
                <div className="h-2 bg-base-700 rounded overflow-hidden">
                  <div
                    className="h-full bg-accent-500 transition-all"
                    style={{ width: (progress.pct || 0) + "%" }}
                  />
                </div>
                <div className="text-xs text-neutral-400 mt-1.5">
                  {trainMsg}
                </div>
              </div>
            )}
            <div className="text-[11px] text-neutral-500 mt-2">
              Training spawns the Python ML CLI (<code>scripts/ml_cli.py</code>)
              in the SC2Replay-Analyzer project; live progress streams over
              Socket.io.
            </div>
          </div>
        );
      }

      // -- What-if predictor (mid-game snapshot)
      function WhatIfPanel({ status }) {
        const FEATS = [
          {
            key: "minute",
            label: "Game minute",
            min: 0,
            max: 30,
            step: 1,
            def: 8,
          },
          {
            key: "supply_diff",
            label: "Supply diff (you-opp)",
            min: -100,
            max: 100,
            step: 1,
            def: 0,
          },
          {
            key: "army_value_diff",
            label: "Army value diff",
            min: -5000,
            max: 5000,
            step: 50,
            def: 0,
          },
          {
            key: "income_min_diff",
            label: "Mineral income diff /min",
            min: -3000,
            max: 3000,
            step: 25,
            def: 0,
          },
          {
            key: "income_gas_diff",
            label: "Gas income diff /min",
            min: -2000,
            max: 2000,
            step: 25,
            def: 0,
          },
          {
            key: "nexus_count_diff",
            label: "Base count diff",
            min: -5,
            max: 5,
            step: 1,
            def: 0,
          },
          {
            key: "tech_score_self",
            label: "Your tech score",
            min: 0,
            max: 30,
            step: 1,
            def: 5,
          },
          {
            key: "tech_score_opp",
            label: "Opp tech score",
            min: 0,
            max: 30,
            step: 1,
            def: 5,
          },
        ];
        const initial = Object.fromEntries(FEATS.map((f) => [f.key, f.def]));
        const [vals, setVals] = useState(initial);
        const [matchup, setMatchup] = useState("");
        const [pred, setPred] = useState(null);
        const [predErr, setPredErr] = useState("");
        const trained = status && status.trained;
        const fetchPred = useRef(null);

        useEffect(() => {
          if (!trained) {
            setPred(null);
            setPredErr("");
            return;
          }
          if (fetchPred.current) clearTimeout(fetchPred.current);
          fetchPred.current = setTimeout(async () => {
            const q = new URLSearchParams();
            Object.entries(vals).forEach(([k, v]) => q.set(k, v));
            if (matchup) q.set("matchup", matchup);
            try {
              const r = await fetch(`${API}/ml/predict?${q.toString()}`);
              const j = await r.json();
              if (!j.ok) {
                setPred(null);
                setPredErr(j.message || "");
              } else {
                setPred(j.p_win);
                setPredErr("");
              }
            } catch (e) {
              setPredErr(e.message);
            }
          }, 200);
          return () => {
            if (fetchPred.current) clearTimeout(fetchPred.current);
          };
        }, [vals, matchup, trained]);

        const pct = pred != null ? pred * 100 : null;
        return (
          <div className="bg-base-800 ring-soft rounded-xl p-4">
            <h3 className="text-base font-semibold text-neutral-100">
              What-if predictor (mid-game)
            </h3>
            <p className="text-xs text-neutral-500 mt-0.5">
              Set the relative state; the model returns p(Win) for that
              snapshot.
            </p>
            {!trained ? (
              <EmptyState
                title="Train the model first"
                sub="The what-if predictor needs a fitted WP model."
              />
            ) : (
              <Fragment>
                <div className="grid grid-cols-2 gap-3 mt-3">
                  {FEATS.map((f) => (
                    <div key={f.key}>
                      <label className="block text-[11px] text-neutral-400">
                        {f.label}
                      </label>

                  className="bg-base-700 ring-soft rounded px-2 py-1 text-sm w-full"

      // ============================================================

      function MapIntelTab({ dbRev, onOpenReplay }) {
        // Replay selection UI for the Map Intel / Replay Viewer.
        //
        // Behaviour:
        //   * Loads the full list of openable replays from /api/analyzer/games
        //     once per dbRev. No replay is auto-opened.
        //   * Search box filters the list as you type (opponent / map / build /
        //     opp_strategy).
        //   * Sort dropdown re-orders client-side.
        //   * Race chips filter by opponent race; result chips filter by W/L.
        //   * The list is rendered as cards with a "Watch" button on the right.
        //     The first 200 matches are shown; "Show more" reveals further
        //     matches in chunks of 200 to keep the DOM responsive.
        const [games, setGames] = useState(null);   // null = not yet loaded
        const [err, setErr] = useState(null);
        const [loading, setLoading] = useState(false);
        const [search, setSearch] = useState("");
        const [sort, setSort] = useState("date_desc");
        const [raceFilter, setRaceFilter] = useState("all");   // all | P | T | Z
        const [resultFilter, setResultFilter] = useState("all"); // all | win | loss
        const [visibleCount, setVisibleCount] = useState(200);
        const [selectedId, setSelectedId] = useState(null);

        useEffect(() => {
          let cancelled = false;
          setLoading(true);
          setErr(null);
          fetch(`${API}/games?limit=10000`)
            .then(r => r.json())
            .then(j => {
              if (cancelled) return;
              if (j && j.ok && Array.isArray(j.games)) {
                setGames(j.games);
              } else {
                setErr(j?.error || "Could not load replay list.");
              }
              setLoading(false);
            })
            .catch(e => {
              if (cancelled) return;
              setErr(String(e));
              setLoading(false);
            });
          return () => { cancelled = true; };
        }, [dbRev]);

        // Reset paging when the filter window changes so we don't sit at
        // page 5 of a list that just shrunk to 12 items.
        useEffect(() => { setVisibleCount(200); }, [search, sort, raceFilter, resultFilter]);

        const norm = (s) => String(s || "").toLowerCase();
        const isWin = (g) => norm(g.result) === "win" || norm(g.result) === "victory";
        const isLoss = (g) => norm(g.result) === "loss" || norm(g.result) === "defeat";

        const filtered = React.useMemo(() => {
          if (!games) return [];
          const q = search.trim().toLowerCase();
          let out = games.filter(g => {
            if (raceFilter !== "all") {
              const r = (g.opp_race || "").charAt(0).toUpperCase();
              if (r !== raceFilter) return false;
            }
            if (resultFilter === "win" && !isWin(g)) return false;
            if (resultFilter === "loss" && !isLoss(g)) return false;
            if (q) {
              const hay = `${g.opponent || ""} ${g.map || ""} ${g.build || ""} ${g.opp_strategy || ""}`.toLowerCase();
              if (!hay.includes(q)) return false;
            }
            return true;
          });
          const cmps = {
            date_desc:    (a, b) => new Date(b.date || 0) - new Date(a.date || 0),
            date_asc:     (a, b) => new Date(a.date || 0) - new Date(b.date || 0),
            opponent_asc: (a, b) => String(a.opponent || "").localeCompare(String(b.opponent || "")),
            opponent_desc:(a, b) => String(b.opponent || "").localeCompare(String(a.opponent || "")),
            map_asc:      (a, b) => String(a.map || "").localeCompare(String(b.map || "")),
            map_desc:     (a, b) => String(b.map || "").localeCompare(String(a.map || "")),
            length_desc:  (a, b) => (b.game_length || 0) - (a.game_length || 0),
            length_asc:   (a, b) => (a.game_length || 0) - (b.game_length || 0),
          };
          out = out.slice().sort(cmps[sort] || cmps.date_desc);
          return out;
        }, [games, search, sort, raceFilter, resultFilter]);

        const visible = filtered.slice(0, visibleCount);
        const remaining = Math.max(0, filtered.length - visibleCount);

        const fmtDate = (d) => {
          if (!d) return "Unknown";
          const dt = new Date(d);
          if (isNaN(dt.getTime())) return String(d).slice(0, 10);
          return dt.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: '2-digit' });
        };
        const fmtLen = (s) => {
          const n = Number(s);
          if (!Number.isFinite(n) || n <= 0) return "—";
          const m = Math.floor(n / 60);
          const sec = String(Math.floor(n % 60)).padStart(2, '0');
          return `${m}:${sec}`;
        };
        const raceColor = (r) => {
          const c = (r || "").charAt(0).toUpperCase();
          if (c === "P") return "text-blue-400";
          if (c === "T") return "text-red-400";
          if (c === "Z") return "text-purple-400";
          return "text-neutral-400";
        };
        const Chip = ({ active, onClick, children, title }) => (
          <button
            type="button"
            onClick={onClick}
            title={title}
            className={
              "px-2.5 py-1 rounded-full text-xs font-medium border transition-colors " +
              (active
                ? "bg-accent-600 border-accent-500 text-white"
                : "bg-base-800 border-base-700 text-neutral-300 hover:bg-base-700")
            }
          >{children}</button>
        );

        const totalCount = games ? games.length : 0;
        const matchCount = filtered.length;

        return (
          <div className="space-y-5">
            <div>
              <h2 className="text-xl font-semibold">Map Intel / Replay Viewer</h2>
              <div className="text-sm text-neutral-400 max-w-2xl mt-1">
                Watch interactive playback of any recent game directly from the browser.
                Features full timeline, building and unit placement using high-res icons,
                and post-game stats analysis.
              </div>
            </div>

            {/* How-to-use blurb */}
            <div className="bg-base-800/60 border border-base-700 rounded p-3 text-xs text-neutral-300 max-w-3xl">
              <span className="font-semibold text-neutral-100">How to use:&nbsp;</span>
              Search by opponent, map, build, or strategy. Use the sort and filter
              chips to narrow the list, then click <span className="text-accent-400 font-medium">Watch</span>
              &nbsp;on any row to load that replay in the playback viewer.
            </div>

            {/* Controls row */}
            <div className="flex flex-wrap items-center gap-3">
              <div className="flex-1 min-w-[220px] max-w-md relative">
                <input
                  type="text"
                  value={search}
                  onChange={e => setSearch(e.target.value)}
                  placeholder="Search opponent, map, build, strategy..."
                  className="w-full bg-base-800 border border-base-700 rounded pl-8 pr-3 py-2 text-sm text-neutral-100 placeholder-neutral-500 focus:outline-none focus:border-accent-500"
                />
                <span className="absolute left-2.5 top-1/2 -translate-y-1/2 text-neutral-500 text-sm">&#x1F50D;</span>
                {search && (
                  <button
                    onClick={() => setSearch("")}
                    className="absolute right-2 top-1/2 -translate-y-1/2 text-neutral-500 hover:text-neutral-200 text-xs"
                    title="Clear search"
                  >&#x2715;</button>
                )}
              </div>

              <div className="flex items-center gap-2">
                <label className="text-xs text-neutral-400">Sort</label>
                <select
                  value={sort}
                  onChange={e => setSort(e.target.value)}
                  className="bg-base-800 border border-base-700 rounded px-2 py-1.5 text-sm text-neutral-100 focus:outline-none focus:border-accent-500"
                >
                  <option value="date_desc">Newest first</option>
                  <option value="date_asc">Oldest first</option>
                  <option value="opponent_asc">Opponent A - Z</option>
                  <option value="opponent_desc">Opponent Z - A</option>
                  <option value="map_asc">Map A - Z</option>
                  <option value="map_desc">Map Z - A</option>
                  <option value="length_desc">Longest first</option>
                  <option value="length_asc">Shortest first</option>
                </select>
              </div>

              <div className="flex items-center gap-1.5">
                <span className="text-xs text-neutral-400 mr-1">Race</span>
                <Chip active={raceFilter === "all"} onClick={() => setRaceFilter("all")}>All</Chip>
                <Chip active={raceFilter === "P"} onClick={() => setRaceFilter("P")} title="Protoss">P</Chip>
                <Chip active={raceFilter === "T"} onClick={() => setRaceFilter("T")} title="Terran">T</Chip>
                <Chip active={raceFilter === "Z"} onClick={() => setRaceFilter("Z")} title="Zerg">Z</Chip>
              </div>

              <div className="flex items-center gap-1.5">
                <span className="text-xs text-neutral-400 mr-1">Result</span>
                <Chip active={resultFilter === "all"} onClick={() => setResultFilter("all")}>All</Chip>
                <Chip active={resultFilter === "win"} onClick={() => setResultFilter("win")}>Wins</Chip>
                <Chip active={resultFilter === "loss"} onClick={() => setResultFilter("loss")}>Losses</Chip>
              </div>
            </div>

            {/* Status row */}
            <div className="text-xs text-neutral-500">
              {loading && <span className="animate-pulse">Loading replays...</span>}
              {!loading && games && (
                <span>
                  Showing <span className="text-neutral-300">{Math.min(visible.length, matchCount)}</span> of{" "}
                  <span className="text-neutral-300">{matchCount.toLocaleString()}</span>{" "}
                  {matchCount !== totalCount && (<>(filtered from <span className="text-neutral-300">{totalCount.toLocaleString()}</span>) </>)}
                  replays
                </span>
              )}
            </div>

            {err && (
              <div className="bg-loss-500/10 border border-loss-500/40 text-loss-400 rounded px-3 py-2 text-sm">
                {err}
              </div>
            )}

            {/* Replay list */}
            {!loading && games && (
              <div className="bg-base-800 rounded border border-base-700 overflow-hidden">
                {visible.length === 0 ? (
                  <div className="py-10 text-center text-neutral-500 text-sm">
                    {totalCount === 0
                      ? "No replays found in your library yet. Play a game and the parser will pick it up."
                      : "No replays match the current filters."}
                  </div>
                ) : (
                  <ul className="divide-y divide-base-700/60">
                    {visible.map((g, i) => {
                      const win = isWin(g);
                      const isSel = selectedId === (g.id || `${g.file_path}|${i}`);
                      const rowKey = g.id || `${g.file_path}|${i}`;
                      return (
                        <li
                          key={rowKey}
                          className={
                            "flex items-center gap-3 px-4 py-2.5 hover:bg-base-700/40 transition-colors " +
                            (isSel ? "bg-base-700/60" : "")
                          }
                          onClick={() => setSelectedId(rowKey)}
                        >
                          <div className="w-24 shrink-0 text-xs text-neutral-400 whitespace-nowrap">
                            {fmtDate(g.date)}
                          </div>
                          <div className="w-48 shrink-0 truncate text-sm text-gold-400" title={g.map}>
                            {g.map || "Unknown map"}
                          </div>
                          <div className="flex-1 min-w-0 truncate text-sm font-medium text-neutral-100" title={g.opponent}>
                            {g.opponent || "Unknown"}
                            {g.opp_race && (
                              <span className={"ml-2 text-xs " + raceColor(g.opp_race)}>
                                ({(g.opp_race || "").charAt(0).toUpperCase()})
                              </span>
                            )}
                          </div>
                          <div className="hidden md:block w-40 shrink-0 truncate text-xs text-neutral-500" title={g.build}>
                            {g.build || ""}
                          </div>
                          <div className="w-12 shrink-0 text-xs text-neutral-400 text-right tabular-nums">
                            {fmtLen(g.game_length)}
                          </div>
                          <div className="w-16 shrink-0 text-right">
                            <span className={
                              "text-xs font-semibold " +
                              (win ? "text-win-500" : isLoss(g) ? "text-loss-500" : "text-neutral-500")
                            }>
                              {win ? "Win" : isLoss(g) ? "Loss" : (g.result || "—")}
                            </span>
                          </div>
                          <div className="w-20 shrink-0 text-right">
                            <button
                              className="bg-accent-600 hover:bg-accent-500 text-white px-3 py-1 rounded text-xs transition-colors shadow-sm"
                              onClick={(e) => {
                                e.stopPropagation();
                                onOpenReplay({ path: g.file_path, player: g.me_name || "" });
                              }}
                            >
                              Watch
                            </button>
                          </div>
                        </li>
                      );
                    })}
                  </ul>
                )}
                {remaining > 0 && (
                  <div className="border-t border-base-700 bg-base-900/40 px-4 py-2 flex items-center justify-between">
                    <span className="text-xs text-neutral-500">
                      {remaining.toLocaleString()} more match{remaining === 1 ? "" : "es"} hidden
                    </span>
                    <button
                      onClick={() => setVisibleCount(c => c + 200)}
                      className="text-xs text-accent-400 hover:text-accent-300 font-medium"
                    >
                      Show more &#8595;
                    </button>
                  </div>
                )}
              </div>
            )}
          </div>
        );
      }

      function pickStatsAtTime(stats, t) {
        if (!Array.isArray(stats) || stats.length === 0) return null;
        let lo = 0, hi = stats.length - 1, idx = 0;
        while (lo <= hi) {
          const mid = (lo + hi) >> 1;
          if (stats[mid].time <= t) { idx = mid; lo = mid + 1; }
          else { hi = mid - 1; }
        }
        return stats[idx];
      }

      function MapIntelResourceCell({ label, value, color }) {

          <div style={{

            <span style={{
              fontFamily: "var(--font-family-mono)",
              fontSize: "13px", color: color || "#e6e9ef",
              fontWeight: 600,
            }}>{value}</span>
          </div>
        );
      }

      function MapIntelResourceRow({ name, stats, accent }) {
        const fmt = (n) => (typeof n === "number") ? n.toLocaleString("en-US") : "—";

        return (
          <div style={{
            display: "flex", alignItems: "center", gap: "8px",
            padding: "4px 8px", background: "rgba(20,24,32,0.85)",
            borderRadius: "6px",
          }}>
            <div style={{
              minWidth: "100px", maxWidth: "140px",
              color: accent, fontWeight: 700,
              overflow: "hidden", textOverflow: "ellipsis",
              whiteSpace: "nowrap",
            }}>{name}</div>
            <MapIntelResourceCell label="Min"     value={fmt(s.minerals)}  color="#7dd3fc" />
            <MapIntelResourceCell label="Gas"     value={fmt(s.vespene)}   color="#86efac" />
            <MapIntelResourceCell label="Supply"
              value={(s.food_used != null && s.food_made != null)
                ? `${s.food_used}/${s.food_made}` : "—"} />
            <MapIntelResourceCell label="Workers" value={fmt(s.workers)} />
            <MapIntelResourceCell label="Army"
              value={s.army_val != null ? Math.round(s.army_val) : "—"} />
            <MapIntelResourceCell label="Lost"
              value={fmt(s.lost)} color="#FCA5A5" />
            <MapIntelResourceCell label="Killed"
              value={fmt(s.killed)} color="#FDE68A" />
          </div>
        );
      }

      function MapIntelResourceBar({ data, time }) {
        if (!data) return null;
        const me = pickStatsAtTime(data.my_stats, time) || {};
        const opp = pickStatsAtTime(data.opp_stats, time) || {};
        const meName = data.me_name || "You";
        const oppName = data.opp_name || "Opponent";
        return (
          <div style={{
            display: "flex", justifyContent: "center", alignItems: "stretch",
            gap: "12px", padding: "8px 16px",
            background: "rgba(11,13,17,0.95)",
            borderBottom: "1px solid rgba(255,255,255,0.06)",
            flexShrink: 0,
          }}>
            <MapIntelResourceRow name={meName}  stats={me}  accent="#66BB6A" />
            <MapIntelResourceRow name={oppName} stats={opp} accent="#EF5350" />
          </div>
        );
      }

      function MapIntelViewer({ replayPath, playerName, onBack }) {
        const [data, setData] = useState(null);
        const [err, setErr] = useState(null);
        const [loading, setLoading] = useState(true);

        const [time, setTime] = useState(0);
        const [playing, setPlaying] = useState(false);
        const [speed, setSpeed] = useState(1.0);

        const canvasRef = React.useRef(null);
        const containerRef = React.useRef(null);
        const animRef = React.useRef(null);

        // Pan/Zoom state
        const [zoom, setZoom] = useState(1.0);
        const [pan, setPan] = useState({ x: 0, y: 0 });
        const dragRef = React.useRef(null);

        // Bumper to force a redraw when an async icon finishes loading.
        // The cache lives on `window` but is shared across the app; one
        // setter is enough to nudge the drawing useEffect.
        const [iconTick, setIconTick] = useState(0);
        useEffect(() => {
          window._iconBumper = () => setIconTick(t => t + 1);
          return () => { if (window._iconBumper === setIconTick) window._iconBumper = null; };
        }, []);

        // Real map image (lazy-loaded from /api/analyzer/map-image, then drawn
        // as the canvas background under the projected SC2 coords).
        const [mapImage, setMapImage] = useState(null);
        useEffect(() => {
          if (!data || !data.map_name) { setMapImage(null); return; }
          let cancelled = false;
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.onload = () => { if (!cancelled) setMapImage(img); };
          img.onerror = () => { if (!cancelled) setMapImage(null); };
          img.src = `${API}/map-image?name=${encodeURIComponent(data.map_name)}`;
          return () => { cancelled = true; };
        }, [data && data.map_name]);

        // Fetch playback data
        useEffect(() => {
          let cancelled = false;
          setLoading(true);
          setErr(null);
          setData(null);
          fetch(`${API}/playback?replay=${encodeURIComponent(replayPath)}`)
            .then(r => r.json())
            .then(j => {
              if (cancelled) return;
              if (j && j.ok) {
                // The /playback endpoint wraps the spatial-CLI output as
                // `{ ok, result: records }`. The CLI emits one NDJSON record
                // per frame plus a header record that carries map_name,
                // me_name, opp_name, game_length, bounds, etc. Older CLI
                // builds returned the playback object directly. Be tolerant
                // of both shapes and only treat the result as usable when
                // it has the required header fields.
                const raw = j.result;
                let payload = null;
                if (Array.isArray(raw)) {
                  // Prefer a record that looks like the playback header.
                  payload = raw.find(r => r && (r.map_name || r.bounds || r.game_length)) || raw[0] || null;
                } else if (raw && typeof raw === 'object') {
                  payload = raw;
                }
                if (payload && (payload.map_name || payload.bounds || payload.game_length)) {
                  setData(payload);
                  setTime(0);
                } else {
                  setErr("Replay parsed but did not return playback data. The CLI may have emitted an unexpected format.");
                }
              } else {
                setErr(j?.error || "Failed to parse replay.");
              }
              setLoading(false);
            })
            .catch(e => {
              if (!cancelled) {
                setErr(String(e));
                setLoading(false);
              }
            });
          return () => { cancelled = true; };
        }, [replayPath]);

        // Animation Loop
        useEffect(() => {
          if (!playing || !data) return;
          let lastTick = performance.now();
          const tick = (now) => {
            const dt = (now - lastTick) / 1000.0;
            lastTick = now;
            setTime(prev => {
              const next = prev + dt * speed;
              if (next >= data.game_length) {
                setPlaying(false);
                return data.game_length;
              }
              return next;
            });
            animRef.current = requestAnimationFrame(tick);
          };
          animRef.current = requestAnimationFrame(tick);
          return () => cancelAnimationFrame(animRef.current);
        }, [playing, speed, data]);

        // Drawing
        useEffect(() => {
          if (!data || !canvasRef.current || !containerRef.current) return;
          const canvas = canvasRef.current;
          const ctx = canvas.getContext('2d');

          const CW = canvas.width;
          const CH = canvas.height;

          ctx.clearRect(0, 0, CW, CH);

          // Render background
          ctx.fillStyle = "#1a1f29";
          ctx.fillRect(0, 0, CW, CH);

          const b = data.bounds;
          if (!b) return;

          const PAD = 20;
          const mapW = b.x_max - b.x_min || 1;
          const mapH = b.y_max - b.y_min || 1;

          // Compute scale
          const scaleX = (CW - 2 * PAD) / mapW;
          const scaleY = (CH - 2 * PAD) / mapH;
          const baseScale = Math.min(scaleX, scaleY);

          // Project SC2 coordinates to Canvas
          const project = (sc2_x, sc2_y) => {
             // In SC2, y grows upwards. In canvas, y grows downwards.
             let px = PAD + (sc2_x - b.x_min) * baseScale;
             let py = CH - PAD - (sc2_y - b.y_min) * baseScale;

             // Apply pan/zoom relative to center
             px = (px - CW/2) * zoom + pan.x + CW/2;
             py = (py - CH/2) * zoom + pan.y + CH/2;

             return { x: px, y: py };
          };

          // Draw bounds box
          const pMin = project(b.x_min, b.y_min);
          const pMax = project(b.x_max, b.y_max);

          // Draw real map image inside the playable bounds rectangle,
          // BEFORE the grid/events/icons so they paint on top of it.
          if (mapImage && mapImage.complete && mapImage.naturalWidth > 0) {
             const dx = pMin.x;
             const dy = pMax.y;
             const dw = pMax.x - pMin.x;
             const dh = pMin.y - pMax.y;
             ctx.save();
             ctx.globalAlpha = 0.85;
             try { ctx.drawImage(mapImage, dx, dy, dw, dh); } catch (_) {}
             ctx.restore();
          }

          ctx.strokeStyle = "#2b3445";
          ctx.lineWidth = 2;
          ctx.strokeRect(pMin.x, pMax.y, pMax.x - pMin.x, pMin.y - pMax.y);

          // Draw grid
          ctx.strokeStyle = "#242c3b";
          ctx.lineWidth = 1;
          ctx.beginPath();
          for (let x = Math.ceil(b.x_min); x <= b.x_max; x += 16) {
             const p0 = project(x, b.y_min);
             const p1 = project(x, b.y_max);
             ctx.moveTo(p0.x, p0.y);
             ctx.lineTo(p1.x, p1.y);
          }
          for (let y = Math.ceil(b.y_min); y <= b.y_max; y += 16) {
             const p0 = project(b.x_min, y);
             const p1 = project(b.x_max, y);
             ctx.moveTo(p0.x, p0.y);
             ctx.lineTo(p1.x, p1.y);
          }
          ctx.stroke();

          // Create cache for icons. Buildings live under /static/icons/buildings/
          // and units under /static/icons/units/. Unit names from sc2reader carry
          // a few variants (SiegeTankSieged, WarpPrismPhasing, BanelingBurrowed,
          // Hellion vs HellionTank, etc.) so we map known variants back to their
          // canonical base name before the lookup.
          const _UNIT_NAME_ALIASES = {
            // Hallucinations are clones -- show the same icon as the
            // real unit. The actual gameplay distinction (real vs hallu)
            // doesn't matter for the playback viewer. sc2reader reports
            // them as "HallucinatedX" raw types.
            hallucinatedphoenix: 'phoenix',
            hallucinatedstalker: 'stalker',
            hallucinatedzealot: 'zealot',
            hallucinatedhightemplar: 'hightemplar',
            hallucinatedimmortal: 'immortal',
            hallucinatedvoidray: 'voidray',
            hallucinatedcolossus: 'colossus',
            hallucinatedarchon: 'archon',
            hallucinatedprobe: 'probe',
            hallucinateddisruptor: 'disruptor',
            hallucinatedoracle: 'oracle',
            hallucinatedwarpprism: 'warpprism',
            hallucinatedadept: 'adept',
            hallucinatedsentry: 'sentry',
            siegetanksieged: 'siegetank',
            siegetank: 'siegetank',
            warpprismphasing: 'warpprism',
            warpprism: 'warpprism',
            banelingburrowed: 'baneling',
            roachburrowed: 'roach',
            zerglingburrowed: 'zergling',
            hydraliskburrowed: 'hydralisk',
            infestorburrowed: 'infestor',
            lurkerburrowed: 'lurker',
            lurkermp: 'lurker',
            lurkermpburrowed: 'lurker',
            ravagerburrowed: 'ravager',
            droneburrowed: 'drone',
            queenburrowed: 'queen',
            swarmhostmp: 'swarmhost',
            swarmhostmpburrowed: 'swarmhost',
            hellionhellion: 'hellion',
            helliontank: 'hellbat',
            vikingfighter: 'viking',
            vikingassault: 'viking',
            thoraap: 'thor',
            ling: 'zergling',
            zealotwarp: 'zealot',
            stalkerwarp: 'stalker',
            sentrywarp: 'sentry',
          };
          const getIcon = (name, category) => {
            if (!window._iconCache) window._iconCache = {};
            const raw = String(name || '').toLowerCase().replace(/[^a-z0-9]/g, '');
            const cleanName = (category === 'unit' && _UNIT_NAME_ALIASES[raw]) || raw;
            const cacheKey = (category || 'auto') + '|' + cleanName;
            if (window._iconCache[cacheKey]) return window._iconCache[cacheKey];

            let iconPath;
            if (category === 'unit') {
              iconPath = `/static/icons/units/${cleanName}.png`;
            } else {
              iconPath = `/static/icons/buildings/${cleanName}.png`;
              if (window.TimingCatalog && window.TimingCatalog.TOKENS) {
                 const tok = window.TimingCatalog.TOKENS.find(t => t.id.toLowerCase() === cleanName || t.name.toLowerCase() === cleanName);
                 if (tok) iconPath = `/static/icons/buildings/${tok.icon}`;
              }
            }

            const img = new Image();
            // Trigger a single re-render when this icon loads so the unit/
            // building isn't stuck on its fallback dot. We don't want every
            // icon to re-render individually, so we coalesce with rAF.
            img.onload = () => {
              if (!window._iconRedrawScheduled) {
                window._iconRedrawScheduled = true;
                requestAnimationFrame(() => {
                  window._iconRedrawScheduled = false;
                  // Bump the iconBumper so the drawing useEffect re-fires.
                  if (window._iconBumper) window._iconBumper();
                });
              }
            };
            img.onerror = () => { /* leave as broken; fallback dot will draw */ };
            img.src = iconPath;
            window._iconCache[cacheKey] = img;
            return img;
          };

          // Draw Events
          const drawEvent = (ev, colorStr, isMe) => {
            if (ev.time > time) return;
            if (!ev.x || !ev.y) return;
            const p = project(ev.x, ev.y);

            if (ev.type === "building") {
              const img = getIcon(ev.name, 'building');
              const sz = Math.max(18, 22 * zoom);

              if (img.complete && img.naturalWidth > 0) {
                 // Draw backing for visibility
                 ctx.fillStyle = colorStr;
                 ctx.globalAlpha = 0.6;
                 ctx.beginPath();
                 ctx.arc(p.x, p.y, sz/2 + 2, 0, 2*Math.PI);
                 ctx.fill();
                 ctx.globalAlpha = 1.0;

                 ctx.drawImage(img, p.x - sz/2, p.y - sz/2, sz, sz);
              } else {
                 ctx.fillStyle = colorStr;
                 ctx.beginPath();
                 ctx.rect(p.x - 6*zoom, p.y - 6*zoom, 12*zoom, 12*zoom);
                 ctx.fill();
                 ctx.strokeStyle = "#000";
                 ctx.lineWidth = 1;
                 ctx.stroke();
              }
            } else {
              ctx.fillStyle = colorStr;
              ctx.beginPath();
              ctx.arc(p.x, p.y, Math.max(3, 5*zoom), 0, 2*Math.PI);
              ctx.fill();
            }
          };

          // ---- Spawn-location markers ---------------------------------------
          // Drawn BEFORE buildings/units so the actual building icons stack
          // on top. Each player's spawn is the first town hall placement
          // detected by the Python extractor; the marker is a labeled ring
          // sized large enough that you can visually confirm the alignment
          // between SC2 coords and the underlying minimap.
          if (Array.isArray(data.spawn_locations)) {
            for (const s of data.spawn_locations) {
              if (typeof s.x !== 'number' || typeof s.y !== 'number') continue;
              const sp = project(s.x, s.y);
              const isMe = s.owner === 'me';
              const ring = isMe ? '#66BB6A' : '#EF5350';
              const label = isMe ? (data.me_name || 'You') : (data.opp_name || 'Opp');
              const r1 = Math.max(22, 30 * zoom);
              const r2 = r1 + Math.max(4, 5 * zoom);
              ctx.save();
              ctx.lineWidth = Math.max(2, 2.5 * Math.sqrt(zoom));
              ctx.strokeStyle = ring;
              ctx.globalAlpha = 0.9;
              ctx.beginPath(); ctx.arc(sp.x, sp.y, r1, 0, 2 * Math.PI); ctx.stroke();
              ctx.globalAlpha = 0.45;
              ctx.beginPath(); ctx.arc(sp.x, sp.y, r2, 0, 2 * Math.PI); ctx.stroke();
              ctx.globalAlpha = 1;
              ctx.font = Math.max(13, Math.floor(14 * zoom)) + 'px sans-serif';
              ctx.textAlign = 'center';
              ctx.textBaseline = 'top';
              const ty = sp.y + r2 + 4;
              const tw = ctx.measureText(label).width;
              ctx.fillStyle = 'rgba(20,24,32,0.85)';
              ctx.fillRect(sp.x - tw/2 - 4, ty - 1, tw + 8, Math.max(14, 13 * zoom));
              ctx.fillStyle = ring;
              ctx.fillText(label, sp.x, ty + 1);
              ctx.restore();
            }
          }

          if (data.my_events) data.my_events.forEach(e => drawEvent(e, "#66BB6A", true));
          if (data.opp_events) data.opp_events.forEach(e => drawEvent(e, "#EF5350", false));

          // ---- Moving units --------------------------------------------------
          // Each unit carries a flat [t,x,y, t,x,y, ...] waypoint array. Find
          // the segment surrounding the current `time` and linearly interpolate
          // to get the unit's position. Only render units that have been born
          // and are not yet dead. Each unit gets its own SC2-Overlay PNG icon
          // (so 12 marines render as 12 little marine icons, not 12 dots).
          // How long the death-spot X stays on the canvas after a unit
          // dies, in game-seconds. 2s is long enough to spot which clump
          // of icons died but short enough that a big fight doesn't leave
          // a forest of permanent crosses.
          const DEATH_MARKER_LINGER = 2.0;

          const drawUnit = (u, ringStr) => {
            if (!u || !u.waypoints || u.waypoints.length < 3) return;
            if (typeof u.born === 'number' && time < u.born) return;
            // Death window: in (died, died + DEATH_MARKER_LINGER) we draw
            // a fading X at the last known position. After that we drop
            // the unit completely.
            const isDead = (u.died != null && time > u.died);
            if (isDead && time > u.died + DEATH_MARKER_LINGER) return;
            if (isDead) {
              const wpd = u.waypoints;
              const N = wpd.length / 3;
              const lx = wpd[(N - 1) * 3 + 1];
              const ly = wpd[(N - 1) * 3 + 2];
              if (typeof lx === 'number' && typeof ly === 'number') {
                const pp = project(lx, ly);
                const fade = Math.max(0, 1 - (time - u.died) / DEATH_MARKER_LINGER);
                const r = (u.is_worker
                    ? Math.max(4, 5 * zoom)
                    : Math.max(6, 7 * zoom));
                ctx.save();
                ctx.globalAlpha = 0.35 + 0.55 * fade;
                ctx.strokeStyle = ringStr;
                ctx.lineWidth = Math.max(1.5, 2 * Math.sqrt(zoom));
                ctx.beginPath();
                ctx.moveTo(pp.x - r, pp.y - r);
                ctx.lineTo(pp.x + r, pp.y + r);
                ctx.moveTo(pp.x - r, pp.y + r);
                ctx.lineTo(pp.x + r, pp.y - r);
                ctx.stroke();
                ctx.restore();
              }
              return;
            }
            const wp = u.waypoints; // length is multiple of 3
            const N = wp.length / 3;
            // Binary search for the largest waypoint index whose t <= time.
            let lo = 0, hi = N - 1, idx = 0;
            while (lo <= hi) {
              const mid = (lo + hi) >> 1;
              if (wp[mid * 3] <= time) { idx = mid; lo = mid + 1; }
              else                       { hi = mid - 1; }
            }
            let ux, uy;
            if (idx >= N - 1) {
              ux = wp[idx * 3 + 1];
              uy = wp[idx * 3 + 2];
            } else {
              const t0 = wp[idx * 3],     x0 = wp[idx * 3 + 1],     y0 = wp[idx * 3 + 2];
              const t1 = wp[(idx + 1) * 3], x1 = wp[(idx + 1) * 3 + 1], y1 = wp[(idx + 1) * 3 + 2];
              // sc2reader emits UnitPositionsEvent sparsely for idle /
              // mining units. If two consecutive waypoints are far apart
              // in TIME (>10 game-seconds), the unit was likely doing a
              // mining loop or sitting idle in between -- linear interp
              // shows a fake straight-line drift across the map. Snap to
              // the EARLIER waypoint instead so the unit stays put near
              // its mining patch / idle position until the next real
              // sample arrives.
              const span = t1 - t0;
              const SPARSE_GAP_SEC = 10;
              if (span > SPARSE_GAP_SEC) {
                ux = x0;
                uy = y0;
              } else {
                const safeSpan = Math.max(1e-3, span);
                const f = Math.min(1, Math.max(0, (time - t0) / safeSpan));
                ux = x0 + (x1 - x0) * f;
                uy = y0 + (y1 - y0) * f;
              }
            }
            const p0 = project(ux, uy);
            // Per-unit deterministic offset so units sharing a position
            // (e.g. 20 roaches that just hatched from the same warren)
            // fan out into a small visible cluster instead of drawing 20
            // icons stacked on the same pixel. Spread radius scales with
            // zoom so the cluster stays compact when zoomed out.
            const seed = ((u.id || 0) * 2654435761) >>> 0;
            const angle = (seed % 360) * Math.PI / 180;
            const radius = ((seed >>> 9) & 7) * (1.5 + zoom * 0.6);
            const p = { x: p0.x + Math.cos(angle) * radius, y: p0.y + Math.sin(angle) * radius };

            // Workers (Drone/Probe/SCV/MULE) are rendered smaller and a
            // touch transparent so they don't drown the canvas when 60+
            // workers are alive mid-game. Combat units stay full-sized.
            const isWorker = !!u.is_worker;
            const sz = isWorker
              ? Math.max(10, 14 * zoom)
              : Math.max(16, 22 * zoom);
            const alpha = isWorker ? 0.7 : 1.0;
            const img = getIcon(u.name, 'unit');
            if (img.complete && img.naturalWidth > 0) {
              // Colored team ring behind the icon for friend/foe legibility.
              ctx.save();
              ctx.globalAlpha = alpha;
              ctx.strokeStyle = ringStr;
              ctx.lineWidth = Math.max(1, 1.5 * Math.sqrt(zoom));
              ctx.beginPath();
              ctx.arc(p.x, p.y, sz / 2 + 1, 0, 2 * Math.PI);
              ctx.stroke();
              ctx.drawImage(img, p.x - sz / 2, p.y - sz / 2, sz, sz);
              ctx.restore();
            } else {
              // Icon not yet loaded or missing PNG (e.g. probe/drone/scv
              // don't ship icon files). Draw a bright dot with a high-
              // contrast outline so the unit is unmistakable on the busy
              // map texture. Workers get smaller dots than combat units.
              const dotRadius = isWorker
                ? Math.max(4, 5 * zoom)
                : Math.max(6, 8 * zoom);
              const fillColor = isWorker
                ? (ringStr === "#1B5E20" ? "#7CFC76" : "#FF7B85")
                : (ringStr === "#1B5E20" ? "#A6FF9A" : "#FFA8B0");
              ctx.save();
              ctx.globalAlpha = isWorker ? 0.9 : 1.0;
              ctx.fillStyle = fillColor;
              ctx.beginPath();
              ctx.arc(p.x, p.y, dotRadius, 0, 2 * Math.PI);
              ctx.fill();
              ctx.lineWidth = Math.max(1, 1.5 * Math.sqrt(zoom));
              ctx.strokeStyle = "#0A0E1A";
              ctx.stroke();
              ctx.restore();
            }
          };
          if (data.my_units)  data.my_units.forEach(u  => drawUnit(u, "#1B5E20"));
          if (data.opp_units) data.opp_units.forEach(u => drawUnit(u, "#B71C1C"));

        }, [data, time, zoom, pan, mapImage, iconTick]);

        // Wheel zoom is attached as a NATIVE listener (with passive:false) inside
        // Wheel zoom. We use the JSX onWheel prop directly (React's
        // synthetic event) instead of a native listener -- the native
        // useEffect-based listener wasn't firing reliably across React
        // 18 mount cycles. The page has nothing to scroll inside this
        // fullscreen viewer, so we don't need preventDefault to keep the
        // page anchored.
        const handleWheel = (e) => {
          if (e.deltaY < 0) setZoom((z) => Math.min(8.0, z * 1.2));
          else              setZoom((z) => Math.max(0.25, z / 1.2));
        };

        // (Wheel zoom is now bound via the JSX `onWheel` prop on the
        // canvas container. See `handleWheel` above.)

        // Auto-hide chrome (header + control bar). Show on mouse move/enter,
        // hide after 2.2s of idle.
        const [chromeVisible, setChromeVisible] = useState(true);
        const chromeTimerRef = React.useRef(null);
        useEffect(() => {
          const el = containerRef.current;
          if (!el) return;
          const show = () => {
            setChromeVisible(true);
            if (chromeTimerRef.current) clearTimeout(chromeTimerRef.current);
            chromeTimerRef.current = setTimeout(() => setChromeVisible(false), 2200);
          };
          el.addEventListener('mousemove', show);
          el.addEventListener('mouseenter', show);
          show();
          return () => {
            el.removeEventListener('mousemove', show);
            el.removeEventListener('mouseenter', show);
            if (chromeTimerRef.current) clearTimeout(chromeTimerRef.current);
          };
        }, []);

        // Make the canvas fill its container so the map is as big as possible.
        useEffect(() => {
          const fit = () => {
            const el = containerRef.current;
            const cv = canvasRef.current;
            if (!el || !cv) return;
            const r = el.getBoundingClientRect();
            const sz = Math.max(400, Math.min(r.width, r.height));
            if (cv.width !== sz)  cv.width  = sz;
            if (cv.height !== sz) cv.height = sz;
            setIconTick(t => t + 1);
          };
          fit();
          window.addEventListener('resize', fit);
          return () => window.removeEventListener('resize', fit);
        }, [data]);

        // Keyboard shortcuts: space=play/pause, arrows=seek 5s, Home/End=ends.
        useEffect(() => {
          const onKey = (e) => {
            if (!data) return;
            if (e.target && (/INPUT|TEXTAREA|SELECT/).test(e.target.tagName)) return;
            if (e.code === 'Space') { e.preventDefault(); setPlaying(p => !p); }
            else if (e.code === 'ArrowLeft')  setTime(t => Math.max(0, t - 5));
            else if (e.code === 'ArrowRight') setTime(t => Math.min(data.game_length, t + 5));
            else if (e.code === 'Home')       setTime(0);
            else if (e.code === 'End')        setTime(data.game_length);
          };
          window.addEventListener('keydown', onKey);
          return () => window.removeEventListener('keydown', onKey);
        }, [data]);

        const handlePointerDown = (e) => {
           // Don't start a pan-drag when the user clicks an interactive
           // child (timeline scrubber, buttons, etc.) -- those events
           // bubble up to the container and would otherwise trigger pan.
           const tag = (e.target && e.target.tagName) || "";
           if (tag === "INPUT" || tag === "BUTTON" || tag === "LABEL"
               || tag === "SELECT" || tag === "TEXTAREA"
               || (e.target && e.target.closest && e.target.closest('button,input,label,select'))) {
             return;
           }
           dragRef.current = { startX: e.clientX, startY: e.clientY, pX: pan.x, pY: pan.y };
        };
        const handlePointerMove = (e) => {
           if (!dragRef.current) return;
           const dx = e.clientX - dragRef.current.startX;
           const dy = e.clientY - dragRef.current.startY;
           setPan({ x: dragRef.current.pX + dx, y: dragRef.current.pY + dy });
        };
        const handlePointerUp = () => {
           dragRef.current = null;
        };

        const formatTime = (secs) => {
          const m = Math.floor(secs / 60);
          const s = Math.floor(secs % 60);
          return `${m}:${s.toString().padStart(2, '0')}`;
        };

        if (loading) {
          return <div className="flex h-full items-center justify-center"><div className="animate-pulse">Loading Replay...</div></div>;
        }

        if (err) {
          return (
            <div className="p-4">
              <button onClick={onBack} className="mb-4 text-accent-500 hover:text-accent-400">← Back</button>
              <div className="text-loss-500">{err}</div>
            </div>
          );
        }

        // Belt-and-suspenders: if the fetch resolved without an error but
        // `data` is still null (race condition during re-fetch, unexpected
        // CLI shape, etc.), bail out cleanly instead of crashing on
        // `data.map_name`.
        if (!data) {
          return (
            <div className="p-4">
              <button onClick={onBack} className="mb-4 text-accent-500 hover:text-accent-400">← Back</button>
              <div className="text-neutral-400 text-sm">No playback data available for this replay.</div>
            </div>
          );
        }

        const mapName = data.map_name || data.map || "Unknown map";
        const meName  = data.me_name  || data.player_name || "You";
        const oppName = data.opp_name || data.opponent || "Opponent";
        const gameLen = Number.isFinite(data.game_length) ? data.game_length : 0;

        return (
          <div className="fixed inset-0 z-30 bg-base-900 flex flex-col">
            {/* Resource HUD sits ABOVE the canvas as a sibling (not an
                overlay) so it never covers the playable map. */}
            <MapIntelResourceBar data={data} time={time} />
            {/* Canvas Area -- fills the viewport. The header & controls are
                overlaid on top with auto-hide so the map gets the full space. */}
            <div
              ref={containerRef}
              className="flex-1 bg-base-900 relative overflow-hidden flex justify-center items-center cursor-move select-none"
              onWheel={handleWheel}
              onPointerDown={handlePointerDown}
              onPointerMove={handlePointerMove}
              onPointerUp={handlePointerUp}
              onPointerLeave={handlePointerUp}
            >
              <canvas
                ref={canvasRef}
                width={800}
                height={800}
                className="block"
                style={{ touchAction: 'none' }}
              />

              {/* Top overlay: title + back button (auto-hide) */}
              <div className={"absolute top-0 left-0 right-0 z-20 pointer-events-none transition-opacity duration-200 " + (chromeVisible ? "opacity-100" : "opacity-0")}>
                <div className="bg-gradient-to-b from-base-900/90 via-base-900/60 to-transparent px-4 py-3 flex items-center gap-4 pointer-events-auto">
                  <button
                    onClick={onBack}
                    className="text-neutral-200 hover:text-white px-3 py-1.5 bg-base-700/80 hover:bg-base-600 rounded transition-colors text-sm shadow-lg"
                  >
                    ← Exit
                  </button>
                  <div className="flex flex-col">
                    <span className="font-semibold text-base">{mapName}</span>
                    <span className="text-xs text-neutral-300">
                      <span className="text-win-400">{meName}</span>
                      <span className="text-neutral-400 mx-1">vs</span>
                      <span className="text-loss-400">{oppName}</span>
                    </span>
                  </div>
                  <div className="flex-1" />
                  <div className="tabular-nums font-mono text-xl bg-base-900/70 px-3 py-1 rounded">
                    {formatTime(time)} / {formatTime(gameLen)}
                  </div>
                </div>
              </div>

              {/* Game Over Screen */}
              {time >= data.game_length && (
                <div className="absolute inset-0 bg-base-900/85 backdrop-blur-sm flex items-center justify-center p-8 z-30">
                  <div className="bg-base-800 border border-base-600 rounded-lg shadow-2xl p-6 w-full max-w-2xl">
                    <h2 className="text-3xl font-bold mb-2 text-center">
                      {data.result === 'Victory' ? (
                        <span className="text-win-500">VICTORY</span>
                      ) : data.result === 'Defeat' ? (
                        <span className="text-loss-500">DEFEAT</span>
                      ) : (
                        <span className="text-neutral-300">GAME OVER</span>
                      )}
                    </h2>
                    <p className="text-center text-neutral-400 mb-6">Game finished at {formatTime(data.game_length)}</p>
                    <div className="grid grid-cols-2 gap-4 mb-6">
                      <div className="bg-base-900 p-4 rounded border border-base-700">
                        <h3 className="text-win-400 font-semibold mb-2">{data.me_name} (You)</h3>
                        <ul className="text-sm space-y-1 text-neutral-300 list-disc list-inside">
                           <li>Max Army Val: {Math.max(...data.my_stats.map(s => s.army_val), 0).toLocaleString()}</li>
                           <li>Events Captured: {data.my_events.length}</li>
                        </ul>
                      </div>
                      <div className="bg-base-900 p-4 rounded border border-base-700">
                        <h3 className="text-loss-400 font-semibold mb-2">{data.opp_name} (Opponent)</h3>
                        <ul className="text-sm space-y-1 text-neutral-300 list-disc list-inside">
                           <li>Max Army Val: {Math.max(...data.opp_stats.map(s => s.army_val), 0).toLocaleString()}</li>
                           <li>Events Captured: {data.opp_events.length}</li>
                        </ul>
                      </div>
                    </div>
                    {data.analysis && (
                      <div className="bg-base-900 p-4 rounded border border-base-700 mb-6">
                        <h3 className="font-semibold mb-2 text-neutral-200">Post-Game Analysis</h3>
                        <div className="space-y-3 text-sm">
                          <div><span className="text-win-400 font-semibold">Good: </span><span className="text-neutral-300">{data.analysis.good.join(" ")}</span></div>
                          <div><span className="text-loss-400 font-semibold">To Improve: </span><span className="text-neutral-300">{data.analysis.bad.join(" ")}</span></div>
                          <div><span className="text-gold-400 font-semibold">Tip: </span><span className="text-neutral-300">{data.analysis.tips.join(" ")}</span></div>
                        </div>
                      </div>
                    )}
                    <div className="flex justify-center gap-4">
                       <button
                         className="bg-base-700 hover:bg-base-600 px-4 py-2 rounded font-medium transition-colors"
                         onClick={() => { setTime(0); setPlaying(true); }}
                       >
                         Watch Again
                       </button>
                    </div>
                  </div>
                </div>
              )}

              {/* Bottom overlay: playback controls (auto-hide YouTube-style) */}
              <div className={"absolute bottom-0 left-0 right-0 z-20 pointer-events-none transition-opacity duration-200 " + (chromeVisible ? "opacity-100" : "opacity-0")}>
                <div className="bg-gradient-to-t from-base-900/95 via-base-900/80 to-transparent px-4 pt-8 pb-3 pointer-events-auto">
                  <div className="flex items-center gap-3">
                    <button
                      onClick={() => setTime(t => Math.max(0, t - 10))}
                      title="Back 10s"
                      className="w-9 h-9 rounded-full flex items-center justify-center bg-base-800/80 hover:bg-base-700 text-neutral-200 text-sm transition-colors"
                    >⏪</button>
                    <button
                      onClick={() => setPlaying(!playing)}
                      title="Play / Pause (Space)"
                      className={"w-12 h-12 rounded-full flex items-center justify-center transition-colors shadow-lg text-lg " + (
                        playing ? 'bg-amber-600 hover:bg-amber-500' : 'bg-win-600 hover:bg-win-500'
                      )}
                    >{playing ? '⏸' : '▶'}</button>
                    <button
                      onClick={() => setTime(t => Math.min(data.game_length, t + 10))}
                      title="Forward 10s"
                      className="w-9 h-9 rounded-full flex items-center justify-center bg-base-800/80 hover:bg-base-700 text-neutral-200 text-sm transition-colors"
                    >⏩</button>

                    <span className="tabular-nums font-mono text-xs text-neutral-300 ml-2 w-12 text-right">{formatTime(time)}</span>
                    <input
                      type="range"
                      min="0"
                      max={data.game_length}
                      value={time}
                      step="0.5"
                      onChange={e => setTime(parseFloat(e.target.value))}
                      className="flex-1 accent-accent-500 h-1.5"
                    />
                    <span className="tabular-nums font-mono text-xs text-neutral-400 w-12">{formatTime(gameLen)}</span>

                    <div className="flex bg-base-900/70 rounded overflow-hidden border border-base-700 ml-2">
                      {[0.5, 1, 2, 4, 8].map(s => (
                        <button
                          key={s}
                          onClick={() => setSpeed(s)}
                          className={"px-2.5 py-1 text-xs font-mono border-r border-base-700 last:border-0 " + (
                            speed === s ? 'bg-accent-600 text-white' : 'text-neutral-400 hover:bg-base-700'
                          )}
                        >{s}x</button>
                      ))}
                    </div>

                    <button
                      onClick={() => { setZoom(1); setPan({x:0, y:0}); }}
                      title="Reset zoom & pan"
                      className="px-3 py-1.5 text-xs bg-base-700/80 hover:bg-base-600 text-neutral-300 rounded transition-colors ml-2"
                    >Reset View</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }


      // Sidebar widget shown on the opponent-profile page. Lists this opponent's
      // proxy locations across all games against the user, with a tiny scatter
      // visualization grouped by map. Uses /api/analyzer/spatial/opponent-proxies.
      function OpponentProxyPatterns({ opponentName }) {
        const [data, setData] = useState(null);
        const [err, setErr] = useState(null);
        useEffect(() => {
          if (!opponentName) return;
          let cancelled = false;
          fetch(
            `${API}/spatial/opponent-proxies?opponent=${encodeURIComponent(opponentName)}`,
          )
            .then((r) => r.json())
            .then((j) => {
              if (cancelled) return;
              if (!j || j.ok === false) setErr((j && j.message) || "no data");
              else setData(j.result || j);
            })
            .catch((e) => !cancelled && setErr(String(e)));
          return () => {
            cancelled = true;
          };
        }, [opponentName]);
        if (err)
          return (
            <div className="text-xs text-loss-500">Proxy patterns: {err}</div>
          );
        if (!data)
          return (
            <div className="text-xs text-neutral-500">
              Loading proxy patterns…
            </div>
          );
        const points = data.points || [];
        if (!points.length) {
          return (
            <EmptyState
              title="No proxy patterns"
              sub={`Scanned ${data.games_scanned} game(s).`}
            />
          );
        }
        // Group points by map for the per-map breakdown line.
        const byMap = data.by_map || {};
        return (
          <div className="space-y-3">
            <div className="text-xs text-neutral-400">
              {data.proxies_found} proxy building(s) across {data.games_scanned}{" "}
              game(s)
            </div>
            <ul className="space-y-1 max-h-64 overflow-y-auto pr-1 text-xs">
              {Object.entries(byMap).map(([map, n]) => (
                <li key={map} className="flex justify-between text-neutral-300">
                  <span>{map}</span>
                  <span className="tabular-nums text-gold-500">{n}</span>
                </li>
              ))}
            </ul>
            <div className="text-[10px] text-neutral-600">
              Distance threshold matches the strategy detector's `_is_proxy`
              rule. Tap "Map Intel" for a full heatmap of opponent proxy
              locations.
            </div>
          </div>
        );
      }

      // ============================================================
      // DEFINITIONS TAB -- searchable build/strategy glossary
      //
      // Mirrors the "Definitions" tab in the desktop SC2ReplayAnalyzer.py.
      // The catalog is sourced from the python project's
      // detectors/definitions.py and exposed by GET /definitions on the
      // backend. Filterable by race + free-text search.
      // ============================================================
      function DefinitionsTab() {
        const [items, setItems] = useState(null);
        const [error, setError] = useState(null);
        const [search, setSearch] = useState("");
        const [race, setRace] = useState("All");

        useEffect(() => {
          let cancelled = false;
          fetch(`${API}/definitions`)
            .then((r) =>
              r.ok ? r.json() : r.json().then((j) => Promise.reject(j)),
            )
            .then((j) => {
              if (!cancelled) setItems(Array.isArray(j.items) ? j.items : []);
            })
            .catch((e) => {
              if (!cancelled) setError(e.error || "fetch failed");
            });
          return () => {
            cancelled = true;
          };
        }, []);

        if (error)
          return <EmptyState title="Definitions unavailable" sub={error} />;
        if (items == null) return <EmptyState title="Loading definitions…" />;

        const q = search.trim().toLowerCase();
        const filtered = items.filter((it) => {
          if (race !== "All" && !it.name.startsWith(race)) return false;
          if (
            q &&
            !(
              it.name.toLowerCase().includes(q) ||
              it.description.toLowerCase().includes(q)
            )
          )
            return false;
          return true;
        });

        // Group by race prefix for visual sectioning.
        const grouped = filtered.reduce((acc, it) => {
          const prefix = it.name.split(" - ")[0] || "Other";
          (acc[prefix] = acc[prefix] || []).push(it);
          return acc;
        }, {});

        const races = ["All", "Zerg", "Protoss", "Terran"];

        return (
          <div className="p-4 space-y-3">
            <div className="flex items-center gap-3 flex-wrap">
              <h2 className="text-lg font-semibold text-neutral-100">
                Build &amp; Strategy Definitions
              </h2>
              <span className="text-xs text-neutral-500">
                {filtered.length} of {items.length} entries
              </span>
            </div>
            <div className="text-xs text-neutral-400 max-w-3xl">
              The detection rules used by the analyzer to label opponent
              strategies and your own builds. Use these to interpret labels in
              the rest of the SPA.
            </div>

            <div className="flex items-center gap-2 flex-wrap">
              <input
                type="text"
                value={search}
                onChange={(e) => setSearch(e.target.value)}
                placeholder="Search builds and strategies…"
