      // Sidebar widget shown on the opponent-profile page. Lists this opponent's
      // proxy locations across all games against the user, with a tiny scatter
      // visualization grouped by map. Uses /api/analyzer/spatial/opponent-proxies.
      function OpponentProxyPatterns({ opponentName }) {
        const [data, setData] = useState(null);
        const [err, setErr] = useState(null);
        useEffect(() => {
          if (!opponentName) return;
          let cancelled = false;
          fetch(
            `${API}/spatial/opponent-proxies?opponent=${encodeURIComponent(opponentName)}`,
          )
            .then((r) => r.json())
            .then((j) => {
              if (cancelled) return;
              if (!j || j.ok === false) setErr((j && j.message) || "no data");
              else setData(j.result || j);
            })
            .catch((e) => !cancelled && setErr(String(e)));
          return () => {
            cancelled = true;
          };
        }, [opponentName]);
        if (err)
          return (
            <div className="text-xs text-loss-500">Proxy patterns: {err}</div>
          );
        if (!data)
          return (
            <div className="text-xs text-neutral-500">
              Loading proxy patterns…
            </div>
          );
        const points = data.points || [];
        if (!points.length) {
          return (
            <EmptyState
              title="No proxy patterns"
              sub={`Scanned ${data.games_scanned} game(s).`}
            />
          );
        }
        // Group points by map for the per-map breakdown line.
        const byMap = data.by_map || {};
        return (
          <div className="space-y-3">
            <div className="text-xs text-neutral-400">
              {data.proxies_found} proxy building(s) across {data.games_scanned}{" "}
              game(s)
            </div>
            <ul className="space-y-1 max-h-64 overflow-y-auto pr-1 text-xs">
              {Object.entries(byMap).map(([map, n]) => (
                <li key={map} className="flex justify-between text-neutral-300">
                  <span>{map}</span>
                  <span className="tabular-nums text-gold-500">{n}</span>
                </li>
              ))}
            </ul>
            <div className="text-[10px] text-neutral-600">
              Distance threshold matches the strategy detector's `_is_proxy`
              rule. Tap "Map Intel" for a full heatmap of opponent proxy
              locations.
            </div>
          </div>
        );
      }

      // ============================================================
      // DEFINITIONS TAB -- searchable build/strategy glossary
      //
      // Mirrors the "Definitions" tab in the desktop SC2ReplayAnalyzer.py.
      // The catalog is sourced from the python project's
      // detectors/definitions.py and exposed by GET /definitions on the
      // backend. Filterable by race + free-text search.
      // ============================================================
      function DefinitionsTab() {
        const [items, setItems] = useState(null);
        const [error, setError] = useState(null);
        const [search, setSearch] = useState("");
        const [race, setRace] = useState("All");

        useEffect(() => {
          let cancelled = false;
          fetch(`${API}/definitions`)
            .then((r) =>
              r.ok ? r.json() : r.json().then((j) => Promise.reject(j)),
            )
            .then((j) => {
              if (!cancelled) setItems(Array.isArray(j.items) ? j.items : []);
            })
            .catch((e) => {
              if (!cancelled) setError(e.error || "fetch failed");
            });
          return () => {
            cancelled = true;
          };
        }, []);

        if (error)
          return <EmptyState title="Definitions unavailable" sub={error} />;
        if (items == null) return <EmptyState title="Loading definitions…" />;

        const q = search.trim().toLowerCase();
        const filtered = items.filter((it) => {
          if (race !== "All" && !it.name.startsWith(race)) return false;
          if (
            q &&
            !(
              it.name.toLowerCase().includes(q) ||
              it.description.toLowerCase().includes(q)
            )
          )
            return false;
          return true;
        });

        // Group by race prefix for visual sectioning.
        const grouped = filtered.reduce((acc, it) => {
          const prefix = it.name.split(" - ")[0] || "Other";
          (acc[prefix] = acc[prefix] || []).push(it);
          return acc;
        }, {});

        const races = ["All", "Zerg", "Protoss", "Terran"];

        return (
          <div className="p-4 space-y-3">
            <div className="flex items-center gap-3 flex-wrap">
              <h2 className="text-lg font-semibold text-neutral-100">
                Build &amp; Strategy Definitions
              </h2>
              <span className="text-xs text-neutral-500">
                {filtered.length} of {items.length} entries
              </span>
            </div>
            <div className="text-xs text-neutral-400 max-w-3xl">
              The detection rules used by the analyzer to label opponent
              strategies and your own builds. Use these to interpret labels in
              the rest of the SPA.
            </div>

            <div className="flex items-center gap-2 flex-wrap">
              <input
                type="text"
                value={search}
                onChange={(e) => setSearch(e.target.value)}
                placeholder="Search builds and strategies…"
                className="bg-base-800 border border-base-700 rounded px-3 py-1.5 text-sm text-neutral-100 placeholder-neutral-500 w-64 focus:outline-none focus:border-accent-500"
              />
              <div className="flex items-center gap-1 ml-2">
                {races.map((r) => (
                  <button
                    key={r}
                    onClick={() => setRace(r)}
                    className={
                      "px-2.5 py-1 text-xs rounded transition " +
                      (race === r
                        ? "bg-accent-500 text-white"
                        : "bg-base-700 text-neutral-300 hover:bg-base-600")
                    }
                  >
                    {r}
                  </button>
                ))}
              </div>
            </div>

            {filtered.length === 0 ? (
              <EmptyState
                title="No matches"
                sub="Try a different search or race filter."
              />
            ) : (
              <div className="space-y-4">
                {Object.keys(grouped)
                  .sort()
                  .map((group) => (
                    <div key={group}>
                      <div className="text-[11px] uppercase tracking-wider text-neutral-500 mb-2">
                        {group}
                      </div>
                      <div className="space-y-1.5">
                        {grouped[group].map((it) => (
                          <div
                            key={it.name}
                            className="bg-base-800 rounded p-3 border border-base-700"
                          >
                            <div className="text-sm font-semibold text-neutral-100">
                              {it.name}
                            </div>
                            <div className="text-xs text-neutral-400 mt-1">
                              {it.description}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
              </div>
            )}
          </div>
        );
      }

      const TABS = [

        const total = (races.Protoss || 0) + (races.Terran || 0)
                    + (races.Zerg || 0) + (races.Random || 0);
        const breakdown = total > 0
          ? WIZARD_RACES
              .map((r) => ({ r, n: races[r] || 0 }))
              .filter((x) => x.n > 0)
              .map((x) => `${x.r[0]} ${Math.round(100 * x.n / total)}%`)
              .join(" · ")
          : "";
        return (
          <tr style={{ borderTop: "1px solid var(--color-divider)" }}>
            <td style={{ padding: "var(--space-1)" }}>
              <input id={id} type="checkbox"
                     checked={isSel}
                     onChange={() => onToggle(player)} />
            </td>
            <td style={{ padding: "var(--space-1)" }}>
              <label htmlFor={id}>{player.name}</label>
              {breakdown ? (
                <div style={{ fontSize: "var(--font-size-xs)",
                               color: "var(--color-text-muted)" }}>
                  {breakdown}
                </div>
              ) : null}
            </td>
            <td style={{ padding: "var(--space-1)",
                         fontFamily: "var(--font-family-mono)",
                         color: "var(--color-text-muted)" }}>
              {player.character_id}
            </td>
            <td style={{ padding: "var(--space-1)", textAlign: "right" }}>
              {player.games_seen}
            </td>
          </tr>
        );
      }

      function WizardIdentityTable({ identities, selectedIds, onToggle }) {
        return (
          <table style={{ width: "100%", borderCollapse: "collapse",
                           fontSize: "var(--font-size-sm)" }}>
            <thead>
              <tr style={{ color: "var(--color-text-secondary)" }}>
                <th style={{ textAlign: "left",  padding: "var(--space-1)" }}>Pick</th>
                <th style={{ textAlign: "left",  padding: "var(--space-1)" }}>Name</th>
                <th style={{ textAlign: "left",  padding: "var(--space-1)" }}>Character ID</th>
                <th style={{ textAlign: "right", padding: "var(--space-1)" }}>Games</th>

            </thead>
            <tbody>

                <WizardIdentityRow key={p.character_id} player={p}

                                   onToggle={onToggle} />

      }

        const count = (selectedIds || []).length;
        return (
          <div style={{ padding: "var(--space-6)" }}>
            <h2 id="wizard-title" style={{ fontSize: "var(--font-size-xl)",
                                            marginBottom: "var(--space-3)" }}>
              Which of these are you?
            </h2>
            <p style={{ fontSize: "var(--font-size-sm)",
                        color: "var(--color-text-secondary)",
                        marginBottom: "var(--space-4)" }}>
              Check every account that's yours &mdash; including alt regions
              and other Battle.net accounts. The most-played one becomes
              your primary identity; the others are tracked for stat
              filtering and SC2Pulse aggregation.
            </p>
            {scanning ? <div style={{ color: "var(--color-text-muted)" }}>Scanning replays…</div> : null}
            <WizardError>{scanError}</WizardError>
            <WizardIdentityTable identities={identities}
                                 selectedIds={selectedIds}
                                 onToggle={onToggle} />
            <WizardNavRow>
              <WizardButton kind="secondary" onClick={onBack}>Back</WizardButton>
              <WizardButton kind="secondary" onClick={onRescan}>Rescan</WizardButton>
              <WizardButton onClick={onNext} disabled={count === 0}>
                Next ({count})

            </WizardNavRow>
          </div>

      }

        return (
          <label htmlFor={id} style={{
            flex: "1 1 140px",
            background: sel ? "var(--color-bg-elevated)" : "var(--color-bg-primary)",
            border: sel

            borderRadius: "var(--radius-md)",
            padding: "var(--space-3)", cursor: "pointer",
            display: "flex", alignItems: "center", gap: "var(--space-2)",

            <input id={id} type="checkbox"

      function WizardStepRace({ selectedRaces, onToggle, onNext, onBack }) {

            <fieldset style={{ border: "none", padding: 0 }}>
              <legend style={{ fontSize: "var(--font-size-sm)",

                               marginBottom: "var(--space-3)" }}>
                Pick every race you regularly play. Single-race players

              </legend>
              <div style={{ display: "flex", gap: "var(--space-2)",

                {WIZARD_RACES.map((r) => (

            <WizardNavRow>
              <WizardButton kind="secondary" onClick={onBack}>Back</WizardButton>

      // ---- Step 5: Integrations (3 collapsible cards) -----------

      function WizardIntegrationCard({ title, expanded, onToggle, children }) {
        return (
          <div style={{
            background: "var(--color-bg-elevated)",
            border: "1px solid var(--color-border-subtle)",
            borderRadius: "var(--radius-md)",
            marginBottom: "var(--space-2)",

            <button type="button" onClick={onToggle} aria-expanded={expanded}

      function WizardTestStatus({ status }) {
        if (!status) return null;
        const colorMap = {

          testing: "var(--color-text-muted)",

        return (
          <div role="status" aria-live="polite"

                        fontSize: "var(--font-size-xs)",

      function WizardHowTo({ title, steps }) {
        return (
          <details style={{
            marginBottom: "var(--space-3)",
            background: "var(--color-bg-primary)",

            <summary style={{

      function WizardCopyBox({ value }) {
        const [copied, setCopied] = useState(false);
        const onCopy = async () => {
          try {

            setCopied(true);
            setTimeout(() => setCopied(false), 1500);
          } catch (_e) { /* no-op */ }

          <div style={{ display: "flex", gap: "var(--space-2)",

            <code style={{

              padding: "var(--space-2) var(--space-3)",

              borderRadius: "var(--radius-md)",
              fontFamily: "var(--font-family-mono)",
              fontSize: "var(--font-size-sm)",
              wordBreak: "break-all",
            }}>{value}</code>
            <WizardButton kind="secondary" onClick={onCopy}>
              {copied ? "Copied!" : "Copy"}
            </WizardButton>
          </div>
        );

        0: "Bronze", 1: "Silver", 2: "Gold", 3: "Platinum",

        const isSel = (selectedIds || []).includes(match.pulse_id);
        const league = PULSE_LEAGUE_LABEL[match.league_max];

          (match.rating_max != null) ? `MMR ${match.rating_max}` : null,
          (match.games_played != null) ? `${match.games_played} games` : null,

          <div style={{
            display: "flex", gap: "var(--space-2)",
            alignItems: "center", padding: "var(--space-2)",
            background: isSel
              ? "var(--color-bg-elevated)" : "var(--color-bg-primary)",
            border: isSel
              ? "1px solid var(--color-info)"
              : "1px solid var(--color-border-subtle)",
            borderRadius: "var(--radius-md)",
            marginBottom: "var(--space-2)",
          }}>
            <div style={{ flex: 1, fontSize: "var(--font-size-sm)" }}>
              <div style={{ color: "var(--color-text-primary)" }}>
                {match.name || "(unnamed)"}

              <div style={{
                color: "var(--color-text-muted)",
                fontSize: "var(--font-size-xs)",
                fontFamily: "var(--font-family-mono)",
              }}>
                pulse_id={match.pulse_id} {meta ? "· " + meta : ""}

            </div>
            <WizardButton kind={isSel ? "primary" : "secondary"}
                          onClick={() => onPick(match)}>
              {isSel ? "Picked ✓" : "This one"}
            </WizardButton>
          </div>

      }

      function WizardPulseSearchResults({ pulse, onPick }) {
        const matches = pulse.matches || [];
        if (pulse.searchStatus?.kind === "fail") {
          return <WizardError>{pulse.searchStatus.message}</WizardError>;
        }
        if (matches.length === 0 && pulse.searchStatus?.kind === "ok") {
          return (
            <p style={{ fontSize: "var(--font-size-sm)",
                        color: "var(--color-text-secondary)" }}>
              No SC2Pulse profile found for that name. Try a different
              spelling or check the player exists on
              sc2pulse.nephest.com.
            </p>
          );
        }
        if (matches.length === 0) return null;
        return (
          <div style={{ marginBottom: "var(--space-3)" }}>
            <div style={{ fontSize: "var(--font-size-xs)",
                          color: "var(--color-text-secondary)",
                          marginBottom: "var(--space-2)" }}>
              Multiple matches? Pick every row that's yours &mdash;
              multi-region / alt accounts are normal here.
            </div>
            {matches.map((m) => (
              <WizardPulseMatchRow key={m.pulse_id} match={m}
                                   selectedIds={pulse.character_ids}
                                   onPick={onPick} />
            ))}
          </div>
        );
      }

      function WizardPulseCard({ pulse, onChange, onSearch, onPickMatch,
                                  onTest, expanded, onToggle }) {
        const busy = pulse.status?.kind === "testing";
        const searching = pulse.searchStatus?.kind === "searching";
        const term = pulse.search_term || "";
        return (
          <WizardIntegrationCard title="SC2Pulse (recommended) — live MMR"
                                 expanded={expanded} onToggle={onToggle}>
            <p style={{ fontSize: "var(--font-size-sm)",
                        color: "var(--color-text-secondary)",
                        marginBottom: "var(--space-3)" }}>
              SC2Pulse is the community ladder API. Search by your in-game

            </p>
            <WizardField label="Search by name" htmlFor="wzr-pulse-name"
                         hint="Default-filled from your Step 3 identity. Change if needed.">
              <div style={{ display: "flex", gap: "var(--space-2)" }}>
                <WizardInput id="wzr-pulse-name"
                             placeholder="e.g. ReSpOnSe"
                             value={term}
                             onChange={(e) => onChange({ search_term: e.target.value })} />
                <WizardButton kind="secondary" onClick={onSearch}
                              disabled={!term || searching}>
                  {searching ? "Searching…" : "Search"}

              </div>
            </WizardField>
            <WizardPulseSearchResults pulse={pulse} onPick={onPickMatch} />
            {(pulse.character_ids || []).length > 0 ? (
              <div style={{
                fontSize: "var(--font-size-xs)",
                color: "var(--color-text-muted)",
                marginBottom: "var(--space-2)",
              }}>
                Picked {(pulse.character_ids || []).length}:
                {" "}{(pulse.character_ids || []).join(", ")}
              </div>
            ) : null}
            <WizardButton kind="secondary" onClick={onTest}
                          disabled={(pulse.character_ids || []).length === 0 || busy}>
              {busy ? "Testing…" : "Test connection"}
            </WizardButton>
            <WizardTestStatus status={pulse.status} />
          </WizardIntegrationCard>
        );
      }

      function WizardTwitchCard({ twitch, onChange, onTest, expanded, onToggle }) {

          <WizardIntegrationCard title="Twitch — chat bot for !commands"

                        color: "var(--color-text-secondary)",
                        marginBottom: "var(--space-3)" }}>

              in your chat. Skip this if you don't stream.

            <WizardHowTo title="How do I generate an OAuth token?"
              steps={[
                <span key="s1">Open <a href="https://twitchtokengenerator.com"

                "Pick \"Bot Chat Token\" (the 2nd option).",

            <WizardField label="OAuth token" htmlFor="wzr-twitch-tok"

      function WizardObsCard({ obs, onChange, onTest, expanded, onToggle }) {

          <WizardIntegrationCard title="OBS Studio — control + overlay"

      const WIZARD_STREAMLABS_HOWTO_OBS = [
        "In OBS, click the + under Sources and pick \"Browser\".",
        "Name it after the widget and click OK.",
        "Paste that widget\u2019s URL into the URL field.",
        "Set Width and Height to the suggested values shown above.",
        "Tick \"Refresh browser when scene becomes active\".",
        "Click OK, then drag the source to where you want it.",
        "Repeat for each widget you want.",
      ];

      function useWizardStreamlabsState() {
        const [showAll, setShowAll] = useState(false);
        const [allCopied, setAllCopied] = useState(false);
        const visible = showAll
          ? WIZARD_OVERLAY_WIDGETS
          : WIZARD_OVERLAY_WIDGETS.filter((w) => w.recommended);
        const copyAllUrls = async () => {
          const urls = visible
            .map((w) => `${w.title}\t${WIZARD_OVERLAY_URL}widgets/${w.file}`)
            .join("\n");
          try {
            await navigator.clipboard.writeText(urls);
            setAllCopied(true);
            setTimeout(() => setAllCopied(false), 1500);
          } catch (_e) { /* clipboard API may be blocked */ }
        };
        return { showAll, setShowAll, visible, copyAllUrls, allCopied };
      }

      function WizardStreamlabsCard({ expanded, onToggle }) {
        const s = useWizardStreamlabsState();
        return (
          <WizardIntegrationCard title="Streamlabs / OBS Browser Source"
                                 expanded={expanded} onToggle={onToggle}>
            <p style={{ fontSize: "var(--font-size-sm)",
                        color: "var(--color-text-secondary)",
                        marginBottom: "var(--space-3)" }}>
              Each card below is its own Browser Source URL. Add only the
              widgets you want and drag them around your scene independently.
              The four <span style={{ color: "var(--color-success)" }}>
              RECOMMENDED</span> widgets cover most stream needs.
            </p>
            <WizardStreamlabsToolbar
              showAll={s.showAll}
              onToggleShowAll={() => s.setShowAll(!s.showAll)}
              visibleCount={s.visible.length}
              totalCount={WIZARD_OVERLAY_WIDGETS.length}
              onCopyAll={s.copyAllUrls}
              allCopied={s.allCopied} />
            {s.visible.map((w) => (
              <WizardWidgetRow key={w.file} widget={w}
                               baseUrl={WIZARD_OVERLAY_URL} />
            ))}
            <WizardStreamlabsAllInOne />
            <WizardHowTo title="How do I add a widget in Streamlabs Desktop?"
              steps={WIZARD_STREAMLABS_HOWTO_STREAMLABS} />
            <WizardHowTo title="How do I add a widget in OBS Studio?"
              steps={WIZARD_STREAMLABS_HOWTO_OBS} />
            <p style={{ fontSize: "var(--font-size-xs)",
                        color: "var(--color-text-muted)" }}>
              Tip: keep this app&apos;s server running while you stream.
              Widgets connect to it for live data and update whenever a
              new replay lands.
            </p>
          </WizardIntegrationCard>
        );
      }

      function WizardStepIntegrations({ twitch, obs, pulse,
                                        onChangeTwitch, onChangeObs, onChangePulse,
                                        onTest, onSkipAll, onNext, onBack }) {
        const [open, setOpen] = useState({
          pulse: true, streamlabs: false, twitch: false, obs: false });
        const toggle = (k) => setOpen({ ...open, [k]: !open[k] });

          <div style={{ padding: "var(--space-6)" }}>
            <h2 id="wizard-title" style={{ fontSize: "var(--font-size-xl)",

              Optional: connect your stack
            </h2>
            <p style={{ fontSize: "var(--font-size-sm)",
                        color: "var(--color-text-secondary)",
                        marginBottom: "var(--space-4)" }}>
              Each card has a "How do I…" expander with step-by-step
              instructions. None of these are required &mdash; skip any
              you don't use.
            </p>
            <WizardPulseCard pulse={pulse} onChange={onChangePulse}
                             onSearch={() => onTest("pulse-search")}
                             onPickMatch={(m) => onTest("pulse-pick", m)}
                             onTest={() => onTest("pulse")}
                             expanded={open.pulse}
                             onToggle={() => toggle("pulse")} />
            <WizardStreamlabsCard expanded={open.streamlabs}
                                  onToggle={() => toggle("streamlabs")} />
            <WizardTwitchCard twitch={twitch} onChange={onChangeTwitch}
                              onTest={() => onTest("twitch")}
                              expanded={open.twitch}
                              onToggle={() => toggle("twitch")} />
            <WizardObsCard obs={obs} onChange={onChangeObs}
                           onTest={() => onTest("obs")}
                           expanded={open.obs}
                           onToggle={() => toggle("obs")} />
            <WizardNavRow>

      // ---- Step 6: Apply ----------------------------------------

      function WizardSummaryRow({ label, value }) {
        return (
          <div style={{ display: "flex", gap: "var(--space-3)",
                        padding: "var(--space-2) 0",
                        borderBottom: "1px solid var(--color-divider)" }}>

      function WizardStepApply({ summary, applying, applyError, onApply, onBack }) {
        return (
          <div style={{ padding: "var(--space-6)" }}>
            <h2 id="wizard-title" style={{ fontSize: "var(--font-size-xl)",
                                            marginBottom: "var(--space-3)" }}>
              Ready to save
            </h2>
            <dl style={{ fontSize: "var(--font-size-sm)" }}>
              {summary.map((row) => (
                <WizardSummaryRow key={row.label}
                                  label={row.label} value={row.value} />
              ))}
            </dl>
            <WizardError>{applyError}</WizardError>
            <WizardNavRow>
              <WizardButton kind="secondary" onClick={onBack} disabled={applying}>
                Back
              </WizardButton>
              <WizardButton onClick={onApply} disabled={applying}>

      // ---- Async helpers -----------------------------------------

      async function wizardFetchJson(url, init) {
        const res = await fetch(url, init || {});
        let body = null;
        try { body = await res.json(); } catch (_e) { /* may be empty */ }
        return { ok: res.ok, status: res.status, body: body || {} };
      }

      function wizardEmptyTwitch() { return { channel: "", oauth_token: "", status: null }; }
      function wizardEmptyObs() {
        return { host: WIZARD_DEFAULT_OBS_HOST, port: WIZARD_DEFAULT_OBS_PORT,
                 password: "", status: null };
      }
      function wizardEmptyPulse() {
        return {
          character_ids: [], status: null,
          search_term: "", matches: [], searchStatus: null,
        };
      }

      function wizardJsonInit(body) {
        return {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        };
      }

      async function wizardTestTwitch(twitch, setTwitch) {
        setTwitch({ ...twitch, status: { kind: "testing", message: "Testing…" } });
        const r = await wizardFetchJson("/api/onboarding/test/twitch",
            wizardJsonInit({ channel: twitch.channel,
                             oauth_token: twitch.oauth_token }));
        const ok = r.ok && r.body.ok;
        setTwitch({ ...twitch, status: {
          kind: ok ? "ok" : "fail",
          message: ok ? `Connected as ${r.body.login}.`
                      : (r.body.error || "Connection failed."),
        } });
      }

      async function wizardTestObs(obs, setObs) {
        setObs({ ...obs, status: { kind: "testing", message: "Testing…" } });
        const r = await wizardFetchJson("/api/onboarding/test/obs",
            wizardJsonInit({ host: obs.host, port: obs.port,
                             password: obs.password || "" }));
        const ok = r.ok && r.body.ok;
        setObs({ ...obs, status: {
          kind: ok ? "ok" : "fail",
          message: ok ? "Connected to obs-websocket."
                      : (r.body.error || "Connection failed."),
        } });
      }

      async function wizardSearchPulse(pulse, setPulse) {
        const term = (pulse.search_term || "").trim();
        if (!term) return;
        setPulse({ ...pulse,
          searchStatus: { kind: "searching", message: "Searching…" } });
        const r = await wizardFetchJson("/api/onboarding/search-pulse",
            wizardJsonInit({ name: term }));
        const matches = (r.body && r.body.matches) || [];
        const ok = r.ok && r.body.ok;
        setPulse({ ...pulse,
          matches,
          searchStatus: ok
            ? { kind: "ok", message: "" }
            : { kind: "fail",
                message: (r.body && r.body.error) || "Search failed." } });
      }

      function wizardPickPulseMatch(pulse, setPulse, match) {
        const cur = pulse.character_ids || [];
        const next = cur.includes(match.pulse_id)
          ? cur.filter((id) => id !== match.pulse_id)
          : [...cur, match.pulse_id];
        setPulse({ ...pulse, character_ids: next, status: null });
      }

      async function wizardTestPulse(pulse, setPulse) {
        const ids = pulse.character_ids || [];
        if (ids.length === 0) return;
        setPulse({ ...pulse, status: { kind: "testing", message: "Testing…" } });
        const r = await wizardFetchJson("/api/onboarding/test/pulse",
            wizardJsonInit({ character_ids: ids }));
        const ok = r.ok && r.body.ok;
        const results = (r.body && r.body.results) || [];
        const summary = ok
          ? results.map((x) => `${x.name || "?"} (${x.region || "?"})`).join(", ")
          : "";
        setPulse({ ...pulse,
          status: {
            kind: ok ? "ok" : "fail",
            message: ok
              ? `Verified ${results.length} profile(s): ${summary}`
              : (r.body.error || "Pulse lookup failed."),
          },
        });
      }

      function wizardPickPrimary(identities) {
        if (!Array.isArray(identities) || identities.length === 0) return null;
        let best = identities[0];
        for (const p of identities) {
          if ((p.games_seen || 0) > (best.games_seen || 0)) best = p;
        }
        return best;
      }

      function wizardRegionFromCharacterId(cid) {
        const lead = (cid || "").split("-")[0];
        return ({ "1": "us", "2": "eu", "3": "kr",
                  "5": "cn", "6": "sea" })[lead] || "us";
      }

      // Account_id resolution: identity_cli.py lifts the real Battle.net
      // account_id from the replay folder path (Accounts/<id>/<toon>/...).
      // When a custom path doesn't match that layout, fall back to the
      // toon_handle's last numeric segment so the schema regex still
      // validates.
      function wizardAccountIdFor(player) {
        if (!player) return "0";
        if (player.account_id) return String(player.account_id);
        const cid = player.character_id || "";
        const tail = cid.split("-")[3] || "0";
        return tail;
      }

      function wizardBuildProfile(state) {
        const primary = wizardPickPrimary(state.identities);
        if (!primary) return null;
        const battle_tag = `${primary.name}#0`;
        const region = state.pulse.region
            || wizardRegionFromCharacterId(primary.character_id);
        const account_id = wizardAccountIdFor(primary);
        return {
          version: 1,
          battlenet: { battle_tag,
                       character_id: primary.character_id,
                       account_id, region },
          races: Array.isArray(state.races) && state.races.length
            ? state.races : ["Protoss"],
          mmr_target: null,
          preferred_player_name_in_replays: primary.name,
        };
      }

      function wizardBuildConfig(state) {
        const identities = (Array.isArray(state.identities) ? state.identities : [])
          .map((p) => ({
            name: p.name,
            character_id: p.character_id,
            account_id: wizardAccountIdFor(p),
            region: wizardRegionFromCharacterId(p.character_id),
          }));
        return {
          version: 1,
          paths: {
            sc2_install_dir: "",
            replay_folders: Array.isArray(state.folders) ? state.folders : [],
          },
          identities,
          macro_engine: {
            enabled_disciplines: ["chrono", "inject", "mule"],
            minimum_game_length_sec: 60,
            engine_version: "2026-04-chain-counted",
          },
          build_classifier: {
            active_definition_ids: [],
            use_custom_builds: true,
            use_community_shared_builds: true,
          },
          stream_overlay: {
            enabled: !!(state.twitch.oauth_token || state.obs.password),
            twitch_channel: state.twitch.channel || null,
            obs_websocket: {
              host: state.obs.host || WIZARD_DEFAULT_OBS_HOST,
              port: state.obs.port || WIZARD_DEFAULT_OBS_PORT,
              password: state.obs.password || null,
            },
            pulse_character_ids: Array.isArray(state.pulse.character_ids)
              ? state.pulse.character_ids.slice() : [],
          },
          telemetry: { opt_in: false },
          ui: { theme: "dark", default_perspective: "me" },
        };
      }

      function wizardAggregateRaces(identities) {
        const sums = { Protoss: 0, Terran: 0, Zerg: 0, Random: 0 };
        for (const p of identities || []) {
          const r = (p && p.races) || {};
          sums.Protoss += r.Protoss || 0;
          sums.Terran  += r.Terran  || 0;
          sums.Zerg    += r.Zerg    || 0;
          sums.Random  += r.Random  || 0;
        }
        return sums;
      }

      // Threshold: a race must have at least 5% of games OR 5 raw games
      // to auto-check. Below that, the user can still tick it manually.
      const WIZARD_RACE_AUTO_PCT = 0.05;
      const WIZARD_RACE_AUTO_FLOOR = 5;

      function wizardPickAutoRaces(identities) {
        const sums = wizardAggregateRaces(identities);
        const total = sums.Protoss + sums.Terran + sums.Zerg + sums.Random;
        if (total === 0) return [];
        const out = [];
        for (const r of WIZARD_RACES) {
          const n = sums[r] || 0;
          if (n >= WIZARD_RACE_AUTO_FLOOR
              || n / total >= WIZARD_RACE_AUTO_PCT) {
            out.push(r);
          }
        }
        return out;
      }

      function wizardSummary(state) {
        const folderLabel = Array.isArray(state.folders) && state.folders.length
          ? `${state.folders.length} folder(s):\n${state.folders.join("\n")}`
          : null;
        const ids = Array.isArray(state.identities) ? state.identities : [];
        const primary = wizardPickPrimary(ids);
        const idLabel = ids.length
          ? `${ids.length} identity(ies):\n` + ids
              .map((p) => `${p.name} (${p.character_id})`).join("\n")
          : null;
        const raceLabel = Array.isArray(state.races) && state.races.length
          ? state.races.join(", ") : null;
        return [
          { label: "Replay folders",      value: folderLabel },
          { label: "Identities",          value: idLabel },
          { label: "Primary",
            value: primary ? `${primary.name} (${primary.character_id})` : null },
          { label: "Races",               value: raceLabel },
          { label: "Twitch channel",      value: state.twitch.channel },
          { label: "OBS host:port",
            value: state.obs.password ? `${state.obs.host}:${state.obs.port}` : null },
          { label: "SC2Pulse profile(s)",
            value: (state.pulse.character_ids || []).length
              ? `${state.pulse.character_ids.length}: `
                + state.pulse.character_ids.join(", ")
              : null },
        ];
      }

      async function wizardApply(state, setApplying, setApplyError, onComplete) {
        setApplying(true); setApplyError("");
        const profile = wizardBuildProfile(state);
        if (!profile) {
          setApplying(false);
          setApplyError("Pick at least one identity in step 3.");
          return;
        }
        const r1 = await wizardFetchJson("/api/profile",
            { ...wizardJsonInit(profile), method: "PUT" });
        if (!r1.ok) {
          setApplying(false);
          setApplyError("Profile save failed: "
              + JSON.stringify(r1.body.errors || r1.body.error));
          return;
        }
        const r2 = await wizardFetchJson("/api/config",
            { ...wizardJsonInit(wizardBuildConfig(state)), method: "PUT" });
        if (!r2.ok) {
          setApplying(false);
          setApplyError("Config save failed: "
              + JSON.stringify(r2.body.errors || r2.body.error));
          return;
        }
        // Best-effort: never blocks completion if backfill kickoff fails.
        await wizardFetchJson("/api/onboarding/start-initial-backfill",
            { method: "POST" });
        setApplying(false);
        if (typeof onComplete === "function") onComplete();
      }


      function WizardStepImport({ folders, onNext, onBack, onSkip }) {
        // Reuses SettingsImportPanel by faking the pendingConfig shape it
        // expects. Lets a brand-new user kick off a historical replay
        // import as part of onboarding -- the import then runs in the
        // background while they finish the rest of the wizard.
        const fakePendingConfig = {
          paths: { replay_folders: Array.isArray(folders) ? folders : [] },
        };
        return (
          <WizardCard>
            <h2 id="wizard-title"
              className="text-xl font-semibold text-neutral-100">
              Import your past replays (optional)
            </h2>
            <p className="text-sm text-neutral-400 mt-2">
              We can scan your replay folder for games you played before
              installing this app and import them all at once. This is
              optional — you can also skip it and only track new games
              going forward.
            </p>
            <p className="text-xs text-neutral-500 mt-1">
              The import runs in the background, so you can continue with
              the rest of the wizard while it works.
            </p>
            <div className="mt-4">
              <SettingsImportPanel pendingConfig={fakePendingConfig} />
            </div>
            <WizardNavRow>
              <WizardButton kind="ghost" onClick={onBack}>
                Back
              </WizardButton>
              <WizardButton kind="ghost" onClick={onSkip}>
                Skip
              </WizardButton>
              <WizardButton kind="primary" onClick={onNext}>
                Continue
              </WizardButton>
            </WizardNavRow>
          </WizardCard>
        );
      }

      // ---- Wizard step dispatcher --------------------------------

      function WizardBody({ step, ctx }) {
        if (step === 1) return <WizardStepWelcome onNext={() => ctx.setStep(2)}
                                                  onSkip={ctx.onSkipWizard} />;
        if (step === 2) return <WizardStepReplays
            folders={ctx.folders} scanning={ctx.foldersLoading}
            scanError={ctx.foldersError}
            selected={ctx.selectedFolders}
            onToggle={ctx.onToggleFolder}
            customInput={ctx.customInput}
            onCustomInput={ctx.setCustomInput}
            onAddCustom={ctx.onAddCustomFolder}
            onRescan={ctx.scanFolders}
            onNext={ctx.goNextFromReplays}
            onBack={() => ctx.setStep(1)} />;
        if (step === 3) return <WizardStepIdentity
            scanning={ctx.identitiesLoading} scanError={ctx.identitiesError}
            identities={ctx.identities}
            selectedIds={(ctx.selectedIdentities || []).map((p) => p.character_id)}
            onToggle={ctx.onToggleIdentity}
            onRescan={() => ctx.scanIdentities(ctx.selectedFolders || [])}
            onNext={() => ctx.setStep(4)} onBack={() => ctx.setStep(2)} />;
        if (step === 4) return <WizardStepRace
            selectedRaces={ctx.selectedRaces}
            onToggle={ctx.onToggleRace}
            onNext={() => ctx.setStep(5)} onBack={() => ctx.setStep(3)} />;
        if (step === 5) return <WizardStepImport
            folders={ctx.selectedFolders}
            onNext={() => ctx.setStep(6)}
            onBack={() => ctx.setStep(4)}
            onSkip={() => ctx.setStep(6)} />;
        if (step === 6) return <WizardStepIntegrations
            twitch={ctx.twitch} obs={ctx.obs} pulse={ctx.pulse}
            onChangeTwitch={(p) => ctx.setTwitch({ ...ctx.twitch, ...p, status: null })}
            onChangeObs={(p) => ctx.setObs({ ...ctx.obs, ...p, status: null })}
            onChangePulse={(p) => ctx.setPulse({ ...ctx.pulse, ...p, status: null })}
            onTest={ctx.onTest} onSkipAll={() => ctx.setStep(7)}
            onNext={() => ctx.setStep(7)} onBack={() => ctx.setStep(5)} />;
        if (step === 7) return <WizardStepApply
            summary={wizardSummary({
              folders: ctx.selectedFolders,
              identities: ctx.selectedIdentities,
              races: ctx.selectedRaces,
              twitch: ctx.twitch, obs: ctx.obs, pulse: ctx.pulse,
            })}
            applying={ctx.applying}
            applyError={ctx.applyError}
            onApply={ctx.onApply} onBack={() => ctx.setStep(6)} />;
        return null;
      }

      // ---- Wizard hooks ------------------------------------------

      function useWizardState() {
        const [step, setStep] = useState(1);
        const [folders, setFolders] = useState([]);
        const [selectedFolders, setSelectedFolders] = useState([]);
        const [customInput, setCustomInput] = useState("");
        const [foldersLoading, setFoldersLoading] = useState(false);
        const [foldersError, setFoldersError] = useState("");
        const [identities, setIdentities] = useState([]);
        const [selectedIdentities, setSelectedIdentities] = useState([]);
        const [identitiesLoading, setIdentitiesLoading] = useState(false);
        const [identitiesError, setIdentitiesError] = useState("");
        const [selectedRaces, setSelectedRaces] = useState([]);
        const [twitch, setTwitch] = useState(wizardEmptyTwitch());
        const [obs, setObs] = useState(wizardEmptyObs());
        const [pulse, setPulse] = useState(wizardEmptyPulse());
        const [applying, setApplying] = useState(false);
        const [applyError, setApplyError] = useState("");
        return {
          step, setStep,
          folders, setFolders,
          selectedFolders, setSelectedFolders,
          customInput, setCustomInput,
          foldersLoading, setFoldersLoading,
          foldersError, setFoldersError,
          identities, setIdentities,
          selectedIdentities, setSelectedIdentities,
          identitiesLoading, setIdentitiesLoading,
          identitiesError, setIdentitiesError,
          selectedRaces, setSelectedRaces,
          twitch, setTwitch, obs, setObs, pulse, setPulse,
          applying, setApplying, applyError, setApplyError,
        };
      }

      // ---- Scan-orchestration hook -------------------------------

      function useWizardScans(s) {
        const scanFolders = useCallback(async () => {
          s.setFoldersLoading(true); s.setFoldersError("");
          const r = await wizardFetchJson(
              "/api/onboarding/scan-replay-folders", { method: "POST" });
          s.setFoldersLoading(false);
          if (!r.ok) { s.setFoldersError("Folder scan failed."); return; }
          const list = r.body.folders || [];
          s.setFolders(list);
          if (list.length && (s.selectedFolders || []).length === 0) {
            s.setSelectedFolders([list[0].path]);
          }
        }, [s.selectedFolders]);

        const scanIdentities = useCallback(async (paths) => {
          s.setIdentitiesLoading(true); s.setIdentitiesError("");
          const r = await wizardFetchJson("/api/onboarding/scan-identities",
              wizardJsonInit({ folders: paths,
                               sample_size: WIZARD_IDENTITY_SAMPLE }));
          s.setIdentitiesLoading(false);
          if (!r.ok || r.body.ok === false) {
            s.setIdentitiesError(r.body.error || "Identity scan failed.");
            return;
          }
          const list = r.body.players || [];
          s.setIdentities(list);
          if (list.length && (s.selectedIdentities || []).length === 0) {
            s.setSelectedIdentities([list[0]]);
          }
        }, [s.selectedIdentities]);

        return { scanFolders, scanIdentities };
      }

      function useWizardHandlers(s) {
        const onToggleFolder = (p) => {
          const cur = s.selectedFolders || [];
          if (cur.includes(p)) {
            s.setSelectedFolders(cur.filter((x) => x !== p));
          } else {
            s.setSelectedFolders([...cur, p]);
          }
        };

        const onAddCustomFolder = () => {
          const path = (s.customInput || "").trim();
          if (!path) return;
          const cur = s.selectedFolders || [];
          if (!cur.includes(path)) s.setSelectedFolders([...cur, path]);
          s.setCustomInput("");
        };

        const onToggleIdentity = (player) => {
          const cur = s.selectedIdentities || [];
          const i = cur.findIndex((p) => p.character_id === player.character_id);
          if (i >= 0) {
            s.setSelectedIdentities(cur.filter((_, j) => j !== i));
          } else {
            s.setSelectedIdentities([...cur, player]);
          }
        };

        const onToggleRace = (race) => {
          const cur = s.selectedRaces || [];
          if (cur.includes(race)) {
            s.setSelectedRaces(cur.filter((r) => r !== race));
          } else {
            s.setSelectedRaces([...cur, race]);
          }
        };

        return { onToggleFolder, onAddCustomFolder,
                 onToggleIdentity, onToggleRace };
      }

      function wizardOnTest(s, which, payload) {
        if (which === "twitch")       return wizardTestTwitch(s.twitch, s.setTwitch);
        if (which === "obs")          return wizardTestObs(s.obs, s.setObs);
        if (which === "pulse")        return wizardTestPulse(s.pulse, s.setPulse);
        if (which === "pulse-search") return wizardSearchPulse(s.pulse, s.setPulse);
        if (which === "pulse-pick") {
          wizardPickPulseMatch(s.pulse, s.setPulse, payload);
          return null;
        }
        return null;
      }

      function useWizardEffects(s, scanFolders) {
        // Trigger the folder scan as soon as the user lands on Step 2
        // unless we already have results.
        useEffect(() => {
          if (s.step === 2 && s.folders.length === 0) scanFolders();
        }, [s.step, s.folders.length, scanFolders]);

        // Auto-prefill races from the aggregate race breakdown across
        // the selected identities. Only runs when the user hasn't yet
        // touched the race tiles -- manual edits aren't clobbered if
        // they go back and tweak.
        useEffect(() => {
          const ids = s.selectedIdentities || [];
          if (ids.length === 0) return;
          if ((s.selectedRaces || []).length > 0) return;
          const auto = wizardPickAutoRaces(ids);
          if (auto.length > 0) s.setSelectedRaces(auto);
        }, [s.selectedIdentities]);

        // Pre-fill the SC2Pulse search term from the primary identity
        // name once one is picked. Skip if user already typed something.
        useEffect(() => {
          const primary = wizardPickPrimary(s.selectedIdentities || []);
          if (!primary || !primary.name) return;
          if (s.pulse.search_term) return;
          if ((s.pulse.character_ids || []).length > 0) return;
          s.setPulse({ ...s.pulse, search_term: primary.name });
        }, [s.selectedIdentities]);
      }

      // ---- The wizard component itself ---------------------------


      function Wizard({ onComplete }) {
        const s = useWizardState();
        const { scanFolders, scanIdentities } = useWizardScans(s);

        useWizardEffects(s, scanFolders);

        const h = useWizardHandlers(s);

        const goNextFromReplays = () => {
          s.setSelectedIdentities([]);
          s.setIdentities([]); s.setIdentitiesError("");
          s.setStep(3);
          scanIdentities(s.selectedFolders || []);
        };

        const onTest = (which, payload) => wizardOnTest(s, which, payload);

        const onApply = () => wizardApply(
          { folders: s.selectedFolders,
            identities: s.selectedIdentities,
            races: s.selectedRaces,
            twitch: s.twitch, obs: s.obs, pulse: s.pulse },
          s.setApplying, s.setApplyError, onComplete);

        const onSkipWizard = () => {
          if (typeof onComplete === "function") onComplete();
        };

        const ctx = { ...s, ...h,
                      scanFolders, scanIdentities, goNextFromReplays,
                      onTest, onApply, onSkipWizard };

        return (
          <WizardCard>
            <WizardProgressStrip step={s.step} />
            <WizardBody step={s.step} ctx={ctx} />
          </WizardCard>
        );
      }

      async function settingsFetchJson(url, init) {
        const res = await fetch(url, init || {});
        let body = null;
        try { body = await res.json(); } catch (_e) { /* may be empty */ }
        return { ok: res.ok, status: res.status, body: body || {} };
      }

      function settingsSetByPath(obj, segs, value) {
        if (!segs.length) return value;
        const [head, ...rest] = segs;
        const next = (obj && typeof obj === "object" && !Array.isArray(obj))
          ? { ...obj } : {};
        next[head] = settingsSetByPath(next[head], rest, value);
        return next;
      }

      function settingsHumanizeBytes(n) {
        if (typeof n !== "number" || !Number.isFinite(n)) return "—";
        if (n < 1024) return n + " B";
        if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
        return (n / (1024 * 1024)).toFixed(1) + " MB";
      }

      function settingsFormatDate(iso) {
        if (!iso) return "—";
        try { return new Date(iso).toLocaleString(); }
        catch (_e) { return iso; }
      }

      function settingsArraysEqual(a, b) {
        if (a === b) return true;
        if (!Array.isArray(a) || !Array.isArray(b)) return false;
        if (a.length !== b.length) return false;
        for (let i = 0; i < a.length; i += 1) {
          if (!Object.is(a[i], b[i])) return false;
        }
        return true;
      }

      function settingsDiffPaths(a, b, path) {
        const here = path || [];
        if (Object.is(a, b)) return [];
        if (a === null || b === null
            || typeof a !== "object" || typeof b !== "object"
            || Array.isArray(a) !== Array.isArray(b)) {
          return [here];
        }
        if (Array.isArray(a)) {
          return settingsArraysEqual(a, b) ? [] : [here];
        }
        const keys = new Set([...Object.keys(a), ...Object.keys(b)]);
        const out = [];
        keys.forEach(k => {
          out.push(...settingsDiffPaths(a[k], b[k], [...here, k]));
        });
        return out;
      }

      function settingsCollectErrors(profileErrors, configErrors) {
        const out = {};
        const push = (key, msg) => {
          if (!key) return;
          out[key] = out[key] || [];
          out[key].push(msg);
        };
        const collect = (errs) => {
          if (!Array.isArray(errs)) return;
          errs.forEach(e => {
            const raw = String(e.instancePath || e.dataPath || "");
            const cleaned = raw.replace(/^\//, "").replace(/\//g, ".");
            const key = cleaned
              || (e.params && e.params.missingProperty)
              || "";
            push(key, e.message || "invalid value");
          });
        };
        collect(profileErrors); collect(configErrors);
        return out;
      }

        const count = body
          ? (body.replay_count != null

            : (Array.isArray(body.replays) ? body.replays.length : 0))
          : 0;
        if (typeof count === "number" && count > 0) {
          return { ok: true, message: "✓ " + count + " replays found", count };
        }
        return { ok: false, message: "✗ no replays detected", count: 0 };
      }

      function useSettingsFolderTests() {
        const [statuses, setStatuses] = useState({});
        const setOne = (key, val) =>
          setStatuses(prev => ({ ...prev, [key]: val }));
        const test = async (folder) => {
          setOne(folder, { ok: null, message: "Scanning…" });
          const r = await settingsFetchJson(
            "/api/onboarding/scan-replay-folders",
            { method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ single_path: folder }) });
          if (!r.ok) {
            setOne(folder, { ok: false,
              message: "✗ " + ((r.body && (r.body.error || "scan failed"))
                || "scan failed"),
              count: null });
            return;
          }
          setOne(folder, settingsFolderTestStatus(r.body));
        };
        return { statuses, test };
      }

      function useSettingsBackups() {
        const [list, setList] = useState([]);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [busy, setBusy] = useState(false);
        const [lastSafety, setLastSafety] = useState(null);
        const refresh = async () => {
          setLoading(true); setError(null);
          const r = await settingsFetchJson("/api/backups");
          setLoading(false);
          if (!r.ok) {
            setError((r.body && r.body.error) || "load failed");
            return;
          }
          setList(Array.isArray(r.body.backups) ? r.body.backups : []);
        };
        useEffect(() => { refresh(); }, []);
        return { list, loading, error, busy, setBusy,
                 lastSafety, setLastSafety, refresh };
      }

      async function settingsRunBackupAction(url, init, label) {
        const r = await settingsFetchJson(url, init);
        if (!r.ok) {
          window.alert(label + " failed: "
            + ((r.body && r.body.error) || r.status));
          return null;
        }
        return r.body;
      }

            + "Delete it ONLY if you've already verified the restore "
            + "succeeded. Continue?";
          if (!window.confirm(extra)) return false;
        }
        return window.confirm("Permanently delete " + snap.name
          + "? This cannot be undone.");

      function SettingsBackupsPanel() {
        const [createBase, setCreateBase] = useState("meta_database.json");
        const ctx = useSettingsBackups();
        const onCreate = async () => {
          ctx.setBusy(true);
          await settingsRunBackupAction("/api/backups/create", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ base: createBase }),
          }, "Create");
          ctx.setBusy(false); ctx.refresh();
        };
        const onRestore = async (snap) => {
          if (!settingsConfirmRestore(snap)) return;
          ctx.setBusy(true);
          const body = await settingsRunBackupAction(
            "/api/backups/restore",
            { method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ snapshot: snap.name }) },
            "Restore");
          ctx.setBusy(false);
          if (body && body.pre_restore_snapshot
              && body.pre_restore_snapshot.name) {
            ctx.setLastSafety(body.pre_restore_snapshot.name);
          }
          ctx.refresh();
        };
        const onDelete = async (snap) => {
          if (!settingsConfirmDelete(snap)) return;
          ctx.setBusy(true);
          await settingsRunBackupAction(
            "/api/backups/" + encodeURIComponent(snap.name),
            { method: "DELETE" }, "Delete");
          ctx.setBusy(false); ctx.refresh();
        };
        return (
          <div className="space-y-3">
            <SettingsBackupsToolbar createBase={createBase}
              setCreateBase={setCreateBase}
              onCreate={onCreate} onRefresh={ctx.refresh}
              busy={ctx.busy} loading={ctx.loading}
              lastSafety={ctx.lastSafety} error={ctx.error} />
            <SettingsBackupsTable list={ctx.list} loading={ctx.loading}
              onRestore={onRestore} onDelete={onDelete} />
          </div>
        );
      }
