        );
      }

      function SettingsBackupsEmptyRow({ message }) {
        return (
          <tr>
            <td colSpan="6"
                className="px-3 py-4 text-center text-neutral-500">
              {message}
            </td>
          </tr>
        );
      }

      function SettingsBackupsTableRows({ list, loading,
                                          onRestore, onDelete }) {
        if (loading) {
          return <SettingsBackupsEmptyRow message="Loading…" />;
        }
        if (list.length === 0) {
          return <SettingsBackupsEmptyRow message="No snapshots yet." />;
        }
        return list.map(s => (
          <SettingsBackupRow key={s.name} snap={s}
            onRestore={onRestore} onDelete={onDelete} />
        ));
      }

      function SettingsBackupsTable({ list, loading, onRestore, onDelete }) {
        return (
          <div className="overflow-auto border border-base-700 rounded">
            <table className="w-full text-sm">
              <thead className="text-[10px] uppercase tracking-wider
                                 text-neutral-500 bg-base-800/40">
                <tr>
                  <th className="px-3 py-2 text-left">Name</th>
                  <th className="px-3 py-2 text-left">Base</th>
                  <th className="px-3 py-2 text-left">Kind</th>
                  <th className="px-3 py-2 text-left">Size</th>
                  <th className="px-3 py-2 text-left">Modified</th>
                  <th className="px-3 py-2 text-right">Actions</th>
                </tr>
              </thead>
              <tbody>
                <SettingsBackupsTableRows list={list} loading={loading}
                  onRestore={onRestore} onDelete={onDelete} />
              </tbody>
            </table>
          </div>
        );
      }

      function SettingsBackupsPanel() {
        const [createBase, setCreateBase] = useState("meta_database.json");
        const ctx = useSettingsBackups();
        const onCreate = async () => {
          ctx.setBusy(true);
          await settingsRunBackupAction("/api/backups/create", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ base: createBase }),
          }, "Create");
          ctx.setBusy(false); ctx.refresh();
        };
        const onRestore = async (snap) => {
          if (!settingsConfirmRestore(snap)) return;
          ctx.setBusy(true);
          const body = await settingsRunBackupAction(
            "/api/backups/restore",
            { method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ snapshot: snap.name }) },
            "Restore");
          ctx.setBusy(false);
          if (body && body.pre_restore_snapshot
              && body.pre_restore_snapshot.name) {
            ctx.setLastSafety(body.pre_restore_snapshot.name);
          }
          ctx.refresh();
        };
        const onDelete = async (snap) => {
          if (!settingsConfirmDelete(snap)) return;
          ctx.setBusy(true);
          await settingsRunBackupAction(
            "/api/backups/" + encodeURIComponent(snap.name),
            { method: "DELETE" }, "Delete");
          ctx.setBusy(false); ctx.refresh();
        };
        return (
          <div className="space-y-3">
            <SettingsBackupsToolbar createBase={createBase}
              setCreateBase={setCreateBase}
              onCreate={onCreate} onRefresh={ctx.refresh}
              busy={ctx.busy} loading={ctx.loading}
              lastSafety={ctx.lastSafety} error={ctx.error} />
            <SettingsBackupsTable list={ctx.list} loading={ctx.loading}
              onRestore={onRestore} onDelete={onDelete} />
          </div>
        );
      }

      function SettingsDiagnosticsPanel() {
        return (
          <div className="space-y-3 max-w-xl">
            <p className="text-sm text-neutral-300">
              Diagnostics page is owned by Stage 4. The full health-check
              view will live at{" "}
              <code className="text-xs bg-base-900 px-1.5 py-0.5 rounded">
                /diagnostics
              </code>.
            </p>
            <p className="text-xs text-neutral-500">
              For now, the wizard's identity-scan and folder-scan endpoints
              are the closest equivalents; reproduce any error you saw in the
              wizard's "Test" steps from the other tabs on this page.
            </p>
          </div>
        );
      }

      function SettingsPrivacyPanel({ telemetry, errors, onPatch }) {
        const t = telemetry || {};
        return (
          <div className="space-y-4 max-w-xl">
            <SettingsCheckbox id="settings-telemetry-opt"
              checked={!!t.opt_in}
              onChange={(v) => onPatch(["telemetry", "opt_in"], v)}
              label="Send anonymized usage telemetry"
              hint={"Counts of events; never replay paths, opponent names, "
                + "battle tags, or push tokens."} />
            <SettingsErrorList errors={errors["telemetry.opt_in"]} />
            <div className="px-3 py-3 bg-base-900 border border-base-700
                            rounded">
              <div className="text-sm font-medium text-neutral-300">
                Retention
              </div>
              <p className="text-xs text-neutral-500 mt-1">
                Replay-derived stats stay on this machine. Backups are kept
                until you delete them. Logs roll over after 30 days.
              </p>
            </div>
            <div className="px-3 py-3 bg-base-900 border border-base-700
                            rounded opacity-70"
                 title="Cloud sync arrives in Stage 14.">
              <div className="text-sm font-medium text-neutral-300">
                Cloud sync (Stage 14)
              </div>
              <p className="text-xs text-neutral-500 mt-1">
                Opt-in cloud backup of profile/config/custom builds.
                Disabled until Stage 14 ships.
              </p>
            </div>
          </div>
        );
      }

      function SettingsAboutPanel({ ui, errors, onPatch }) {
        const u = ui || {};
        const [updateMsg, setUpdateMsg] = useState(null);
        const checkUpdate = () => {
          setUpdateMsg("Update channel not wired yet — Stage 14 owns this. "
            + "Visit GitHub to see the latest release.");
        };
        return (
          <div className="space-y-4 max-w-xl">
            <div className="grid grid-cols-2 gap-3">
              <div>
                <SettingsLabel htmlFor="settings-ui-theme">Theme</SettingsLabel>
                <SettingsSelect id="settings-ui-theme"
                  value={u.theme || "dark"}
                  onChange={(e) => onPatch(["ui", "theme"], e.target.value)}
                  options={[
                    { id: "dark",  label: "Dark" },
                    { id: "light", label: "Light" },
                  ]}
                  invalid={!!errors["ui.theme"]} />
                <SettingsErrorList errors={errors["ui.theme"]} />
              </div>
              <div>
                <SettingsLabel htmlFor="settings-ui-perspective">
                  Default perspective
                </SettingsLabel>
                <SettingsSelect id="settings-ui-perspective"
                  value={u.default_perspective || "me"}
                  onChange={(e) => onPatch(
                    ["ui", "default_perspective"], e.target.value)}
                  options={SETTINGS_PERSPECTIVES}
                  invalid={!!errors["ui.default_perspective"]} />
                <SettingsErrorList errors={errors["ui.default_perspective"]} />
              </div>
            </div>
            <div className="px-3 py-3 bg-base-900 border border-base-700
                            rounded space-y-2">
              <div className="text-sm text-neutral-300">
                SC2Tools v{SETTINGS_VERSION}
              </div>
              <div className="text-xs text-neutral-500">
                <a href={SETTINGS_GITHUB_URL} target="_blank"
                   rel="noopener noreferrer"
                   className="text-accent-300 hover:underline
                              focus-visible:underline">
                  View source on GitHub
                </a>
              </div>
              <SettingsButton kind="secondary" onClick={checkUpdate}>
                Check for updates
              </SettingsButton>
              {updateMsg ? (
                <p className="text-xs text-neutral-500">{updateMsg}</p>
              ) : null}
            </div>
          </div>
        );
      }

      // --- container ---------------------------------------------

      function useSettingsDocuments() {
        const [profile, setProfile] = useState(null);
        const [config, setConfig] = useState(null);
        const [pendingProfile, setPendingProfile] = useState(null);
        const [pendingConfig, setPendingConfig] = useState(null);
        const [loading, setLoading] = useState(true);
        const [loadError, setLoadError] = useState(null);
        const loadAll = async () => {
          setLoading(true); setLoadError(null);
          const [p, c] = await Promise.all([
            settingsFetchJson("/api/profile"),
            settingsFetchJson("/api/config"),
          ]);
          if (!p.ok || !c.ok) {
            setLoading(false);
            setLoadError("Couldn't load settings. "
              + "Open the wizard or check the backend is running.");
            return;
          }
          setProfile(p.body); setPendingProfile(p.body);
          setConfig(c.body); setPendingConfig(c.body);
          setLoading(false);
        };
        useEffect(() => { loadAll(); }, []);
        return { profile, config, pendingProfile, pendingConfig,
                 loading, loadError, loadAll,
                 setPendingProfile, setPendingConfig };
      }

      function useSettingsBuildDefinitions() {
        const [definitions, setDefinitions] = useState([]);
        const [defLoading, setDefLoading] = useState(true);
        const [defError, setDefError] = useState(null);
        useEffect(() => {
          let cancelled = false;
          (async () => {
            setDefLoading(true); setDefError(null);
            const r = await settingsFetchJson("/api/analyzer/definitions");
            if (cancelled) return;
            setDefLoading(false);
            if (!r.ok) {
              setDefError((r.body && r.body.error) || "load failed");
              return;
            }
            setDefinitions(Array.isArray(r.body.items) ? r.body.items : []);
          })();
          return () => { cancelled = true; };
        }, []);
        return { definitions, defLoading, defError };
      }

      function settingsBuildSaveTasks(dirtyProfile, dirtyConfig,
                                      pendingProfile, pendingConfig) {
        const tasks = [];
        if (dirtyProfile.length) {
          tasks.push(settingsFetchJson("/api/profile", {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(pendingProfile),
          }).then(r => ({ kind: "profile", r })));
        }
        if (dirtyConfig.length) {
          tasks.push(settingsFetchJson("/api/config", {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(pendingConfig),
          }).then(r => ({ kind: "config", r })));
        }
        return tasks;
      }

      function settingsExtractSaveErrors(results) {
        let pErrs = null, cErrs = null, anyFailed = false;
        results.forEach(({ kind, r }) => {
          if (r.ok) return;
          anyFailed = true;
          if (Array.isArray(r.body && r.body.errors)) {
            if (kind === "profile") pErrs = r.body.errors;
            else cErrs = r.body.errors;
          }
        });
        return { anyFailed, pErrs, cErrs };
      }

      function SettingsActivePanel({ tab, pendingProfile, pendingConfig,
                                     errors, patchProfile, patchConfig,
                                     defs }) {
        if (!pendingProfile || !pendingConfig) return null;
        switch (tab) {
          case "profile":
            return <SettingsProfilePanel profile={pendingProfile}
              errors={errors} onPatch={patchProfile} />;
          case "folders":
            return <SettingsFoldersPanel paths={pendingConfig.paths}
              errors={errors} onPatch={patchConfig} />;
          case "macro":
            return <SettingsMacroPanel
              macroEngine={pendingConfig.macro_engine}
              errors={errors} onPatch={patchConfig} />;
          case "builds":
            return <SettingsBuildsPanel
              classifier={pendingConfig.build_classifier}
              errors={errors} onPatch={patchConfig}
              definitions={defs.definitions} defLoading={defs.defLoading}
              defError={defs.defError} />;
          case "overlay":
            return <SettingsOverlayPanel
              overlay={pendingConfig.stream_overlay}
              errors={errors} onPatch={patchConfig} />;
          case "backups": return <SettingsBackupsPanel />;
          case "diagnostics": return <SettingsDiagnosticsPanel />;
          case "privacy":
            return <SettingsPrivacyPanel
              telemetry={pendingConfig.telemetry}
              errors={errors} onPatch={patchConfig} />;
          case "about":
            return <SettingsAboutPanel ui={pendingConfig.ui}
              errors={errors} onPatch={patchConfig} />;
          default: return null;
        }
      }

      function SettingsLoadFailure({ message, onRetry }) {
        return (
          <div className="space-y-2">
            <p className="text-sm text-loss-500">{message}</p>
            <SettingsButton kind="secondary" onClick={onRetry}>
              Retry
            </SettingsButton>
          </div>
        );
      }

      function settingsComputeDirty(docs) {
        const dirtyProfile = (docs.profile && docs.pendingProfile)
          ? settingsDiffPaths(docs.profile, docs.pendingProfile, []) : [];
        const dirtyConfig = (docs.config && docs.pendingConfig)
          ? settingsDiffPaths(docs.config, docs.pendingConfig, []) : [];
        return { dirtyProfile, dirtyConfig,
                 dirtyCount: dirtyProfile.length + dirtyConfig.length };
      }

      function settingsMakePatchers(docs) {
        return {
          patchProfile: (segs, value) => docs.setPendingProfile(
            prev => settingsSetByPath(prev || {}, segs, value)),
          patchConfig: (segs, value) => docs.setPendingConfig(
            prev => settingsSetByPath(prev || {}, segs, value)),
        };
      }

      function SettingsView({ dbRev: _dbRev }) {
        const [tab, setTab] = useState("profile");
        const docs = useSettingsDocuments();
        const defs = useSettingsBuildDefinitions();
        const [errors, setErrors] = useState({});
        const [saving, setSaving] = useState(false);
        const [saveError, setSaveError] = useState(null);
        const dirty = settingsComputeDirty(docs);
        const patchers = settingsMakePatchers(docs);
        const onDiscard = () => {
          docs.setPendingProfile(docs.profile);
          docs.setPendingConfig(docs.config);
          setErrors({}); setSaveError(null);
        };
        const onSave = async () => {
          setSaving(true); setSaveError(null); setErrors({});
          const tasks = settingsBuildSaveTasks(
            dirty.dirtyProfile, dirty.dirtyConfig,
            docs.pendingProfile, docs.pendingConfig);
          const verdict = settingsExtractSaveErrors(
            await Promise.all(tasks));
          if (verdict.anyFailed) {
            setSaving(false);
            setErrors(settingsCollectErrors(verdict.pErrs, verdict.cErrs));
            setSaveError("Some changes were rejected. See inline errors.");
            return;
          }
          await docs.loadAll(); setSaving(false);
        };
        if (docs.loading) {
          return <p className="text-sm text-neutral-500">Loading settings…</p>;
        }
        if (docs.loadError) {
          return <SettingsLoadFailure message={docs.loadError}
            onRetry={docs.loadAll} />;
        }
        return (
          <div className="space-y-4">
            <SettingsSaveBar dirtyCount={dirty.dirtyCount} saving={saving}
              error={saveError} onSave={onSave} onDiscard={onDiscard} />
            <div className="flex flex-col md:flex-row gap-6">
              <SettingsTabRail tab={tab} onChange={setTab} />
              <section className="flex-1 min-w-0"
                       aria-label={tab + " settings"}>
                <SettingsActivePanel tab={tab}
                  pendingProfile={docs.pendingProfile}
                  pendingConfig={docs.pendingConfig}
                  errors={errors}
                  patchProfile={patchers.patchProfile}
                  patchConfig={patchers.patchConfig}
                  defs={defs} />
              </section>
            </div>
          </div>
        );
      }


      function App() {
        const [tab, setTab] = useState("dashboard");
        const [filters, setFilters] = useState({});
        const [dbRev, setDbRev] = useState(0);
        const [openPulseId, setOpenPulseId] = useState(null);
        const [openBuildName, setOpenBuildName] = useState(null);
        const [openReplay, setOpenReplay] = useState(null);
        const [conn, setConn] = useState({ status: "connecting" });
        // Stage 2.2 first-run wizard. profileExists tri-state:
        // null = unknown, false = wizard needed, true = main app.
        const [profileExists, setProfileExists] = useState(null);
        const [showWizard, setShowWizard] = useState(false);

        useEffect(() => {
          try {
            const sock = io({ transports: ["websocket", "polling"] });
            sock.on("connect", () => setConn({ status: "live" }));
            sock.on("disconnect", () => setConn({ status: "offline" }));
            sock.on("analyzer_db_changed", (msg) => {
              setDbRev((r) => r + 1);
            });
            return () => sock.disconnect();
          } catch (err) {
            console.warn("socket.io unavailable:", err);
            setConn({ status: "offline" });
          }
        }, []);

        // Probe whether the user has run the wizard before. 200 -> exists,
        // 404/error -> show wizard. We default to "show" on net failure so
        // a non-running backend never silently traps the user in the SPA.
        useEffect(() => {
          let cancelled = false;
          (async () => {
            try {
              const res = await fetch("/api/profile/exists");
              if (cancelled) return;
              if (!res.ok) {
                setProfileExists(false); setShowWizard(true);
                return;
              }
              const j = await res.json();
              const exists = !!(j && j.exists);
              setProfileExists(exists);
              setShowWizard(!exists);
            } catch (_e) {
              if (!cancelled) {
                setProfileExists(false); setShowWizard(true);
              }
            }
          })();
          return () => { cancelled = true; };
        }, []);

        const renderBody = () => {
          if (openBuildName) {
            return (
              <BuildDeepDive
                buildName={openBuildName}
                filters={filters}
                onBack={() => setOpenBuildName(null)}
                dbRev={dbRev}
              />
            );
          }
          if (openReplay) {
            return (
              <MapIntelViewer
                replayPath={openReplay.path}
                playerName={openReplay.player}
                onBack={() => setOpenReplay(null)}
              />
            );
          }
          if (openPulseId) {
            return (
              <OpponentProfile
                pulseId={openPulseId}
                onBack={() => setOpenPulseId(null)}
                dbRev={dbRev}
              />
            );
          }
          switch (tab) {
            case "dashboard":
              return <DashboardTab filters={filters} dbRev={dbRev} />;
            case "builds":
              return (
                <BuildsTab
                  filters={filters}
                  dbRev={dbRev}
                  onOpen={setOpenBuildName}
                />
              );
            case "strategies":
              return <StrategiesTab filters={filters} dbRev={dbRev} />;
            case "bvs":
              return <BuildVsStrategyTab filters={filters} dbRev={dbRev} />;
            case "maps":
              return <MapsTab filters={filters} dbRev={dbRev} />;
            case "matchups":
              return <MatchupsTab filters={filters} dbRev={dbRev} />;
            case "opponents":
              return (
                <OpponentsTab
                  filters={filters}
                  dbRev={dbRev}
                  onOpen={setOpenPulseId}
                />
              );
            case "trends":
              return <TrendsTab filters={filters} dbRev={dbRev} />;
            case "ml":
              return <MlTab dbRev={dbRev} />;
            case "mapintel":
              return <MapIntelTab dbRev={dbRev} onOpenReplay={setOpenReplay} />;
            case "widgets":
              return <WidgetsTab />;
            case "definitions":
              return <DefinitionsTab />;
            case "settings":
              return <SettingsView dbRev={dbRev} />;
            default:
              return <EmptyState title="Unknown tab" />;
          }
        };

        // First-run wizard short-circuit. While profileExists is
        // unknown we render nothing to prevent a flash of empty UI.
        if (profileExists === null) return null;
        if (showWizard) {
          return (
            <Wizard onComplete={() => {
              setShowWizard(false);
              setProfileExists(true);
            }} />
          );
        }

        return (
          <div className="min-h-screen flex flex-col">
            <header className="border-b border-base-700 bg-base-800/60 backdrop-blur sticky top-0 z-10">
              <div className="max-w-7xl mx-auto px-4 py-3 flex items-center gap-3">
                <div className="text-lg font-semibold text-neutral-100">
                  SC2 Meta Analyzer
                </div>
                <span
                  className={
                    "text-[10px] uppercase tracking-wider px-2 py-0.5 rounded " +
                    (conn.status === "live"
                      ? "bg-win-500/20 text-win-500"
                      : conn.status === "offline"
                        ? "bg-loss-500/20 text-loss-500"
                        : "bg-base-700 text-neutral-500")
                  }
                >
                  {conn.status}
                </span>
                <span
                  className="text-[10px] uppercase tracking-wider px-2 py-0.5 rounded bg-base-700 text-neutral-500"
                  title="Charts are rendered inline via SVG -- no external dependency"
                >
                  charts: built-in
                </span>
                <nav className="ml-auto flex flex-wrap gap-1">
                  {TABS.map((t) => (
                    <button
                      key={t.id}
                      onClick={() => {
                        setOpenPulseId(null);
                        setOpenBuildName(null);
                        setTab(t.id);
                      }}
                      className={
                        "px-3 py-1.5 text-sm rounded transition " +
                        (tab === t.id && !openPulseId && !openBuildName
                          ? "bg-accent-500 text-white"
                          : "text-neutral-400 hover:bg-base-700 hover:text-neutral-200")
                      }
                    >
                      {t.label}
                    </button>
                  ))}
                </nav>
              </div>
            </header>

            {!openPulseId && !openBuildName && (
              <div className="max-w-7xl mx-auto w-full px-4 pt-4">
                <FilterBar
                  filters={filters}
                  onChange={setFilters}
                  onReset={() => setFilters({})}
                />
              </div>
            )}

            <main className="max-w-7xl mx-auto w-full px-4 py-4 flex-1">
              <ErrorBoundary
                label={
                  openBuildName
                    ? `Build "${openBuildName}"`
                    : openPulseId
                      ? "Opponent profile"
                      : `Tab "${tab}"`
                }
              >
                {renderBody()}
              </ErrorBoundary>
            </main>

            <footer className="border-t border-base-700 text-[11px] text-neutral-600 py-3 px-4 text-center">
              Data refreshes automatically when new replays land &middot;
              backend `/api/analyzer`
            </footer>
          </div>
        );
      }

      try {
        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
      } catch (err) {
        const root = document.getElementById("root");
        const pre = document.createElement("pre");
        pre.style.padding = "24px";
        pre.style.color = "#ef476f";
        pre.style.fontFamily = "monospace";
        pre.style.whiteSpace = "pre-wrap";
        pre.textContent = String((err && err.stack) || err);
        root.innerHTML = "";
        root.appendChild(pre);
      }
    </script>
  </body>
</html>
