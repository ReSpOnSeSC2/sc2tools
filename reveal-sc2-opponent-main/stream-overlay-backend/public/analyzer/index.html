      function MapIntelViewer({ replayPath, playerName, onBack }) {
        const [data, setData] = useState(null);
        const [err, setErr] = useState(null);
        const [loading, setLoading] = useState(true);

        const [time, setTime] = useState(0);
        const [playing, setPlaying] = useState(false);
        const [speed, setSpeed] = useState(1.0);

        const canvasRef = React.useRef(null);
        const containerRef = React.useRef(null);
        const animRef = React.useRef(null);

        // Pan/Zoom state
        const [zoom, setZoom] = useState(1.0);
        const [pan, setPan] = useState({ x: 0, y: 0 });
        const dragRef = React.useRef(null);

        // Fetch playback data
        useEffect(() => {
          let cancelled = false;
          setLoading(true);
          fetch(`${API}/playback?replay=${encodeURIComponent(replayPath)}`)
            .then(r => r.json())
            .then(j => {
              if (cancelled) return;
              if (j && j.ok) {
                setData(j.result);
                setTime(0);
              } else {
                setErr(j?.error || "Failed to parse replay.");
              }
              setLoading(false);
            })
            .catch(e => {
              if (!cancelled) {
                setErr(String(e));
                setLoading(false);
              }
            });
          return () => { cancelled = true; };
        }, [replayPath]);

        // Animation Loop
        useEffect(() => {
          if (!playing || !data) return;
          let lastTick = performance.now();
          const tick = (now) => {
            const dt = (now - lastTick) / 1000.0;
            lastTick = now;
            setTime(prev => {
              const next = prev + dt * speed;
              if (next >= data.game_length) {
                setPlaying(false);
                return data.game_length;
              }
              return next;
            });
            animRef.current = requestAnimationFrame(tick);
          };
          animRef.current = requestAnimationFrame(tick);
          return () => cancelAnimationFrame(animRef.current);
        }, [playing, speed, data]);

        // Drawing
        useEffect(() => {
          if (!data || !canvasRef.current || !containerRef.current) return;
          const canvas = canvasRef.current;
          const ctx = canvas.getContext('2d');

          const CW = canvas.width;
          const CH = canvas.height;

          ctx.clearRect(0, 0, CW, CH);

          // Render background
          ctx.fillStyle = "#1a1f29";
          ctx.fillRect(0, 0, CW, CH);

          const b = data.bounds;
          if (!b) return;

          const PAD = 20;
          const mapW = b.x_max - b.x_min || 1;
          const mapH = b.y_max - b.y_min || 1;

          // Compute scale
          const scaleX = (CW - 2 * PAD) / mapW;
          const scaleY = (CH - 2 * PAD) / mapH;
          const baseScale = Math.min(scaleX, scaleY);

          // Project SC2 coordinates to Canvas
          const project = (sc2_x, sc2_y) => {
             // In SC2, y grows upwards. In canvas, y grows downwards.
             let px = PAD + (sc2_x - b.x_min) * baseScale;
             let py = CH - PAD - (sc2_y - b.y_min) * baseScale;

             // Apply pan/zoom relative to center
             px = (px - CW/2) * zoom + pan.x + CW/2;
             py = (py - CH/2) * zoom + pan.y + CH/2;

             return { x: px, y: py };
          };

          // Draw bounds box
          const pMin = project(b.x_min, b.y_min);
          const pMax = project(b.x_max, b.y_max);
          ctx.strokeStyle = "#2b3445";
          ctx.lineWidth = 2;
          ctx.strokeRect(pMin.x, pMax.y, pMax.x - pMin.x, pMin.y - pMax.y);

          // Draw grid
          ctx.strokeStyle = "#242c3b";
          ctx.lineWidth = 1;
          ctx.beginPath();
          for (let x = Math.ceil(b.x_min); x <= b.x_max; x += 16) {
             const p0 = project(x, b.y_min);
             const p1 = project(x, b.y_max);
             ctx.moveTo(p0.x, p0.y);
             ctx.lineTo(p1.x, p1.y);
          }
          for (let y = Math.ceil(b.y_min); y <= b.y_max; y += 16) {
             const p0 = project(b.x_min, y);
             const p1 = project(b.x_max, y);
             ctx.moveTo(p0.x, p0.y);
             ctx.lineTo(p1.x, p1.y);
          }
          ctx.stroke();

          // Create cache for icons
          const getIcon = (name) => {
            if (!window._iconCache) window._iconCache = {};
            const cleanName = name.toLowerCase().replace(/[^a-z0-9]/g, '');
            if (window._iconCache[cleanName]) return window._iconCache[cleanName];

            // Attempt to resolve via TimingCatalog if available, otherwise guess path
            let iconPath = `/static/icons/buildings/${cleanName}.png`;
            if (window.TimingCatalog && window.TimingCatalog.TOKENS) {
               const tok = window.TimingCatalog.TOKENS.find(t => t.id.toLowerCase() === cleanName || t.name.toLowerCase() === cleanName);
               if (tok) iconPath = `/static/icons/buildings/${tok.icon}`;
            }

            const img = new Image();
            img.src = iconPath;
            window._iconCache[cleanName] = img;
            return img;
          };

          // Draw Events
          const drawEvent = (ev, colorStr, isMe) => {
            if (ev.time > time) return;
            if (!ev.x || !ev.y) return;
            const p = project(ev.x, ev.y);

            if (ev.type === "building") {
              const img = getIcon(ev.name);
              const sz = 16 * zoom;

              if (img.complete && img.naturalWidth > 0) {
                 // Draw backing for visibility
                 ctx.fillStyle = colorStr;
                 ctx.globalAlpha = 0.6;
                 ctx.beginPath();
                 ctx.arc(p.x, p.y, sz/2 + 2, 0, 2*Math.PI);
                 ctx.fill();
                 ctx.globalAlpha = 1.0;

                 ctx.drawImage(img, p.x - sz/2, p.y - sz/2, sz, sz);
              } else {
                 ctx.fillStyle = colorStr;
                 ctx.beginPath();
                 ctx.rect(p.x - 4*zoom, p.y - 4*zoom, 8*zoom, 8*zoom);
                 ctx.fill();
                 ctx.strokeStyle = "#000";
                 ctx.lineWidth = 1;
                 ctx.stroke();
              }
            } else {
              ctx.fillStyle = colorStr;
              ctx.beginPath();
              ctx.arc(p.x, p.y, 3*zoom, 0, 2*Math.PI);
              ctx.fill();
            }
          };

          if (data.my_events) data.my_events.forEach(e => drawEvent(e, "#66BB6A", true));
          if (data.opp_events) data.opp_events.forEach(e => drawEvent(e, "#EF5350", false));

        }, [data, time, zoom, pan]);

        // Input Handlers
        const handleWheel = (e) => {
          e.preventDefault();
          if (e.deltaY < 0) {
            setZoom(z => Math.min(8.0, z * 1.25));
          } else {
            setZoom(z => Math.max(0.25, z / 1.25));
          }
        };

        const handlePointerDown = (e) => {
           dragRef.current = { startX: e.clientX, startY: e.clientY, pX: pan.x, pY: pan.y };
        };
        const handlePointerMove = (e) => {
           if (!dragRef.current) return;
           const dx = e.clientX - dragRef.current.startX;
           const dy = e.clientY - dragRef.current.startY;
           setPan({ x: dragRef.current.pX + dx, y: dragRef.current.pY + dy });
        };
        const handlePointerUp = () => {
           dragRef.current = null;
        };

        const formatTime = (secs) => {
          const m = Math.floor(secs / 60);
          const s = Math.floor(secs % 60);
          return `${m}:${s.toString().padStart(2, '0')}`;
        };

        if (loading) {
          return <div className="flex h-full items-center justify-center"><div className="animate-pulse">Loading Replay...</div></div>;
        }

        if (err) {
          return (
            <div className="p-4">
              <button onClick={onBack} className="mb-4 text-accent-500 hover:text-accent-400">← Back</button>
              <div className="text-loss-500">{err}</div>
            </div>
          );
        }

        return (
          <div className="flex flex-col h-[calc(100vh-60px)]">
            {/* Header */}
            <div className="flex items-center gap-4 bg-base-800 p-2 border-b border-base-700">
              <button onClick={onBack} className="text-neutral-400 hover:text-white px-2 py-1 bg-base-700 rounded transition-colors text-sm">
                ← Exit
              </button>
              <div className="flex flex-col">
                <span className="font-semibold">{data.map_name}</span>
                <span className="text-xs text-neutral-400">
                  <span className="text-win-500">{data.me_name}</span> vs <span className="text-loss-500">{data.opp_name}</span>
                </span>
              </div>
              <div className="flex-1" />
              <div className="tabular-nums font-mono text-xl">
                {formatTime(time)} / {formatTime(data.game_length)}
              </div>
            </div>

            {/* Canvas Area */}
            <div
              ref={containerRef}
              className="flex-1 bg-base-900 relative overflow-hidden flex justify-center items-center cursor-move"
              onWheel={handleWheel}
              onPointerDown={handlePointerDown}
              onPointerMove={handlePointerMove}
              onPointerUp={handlePointerUp}
              onPointerLeave={handlePointerUp}
            >
              <canvas
                ref={canvasRef}
                width={800}
                height={800}
                className="max-w-full max-h-full"
                style={{ touchAction: 'none' }}
              />

              {/* Game Over Screen */}
              {time >= data.game_length && (
                <div className="absolute inset-0 bg-base-900/80 backdrop-blur-sm flex items-center justify-center p-8 z-10">
                  <div className="bg-base-800 border border-base-600 rounded-lg shadow-2xl p-6 w-full max-w-2xl transform scale-100 animate-in zoom-in-95 duration-200">
                    <h2 className="text-3xl font-bold mb-2 text-center">
                      {data.result === 'Victory' ? (
                        <span className="text-win-500">VICTORY</span>
                      ) : data.result === 'Defeat' ? (
                        <span className="text-loss-500">DEFEAT</span>
                      ) : (
                        <span className="text-neutral-300">GAME OVER</span>
                      )}
                    </h2>
                    <p className="text-center text-neutral-400 mb-6">Game finished at {formatTime(data.game_length)}</p>

                    <div className="grid grid-cols-2 gap-4 mb-6">
                      <div className="bg-base-900 p-4 rounded border border-base-700">
                        <h3 className="text-win-400 font-semibold mb-2">{data.me_name} (You)</h3>
                        <ul className="text-sm space-y-1 text-neutral-300 list-disc list-inside">
                           <li>Max Army Val: {Math.max(...data.my_stats.map(s => s.army_val), 0).toLocaleString()}</li>
                           <li>Events Captured: {data.my_events.length}</li>
                        </ul>
                      </div>
                      <div className="bg-base-900 p-4 rounded border border-base-700">
                        <h3 className="text-loss-400 font-semibold mb-2">{data.opp_name} (Opponent)</h3>
                        <ul className="text-sm space-y-1 text-neutral-300 list-disc list-inside">
                           <li>Max Army Val: {Math.max(...data.opp_stats.map(s => s.army_val), 0).toLocaleString()}</li>
                           <li>Events Captured: {data.opp_events.length}</li>
                        </ul>
                      </div>
                    </div>

                    {data.analysis && (
                      <div className="bg-base-900 p-4 rounded border border-base-700 mb-6">
                        <h3 className="font-semibold mb-2 text-neutral-200">Post-Game Analysis</h3>
                        <div className="space-y-3 text-sm">
                          <div>
                            <span className="text-win-400 font-semibold">Good: </span>
                            <span className="text-neutral-300">{data.analysis.good.join(" ")}</span>
                          </div>
                          <div>
                            <span className="text-loss-400 font-semibold">To Improve: </span>
                            <span className="text-neutral-300">{data.analysis.bad.join(" ")}</span>
                          </div>
                          <div>
                            <span className="text-gold-400 font-semibold">Tip: </span>
                            <span className="text-neutral-300">{data.analysis.tips.join(" ")}</span>
                          </div>
                        </div>
                      </div>
                    )}

                    <div className="flex justify-center gap-4">
                       <button
                         className="bg-base-700 hover:bg-base-600 px-4 py-2 rounded font-medium transition-colors"
                         onClick={() => { setTime(0); setPlaying(true); }}
                       >
                         Watch Again
                       </button>
                    </div>
                  </div>
                </div>
              )}
            </div>

            {/* Playback Controls */}
            <div className="bg-base-800 border-t border-base-700 p-3 flex items-center gap-4">
              <button
                onClick={() => setPlaying(!playing)}
                className={`w-12 h-12 rounded-full flex items-center justify-center transition-colors shadow-lg ${
                  playing ? 'bg-amber-600 hover:bg-amber-500' : 'bg-win-600 hover:bg-win-500'
                }`}
              >
                {playing ? '⏸' : '▶'}
              </button>

              <div className="flex-1 flex flex-col px-2">
                <input
                  type="range"
                  min="0"
                  max={data.game_length}
                  value={time}
                  step="0.5"
                  onChange={e => {
                    setTime(parseFloat(e.target.value));
                  }}
                  className="w-full accent-accent-500"
                />
              </div>

              <div className="flex bg-base-900 rounded overflow-hidden border border-base-700">
                {[0.5, 1, 2, 4, 8].map(s => (
                  <button
                    key={s}
                    onClick={() => setSpeed(s)}
                    className={`px-3 py-1.5 text-xs font-mono border-r border-base-700 last:border-0 ${
                      speed === s ? 'bg-accent-600 text-white' : 'text-neutral-400 hover:bg-base-700'
                    }`}
                  >
                    {s}x
                  </button>
                ))}
              </div>

              <button
                onClick={() => { setZoom(1); setPan({x:0, y:0}); }}
                className="px-3 py-1.5 text-xs bg-base-700 hover:bg-base-600 text-neutral-300 rounded transition-colors"
              >
                Reset View
              </button>
            </div>
          </div>
        );
      }


      // Sidebar widget shown on the opponent-profile page. Lists this opponent's
      // proxy locations across all games against the user, with a tiny scatter
      // visualization grouped by map. Uses /api/analyzer/spatial/opponent-proxies.
      function OpponentProxyPatterns({ opponentName }) {
        const [data, setData] = useState(null);
        const [err, setErr] = useState(null);
        useEffect(() => {
          if (!opponentName) return;
          let cancelled = false;
          fetch(
            `${API}/spatial/opponent-proxies?opponent=${encodeURIComponent(opponentName)}`,
          )
            .then((r) => r.json())
            .then((j) => {
              if (cancelled) return;
              if (!j || j.ok === false) setErr((j && j.message) || "no data");
              else setData(j.result || j);
            })
            .catch((e) => !cancelled && setErr(String(e)));
          return () => {
            cancelled = true;
          };
        }, [opponentName]);
        if (err)
          return (
            <div className="text-xs text-loss-500">Proxy patterns: {err}</div>
          );
        if (!data)
          return (
            <div className="text-xs text-neutral-500">
              Loading proxy patterns…
            </div>
          );
        const points = data.points || [];
        if (!points.length) {
          return (
            <EmptyState
              title="No proxy patterns"
              sub={`Scanned ${data.games_scanned} game(s).`}
            />
          );
        }
        // Group points by map for the per-map breakdown line.
        const byMap = data.by_map || {};
        return (
          <div className="space-y-3">
            <div className="text-xs text-neutral-400">
              {data.proxies_found} proxy building(s) across {data.games_scanned}{" "}
              game(s)
            </div>
            <ul className="space-y-1 max-h-64 overflow-y-auto pr-1 text-xs">
              {Object.entries(byMap).map(([map, n]) => (
                <li key={map} className="flex justify-between text-neutral-300">
                  <span>{map}</span>
                  <span className="tabular-nums text-gold-500">{n}</span>
                </li>
              ))}
            </ul>
            <div className="text-[10px] text-neutral-600">
              Distance threshold matches the strategy detector's `_is_proxy`
              rule. Tap "Map Intel" for a full heatmap of opponent proxy
              locations.
            </div>
          </div>
        );
      }

      // ============================================================
      // DEFINITIONS TAB -- searchable build/strategy glossary
      //
      // Mirrors the "Definitions" tab in the desktop SC2ReplayAnalyzer.py.
      // The catalog is sourced from the python project's
      // detectors/definitions.py and exposed by GET /definitions on the
      // backend. Filterable by race + free-text search.
      // ============================================================
      function DefinitionsTab() {
        const [items, setItems] = useState(null);
        const [error, setError] = useState(null);
        const [search, setSearch] = useState("");
        const [race, setRace] = useState("All");

        useEffect(() => {
          let cancelled = false;
          fetch(`${API}/definitions`)
            .then((r) =>
              r.ok ? r.json() : r.json().then((j) => Promise.reject(j)),
            )
            .then((j) => {
              if (!cancelled) setItems(Array.isArray(j.items) ? j.items : []);
            })
            .catch((e) => {
              if (!cancelled) setError(e.error || "fetch failed");
            });
          return () => {
            cancelled = true;
          };
        }, []);

        if (error)
          return <EmptyState title="Definitions unavailable" sub={error} />;
        if (items == null) return <EmptyState title="Loading definitions…" />;

        const q = search.trim().toLowerCase();
        const filtered = items.filter((it) => {
          if (race !== "All" && !it.name.startsWith(race)) return false;
          if (
            q &&
            !(
              it.name.toLowerCase().includes(q) ||
              it.description.toLowerCase().includes(q)
            )
          )
            return false;
          return true;
        });

        // Group by race prefix for visual sectioning.
        const grouped = filtered.reduce((acc, it) => {
          const prefix = it.name.split(" - ")[0] || "Other";
          (acc[prefix] = acc[prefix] || []).push(it);
          return acc;
        }, {});

        const races = ["All", "Zerg", "Protoss", "Terran"];

        return (
          <div className="p-4 space-y-3">
            <div className="flex items-center gap-3 flex-wrap">
              <h2 className="text-lg font-semibold text-neutral-100">
                Build &amp; Strategy Definitions
              </h2>
              <span className="text-xs text-neutral-500">
                {filtered.length} of {items.length} entries
              </span>
            </div>
            <div className="text-xs text-neutral-400 max-w-3xl">
              The detection rules used by the analyzer to label opponent
              strategies and your own builds. Use these to interpret labels in
              the rest of the SPA.
            </div>

            <div className="flex items-center gap-2 flex-wrap">
              <input
                type="text"
                value={search}
                onChange={(e) => setSearch(e.target.value)}
                placeholder="Search builds and strategies…"
                className="bg-base-800 border border-base-700 rounded px-3 py-1.5 text-sm text-neutral-100 placeholder-neutral-500 w-64 focus:outline-none focus:border-accent-500"
              />
              <div className="flex items-center gap-1 ml-2">
                {races.map((r) => (
                  <button
                    key={r}
                    onClick={() => setRace(r)}
                    className={
                      "px-2.5 py-1 text-xs rounded transition " +
                      (race === r
                        ? "bg-accent-500 text-white"
                        : "bg-base-700 text-neutral-300 hover:bg-base-600")
                    }
                  >
                    {r}
                  </button>
                ))}
              </div>
            </div>

            {filtered.length === 0 ? (
              <EmptyState
                title="No matches"
                sub="Try a different search or race filter."
              />
            ) : (
              <div className="space-y-4">
                {Object.keys(grouped)
                  .sort()
                  .map((group) => (
                    <div key={group}>
                      <div className="text-[11px] uppercase tracking-wider text-neutral-500 mb-2">
                        {group}
                      </div>
                      <div className="space-y-1.5">
                        {grouped[group].map((it) => (
                          <div
                            key={it.name}
                            className="bg-base-800 rounded p-3 border border-base-700"
                          >
                            <div className="text-sm font-semibold text-neutral-100">
                              {it.name}
                            </div>
                            <div className="text-xs text-neutral-400 mt-1">
                              {it.description}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
              </div>
            )}
          </div>
        );
      }

      const TABS = [
        { id: "dashboard", label: "Dashboard" },
        { id: "builds", label: "My Builds" },
        { id: "strategies", label: "Opp Strategies" },
        { id: "bvs", label: "Build vs Strategy" },
        { id: "maps", label: "Maps" },
        { id: "matchups", label: "Matchups" },
        { id: "opponents", label: "Opponents" },
        { id: "trends", label: "Trends" },
        { id: "ml", label: "ML / Predict" },
        { id: "mapintel", label: "Map Intel" },
        // Definitions stays at the very end (mirrors the SC2ReplayAnalyzer.py
        // tab order) so the build/strategy glossary is always one click away.
        { id: "definitions", label: "Definitions" },
      ];

      function App() {
        const [tab, setTab] = useState("dashboard");
        const [filters, setFilters] = useState({});
        const [dbRev, setDbRev] = useState(0);
        const [openPulseId, setOpenPulseId] = useState(null);
        const [openBuildName, setOpenBuildName] = useState(null);
        const [openReplay, setOpenReplay] = useState(null);
        const [conn, setConn] = useState({ status: "connecting" });

        useEffect(() => {
          try {
            const sock = io({ transports: ["websocket", "polling"] });
            sock.on("connect", () => setConn({ status: "live" }));
            sock.on("disconnect", () => setConn({ status: "offline" }));
            sock.on("analyzer_db_changed", (msg) => {
              setDbRev((r) => r + 1);
            });
            return () => sock.disconnect();
          } catch (err) {
            console.warn("socket.io unavailable:", err);
            setConn({ status: "offline" });
          }
        }, []);

        const renderBody = () => {
          if (openBuildName) {
            return (
              <BuildDeepDive
                buildName={openBuildName}
                filters={filters}
                onBack={() => setOpenBuildName(null)}
                dbRev={dbRev}
              />
            );
          }
          if (openReplay) {
            return (
              <MapIntelViewer
                replayPath={openReplay.path}
                playerName={openReplay.player}
                onBack={() => setOpenReplay(null)}
              />
            );
          }
          if (openPulseId) {
            return (
              <OpponentProfile
                pulseId={openPulseId}
                onBack={() => setOpenPulseId(null)}
                dbRev={dbRev}
              />
            );
          }
          switch (tab) {
            case "dashboard":
              return <DashboardTab filters={filters} dbRev={dbRev} />;
            case "builds":
              return (
                <BuildsTab
                  filters={filters}
                  dbRev={dbRev}
                  onOpen={setOpenBuildName}
                />
              );
            case "strategies":
              return <StrategiesTab filters={filters} dbRev={dbRev} />;
            case "bvs":
              return <BuildVsStrategyTab filters={filters} dbRev={dbRev} />;
            case "maps":
              return <MapsTab filters={filters} dbRev={dbRev} />;
            case "matchups":
              return <MatchupsTab filters={filters} dbRev={dbRev} />;
            case "opponents":
              return (
                <OpponentsTab
                  filters={filters}
                  dbRev={dbRev}
                  onOpen={setOpenPulseId}
                />
              );
            case "trends":
              return <TrendsTab filters={filters} dbRev={dbRev} />;
            case "ml":
              return <MlTab dbRev={dbRev} />;
            case "mapintel":
              return <MapIntelTab dbRev={dbRev} onOpenReplay={setOpenReplay} />;
            case "definitions":
              return <DefinitionsTab />;
            default:
              return <EmptyState title="Unknown tab" />;
          }
        };

        return (
          <div className="min-h-screen flex flex-col">
            <header className="border-b border-base-700 bg-base-800/60 backdrop-blur sticky top-0 z-10">
              <div className="max-w-7xl mx-auto px-4 py-3 flex items-center gap-3">
                <div className="text-lg font-semibold text-neutral-100">
                  SC2 Meta Analyzer
                </div>
                <span
                  className={
                    "text-[10px] uppercase tracking-wider px-2 py-0.5 rounded " +
                    (conn.status === "live"
                      ? "bg-win-500/20 text-win-500"
                      : conn.status === "offline"
                        ? "bg-loss-500/20 text-loss-500"
                        : "bg-base-700 text-neutral-500")
                  }
                >
                  {conn.status}
                </span>
                <span
                  className="text-[10px] uppercase tracking-wider px-2 py-0.5 rounded bg-base-700 text-neutral-500"
                  title="Charts are rendered inline via SVG -- no external dependency"
                >
                  charts: built-in
                </span>
                <nav className="ml-auto flex flex-wrap gap-1">
                  {TABS.map((t) => (
                    <button
                      key={t.id}
                      onClick={() => {
                        setOpenPulseId(null);
                        setOpenBuildName(null);
                        setTab(t.id);
                      }}
                      className={
                        "px-3 py-1.5 text-sm rounded transition " +
                        (tab === t.id && !openPulseId && !openBuildName
                          ? "bg-accent-500 text-white"
                          : "text-neutral-400 hover:bg-base-700 hover:text-neutral-200")
                      }
                    >
                      {t.label}
                    </button>
                  ))}
                </nav>
              </div>
            </header>

            {!openPulseId && !openBuildName && (
              <div className="max-w-7xl mx-auto w-full px-4 pt-4">
                <FilterBar
                  filters={filters}
                  onChange={setFilters}
                  onReset={() => setFilters({})}
                />
              </div>
            )}

            <main className="max-w-7xl mx-auto w-full px-4 py-4 flex-1">
              <ErrorBoundary
                label={
                  openBuildName
                    ? `Build "${openBuildName}"`
                    : openPulseId
                      ? "Opponent profile"
                      : `Tab "${tab}"`
                }
              >
                {renderBody()}
              </ErrorBoundary>
            </main>

            <footer className="border-t border-base-700 text-[11px] text-neutral-600 py-3 px-4 text-center">
              Data refreshes automatically when new replays land &middot;
              backend `/api/analyzer`
            </footer>
          </div>
        );
      }

      try {
        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
      } catch (err) {
        const root = document.getElementById("root");
        const pre = document.createElement("pre");
        pre.style.padding = "24px";
        pre.style.color = "#ef476f";
        pre.style.fontFamily = "monospace";
        pre.style.whiteSpace = "pre-wrap";
        pre.textContent = String((err && err.stack) || err);
        root.innerHTML = "";
        root.appendChild(pre);
      }
    </script>
  </body>
</html>
