                  className={`px-2 py-0.5 rounded ${wantOpp ? "bg-accent-500 text-white" : "bg-base-700 text-neutral-300"}`}
                  onClick={() => setPerspective("opponent")}
                  disabled={!oppAvailable}
                  title={
                    oppAvailable
                      ? ""
                      : "Opponent build not extracted for this game yet"
                  }
                >
                  Opponent
                </button>
                <button
                  className={`px-2 py-0.5 rounded ${!wantOpp ? "bg-accent-500 text-white" : "bg-base-700 text-neutral-300"}`}
                  onClick={() => setPerspective("me")}
                >
                  You
                </button>
              </div>
              <div className="ml-auto flex items-center gap-1 text-xs">
                {/* Stage 7.5: Save as new build CTA. Hidden when the
                    build-editor module failed to load; disabled while a
                    /from-game request is in flight or when the timeline
                    has zero mappable events. */}
                {window.BuildEditorModal && (
                  <button
                    className="px-2 py-0.5 rounded bg-accent-500 text-white hover:opacity-90 disabled:opacity-50 mr-1"
                    onClick={openBuildEditor}
                    disabled={editorLoading || allEvents.length === 0}
                    title={
                      allEvents.length === 0
                        ? "No events on this game to save."
                        : "Open the editor to save these events as a custom build matchable across your library."
                    }
                  >
                    {editorLoading ? "Loading…" : "Save as new build"}
                  </button>
                )}
                {editorError && (
                  <span
                    className="text-[10px] text-loss-500 mr-1"
                    aria-live="polite"
                  >
                    {editorError}
                  </span>
                )}
                <button
                  className={`px-2 py-0.5 rounded ${filter === "all" ? "bg-accent-500 text-white" : "bg-base-700 text-neutral-300"}`}
                  onClick={() => setFilter("all")}
                >
                  All
                </button>
                <button
                  className={`px-2 py-0.5 rounded ${filter === "buildings" ? "bg-accent-500 text-white" : "bg-base-700 text-neutral-300"}`}
                  onClick={() => setFilter("buildings")}
                >
                  Buildings
                </button>
                <button
                  className={`px-2 py-0.5 rounded ${filter === "units" ? "bg-accent-500 text-white" : "bg-base-700 text-neutral-300"}`}
                  onClick={() => setFilter("units")}
                >
                  Units
                </button>
                <button
                  className={`px-2 py-0.5 rounded ${filter === "upgrades" ? "bg-accent-500 text-white" : "bg-base-700 text-neutral-300"}`}
                  onClick={() => setFilter("upgrades")}
                >
                  Upgrades
                </button>
                <button
                  className="px-2 py-0.5 rounded bg-base-700 text-neutral-300 ml-2"
                  onClick={() => setShowAll((s) => !s)}
                >
                  {showAll ? "Show 5 min" : "Show all"}
                </button>
              </div>
            </div>
            {!wantOpp && (
              <div className="text-[10px] text-neutral-500 mb-2">
                This is YOUR build (captured from the replay). Switch to
                "Opponent" to see {oppName || "their"} build.
                {oppName
                  ? ` Detected strategy: "${data.opp_strategy || "—"}".`
                  : ""}
              </div>
            )}
            {wantOpp && (
              <div className="text-[10px] text-neutral-500 mb-2">
                {oppName || "Opponent"}'s deduped first-5-min milestones.
                Detected strategy: "{data.opp_strategy || "—"}".
              </div>
            )}
            <div
              ref={eventsContainerRef}
              className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-1.5 max-h-[420px] overflow-y-auto"
            >
              {filtered.map((e, i) => {
                const t = Number(e && e.time) || 0;
                const inFocus =
                  focusRange &&
                  t >= focusRange.start &&
                  t <= focusRange.end;
                const rowClass = inFocus
                  ? "flex items-center gap-2 rounded px-2 py-1 ring-1 ring-loss-500 bg-loss-500/15 transition-colors"
                  : "flex items-center gap-2 bg-base-800 rounded px-2 py-1";
                return (
                <div
                  key={i}
                  className={rowClass}
                  data-leak-focused={inFocus ? "true" : undefined}
                  data-build-event-time={t}
                >
                  <span className="font-mono text-[11px] text-neutral-400 w-10 tabular-nums">
                    {e.time_display}
                  </span>
                  <span
                    className={`inline-block w-2 h-2 rounded-full ${RACE_DOT_CLASS[e.race] || RACE_DOT_CLASS.Neutral}`}
                  />
                  <span
                    className="text-sm text-neutral-200 flex-1 truncate"
                    title={e.name}
                  >
                    {e.display}
                  </span>
                  <span
                    className={`text-[10px] px-1.5 py-0.5 rounded ${CATEGORY_BADGE_CLASS[e.category] || CATEGORY_BADGE_CLASS.unknown}`}
                  >
                    {e.category}
                  </span>
                </div>
                );
              })}
            </div>
            {filtered.length === 0 && (
              <div className="text-xs text-neutral-500 px-2 py-3">
                No events match this filter.
              </div>
            )}
            {/* Stage 7.5: BuildEditorModal lives in
                /static/analyzer/components/build-editor-modal.js and
                attaches to window.BuildEditorModal. Mounted inside the
                timeline so closing/restoring focus stays correct. */}
            {editorOpen && window.BuildEditorModal &&
              React.createElement(window.BuildEditorModal, {
                open: editorOpen,
                game: data,
                gameId: gameId,
                draft: editorDraft,
                profileReady: editorProfileReady,
                onClose: () => setEditorOpen(false),
                onSaved: () => {},
                socket: typeof window !== "undefined" ? window.__sc2_socket : null,
              })}
          </div>
        );
      }

      // =====================================================================
      // Active Army & Workers chart used by MacroBreakdownPanel.
      //
      // Pure-SVG, no chart library. Two players overlaid on the same axes:
      //   - Army supply value  = food_used * ARMY_SUPPLY_PER_FOOD  (left axis)
      //   - Worker count       = food_workers                       (right axis)
      // Lines are drawn solid for army / dashed for workers, with each
      // player getting their own color (green/red defaults; user-adjustable
      // via the two color pickers above the chart).
      //
      // Two thin supply-block lanes sit at the bottom of the plot area —
      // one per player — so neither side's bands overlap the other.
      //
      // Hover anywhere in the chart to scrub through samples: a vertical
      // crosshair locks to the nearest sample, dots highlight all four
      // line values, a tooltip shows raw numbers, and a Unit Roster panel
      // below the chart updates with both players' alive non-worker units
      // (icons + counts).
      // =====================================================================
      const RACE_ACCENT_VAR = {
        Protoss: "var(--color-race-protoss)",
        Terran: "var(--color-race-terran)",
        Zerg: "var(--color-race-zerg)",
      };
      const CHART_WARNING_COLOR = "var(--color-warning)";
      const CHART_GRID_COLOR = "var(--color-border-subtle)";
      const CHART_AXIS_TEXT = "var(--color-text-secondary)";
      const CHART_VIEW_W = 800;
      const CHART_VIEW_H = 240;
      const CHART_PAD_LEFT = 44;
      const CHART_PAD_RIGHT = 44;
      const CHART_PAD_TOP = 12;
      const CHART_PAD_BOTTOM = 36;
      const SUPPLY_LANE_HEIGHT = 4;
      const SUPPLY_LANE_GAP = 2;
      const ARMY_SUPPLY_PER_FOOD = 8;
      const SUPPLY_BLOCK_TOLERANCE = 1;
      const SUPPLY_BAND_OPACITY = 0.55;
      const Y_TICK_FRACTIONS = [0, 0.25, 0.5, 0.75, 1];
      // Static x-axis: a labeled tick every 15 seconds. Hover state gives
      // sub-tick precision (down to the second) — see _hoverInfoFromMouseEvent.
      const X_TICK_STEP = 15;
      const ARMY_AXIS_FLOOR = 8 * ARMY_SUPPLY_PER_FOOD;
      const WORKER_AXIS_FLOOR = 12;
      const DEFAULT_MY_COLOR = "#22c55e";
      const DEFAULT_OPP_COLOR = "#ef4444";

      const UNIT_ICON_BASE = "/static/icons/units/";
      const _CHART_UNIT_NAME_ALIASES = {
        siegetanksieged: "siegetank",
        warpprismphasing: "warpprism",
        banelingburrowed: "baneling",
        roachburrowed: "roach",
        zerglingburrowed: "zergling",
        hydraliskburrowed: "hydralisk",
        infestorburrowed: "infestor",
        lurkerburrowed: "lurker",
        lurkermp: "lurker",
        lurkermpburrowed: "lurker",
        ravagerburrowed: "ravager",
        queenburrowed: "queen",
        swarmhostmp: "swarmhost",
        swarmhostmpburrowed: "swarmhost",
        hellionhellion: "hellion",
        helliontank: "hellbat",
        vikingfighter: "viking",
        vikingassault: "viking",
        thoraap: "thor",
        ling: "zergling",
      };
      function _resolveUnitIcon(rawName) {
        const lc = String(rawName || "").toLowerCase().replace(/\s+/g, "");
        const canon = _CHART_UNIT_NAME_ALIASES[lc] || lc;
        return UNIT_ICON_BASE + canon + ".png";
      }

      function _formatGameClock(totalSeconds) {
        const s = Math.max(0, Math.floor(totalSeconds || 0));
        const m = Math.floor(s / 60);
        const ss = (s % 60).toString().padStart(2, "0");
        return `${m}:${ss}`;
      }

      function _supplyBlockBands(samples) {
        if (!Array.isArray(samples) || samples.length === 0) return [];
        const bands = [];
        let openStart = null;
        let lastTime = 0;
        for (const s of samples) {
          const t = Number(s.time) || 0;
          const used = Number(s.food_used) || 0;
          const made = Number(s.food_made) || 0;
          const blocked = made > 0 && used >= made - SUPPLY_BLOCK_TOLERANCE;
          if (blocked && openStart === null) openStart = t;
          else if (!blocked && openStart !== null) {
            bands.push({ start: openStart, end: t });
            openStart = null;
          }
          lastTime = t;
        }
        if (openStart !== null) bands.push({ start: openStart, end: lastTime });
        return bands;
      }

      function _buildLinePath(points) {
        if (!points.length) return "";
        return points
          .map((p, i) => `${i === 0 ? "M" : "L"}${p[0].toFixed(1)},${p[1].toFixed(1)}`)
          .join(" ");
      }

      function _projectSidePoints(samples, xOf, yArmy, yWorker) {
        const armyPts = [];
        const workerPts = [];
        for (const s of samples) {
          const t = Number(s.time) || 0;
          const armyVal = (Number(s.food_used) || 0) * ARMY_SUPPLY_PER_FOOD;
          armyPts.push([xOf(t), yArmy(armyVal)]);
          workerPts.push([xOf(t), yWorker(Number(s.food_workers) || 0)]);
        }
        return { armyPts, workerPts };
      }

      function _buildChartLayout(mySamples, oppSamples, gameLengthSec) {
        const innerW = CHART_VIEW_W - CHART_PAD_LEFT - CHART_PAD_RIGHT;
        const supplyLanesH = SUPPLY_LANE_HEIGHT * 2 + SUPPLY_LANE_GAP * 2;
        const innerH =
          CHART_VIEW_H - CHART_PAD_TOP - CHART_PAD_BOTTOM - supplyLanesH;
        const all = mySamples.concat(oppSamples);
        const lastT = all.length
          ? Math.max(...all.map((s) => Number(s.time) || 0)) : 0;
        const maxT = Math.max(lastT, Number(gameLengthSec) || 0, 60);
        const armyVals = all.map(
          (s) => (Number(s.food_used) || 0) * ARMY_SUPPLY_PER_FOOD);
        const workerVals = all.map((s) => Number(s.food_workers) || 0);
        const armyMax = Math.max(
          armyVals.length ? Math.max(...armyVals) : 0, ARMY_AXIS_FLOOR);
        const workerMax = Math.max(
          workerVals.length ? Math.max(...workerVals) : 0, WORKER_AXIS_FLOOR);
        const xOf = (t) => CHART_PAD_LEFT + (t / maxT) * innerW;
        const yArmy = (a) => CHART_PAD_TOP + (1 - a / armyMax) * innerH;
        const yWorker = (w) => CHART_PAD_TOP + (1 - w / workerMax) * innerH;
        const my = _projectSidePoints(mySamples, xOf, yArmy, yWorker);
        const opp = _projectSidePoints(oppSamples, xOf, yArmy, yWorker);
        const xTicks = [];
        for (let t = 0; t <= maxT; t += X_TICK_STEP) xTicks.push(t);
        const supplyLanesTop = CHART_PAD_TOP + innerH + SUPPLY_LANE_GAP;
        return { innerW, innerH, maxT, armyMax, workerMax,
                 xOf, yArmy, yWorker, my, opp, xTicks, supplyLanesTop };
      }

      function _renderSupplyBands(bands, layout, color, laneIndex) {
        const y = layout.supplyLanesTop +
          (SUPPLY_LANE_HEIGHT + SUPPLY_LANE_GAP) * laneIndex;
        return bands.map((b, i) => (
          <rect key={`band-${laneIndex}-${i}`}
            x={layout.xOf(b.start)} y={y}
            width={Math.max(1, layout.xOf(b.end) - layout.xOf(b.start))}
            height={SUPPLY_LANE_HEIGHT} fill={color}
            opacity={SUPPLY_BAND_OPACITY} />
        ));
      }

      function _renderYAxes(layout) {
        return Y_TICK_FRACTIONS.map((f, i) => {
          const y = CHART_PAD_TOP + (1 - f) * layout.innerH;
          return (
            <g key={`y-${i}`}>
              <line x1={CHART_PAD_LEFT} y1={y}
                x2={CHART_VIEW_W - CHART_PAD_RIGHT} y2={y}
                stroke={CHART_GRID_COLOR} strokeDasharray="2 4" />
              <text x={CHART_PAD_LEFT - 6} y={y + 3} fontSize="10"
                textAnchor="end" fill={CHART_AXIS_TEXT}>
                {Math.round(f * layout.armyMax)}
              </text>
              <text x={CHART_VIEW_W - CHART_PAD_RIGHT + 6} y={y + 3}
                fontSize="10" textAnchor="start" fill={CHART_AXIS_TEXT}>
                {Math.round(f * layout.workerMax)}
              </text>
            </g>
          );
        });
      }

      function _renderXAxisTicks(layout) {
        // 15-second labeled ticks. The hover state provides per-second
        // precision so the static axis stays uncluttered.
        const baseY = CHART_PAD_TOP + layout.innerH;
        return layout.xTicks.map((t, i) => (
          <g key={`x-${i}`}>
            <line x1={layout.xOf(t)} y1={baseY}
              x2={layout.xOf(t)} y2={baseY + 4}
              stroke={CHART_AXIS_TEXT} strokeOpacity="0.6" />
            <text x={layout.xOf(t)} y={CHART_VIEW_H - 18}
              fontSize="10" textAnchor="middle" fill={CHART_AXIS_TEXT}>
              {_formatGameClock(t)}
            </text>
          </g>
        ));
      }

      function _renderLegendSwatch(color, dashed) {
        return (
          <svg width="14" height="6" aria-hidden="true">
            <line x1="1" y1="3" x2="13" y2="3" stroke={color}
              strokeWidth="2" strokeDasharray={dashed ? "2 2" : ""} />
          </svg>
        );
      }

      function _renderChartLegend(myColor, oppColor) {
        return (
          <div className="flex items-center gap-3 text-[11px] text-neutral-300 flex-wrap">
            <span className="inline-flex items-center gap-1">
              {_renderLegendSwatch(myColor, false)} you army
            </span>
            <span className="inline-flex items-center gap-1">
              {_renderLegendSwatch(myColor, true)} you wkrs
            </span>
            <span className="inline-flex items-center gap-1">
              {_renderLegendSwatch(oppColor, false)} opp army
            </span>
            <span className="inline-flex items-center gap-1">
              {_renderLegendSwatch(oppColor, true)} opp wkrs
            </span>
            <span className="inline-flex items-center gap-1 text-neutral-400">
              <span className="inline-block w-3 h-1"
                style={{ background: CHART_WARNING_COLOR,
                         opacity: SUPPLY_BAND_OPACITY }} />
              supply blocked (per side)
            </span>
          </div>
        );
      }

      function _renderColorControls(myColor, setMyColor, oppColor, setOppColor) {
        return (
          <div className="flex items-center gap-3 text-[11px] text-neutral-400">
            <label className="inline-flex items-center gap-1 cursor-pointer">
              <span>YOU</span>
              <input type="color" value={myColor}
                onChange={(e) => setMyColor(e.target.value)}
                aria-label="Pick the color for your lines"
                className="w-5 h-5 rounded border-0 cursor-pointer bg-transparent" />
            </label>
            <label className="inline-flex items-center gap-1 cursor-pointer">
              <span>OPP</span>
              <input type="color" value={oppColor}
                onChange={(e) => setOppColor(e.target.value)}
                aria-label="Pick the color for opponent lines"
                className="w-5 h-5 rounded border-0 cursor-pointer bg-transparent" />
            </label>
          </div>
        );
      }

      // Resolve a mouse event to {cursorSec, sampleIdx}:
      //   - cursorSec: the cursor's game-time rounded to the nearest second
      //     (this drives the crosshair x and the tooltip label, so the chart
      //     reads as second-precise even though sample data is coarser).
      //   - sampleIdx: index into ``samples`` whose time is nearest to
      //     cursorSec (drives the tooltip values + unit roster — the
      //     PlayerStatsEvent stream samples at ~10s cadence so this is the
      //     most-recent observed state for the cursor's second).
      // Returns null when the cursor is outside the plot area or no
      // ``samples`` exist to anchor the data lookup.
      function _hoverInfoFromMouseEvent(e, svgEl, samples, layout) {
        if (!svgEl || !samples.length) return null;
        const rect = svgEl.getBoundingClientRect();
        if (rect.width <= 0) return null;
        const localX = (e.clientX - rect.left) / rect.width * CHART_VIEW_W;
        if (localX < CHART_PAD_LEFT || localX > CHART_VIEW_W - CHART_PAD_RIGHT) {
          return null;
        }
        const tFloat = (localX - CHART_PAD_LEFT) / layout.innerW * layout.maxT;
        const cursorSec = Math.max(0, Math.min(layout.maxT, Math.round(tFloat)));
        let bestIdx = 0;
        let bestDist = Infinity;
        for (let i = 0; i < samples.length; i++) {
          const d = Math.abs((Number(samples[i].time) || 0) - cursorSec);
          if (d < bestDist) { bestDist = d; bestIdx = i; }
        }
        return { cursorSec, sampleIdx: bestIdx };
      }

      function _renderHoverCrosshair(layout, cursorSec, mySample, oppSample, myColor, oppColor) {
        if (cursorSec == null) return null;
        const xCursor = layout.xOf(cursorSec);
        const dot = (s, color, r) => {
          if (!s) return null;
          const army = (Number(s.food_used) || 0) * ARMY_SUPPLY_PER_FOOD;
          return (
            <g pointerEvents="none">
              <circle cx={xCursor}
                cy={layout.yWorker(Number(s.food_workers) || 0)}
                r={r} fill={color} stroke="#000" strokeOpacity="0.4" />
              <circle cx={xCursor} cy={layout.yArmy(army)}
                r={r} fill={color} stroke="#000" strokeOpacity="0.4" />
            </g>
          );
        };
        return (
          <g pointerEvents="none">
            <line x1={xCursor} y1={CHART_PAD_TOP} x2={xCursor}
              y2={CHART_PAD_TOP + layout.innerH}
              stroke={CHART_AXIS_TEXT} strokeDasharray="2 2" opacity="0.6" />
            {dot(mySample, myColor, 3.5)}
            {dot(oppSample, oppColor, 3)}
          </g>
        );
      }

      function _renderChartLines(layout, myColor, oppColor) {
        return (
          <g>
            <path d={_buildLinePath(layout.opp.workerPts)} fill="none"
              stroke={oppColor} strokeWidth="1.5" strokeDasharray="3 3" />
            <path d={_buildLinePath(layout.my.workerPts)} fill="none"
              stroke={myColor} strokeWidth="1.5" strokeDasharray="3 3" />
            <path d={_buildLinePath(layout.opp.armyPts)} fill="none"
              stroke={oppColor} strokeWidth="1.75" />
            <path d={_buildLinePath(layout.my.armyPts)} fill="none"
              stroke={myColor} strokeWidth="1.75" />
          </g>
        );
      }

      function _renderChartSvg(args) {
        const { layout, myColor, oppColor, myBands, oppBands,
                mySample, oppSample, cursorSec,
                svgRef, onMove, onLeave } = args;
        const baselineY = CHART_PAD_TOP + layout.innerH;
        return (
          <svg ref={svgRef}
            viewBox={`0 0 ${CHART_VIEW_W} ${CHART_VIEW_H}`}
            role="img"
            aria-label="Active army supply value and worker count over game time, both players overlaid"
            className="w-full h-auto cursor-crosshair"
            preserveAspectRatio="none"
            onMouseMove={onMove} onMouseLeave={onLeave}>
            {_renderSupplyBands(myBands, layout, myColor, 0)}
            {_renderSupplyBands(oppBands, layout, oppColor, 1)}
            <line x1={CHART_PAD_LEFT} y1={baselineY}
              x2={CHART_VIEW_W - CHART_PAD_RIGHT} y2={baselineY}
              stroke={CHART_GRID_COLOR} />
            {_renderYAxes(layout)}
            {_renderXAxisTicks(layout)}
            {_renderChartLines(layout, myColor, oppColor)}
            {_renderHoverCrosshair(layout, cursorSec, mySample, oppSample, myColor, oppColor)}
            <text x={CHART_PAD_LEFT - 6} y={CHART_PAD_TOP - 2} fontSize="9"
              textAnchor="end" fill={CHART_AXIS_TEXT}>army</text>
            <text x={CHART_VIEW_W - CHART_PAD_RIGHT + 6} y={CHART_PAD_TOP - 2}
              fontSize="9" textAnchor="start" fill={CHART_AXIS_TEXT}>wkrs</text>
          </svg>
        );
      }

      function _sampleInBlockedBand(sample, bands) {
        if (!sample) return false;
        const t = Number(sample.time) || 0;
        for (const b of bands) if (t >= b.start && t <= b.end) return true;
        return false;
      }

      function _renderTooltipLine(label, color, sample, blocked) {
        if (!sample) return null;
        const army = (Number(sample.food_used) || 0) * ARMY_SUPPLY_PER_FOOD;
        const workers = Number(sample.food_workers) || 0;
        return (
          <div className="flex items-center gap-2 tabular-nums">
            <span className="inline-block w-2 h-2 rounded-full"
              style={{ background: color }} />
            <span className="text-neutral-400 text-[10px] uppercase tracking-wider">
              {label}
            </span>
            <span>army <span className="font-semibold">{army}</span></span>
            <span>wkrs <span className="font-semibold">{workers}</span></span>
            {blocked && (
              <span className="text-[10px]"
                style={{ color: CHART_WARNING_COLOR }}>blocked</span>
            )}
          </div>
        );
      }

      function _renderChartTooltip(args) {
        const { mySample, oppSample, myBands, oppBands, layout,
                myColor, oppColor, cursorSec } = args;
        if (cursorSec == null) return null;
        const t = cursorSec;
        const leftPct = (layout.xOf(t) / CHART_VIEW_W) * 100;
        const onRight = leftPct > 60;
        return (
          <div
            className="pointer-events-none absolute z-10 bg-base-900 ring-soft rounded px-2 py-1 text-[11px] text-neutral-100 shadow-soft"
            style={{
              left: onRight ? "auto" : `calc(${leftPct}% + 8px)`,
              right: onRight ? `calc(${100 - leftPct}% + 8px)` : "auto",
              top: 4,
            }}
          >
            <div className="text-neutral-400 tabular-nums mb-0.5">
              {_formatGameClock(t)}
            </div>
            {_renderTooltipLine("YOU", myColor, mySample,
              _sampleInBlockedBand(mySample, myBands))}
            {_renderTooltipLine("OPP", oppColor, oppSample,
              _sampleInBlockedBand(oppSample, oppBands))}
          </div>
        );
      }

      function _renderUnitChip(name, count, color) {
        return (
          <span key={name}
            className="inline-flex items-center gap-1 bg-base-900 ring-soft rounded px-1.5 py-0.5 text-[11px]"
            title={`${name} x${count}`}>
            <img src={_resolveUnitIcon(name)} alt="" width="16" height="16"
              loading="lazy"
              onError={(e) => { e.currentTarget.style.display = "none"; }} />
            <span className="text-neutral-200">{name}</span>
            <span className="font-semibold tabular-nums" style={{ color }}>
              ×{count}
            </span>
          </span>
        );
      }

      // Names that should NEVER appear in the army-composition roster.
      // Beacon* are click-action markers the SC2 client emits at t=0;
      // WidowMineBurrowed is just the burrowed state of WidowMine and
      // would double-count widow mines as a separate row. Mirrors
      // _skip_for_unit_timeline() in core/event_extractor.py.
      function _isRosterNoise(name) {
        if (!name) return true;
        if (typeof name !== "string") return true;
        if (name.startsWith("Beacon")) return true;
        if (name === "WidowMineBurrowed") return true;
        return false;
      }

      function _renderUnitRosterRow(label, color, units) {
        const entries = Object.entries(units || {})
          .filter(([n]) => !_isRosterNoise(n))
          .sort((a, b) => b[1] - a[1]);
        return (
          <div className="flex items-center gap-2 flex-wrap">
            <span className="text-[10px] uppercase tracking-wider"
              style={{ color, minWidth: 28 }}>{label}</span>
            {entries.length === 0 ? (
              <span className="text-[11px] text-neutral-500">—</span>
            ) : (
              entries.map(([n, c]) => _renderUnitChip(n, c, color))
            )}
          </div>
        );
      }

      function _renderUnitRoster(timelineEntry, myColor, oppColor) {
        if (!timelineEntry) {
          return (
            <div className="text-[11px] text-neutral-500 mt-2">
              Hover the chart to see each side's army composition over time.
            </div>
          );
        }
        return (
          <div className="mt-2 space-y-1">
            <div className="text-[10px] uppercase tracking-wider text-neutral-500">
              Unit roster at {_formatGameClock(timelineEntry.time)}
            </div>
            {_renderUnitRosterRow("YOU", myColor, timelineEntry.my)}
            {_renderUnitRosterRow("OPP", oppColor, timelineEntry.opp)}
          </div>
        );
      }

      function MacroResourceChart(props) {
        const samples = Array.isArray(props.statsEvents) ? props.statsEvents : [];
        const oppSamples = Array.isArray(props.oppStatsEvents) ? props.oppStatsEvents : [];
        const timeline = Array.isArray(props.unitTimeline) ? props.unitTimeline : [];
        const [hoverInfo, setHoverInfo] = useState(null);
        const [myColor, setMyColor] = useState(DEFAULT_MY_COLOR);
        const [oppColor, setOppColor] = useState(DEFAULT_OPP_COLOR);
        const svgRef = useRef(null);
        if (samples.length === 0 && oppSamples.length === 0) {
          return (
            <div className="bg-base-800 ring-soft rounded p-3 text-xs text-neutral-400">
              Resource samples unavailable for this replay.
            </div>
          );
        }
        const layout = _buildChartLayout(samples, oppSamples, props.gameLengthSec);
        const myBands = _supplyBlockBands(samples);
        const oppBands = _supplyBlockBands(oppSamples);
        const onMove = (e) => {
          const info = _hoverInfoFromMouseEvent(e, svgRef.current, samples, layout);
          // Compare via cursorSec so we don't re-render on every pixel —
          // only when the second changes.
          if (info == null) {
            if (hoverInfo != null) setHoverInfo(null);
            return;
          }
          if (!hoverInfo || hoverInfo.cursorSec !== info.cursorSec) {
            setHoverInfo(info);
          }
        };
        const onLeave = () => setHoverInfo(null);
        const cursorSec = hoverInfo ? hoverInfo.cursorSec : null;
        const sIdx = hoverInfo ? hoverInfo.sampleIdx : null;
        const mySample = sIdx != null ? samples[sIdx] : null;
        const oppSample = sIdx != null ? oppSamples[sIdx] : null;
        const timelineEntry = sIdx != null ? timeline[sIdx] : null;
        return (
          <div className="bg-base-800 ring-soft rounded p-3">
            <div className="flex items-center justify-between mb-2 flex-wrap gap-2">
              <div className="text-[11px] uppercase tracking-wider text-neutral-200">
                Active Army &amp; Workers
              </div>
              {_renderColorControls(myColor, setMyColor, oppColor, setOppColor)}
            </div>
            <div className="mb-2">{_renderChartLegend(myColor, oppColor)}</div>
            <div className="relative">
              {_renderChartSvg({ layout, myColor, oppColor, myBands, oppBands,
                                  mySample, oppSample, cursorSec,
                                  svgRef, onMove, onLeave })}
              {cursorSec != null && _renderChartTooltip({
                mySample, oppSample, myBands, oppBands, layout,
                myColor, oppColor, cursorSec })}
            </div>
            {_renderUnitRoster(timelineEntry, myColor, oppColor)}
          </div>
        );
      }

      // Renders a click-to-expand macro breakdown panel for one game. Reuses
      // the /games/:id/build-order payload (which now includes top_3_leaks and
      // macro_breakdown). For games without a stored breakdown, offers a
      // ChronoAllocationPanel — Protoss-only donut + table that
      // shows where each chrono boost landed by target building.
      // Reads ``raw.chrono_targets`` (emitted by macro_score for
      // race=="Protoss") which is a list of {building_name, count}
      // sorted by count desc. Donut renders top-5 + an "Other"
      // bucket aggregating the long tail; the table shows EVERY
      // row so absolute counts always reconcile to the chrono total.
      // Targets sc2reader could not resolve bucket as "Unknown" —
      // we never invent a name (preamble hard rule #1: real data only).
      function ChronoAllocationPanel({ targets }) {
        if (!Array.isArray(targets) || targets.length === 0) return null;
        const total = targets.reduce(
          (s, t) => s + (Number(t && t.count) || 0), 0);
        if (total <= 0) return null;

        // Top-5 head, "Other" bucket for the tail in the donut.
        const TOP_N = 5;
        const tableRows = targets.map((t) => ({
          building_name: String(t.building_name || "Unknown"),
          count: Number(t.count) || 0,
          pct: (100 * (Number(t.count) || 0)) / total,
        }));
        const head = tableRows.slice(0, TOP_N);
        const tail = tableRows.slice(TOP_N);
        const tailCount = tail.reduce((s, r) => s + r.count, 0);
        const donutSlices = head.slice();
        if (tail.length > 0 && tailCount > 0) {
          donutSlices.push({
            building_name: "Other",
            count: tailCount,
            pct: (100 * tailCount) / total,
          });
        }

        // Color map keyed by building name. Unrecognized buildings
        // (e.g. ShieldBattery, Pylon) fall back to "other"; the
        // explicit "Unknown" sc2reader-couldn't-resolve bucket
        // gets its own neutral grey so it reads as distinct from
        // small-volume known targets.
        const COLOR_TOKENS = {
          Nexus:             "var(--color-chrono-probe)",
          Gateway:           "var(--color-chrono-gateway)",
          WarpGate:          "var(--color-chrono-gateway)",
          RoboticsFacility:  "var(--color-chrono-robo)",
          RoboticsBay:       "var(--color-chrono-robo)",
          Stargate:          "var(--color-chrono-stargate)",
          FleetBeacon:       "var(--color-chrono-stargate)",
          Forge:             "var(--color-chrono-forge)",
          CyberneticsCore:   "var(--color-chrono-forge)",
          TwilightCouncil:   "var(--color-chrono-tech)",
          TemplarArchive:    "var(--color-chrono-tech)",
          DarkShrine:        "var(--color-chrono-tech)",
          Other:             "var(--color-chrono-other)",
          Unknown:           "var(--color-chrono-unknown)",
        };
        const colorFor = (name) =>
          COLOR_TOKENS[name] || "var(--color-chrono-other)";

        // SVG donut geometry. 100x100 viewBox, radius 36, stroke 18.
        // Slices stack via stroke-dasharray + dashoffset accumulation;
        // rotate(-90) puts the start at 12 o'clock. No transitions or
        // animations, so prefers-reduced-motion is satisfied by default.
        const RADIUS = 36;
        const STROKE_WIDTH = 18;
        const CIRCUMFERENCE = 2 * Math.PI * RADIUS;
        let cumulative = 0;
        const svgSlices = donutSlices.map((s, idx) => {
          const dash = (s.pct / 100) * CIRCUMFERENCE;
          const gap = CIRCUMFERENCE - dash;
          const offset = -((cumulative / 100) * CIRCUMFERENCE);
          cumulative += s.pct;
          return (
            <circle
              key={idx}
              cx="50" cy="50" r={RADIUS}
              fill="none"
              stroke={colorFor(s.building_name)}
              strokeWidth={STROKE_WIDTH}
              strokeDasharray={`${dash} ${gap}`}
              strokeDashoffset={offset}
              transform="rotate(-90 50 50)"
            />
          );
        });

        return (
          <div
            className="bg-base-800 rounded p-3"
            role="region"
            aria-label="Chrono Boost allocation by target building"
          >
            <div className="text-[11px] uppercase tracking-wider text-neutral-500 mb-2">
              Chrono allocation
            </div>
            <div className="text-xs text-neutral-400 mb-3">
              Where your {total} chrono cast{total === 1 ? "" : "s"} landed.
              Buildings under construction count under their final name;
              targets sc2reader could not resolve bucket as
              <span className="text-neutral-300"> Unknown</span>.
            </div>
            <div className="flex flex-col md:flex-row gap-4 items-center md:items-start">
              <div className="flex-shrink-0" aria-hidden="true">
                <svg
                  viewBox="0 0 100 100"
                  width="160"
                  height="160"
                  style={{ display: "block" }}
                >
                  <circle
                    cx="50" cy="50" r={RADIUS}
                    fill="none"
                    stroke="var(--color-border-subtle)"
                    strokeWidth={STROKE_WIDTH}
                  />
                  {svgSlices}
                  <text
                    x="50" y="48"
                    textAnchor="middle"
                    dominantBaseline="central"
                    fill="var(--color-text-primary)"
                    style={{
                      fontSize: "14px",
                      fontWeight: 700,
                      fontVariantNumeric: "tabular-nums",
                    }}
                  >
                    {total}
                  </text>
                  <text
                    x="50" y="60"
                    textAnchor="middle"
                    dominantBaseline="central"
                    fill="var(--color-text-muted)"
                    style={{ fontSize: "7px", letterSpacing: "0.05em" }}
                  >
                    CHRONOS
                  </text>
                </svg>
              </div>
              <div className="flex-1 w-full">
                <table className="w-full text-xs">
                  <thead>
                    <tr className="text-[10px] uppercase tracking-wider text-neutral-500">
                      <th className="text-left py-1 font-normal">Target</th>
                      <th className="text-right py-1 font-normal w-16">% share</th>
                      <th className="text-right py-1 font-normal w-12">#</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-base-700">
                    {tableRows.map((row, i) => (
                      <tr key={i}>
                        <td className="py-1 text-neutral-200">
                          <span
                            aria-hidden="true"
                            style={{
                              display: "inline-block",
                              width: "8px",
                              height: "8px",
                              borderRadius: "2px",
                              background: colorFor(row.building_name),
                              marginRight: "8px",
                              verticalAlign: "middle",
                            }}
                          />
                          {row.building_name}
                        </td>
                        <td className="py-1 text-right tabular-nums text-neutral-300">
                          {row.pct.toFixed(1)}%
                        </td>
                        <td className="py-1 text-right tabular-nums text-neutral-200">
                          {row.count}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        );
      }

      // =====================================================================
      // Spending Efficiency over time (Stage 6.5).
      //
      // Pure SVG line chart of the player's smoothed Spending Quotient (SQ)
      // sampled per PlayerStatsEvent and centered-mean-smoothed by the macro
      // engine. Red bands overlay every "leak window" — contiguous 30s
      // stretches where smoothed_sq < 50 AND avg_unspent > 600. Clicking a
      // band fires window event 'sc2:focus-build-order' (consumed by
      // BuildOrderTimeline) so the matching build-order events scroll into
      // view and highlight.
      //
      // Real data only: when stats_events is empty (older replay or
      // PlayerStatsEvent stream missing), the chart renders an em-dash
      // placeholder with a tooltip explaining why.
      // =====================================================================
      const SQ_CHART_VIEW_W = 800;
      const SQ_CHART_VIEW_H = 200;
      const SQ_CHART_PAD_LEFT = 40;
      const SQ_CHART_PAD_RIGHT = 16;
      const SQ_CHART_PAD_TOP = 12;
      const SQ_CHART_PAD_BOTTOM = 28;
      // SQ axis bounds. Real-world SQ is ~30..115 but we hard-clamp the
      // visible range so a single warmup spike doesn't crush the curve.
      const SQ_AXIS_MIN = 0;
      const SQ_AXIS_MAX = 120;
      const SQ_LEAK_THRESHOLD = 50;
      const SQ_TICK_VALUES = [0, 25, 50, 75, 100];

      function _sqYProject(value, plotTop, plotBottom) {
        const v = Math.max(SQ_AXIS_MIN, Math.min(SQ_AXIS_MAX, Number(value) || 0));
        const range = SQ_AXIS_MAX - SQ_AXIS_MIN;
        const pct = range > 0 ? (v - SQ_AXIS_MIN) / range : 0;
        return plotBottom - pct * (plotBottom - plotTop);
      }

      function _sqXProject(timeSec, gameLengthSec, plotLeft, plotRight) {
        const denom = Math.max(1, Number(gameLengthSec) || 1);
        const t = Math.max(0, Math.min(denom, Number(timeSec) || 0));
        return plotLeft + (t / denom) * (plotRight - plotLeft);
      }

      function _sqLinePoints(samples, gameLengthSec, plotLeft, plotRight, plotTop, plotBottom) {
        if (!Array.isArray(samples) || samples.length === 0) return [];
        const out = [];
        for (const s of samples) {
          const sm = s && (s.smoothed_sq != null ? s.smoothed_sq : s.instantaneous_sq);
          if (sm == null) continue;
          out.push([
            _sqXProject(s.time, gameLengthSec, plotLeft, plotRight),
            _sqYProject(sm, plotTop, plotBottom),
          ]);
        }
        return out;
      }

      function _sqPathD(points) {
        if (!points.length) return "";
        return points
          .map(
            (p, i) =>
              `${i === 0 ? "M" : "L"}${p[0].toFixed(1)},${p[1].toFixed(1)}`,
          )
          .join(" ");
      }

      function SpendingEfficiencyChart({
        gameId,
        statsEvents,
        oppStatsEvents,
        leakWindows,
        oppLeakWindows,
        gameLengthSec,
        myColor,
        oppColor,
      }) {
        const mySamples = Array.isArray(statsEvents) ? statsEvents : [];
        const oppSamples = Array.isArray(oppStatsEvents) ? oppStatsEvents : [];
        const myLeaks = Array.isArray(leakWindows) ? leakWindows : [];
        const oppLeaks = Array.isArray(oppLeakWindows) ? oppLeakWindows : [];

        // Empty state — real data only, never synthesize.
        const haveMine = mySamples.some((s) => s && s.smoothed_sq != null);
        const haveOpp = oppSamples.some((s) => s && s.smoothed_sq != null);
        if (!haveMine && !haveOpp) {
          return (
            <div
              className="bg-base-900 ring-soft rounded-lg p-3 my-2 border border-base-700 text-xs text-neutral-500"
              title="PlayerStatsEvent samples not available for this replay — instantaneous SQ cannot be computed."
            >
              <span className="text-[11px] uppercase tracking-wider text-neutral-500 mr-2">
                Spending efficiency over time
              </span>
              <span className="font-mono text-neutral-400">—</span>
            </div>
          );
        }

        // Game length: prefer the prop, fall back to the latest sample time.
        const inferredEnd = Math.max(
          ...mySamples.map((s) => Number(s.time) || 0),
          ...oppSamples.map((s) => Number(s.time) || 0),
          1,
        );
        const gl = Number(gameLengthSec) > 0 ? Number(gameLengthSec) : inferredEnd;

        const plotLeft = SQ_CHART_PAD_LEFT;
        const plotRight = SQ_CHART_VIEW_W - SQ_CHART_PAD_RIGHT;
        const plotTop = SQ_CHART_PAD_TOP;
        const plotBottom = SQ_CHART_VIEW_H - SQ_CHART_PAD_BOTTOM;

        const myPoints = _sqLinePoints(mySamples, gl, plotLeft, plotRight, plotTop, plotBottom);
        const oppPoints = _sqLinePoints(oppSamples, gl, plotLeft, plotRight, plotTop, plotBottom);

        const myStroke = myColor || "var(--color-success)";
        const oppStroke = oppColor || "var(--color-text-muted)";
        const leakFill = "var(--color-danger)";

        const handleLeakClick = (window_, isMine) => {
          if (!isMine) return; // only my leaks deep-link to my build order
          try {
            window.dispatchEvent(
              new CustomEvent("sc2:focus-build-order", {
                detail: {
                  gameId,
                  start: Number(window_.start) || 0,
                  end: Number(window_.end) || 0,
                },
              }),
            );
          } catch (_e) {
            // Older browsers / sandboxed iframes that disallow CustomEvent
            // construction silently no-op rather than throwing into the
            // React tree and crashing the whole panel.
          }
        };

        const formatClock = (sec) => {
          const s = Math.max(0, Math.floor(Number(sec) || 0));
          return `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, "0")}`;
        };

        return (
          <div className="bg-base-900 ring-soft rounded-lg p-3 my-2 border border-base-700">
            <div className="flex items-center gap-2 mb-2 flex-wrap">
              <span className="text-[11px] uppercase tracking-wider text-neutral-500">
                Spending efficiency over time
              </span>
              <span className="text-[11px] text-neutral-500">
                Smoothed SQ • red bands = leak windows
              </span>
              {myLeaks.length > 0 && (
                <span className="ml-auto text-[11px] text-loss-500 tabular-nums">
                  {myLeaks.length} leak{myLeaks.length === 1 ? "" : "s"}
                </span>
              )}
            </div>
            <svg
              viewBox={`0 0 ${SQ_CHART_VIEW_W} ${SQ_CHART_VIEW_H}`}
              className="w-full"
              style={{ maxHeight: SQ_CHART_VIEW_H }}
              role="img"
              aria-label="Spending efficiency over time"
            >
              {/* Leak threshold reference line at SQ=50. */}
              <line
                x1={plotLeft}
                x2={plotRight}
                y1={_sqYProject(SQ_LEAK_THRESHOLD, plotTop, plotBottom)}
                y2={_sqYProject(SQ_LEAK_THRESHOLD, plotTop, plotBottom)}
                stroke="var(--color-border-subtle)"
                strokeWidth="1"
                strokeDasharray="4 3"
              />
              {/* Y-axis ticks. */}
              {SQ_TICK_VALUES.map((tv) => (
                <g key={`ytick-${tv}`}>
                  <line
                    x1={plotLeft - 3}
                    x2={plotLeft}
                    y1={_sqYProject(tv, plotTop, plotBottom)}
                    y2={_sqYProject(tv, plotTop, plotBottom)}
                    stroke="var(--color-text-muted)"
                    strokeWidth="1"
                  />
                  <text
                    x={plotLeft - 6}
                    y={_sqYProject(tv, plotTop, plotBottom) + 3}
                    textAnchor="end"
                    fontSize="10"
                    fill="var(--color-text-secondary)"
                  >
                    {tv}
                  </text>
                </g>
              ))}
              {/* Opponent leak bands: dimmed, non-interactive. */}
              {oppLeaks.map((lk, i) => {
                const x1 = _sqXProject(lk.start, gl, plotLeft, plotRight);
                const x2 = _sqXProject(lk.end, gl, plotLeft, plotRight);
                return (
                  <rect
                    key={`opp-leak-${i}`}
                    x={x1}
                    y={plotTop}
                    width={Math.max(1, x2 - x1)}
                    height={plotBottom - plotTop}
                    fill={leakFill}
                    fillOpacity="0.10"
                  />
                );
              })}
              {/* My leak bands: clickable, brighter. */}
              {myLeaks.map((lk, i) => {
                const x1 = _sqXProject(lk.start, gl, plotLeft, plotRight);
                const x2 = _sqXProject(lk.end, gl, plotLeft, plotRight);
                const w = Math.max(2, x2 - x1);
                return (
                  <g
                    key={`my-leak-${i}`}
                    style={{ cursor: "pointer" }}
                    onClick={() => handleLeakClick(lk, true)}
                    role="button"
                    tabIndex={0}
                    onKeyDown={(e) => {
                      if (e.key === "Enter" || e.key === " ") {
                        e.preventDefault();
                        handleLeakClick(lk, true);
                      }
                    }}
                    aria-label={`Leak window from ${formatClock(lk.start)} to ${formatClock(lk.end)}, click to focus build order`}
                  >
                    <title>{`Leak ${formatClock(lk.start)}-${formatClock(lk.end)} • avg unspent ${Math.round(lk.avg_unspent || 0)} • avg income ${Math.round(lk.avg_income || 0)}/min — click to focus build order`}</title>
                    <rect
                      x={x1}
                      y={plotTop}
                      width={w}
                      height={plotBottom - plotTop}
                      fill={leakFill}
                      fillOpacity="0.22"
                    />
                    <rect
                      x={x1}
                      y={plotBottom - 3}
                      width={w}
                      height={3}
                      fill={leakFill}
                      fillOpacity="0.95"
                    />
                  </g>
                );
              })}
              {/* Opponent line (dimmed) under my line. */}
              {oppPoints.length > 1 && (
                <path
                  d={_sqPathD(oppPoints)}
                  fill="none"
                  stroke={oppStroke}
                  strokeWidth="1.5"
                  strokeOpacity="0.55"
                />
              )}
              {/* My line. */}
              {myPoints.length > 1 && (
                <path
                  d={_sqPathD(myPoints)}
                  fill="none"
                  stroke={myStroke}
                  strokeWidth="2"
                />
              )}
              {/* X axis baseline. */}
              <line
                x1={plotLeft}
                x2={plotRight}
                y1={plotBottom}
                y2={plotBottom}
                stroke="var(--color-border-default)"
                strokeWidth="1"
              />
              {/* X axis: minute ticks. */}
              {(() => {
                const ticks = [];
                const stepSec = 60;
                for (let t = 0; t <= gl; t += stepSec) {
                  const x = _sqXProject(t, gl, plotLeft, plotRight);
                  ticks.push(
                    <g key={`xtick-${t}`}>
                      <line
                        x1={x}
                        x2={x}
                        y1={plotBottom}
                        y2={plotBottom + 3}
                        stroke="var(--color-text-muted)"
                        strokeWidth="1"
                      />
                      <text
                        x={x}
                        y={plotBottom + 14}
                        textAnchor="middle"
                        fontSize="10"
                        fill="var(--color-text-secondary)"
                      >
                        {formatClock(t)}
                      </text>
                    </g>,
                  );
                }
                return ticks;
              })()}
              {/* Y axis title. */}
              <text
                x={plotLeft - 30}
                y={plotTop + (plotBottom - plotTop) / 2}
                fontSize="9"
                fill="var(--color-text-muted)"
                transform={`rotate(-90 ${plotLeft - 30} ${plotTop + (plotBottom - plotTop) / 2})`}
                textAnchor="middle"
              >
                SQ
              </text>
            </svg>
            {myLeaks.length === 0 && haveMine && (
              <div className="text-[10px] text-neutral-500 mt-1">
                No leak windows detected — sustained spending efficiency throughout.
              </div>
            )}
          </div>
        );
      }

      // "Recompute" button that POSTs to /games/:id/macro-breakdown to re-parse
      // the replay file.
      function MacroBreakdownPanel({ gameId, initialMacro }) {
        const [data, setData] = useState(null);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [recomputing, setRecomputing] = useState(false);

        useEffect(() => {
          let cancelled = false;
          setLoading(true);
          setError(null);
          fetch(`${API}/games/${encodeURIComponent(gameId)}/build-order`)
            .then((r) =>
              r.ok ? r.json() : r.json().then((j) => Promise.reject(j)),
            )
            .then((j) => {
              if (cancelled) return;
              setData(j);
              setLoading(false);
              // Auto-recompute when the stored macro_breakdown is the
              // SLIM shape (post-migration: no stats_events / opp_stats_
              // events / unit_timeline persisted to disk). The existing
              // Active Army & Workers chart needs those arrays, so we
              // hit /macro-breakdown POST in the background. The chart
              // shows a brief "computing samples..." indicator.
              const bd = j && j.macro_breakdown;
              const hasSamples = bd && Array.isArray(bd.stats_events)
                && bd.stats_events.length > 0;
              // Stage 6.2.1: also auto-recompute when there's no stored
              // macro_score yet -- the modal was likely opened from a
              // table dash cell to do exactly this.
              const hasScore = typeof j.macro_score === "number";
              const needsRecompute = !hasScore || (bd && !hasSamples);
              if (needsRecompute) {
                setRecomputing(true);
                fetch(`${API}/games/${encodeURIComponent(gameId)}/macro-breakdown`, {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({}),
                })
                  .then((r) =>
                    r.ok ? r.json() : r.json().then((jj) => Promise.reject(jj)),
                  )
                  .then((fresh) => {
                    if (cancelled) return;
                    setData((d) =>
                      Object.assign({}, d, {
                        macro_score: fresh.macro_score,
                        top_3_leaks: fresh.top_3_leaks || [],
                        macro_breakdown: {
                          score: fresh.score,
                          race: fresh.race,
                          game_length_sec: fresh.game_length_sec,
                          raw: fresh.raw || {},
                          all_leaks: fresh.all_leaks || [],
                          top_3_leaks: fresh.top_3_leaks || [],
                          stats_events: Array.isArray(fresh.stats_events)
                            ? fresh.stats_events : [],
                          opp_stats_events: Array.isArray(fresh.opp_stats_events)
                            ? fresh.opp_stats_events : [],
                          unit_timeline: Array.isArray(fresh.unit_timeline)
                            ? fresh.unit_timeline : [],
                        },
                      }),
                    );
                    setRecomputing(false);
                  })
                  .catch(() => {
                    // Best-effort. Manual "Recompute" button still works.
                    if (!cancelled) setRecomputing(false);
                  });
              }
            })
            .catch((e) => {
              if (!cancelled) {
                setError(e.error || "fetch failed");
                setLoading(false);
              }
            });
          return () => {
            cancelled = true;
          };
        }, [gameId]);

        const recompute = () => {
          setRecomputing(true);
          setError(null);
          fetch(`${API}/games/${encodeURIComponent(gameId)}/macro-breakdown`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({}),
          })
            .then((r) =>
              r.ok ? r.json() : r.json().then((j) => Promise.reject(j)),
            )
            .then((j) => {
              // Merge fresh breakdown into local data for instant rerender.
              setData((d) =>
                Object.assign({}, d, {
                  macro_score: j.macro_score,
                  top_3_leaks: j.top_3_leaks || [],
                  macro_breakdown: {
                    score: j.score,
                    race: j.race,
                    game_length_sec: j.game_length_sec,
                    raw: j.raw || {},
                    all_leaks: j.all_leaks || [],
                    top_3_leaks: j.top_3_leaks || [],
                    // PlayerStatsEvent samples for the army/workers chart.
                    stats_events: Array.isArray(j.stats_events) ? j.stats_events : [],
                    // Opponent samples + alive-unit timeline for the dual-
                    // player chart and the unit roster panel.
                    opp_stats_events: Array.isArray(j.opp_stats_events) ? j.opp_stats_events : [],
                    unit_timeline: Array.isArray(j.unit_timeline) ? j.unit_timeline : [],
                  },
                }),
              );
              setRecomputing(false);
            })
            .catch((e) => {
              setError(e.error || "recompute failed");
              setRecomputing(false);
            });
        };

        if (loading)
          return (
            <div className="text-xs text-neutral-500 px-3 py-2">
              loading macro breakdown…
            </div>
          );
        if (error)
          return (
            <div className="text-xs text-loss-500 px-3 py-2">
              macro unavailable: {error}
            </div>
          );
        if (!data) return null;

        const score =
          typeof data.macro_score === "number"
            ? data.macro_score
            : initialMacro;
        const breakdown = data.macro_breakdown || null;
        const raw = (breakdown && breakdown.raw) || {};
        const leaks =
          breakdown &&
          Array.isArray(breakdown.all_leaks) &&
          breakdown.all_leaks.length > 0
            ? breakdown.all_leaks
            : Array.isArray(data.top_3_leaks)
              ? data.top_3_leaks
              : [];
        const race = (breakdown && breakdown.race) || "";

        // Effective race: prefer the explicit race the backend tagged
        // (analytics/macro_score.py reads my_race from the parser). For
        // older breakdowns or when the user is Random, fall back to the
        // exclusive discipline field that was populated — macro_score
        // only writes ONE of injects/chronos/mules per game so the
        // non-null field is the authoritative race signal.
        const effectiveRace =
          race === "Zerg" || race === "Protoss" || race === "Terran"
            ? race
            : raw.injects_actual != null
              ? "Zerg"
              : raw.chronos_actual != null
                ? "Protoss"
                : raw.mules_actual != null
                  ? "Terran"
                  : "";

        // Per-race section descriptor used by the discipline panel and
        // the "What you did well" copy. The glyph string drives the
        // .race-Z / .race-P / .race-T CSS class (defined at the top of
        // this file) so the small letter next to each heading paints
        // in the right accent. unitPlural is rendered alongside the
        // actual/expected count in the discipline panel.
        const RACE_SECTIONS = {
          Zerg: {
            glyph: "Z",
            title: "Inject Efficiency",
            actualKey: "injects_actual",
            expectedKey: "injects_expected",
            unitPlural: "injects",
            winCopy: "Inject cadence kept up with hatchery uptime.",
          },
          Protoss: {
            glyph: "P",
            title: "Chrono Efficiency",
            actualKey: "chronos_actual",
            expectedKey: "chronos_expected",
            unitPlural: "chronos",
            winCopy: "Chrono usage matched nexus uptime.",
          },
          Terran: {
            glyph: "T",
            title: "MULE Efficiency",
            actualKey: "mules_actual",
            expectedKey: "mules_expected",
            unitPlural: "MULEs",
            winCopy: "MULE drops kept pace with orbital energy.",
          },
        };
        const raceSection = RACE_SECTIONS[effectiveRace] || null;

        const headlineColor =
          typeof score !== "number"
            ? "text-neutral-500"
            : score >= 75
              ? "text-win-500"
              : score >= 50
                ? "text-gold-500"
                : "text-loss-500";

            {breakdown ? (

                <div className="bg-base-800 rounded p-3">
                  <div className="text-[11px] uppercase tracking-wider text-neutral-500 mb-2">

                  <div className="text-xs text-neutral-400 mb-2">

                  <table className="w-full text-xs">
                    <tbody className="divide-y divide-base-700">
                      {typeof raw.sq === "number" && (

                        <td className="py-1 text-neutral-300">

                        <td

                          {raw[raceSection.actualKey]} of ~

                              Math.max(1, raw[raceSection.expectedKey]),
                          )}

                  {/* Race-agnostic discipline metrics (apply to every
                      race). Rendered separately from the race section

                  {(raw.supply_blocked_seconds != null ||
                    raw.mineral_float_spikes != null) && (

                      {raw.supply_blocked_seconds != null && (

                          {Math.round(raw.supply_blocked_seconds)}s total

                      )}
                      {raw.mineral_float_spikes != null && (

                        </div>

                </div>

                {/* What you did well + leaks */}
                <div className="bg-base-800 rounded p-3 space-y-3">
                  {wins.length > 0 && (
                    <div>
                      <div className="text-[11px] uppercase tracking-wider text-win-500 mb-1">

                      </div>
                      <ul className="text-xs text-neutral-200 space-y-1 list-disc pl-4">

                  <div>
                    <div className="text-[11px] uppercase tracking-wider text-loss-500 mb-1">

                              <span className="text-xs font-semibold text-neutral-100">

                              </span>

              </div>
              {/* Macro detail flow (top -> bottom):
                    1. Active Army & Workers   — headline economy/army snapshot,

                    2. Chrono allocation       — Protoss-only deep-dive on where
                                                  chronos landed; renders below the
                                                  headline so race-specific detail
                                                  reads as a refinement, not a header.
                    3. Spending efficiency     — over-time SQ curve with leak windows;
                                                  ties back to BuildOrderTimeline via
                                                  the sc2:focus-build-order event.
                  Each section uses an mt-4 wrapper for a consistent vertical
                  rhythm; each chart owns its own card chrome and header. */}
              <div className="mt-4">
                <MacroResourceChart
                  statsEvents={breakdown && breakdown.stats_events}
                  oppStatsEvents={breakdown && breakdown.opp_stats_events}
                  unitTimeline={breakdown && breakdown.unit_timeline}
                  race={race}
                  gameLengthSec={breakdown && breakdown.game_length_sec}
                />
              </div>
              {effectiveRace === "Protoss" &&
                Array.isArray(raw.chrono_targets) &&
                raw.chrono_targets.length > 0 && (

              <div className="mt-4">
                <SpendingEfficiencyChart

            ) : leaks.length > 0 ? (
              /* Older games without macro_breakdown but with top_3_leaks: show summary only. */
              <div className="bg-base-800 rounded p-3">
