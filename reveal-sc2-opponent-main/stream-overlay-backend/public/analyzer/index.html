      }


      // =====================================================================
      // Resources-over-time chart (sibling to MacroBreakdownPanel inside the
      // GameDetailModal).
      //
      // Three lines per player on a shared time axis:
      //   - Income rate     = minerals_collection_rate + vespene_collection_rate
      //   - Unspent         = minerals_current + vespene_current
      //   - Used in progress = minerals_used_in_progress + vespene_used_in_progress
      //
      // Line style encodes ownership: dotted = me, solid = opp. Color encodes
      // which series. X-axis ticks every 60s. Right-side y-axis shows the
      // "good band" — income target = 60-80 minerals per worker per minute —
      // overlaid as a translucent green polygon at [60*workers, 80*workers]
      // on the user's worker count over time.
      //
      // Empty stats_events (older replays whose tracker stream had no
      // PlayerStatsEvent rows) → renders the "too old" placeholder. Never
      // synthesizes values.
      // =====================================================================
      const RES_VIEW_W = 800;
      const RES_VIEW_H = 260;
      const RES_PAD_LEFT = 56;
      const RES_PAD_RIGHT = 60;
      const RES_PAD_TOP = 12;
      const RES_PAD_BOTTOM = 30;
      const RES_X_TICK_SEC = 60;
      const RES_LINE_OPACITY = 0.95;
      const RES_BAND_OPACITY = 0.18;
      const RES_INCOME_PER_WORKER_LOW = 60;
      const RES_INCOME_PER_WORKER_HIGH = 80;
      // Three independent series colors; we keep them race-neutral because
      // both players already share one chart and we differentiate ownership
      // via dash style.
      const RES_SERIES_COLOR = {
        income: "var(--color-success)",
        unspent: "var(--color-warning)",
        in_progress: "var(--color-info)",
      };
      const RES_SERIES_LABEL = {
        income: "Income",
        unspent: "Unspent",
        in_progress: "In progress",
      };
      const RES_BAND_COLOR = "var(--color-success)";

      function _resSampleIncome(s) {
        return (Number(s.minerals_collection_rate) || 0)
             + (Number(s.vespene_collection_rate) || 0);
      }
      function _resSampleUnspent(s) {
        return (Number(s.minerals_current) || 0)
             + (Number(s.vespene_current) || 0);
      }
      function _resSampleInProgress(s) {
        return (Number(s.minerals_used_in_progress) || 0)
             + (Number(s.vespene_used_in_progress) || 0);
      }

      function _resSeries(samples) {
        if (!Array.isArray(samples) || samples.length === 0) return null;
        const t = samples.map((s) => Number(s.time) || 0);
        return {
          time: t,
          income: samples.map(_resSampleIncome),
          unspent: samples.map(_resSampleUnspent),
          in_progress: samples.map(_resSampleInProgress),
          workers: samples.map((s) => Number(s.food_workers) || 0),
        };
      }

      function _resYAxisMax(seriesList) {
        let m = 0;
        for (const s of seriesList) {
          if (!s) continue;
          for (const arr of [s.income, s.unspent, s.in_progress]) {
            for (const v of arr) if (v > m) m = v;
          }
          // Account for the band ceiling (80 * max workers) so the band
          // never extends past the visible plot.
          for (const w of s.workers) {
            const ceiling = w * RES_INCOME_PER_WORKER_HIGH;
            if (ceiling > m) m = ceiling;
          }
        }
        if (m <= 0) return 1000;
        const steps = [500, 1000, 1500, 2000, 3000, 4000, 5000, 7500, 10000];
        for (const s of steps) if (m <= s) return s;
        return Math.ceil(m / 1000) * 1000;
      }

      function _resXMax(seriesList) {
        let m = 0;
        for (const s of seriesList) {
          if (!s || !s.time.length) continue;
          const last = s.time[s.time.length - 1];
          if (last > m) m = last;
        }
        return m;
      }

      function _resPathFor(times, values, plotW, plotH, padLeft, padTop, xMax, yMax) {
        if (!values || values.length === 0 || yMax <= 0 || xMax <= 0) return "";
        const xAt = (t) => padLeft + (t / xMax) * plotW;
        const yAt = (v) => padTop + plotH - (Math.min(v, yMax) / yMax) * plotH;
        let d = "";
        for (let i = 0; i < values.length; i += 1) {
          d += (i === 0 ? "M " : " L ")
            + xAt(times[i]).toFixed(2) + " "
            + yAt(values[i]).toFixed(2);
        }
        return d;
      }

      function _resBandPolygonPath(times, workers, plotW, plotH,
                                   padLeft, padTop, xMax, yMax,
                                   perWorkerLow, perWorkerHigh) {
        if (!workers || workers.length === 0) return "";
        const xAt = (t) => padLeft + (t / xMax) * plotW;
        const yAt = (v) => padTop + plotH - (Math.min(v, yMax) / yMax) * plotH;
        let upper = "";
        for (let i = 0; i < workers.length; i += 1) {
          upper += (i === 0 ? "M " : " L ")
            + xAt(times[i]).toFixed(2) + " "
            + yAt(workers[i] * perWorkerHigh).toFixed(2);
        }
        let lower = "";
        for (let i = workers.length - 1; i >= 0; i -= 1) {
          lower += " L " + xAt(times[i]).toFixed(2) + " "
            + yAt(workers[i] * perWorkerLow).toFixed(2);
        }
        return upper + lower + " Z";
      }

      function ResourcesChartSvg({ mySeries, oppSeries, xMax, yMax }) {
        const plotW = RES_VIEW_W - RES_PAD_LEFT - RES_PAD_RIGHT;
        const plotH = RES_VIEW_H - RES_PAD_TOP - RES_PAD_BOTTOM;
        const xTicks = [];
        for (let t = 0; t <= xMax; t += RES_X_TICK_SEC) xTicks.push(t);
        const yTickFracs = [0, 0.25, 0.5, 0.75, 1];
        const SERIES_KEYS = ["income", "unspent", "in_progress"];
        const renderPaths = (series, dasharray) => {
          if (!series) return null;
          return SERIES_KEYS.map((k) => {
            const d = _resPathFor(
              series.time, series[k],
              plotW, plotH, RES_PAD_LEFT, RES_PAD_TOP, xMax, yMax,
            );
            if (!d) return null;
            return (
              <path
                key={k}
                d={d}
                fill="none"
                stroke={RES_SERIES_COLOR[k]}
                strokeWidth="1.5"
                strokeDasharray={dasharray}
                opacity={RES_LINE_OPACITY}
              />
            );
          });
        };
        const bandSource = mySeries || oppSeries;
        const bandPath = bandSource
          ? _resBandPolygonPath(
              bandSource.time, bandSource.workers,
              plotW, plotH, RES_PAD_LEFT, RES_PAD_TOP, xMax, yMax,
              RES_INCOME_PER_WORKER_LOW, RES_INCOME_PER_WORKER_HIGH,
            )
          : "";
        return (
          <svg
            viewBox={`0 0 ${RES_VIEW_W} ${RES_VIEW_H}`}
            preserveAspectRatio="none"
            className="w-full h-[260px]"
            role="img"
            aria-label="Resources over time chart"
          >
            {bandPath && (
              <path
                d={bandPath}
                fill={RES_BAND_COLOR}
                opacity={RES_BAND_OPACITY}
              />
            )}
            {yTickFracs.map((frac, i) => {
              const y = RES_PAD_TOP + plotH - frac * plotH;
              const v = Math.round(yMax * frac);
              return (
                <g key={`y${i}`}>
                  <line
                    x1={RES_PAD_LEFT}
                    y1={y}
                    x2={RES_VIEW_W - RES_PAD_RIGHT}
                    y2={y}
                    stroke="var(--color-border-subtle)"
                    strokeWidth="1"
                  />
                  <text
                    x={RES_PAD_LEFT - 4}
                    y={y + 3}
                    textAnchor="end"
                    fontSize="9"
                    fill="var(--color-text-secondary)"
                  >
                    {v}
                  </text>
                </g>
              );
            })}
            {xTicks.map((t, i) => {
              const x = RES_PAD_LEFT + (xMax > 0 ? (t / xMax) * plotW : 0);
              return (
                <g key={`x${i}`}>
                  <line
                    x1={x}
                    y1={RES_PAD_TOP + plotH}
                    x2={x}
                    y2={RES_PAD_TOP + plotH + 3}
                    stroke="var(--color-text-secondary)"
                    strokeWidth="1"
                  />
                  <text
                    x={x}
                    y={RES_PAD_TOP + plotH + 14}
                    textAnchor="middle"
                    fontSize="9"
                    fill="var(--color-text-secondary)"
                  >
                    {Math.floor(t / 60)}:{String(t % 60).padStart(2, "0")}
                  </text>
                </g>
              );
            })}
            <text
              x={RES_VIEW_W - RES_PAD_RIGHT + 6}
              y={RES_PAD_TOP + 10}
              fontSize="9"
              fill={RES_BAND_COLOR}
              opacity="0.85"
            >
              good band
            </text>
            <text
              x={RES_VIEW_W - RES_PAD_RIGHT + 6}
              y={RES_PAD_TOP + 22}
              fontSize="8"
              fill="var(--color-text-secondary)"
            >
              {RES_INCOME_PER_WORKER_LOW}-{RES_INCOME_PER_WORKER_HIGH}
            </text>
            <text
              x={RES_VIEW_W - RES_PAD_RIGHT + 6}
              y={RES_PAD_TOP + 32}
              fontSize="8"
              fill="var(--color-text-secondary)"
            >
              min/wkr/min
            </text>
            {renderPaths(mySeries, "3 3")}
            {renderPaths(oppSeries, "0")}
          </svg>
        );
      }

      function _resLegend(label, dasharray) {
        return (
          <div className="flex items-center gap-3">
            <span className="text-[10px] uppercase tracking-wide text-neutral-500">
              {label}:
            </span>
            {Object.keys(RES_SERIES_COLOR).map((k) => (
              <span key={k} className="flex items-center gap-1">
                <svg width="22" height="6">
                  <line
                    x1="0"
                    y1="3"
                    x2="22"
                    y2="3"
                    stroke={RES_SERIES_COLOR[k]}
                    strokeWidth="2"
                    strokeDasharray={dasharray}
                  />
                </svg>
                <span className="text-[10px] text-neutral-300">
                  {RES_SERIES_LABEL[k]}
                </span>
              </span>
            ))}
          </div>
        );
      }

      function ResourcesOverTimeChart({ gameId }) {
        const [data, setData] = useState(null);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);

        useEffect(() => {
          let cancelled = false;
          setLoading(true);
          setError(null);
          // Reuse /macro-breakdown — stats_events comes back in the same
          // payload, so we don't double-spawn macro_cli for the modal.
          fetch(`${API}/games/${encodeURIComponent(gameId)}/macro-breakdown`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({}),
          })
            .then((r) =>
              r.ok ? r.json() : r.json().then((j) => Promise.reject(j)),
            )
            .then((j) => {
              if (!cancelled) {
                setData(j);
                setLoading(false);
              }
            })
            .catch((e) => {
              if (!cancelled) {
                setError((e && e.error) || "fetch failed");
                setLoading(false);
              }
            });
          return () => {
            cancelled = true;
          };
        }, [gameId]);

        if (loading) {
          return (
            <div className="text-xs text-neutral-500 px-3 py-3">
              loading resources…
            </div>
          );
        }
        if (error) {
          return (
            <div className="text-xs text-loss-500 px-3 py-3">
              resources unavailable: {error}
            </div>
          );
        }
        const myRaw = (data && data.stats_events) || [];
        const oppRaw = (data && data.opp_stats_events) || [];
        if (myRaw.length === 0 && oppRaw.length === 0) {
          return (
            <div className="bg-base-900/40 rounded p-4 text-center">
              <div className="text-xs text-neutral-400 italic">
                Replay too old to have resource samples (no PlayerStatsEvent
                rows in the tracker stream).
              </div>
            </div>
          );
        }
        const mySeries = _resSeries(myRaw);
        const oppSeries = _resSeries(oppRaw);
        const xMax = _resXMax([mySeries, oppSeries]);
        const yMax = _resYAxisMax([mySeries, oppSeries]);
        return (
          <div className="bg-base-900/40 rounded p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="text-xs uppercase tracking-wide text-neutral-300">
                Resources over time
              </div>
              <div className="flex flex-wrap items-center gap-x-4 gap-y-1">
                {_resLegend("me (dotted)", "3 3")}
                {_resLegend("opp (solid)", "0")}
              </div>
            </div>
            <ResourcesChartSvg
              mySeries={mySeries}
              oppSeries={oppSeries}
              xMax={xMax}
              yMax={yMax}
            />
            <div className="text-[10px] text-neutral-500 mt-1 px-1">
              Income = minerals + vespene per minute. Unspent = current bank.
              In progress = mineral+gas cost of units/buildings/upgrades still
              being built. Green band = income range you should be in given
              your worker count (60-80 minerals per worker per minute).
            </div>
          </div>
        );
      }


      // =====================================================================
      // GameDetailModal — full-screen view triggered by clicking a game's
      // macro score in GamesTableWithBuildOrder.
      //
      // Hosts the macro breakdown panel + activity (APM/SPM) charts + the
      // resources-over-time chart side-by-side, all sharing the same gameId.
      // The modal is a fixed-position overlay (z-50) with a dim backdrop;
      // ESC and a backdrop click both close it.
      // =====================================================================
      function _gameModalTitle(game) {
        if (!game) return "Game detail";
        const date = fmtDate(game.date);
        const opp = game.opponent || "—";
        const map = game.map || "—";
        const result = game.result || "";
        return `${date} · vs ${opp} · ${map}${result ? ` · ${result}` : ""}`;
      }

      function GameDetailModal({ game, gameId, macroValue, onClose }) {
        // ESC-to-close. We bind once at mount and explicitly let the
        // dependency list drive re-bind so a new game id doesn't leak the
        // previous handler.
        useEffect(() => {
          const onKey = (e) => {
            if (e.key === "Escape") onClose();
          };
          window.addEventListener("keydown", onKey);
          return () => window.removeEventListener("keydown", onKey);
        }, [onClose]);
        const stop = (e) => e.stopPropagation();
        const myRace = game && (game.my_race || "");
        const oppRace = game && (game.opp_race || "");
        return (
          <div
            className="fixed inset-0 z-50 bg-black/70 flex items-stretch justify-center p-4 sm:p-8 overflow-y-auto"
            onClick={onClose}
            role="dialog"
            aria-modal="true"
            aria-label="Game detail"
          >
            <div
              className="bg-base-800 border border-base-700 rounded-lg shadow-xl w-full max-w-6xl my-auto"
              onClick={stop}
            >
              <div className="flex items-center justify-between px-4 py-3 border-b border-base-700 sticky top-0 bg-base-800 rounded-t-lg z-10">
                <div className="min-w-0 flex-1">
                  <div className="text-[11px] uppercase tracking-wide text-neutral-500">
                    Game detail
                  </div>
                  <div className="text-sm text-neutral-200 truncate">
                    {_gameModalTitle(game)}
                  </div>
                </div>
                <button
                  onClick={onClose}
                  className="ml-3 px-3 py-1 text-xs rounded bg-base-700 hover:bg-base-600 text-neutral-200"
                  aria-label="Close game detail"
                >
                  Close ✕
                </button>
              </div>
              <div className="p-4 space-y-5">
                <section>
                  <div className="text-[11px] uppercase tracking-wide text-neutral-400 mb-2">
                    Macro breakdown
                  </div>
                  <MacroBreakdownPanel
                    gameId={gameId}
                    initialMacro={macroValue}
                  />
                </section>
                <section>
                  <div className="text-[11px] uppercase tracking-wide text-neutral-400 mb-2">
                    Activity (APM / SPM)
                  </div>
                  <ActivityOverTimeChart
                    gameId={gameId}
                    myRaceHint={myRace}
                    oppRaceHint={oppRace}
                  />
                </section>
                <section>
                  <ResourcesOverTimeChart gameId={gameId} />
                </section>
              </div>
            </div>
          </div>
        );
      }

      function GamesTableWithBuildOrder({
        games,
        perspective,
        targetGameId,
        targetGameSeq,
      }) {
        // expandedId tracks which row's drawer is open; expandedMode controls
        // whether the drawer shows the build-order timeline ('build') or the
        // macro breakdown ('macro'). Both come from clicks on the same row.
        // `perspective` is forwarded to BuildOrderTimeline so the OpponentProfile
        // can default the drawer to the opponent's build (callers that don't
        // pass it get the user's build, the historical default).
        // `targetGameId` / `targetGameSeq` are an external focus signal: the
        // timings-drilldown 'open game →' link bumps the seq with the gameId
        // it wants to bring into view. We honor it by expanding the row and
        // scrolling the row into view; the seq bump means clicking the same
        // game twice still re-fires the effect.
        const [expandedId, setExpandedId] = useState(null);
        const [expandedMode, setExpandedMode] = useState("build");
        // Open game appears in a full-screen modal (macro breakdown +
        // activity + resources). Set to {game, gameId, macroValue} to open.
        const [modalGame, setModalGame] = useState(null);
        const tableRef = useRef(null);
        useEffect(() => {
          if (!targetGameId || !tableRef.current) return;
          setExpandedId(targetGameId);
          setExpandedMode("build");
          const el = tableRef.current.querySelector(
            `[data-game-row-id="${CSS && CSS.escape ? CSS.escape(targetGameId) : targetGameId}"]`,
          );
          if (el && typeof el.scrollIntoView === "function") {
            try {
              el.scrollIntoView({ behavior: "smooth", block: "center" });
            } catch (_) {
              el.scrollIntoView();
            }
          }
        }, [targetGameId, targetGameSeq]);
        return (
          <>
          <table ref={tableRef} className="w-full text-sm">
            <thead className="text-neutral-500 text-[11px] uppercase sticky top-0 bg-base-800">
              <tr>
                <th className="text-left py-1 px-2 w-6"></th>
                <th className="text-left py-1 px-2">Date</th>
                <th className="text-left py-1 px-2">Map</th>
                <th className="text-left py-1 px-2">Opponent</th>
                <th className="text-left py-1 px-2">Race</th>
                <th className="text-left py-1 px-2">Strategy</th>
                <th className="text-left py-1 px-2">My Build</th>
                <th className="text-right py-1 px-2">Macro</th>
                <th className="text-right py-1 px-2">Result</th>
              </tr>
            </thead>
            <tbody>
              {games.map((g, i) => {
                // A "real" id is one that came off the actual game record. The
                // synthetic `_idx_N` fallback exists only as a React key; we
                // must NOT use it to fetch /games/:id/build-order or the
                // backend will return 404 "game not found". Rows without a
                // real id are rendered non-interactive (no expand caret, no
                // macro click) instead of producing a broken expand drawer.
                const realId = g.id || g.game_id || null;
                const id = realId || `_idx_${i}`;
                const expandable = !!realId;
                const isOpen = expandable && expandedId === id;
                // Read macro score with defensive fallback — top-level
                // macro_score is the canonical field, but macro_breakdown.score
                // (live recompute payload) and macro_breakdown.macro_score
                // (Python CLI backfill payload) carry the same value. Fall
                // through so a row that lost macro_score in transit still
                // renders the score from whatever shape survived.
                const macro = (() => {
                  if (typeof g.macro_score === "number") return g.macro_score;
                  const bd = g && g.macro_breakdown;
                  if (bd && typeof bd === "object") {
                    if (typeof bd.score === "number") return bd.score;
                    if (typeof bd.macro_score === "number") return bd.macro_score;
                  }
                  return null;
                })();
                const macroColor =
                  macro == null
                    ? "text-neutral-500"
                    : macro >= 75
                      ? "text-win-500"
                      : macro >= 50
                        ? "text-gold-500"
                        : "text-loss-500";
                const macroOpen = isOpen && expandedMode === "macro";
                return (
                  <Fragment key={id}>
                    <tr
                      data-game-row-id={id}
                      className={
                        "border-t border-base-700 " +
                        (expandable
                          ? "cursor-pointer hover:bg-base-700/40 "
                          : "") +
                        (isOpen ? "bg-base-700/30" : "")
                      }
                      onClick={() => {
                        if (!expandable) return;
                        if (isOpen && expandedMode === "build") {
                          setExpandedId(null);
                        } else {
                          setExpandedId(id);
                          setExpandedMode("build");
                        }
                      }}
                    >
                      <td className="py-1 px-2 text-neutral-500 select-none">
                        {expandable ? (isOpen ? "▾" : "▸") : ""}
                      </td>
                      <td className="py-1 px-2 text-neutral-400 font-mono text-xs">
                        {fmtDate(g.date)}
                      </td>
                      <td className="py-1 px-2 text-neutral-300">
                        {g.map || "—"}
                      </td>
                      <td className="py-1 px-2 text-neutral-300">
                        {g.opponent || "—"}
                      </td>
                      <td className={`py-1 px-2 ${raceClass(g.opp_race)}`}>
                        {(g.opp_race || "?")[0].toUpperCase()}
                      </td>
                      <td className="py-1 px-2 text-neutral-400">
                        {g.opp_strategy || "—"}
                      </td>
                      <td
                        className="py-1 px-2 text-neutral-300"
                        title="The build I played that game"
                      >
                        {g.my_build || "—"}
                      </td>
                      <td className="py-1 px-2 text-right">
                        {macro == null && expandable ? (
                          // Stage 6.2.1: a missing macro score is still
                          // actionable for real-id rows -- clicking opens
                          // the detail modal which auto-recomputes from
                          // the replay file. We pass macroValue=null so
                          // MacroBreakdownPanel can detect the no-score
                          // state and kick the recompute itself.
                          <button
                            onClick={(e) => {
                              e.stopPropagation();
                              setModalGame({
                                game: g,
                                gameId: id,
                                macroValue: null,
                              });
                            }}
                            className="font-semibold tabular-nums text-neutral-500 underline decoration-dotted underline-offset-2 hover:text-neutral-300"
                            title="No macro score yet -- click to recompute from the replay file."
                          >
                            —
                          </button>
                        ) : macro == null ? (
                          <span
                            className="font-semibold tabular-nums text-neutral-500"
                            title="Replay metadata missing - run the analyzer on this replay to enable click-through."
                          >
                            —
                          </span>
                        ) : expandable ? (
                          <button
                            onClick={(e) => {
                              e.stopPropagation();
                              setModalGame({
                                game: g,
                                gameId: id,
                                macroValue: macro,
                              });
                            }}
                            className={`font-semibold tabular-nums underline decoration-dotted underline-offset-2 hover:opacity-80 ${macroColor}`}
                            title="Click to see how this score was calculated"
                          >
                            {macro}
                          </button>
                        ) : (
                          <span
                            className={`font-semibold tabular-nums ${macroColor}`}
                            title="Replay metadata missing - run the analyzer on this replay to enable click-through."
                          >
                            {macro}
                          </span>
                        )}
                      </td>
                      <td
                        className={`py-1 px-2 text-right font-semibold ${g.result === "Win" || g.result === "Victory" ? "text-win-500" : g.result === "Loss" || g.result === "Defeat" ? "text-loss-500" : "text-neutral-500"}`}
                      >
                        {g.result || "—"}
                      </td>
                    </tr>
                    {isOpen && (
                      <tr className="bg-base-800/40">
                        <td colSpan={9} className="px-2 pb-3">
                          <BuildOrderTimeline
                            gameId={id}
                            perspective={perspective}
                          />
                        </td>
                      </tr>
                    )}
                  </Fragment>
                );
              })}
            </tbody>
          </table>
          {modalGame && (
            <GameDetailModal
              game={modalGame.game}
              gameId={modalGame.gameId}
              macroValue={modalGame.macroValue}
              onClose={() => setModalGame(null)}
            />
          )}
          </>
        );
      }

      // ============================================================
      // OPPONENT DNA CARDS (used inside OpponentProfile below)
      // ============================================================
      function StrategyTendencyChart({ strategies }) {
        if (!strategies || strategies.length === 0)
          return <EmptyState sub="No strategy data yet" />;
        const total = strategies.reduce((s, x) => s + (x.count || 0), 0) || 1;
        const data = strategies.map((s) => ({
          name: s.strategy,
          winRate: (100 * (s.count || 0)) / total,
          games: s.count,
          _color: wrColor(s.winRate, s.wins + s.losses),
        }));
        return (
          <HBarChart
            data={data}
            height={Math.max(160, 40 * data.length + 60)}
            valueKey="winRate"
            maxValue={100}
            format={(v) => `${v.toFixed(0)}%`}
            colorFor={(d) => d._color}
          />
        );
      }

      /**
       * Drilldown drawer - opens when a timing card is clicked, shows every
       * game that contributed a sample for that token, sorted newest first.
       *
       * Layout: right-side off-canvas panel with backdrop. Focus is trapped
       * inside the panel while open; Escape closes it. We intentionally do
       * NOT introduce a new dialog framework -- this is a small fixed-
       * position div using the same `bg-base-800 ring-soft` chrome as the
       * Cards elsewhere in the SPA.
       */
      function TimingsDrilldownDrawer({
        open,
        onClose,
        token,
        info,
        matchupLabel,
        onOpenGame,
      }) {
        const panelRef = useRef(null);
        const closeBtnRef = useRef(null);
        const copyBtnRef = useRef(null);
        const [copyState, setCopyState] = useState("idle"); // idle | copied | error
        useEffect(() => {
          if (!open) return undefined;
          // Escape closes; Tab cycles focus inside the panel only (focus
          // trap). The trap is a small handler -- we just keep tabs from
          // jumping to elements outside the panel by snapping focus back to
          // either the close button or the copy button at the boundary.
          const focusables = () => {
            if (!panelRef.current) return [];
            return Array.from(
              panelRef.current.querySelectorAll(
                'a[href], button:not([disabled]), [tabindex]:not([tabindex="-1"])',
              ),
            ).filter((el) => el.offsetParent !== null);
          };
          const onKey = (e) => {
            if (e.key === "Escape") {
              onClose();
              return;
            }
            if (e.key !== "Tab") return;
            const list = focusables();
            if (list.length === 0) return;
            const first = list[0];
            const last = list[list.length - 1];
            if (e.shiftKey && document.activeElement === first) {
              e.preventDefault();
              last.focus();
            } else if (!e.shiftKey && document.activeElement === last) {
              e.preventDefault();
              first.focus();
            }
          };
          document.addEventListener("keydown", onKey);
          // Initial focus: the Close button (pre-existing affordance).
          const t = setTimeout(() => {
            const node =
              panelRef.current &&
              panelRef.current.querySelector("[data-autofocus]");
            if (node) node.focus();
          }, 30);
          return () => {
            document.removeEventListener("keydown", onKey);
            clearTimeout(t);
          };
        }, [open, onClose]);
        // Reset the copy button label each time the drawer reopens on a new token.
        useEffect(() => {
          setCopyState("idle");
        }, [token, open]);

        if (!open || !token || !info) return null;
        const samples = Array.isArray(info.samples) ? info.samples : [];
        const display = buildingDisplayName(token, token);
        const iconUrl = buildingIconUrl(token);
        const trend = TREND_GLYPHS[info.trend] || TREND_GLYPHS.unknown;

        const sourceLabel =
          info.source === "opp_build_log"
            ? "opponent's structures (sc2reader)"
            : "your build (proxy for matchup tendencies)";

        function copyAsMarkdown() {
          const lines = [];
          const ml = matchupLabel || "(matchup unknown)";
          const n = info.sampleCount || 0;
          lines.push(`### ${display} — ${ml} (n=${n})`);
          if (n >= 2 && info.p25Display && info.p75Display) {
            lines.push(
              `median ${info.medianDisplay} (p25–p75 ${info.p25Display}–${info.p75Display}` +
                (info.minDisplay && info.maxDisplay
                  ? `, range ${info.minDisplay}–${info.maxDisplay})`
                  : ")"),
            );
          } else {
            lines.push(`median ${info.medianDisplay || "—"}`);
          }
          lines.push("");
          lines.push("| Time | Date | Map | Matchup | Result | Source |");
          lines.push("|------|------|-----|---------|--------|--------|");
          for (const s of samples) {
            const ts = s.display || _format_seconds_safe(s.seconds);
            const dt = String(s.date || "").slice(0, 10) || "—";
            const mp = String(s.map || "—").replace(/\|/g, "/");
            const mu = `${(s.myRace || "?")[0].toUpperCase()} vs ${(s.oppRace || "?")[0].toUpperCase()}`;
            const res = s.result || (s.won ? "Win" : "Loss");
            const srcShort =
              info.source === "opp_build_log" ? "opp_log" : "my_log";
            lines.push(
              `| ${ts} | ${dt} | ${mp} | ${mu} | ${res} | ${srcShort} |`,
            );
          }
          const md = lines.join("\n") + "\n";
          // Prefer the Async Clipboard API; fall back to a hidden <textarea>
          // selection if the page isn't running on https / clipboard-perms
          // are denied (which is common on some local LAN deployments).
          const done = () => {
            setCopyState("copied");
            setTimeout(() => setCopyState("idle"), 1400);
          };
          const fail = () => {
            setCopyState("error");
            setTimeout(() => setCopyState("idle"), 1800);
          };
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard
              .writeText(md)
              .then(done)
              .catch(() => {
                try {
                  const ta = document.createElement("textarea");
                  ta.value = md;
                  ta.style.position = "fixed";
                  ta.style.left = "-1000px";
                  document.body.appendChild(ta);
                  ta.select();
                  document.execCommand("copy");
                  document.body.removeChild(ta);
                  done();
                } catch (_) {
                  fail();
                }
              });
          } else {
            try {
              const ta = document.createElement("textarea");
              ta.value = md;
              ta.style.position = "fixed";
              ta.style.left = "-1000px";
              document.body.appendChild(ta);
              ta.select();
              document.execCommand("copy");
              document.body.removeChild(ta);
              done();
            } catch (_) {
              fail();
            }
          }
        }

        const copyLabel =
          copyState === "copied"
            ? "Copied!"
            : copyState === "error"
              ? "Copy failed"
              : "Copy timings to clipboard";

        return (
          <div
            className="fixed inset-0 z-50 flex"
            role="dialog"
            aria-modal="true"
            aria-label={`${display} — drilldown`}
          >
            <div
              className="flex-1 bg-black/60"
              onClick={onClose}
              aria-hidden="true"
            />
            <aside
              ref={panelRef}
              className="w-[min(560px,95vw)] h-full bg-base-800 ring-soft shadow-soft
                     flex flex-col"
            >
              <header className="flex items-center gap-3 px-5 py-4 border-b border-base-700">
                {iconUrl && (
                  <img
                    src={iconUrl}
                    alt=""
                    className="w-9 h-9 object-contain"
                    onError={(e) => {
                      e.currentTarget.style.visibility = "hidden";
                    }}
                  />
                )}
                <div className="min-w-0 flex-1">
                  <div className="text-sm font-semibold text-neutral-100 truncate">
                    {display}
                  </div>
                  <div className="text-[11px] text-neutral-500 truncate">
                    {matchupLabel ? `${matchupLabel} · ` : ""}n=
                    {info.sampleCount} · median {info.medianDisplay}
                    {info.p25Display && info.p75Display && info.sampleCount >= 2
                      ? ` (${info.p25Display}–${info.p75Display})`
                      : ""}
                    {info.minDisplay && info.maxDisplay && info.sampleCount >= 2
                      ? ` · range ${info.minDisplay}–${info.maxDisplay}`
                      : ""}
                  </div>
                </div>
                <span
                  title={trend.label}
                  aria-label={trend.label}
                  style={{ color: trend.color }}
                  className="text-base font-semibold tabular-nums"
                >
                  {trend.glyph}
                </span>
                <button
                  ref={closeBtnRef}
                  data-autofocus
                  onClick={onClose}
                  className="text-xs uppercase tracking-wider text-neutral-400
                         hover:text-neutral-100 px-2 py-1 ring-soft rounded"
                  aria-label="Close drilldown"
                >
                  Close
                </button>
              </header>
              <div className="px-5 py-3 text-[11px] text-neutral-500 border-b border-base-700">
                {sourceLabel}
                {" · "}sorted newest first
              </div>
              <div
                className="flex-1 overflow-y-auto"
                data-testid="timings-drilldown-list"
              >
                {samples.length === 0 ? (
                  <EmptyState
                    title="No contributing games"
                    sub="This token has no samples in the current games."
                  />
                ) : (
                  <VirtualizedSampleList
                    samples={samples}
                    source={info.source || ""}
                    onOpenGame={onOpenGame}
                  />
                )}
              </div>
              <footer className="flex items-center gap-2 px-5 py-3 border-t border-base-700">
                <button
                  ref={copyBtnRef}
                  type="button"
                  onClick={copyAsMarkdown}
                  className={
                    "text-xs px-3 py-1.5 rounded ring-soft transition-colors " +
                    (copyState === "copied"
                      ? "bg-win-500/20 text-win-500"
                      : copyState === "error"
                        ? "bg-loss-500/20 text-loss-500"
                        : "bg-base-700 hover:bg-base-700/70 text-neutral-300")
                  }
                  aria-label="Copy contributing games as Markdown"
                  title="Copies a Markdown table of every contributing game to your clipboard."
                >
                  {copyLabel}
                </button>
                <button
                  type="button"
                  onClick={onClose}
                  className="ml-auto text-xs px-3 py-1.5 rounded ring-soft
                         bg-base-700 hover:bg-base-700/70 text-neutral-300"
                >
                  Close
                </button>
              </footer>
            </aside>
          </div>
        );
      }
      function _format_seconds_safe(s) {
        if (s == null) return "—";
        const n = Math.max(0, Math.floor(s));
        return Math.floor(n / 60) + ":" + String(n % 60).padStart(2, "0");
      }

      /**
       * IntersectionObserver-based virtual list for the drilldown samples.
       *
       * react-window isn't a dependency of this SPA (see package.json), so
       * this is a hand-rolled windowing pattern: render lightweight
       * placeholder rows for everything outside the viewport, swap in the
       * full row template for items the IntersectionObserver flags as
       * visible. Cuts initial DOM cost on opponents with hundreds of
       * contributing games while keeping native scroll (no virtual height
       * math, no jumpy scrollbar).
       */
      function VirtualizedSampleList({ samples, source, onOpenGame }) {
        const containerRef = useRef(null);
        const [visible, setVisible] = useState(() => {
          // Pre-flag the first 30 rows visible so the user sees something
          // immediately while the observer wires up.
          const set = new Set();
          for (let i = 0; i < Math.min(30, samples.length); i++) set.add(i);
          return set;
        });
        useEffect(() => {
          // Reset when the sample set changes (e.g. switching matchup chip).
          const set = new Set();
          for (let i = 0; i < Math.min(30, samples.length); i++) set.add(i);
          setVisible(set);
        }, [samples]);
        useEffect(() => {
          const root = containerRef.current;
          if (!root) return undefined;
          // No IntersectionObserver in the (rare) ancient browser case ->
          // render everything. Better to pay the DOM cost once than to
          // silently hide rows.
          if (typeof IntersectionObserver === "undefined") {
            const all = new Set();
            for (let i = 0; i < samples.length; i++) all.add(i);
            setVisible(all);
            return undefined;
          }
          const io = new IntersectionObserver(
            (entries) => {
              setVisible((prev) => {
                let changed = false;
                const next = new Set(prev);
                for (const e of entries) {
                  const i = parseInt(e.target.dataset.idx, 10);
                  if (Number.isNaN(i)) continue;
                  if (e.isIntersecting && !next.has(i)) {
                    next.add(i);
                    changed = true;
                  }
                }
                return changed ? next : prev;
              });
            },
            { root, rootMargin: "200px 0px", threshold: 0.01 },
          );
          // Observe every placeholder once it's mounted. Querying the DOM
          // here keeps the observer in sync with React renders without
          // forcing each row to wire up its own ref.
          const stubs = root.querySelectorAll("[data-virtual-row]");
          stubs.forEach((s) => io.observe(s));
          return () => io.disconnect();
        }, [samples]);

        const srcShort = source === "opp_build_log" ? "opp_log" : "my_log";

        return (
          <ul
            ref={containerRef}
            className="divide-y divide-base-700"
            data-testid="timings-drilldown-virtual-list"
          >
            {samples.map((s, i) => {
              const key = (s.gameId || "g") + ":" + i;
              if (!visible.has(i)) {
                // Placeholder: same vertical footprint as a real row so the
                // scrollbar tracks correctly. Carries the data-idx the
                // observer needs to flip it visible.
                return (
                  <li
                    key={key}
                    data-virtual-row
                    data-idx={i}
                    className="h-[58px]"
                    aria-hidden="true"
                  />
                );
              }
              const isWin =
                s.result === "Win" || s.result === "Victory" || !!s.won;
              const isLoss =
                s.result === "Loss" ||
                s.result === "Defeat" ||
                (!isWin && s.won === false);
              const pillBg = isWin ? "#3ddc97" : isLoss ? "#ef476f" : "#9aa3b2";
              const canOpen = !!s.gameId && typeof onOpenGame === "function";
              const onRowClick = canOpen
                ? () => onOpenGame(s.gameId)
                : undefined;
              return (
                <li
                  key={key}
                  data-virtual-row
                  data-idx={i}
                  role={canOpen ? "button" : undefined}
                  tabIndex={canOpen ? 0 : -1}
                  onClick={onRowClick}
                  onKeyDown={
                    canOpen
                      ? (e) => {
                          if (e.key === "Enter" || e.key === " ") {
                            e.preventDefault();
                            onRowClick();
                          }
                        }
                      : undefined
                  }
                  className={
                    "px-5 py-3 hover:bg-base-700/40 focus-within:bg-base-700/40 " +
                    (canOpen ? "cursor-pointer" : "")
                  }
                >
                  <div className="flex items-center gap-3 text-sm">
                    <span className="font-mono tabular-nums text-neutral-200 w-12">
                      {s.display || _format_seconds_safe(s.seconds)}
                    </span>
                    <span
                      className="text-neutral-300 truncate flex-1"
                      title={s.map || ""}
                    >
                      {s.map || "—"}
                    </span>
                    <span
                      className={raceClass(s.myRace) + " text-xs font-mono"}
                    >
                      {(s.myRace || "?")[0].toUpperCase()}
                    </span>
                    <span className="text-neutral-600 text-xs">vs</span>
                    <span
                      className={raceClass(s.oppRace) + " text-xs font-mono"}
                    >
                      {(s.oppRace || "?")[0].toUpperCase()}
                    </span>
                    <span
                      className="text-[10px] font-semibold tabular-nums px-1.5 py-0.5 rounded text-white"
                      style={{ background: pillBg }}
                      title={isWin ? "Win" : isLoss ? "Loss" : "Result unknown"}
                    >
                      {isWin ? "W" : isLoss ? "L" : "?"}
                    </span>
                  </div>
                  <div
                    className="mt-1 flex items-center justify-between
                              text-[11px] text-neutral-500"
                  >
                    <span title={s.date} className="font-mono">
                      {fmtRelDate(s.date)} ·{" "}
                      {String(s.date || "").slice(0, 10) || "—"}
                    </span>
                    <span className="flex items-center gap-2">
                      <span
                        className="text-[10px] uppercase tracking-wider text-neutral-500
                               px-1.5 py-0.5 rounded bg-base-700"
                        title={
                          source === "opp_build_log"
                            ? "parsed from opponent's build log (sc2reader)"
                            : "parsed from your build log"
                        }
                      >
                        {srcShort}
                      </span>
                      {canOpen ? (
                        <span
                          className="text-accent-400 hover:text-accent-500
                                     underline decoration-dotted underline-offset-2"
                          aria-hidden="true"
                        >
                          open game →
                        </span>
                      ) : null}
                    </span>
                  </div>
                </li>
              );
            })}
          </ul>
        );
      }

      /**
       * Matchup-aware Median Timings grid.
       *
       * Source of order: `data.medianTimingsOrder` from the API payload.
       * Source of taxonomy (display name, icon, race ownership): the
       * `window.TimingCatalog` script tag loaded at the top of the page.
       *
       * UI features:
       *   - Building icon (top-left), display name, hero median, p25-p75
       *     range, sample-count badge, win-rate pill, trend arrow.
       *   - Empty cards (sampleCount === 0) render dimmed + non-clickable
       *     subline "no samples"; still keyboard-focusable so screen-reader
       *     users can scan the matchup-relevant slots.
       *   - Click opens the side drilldown drawer with the contributing games.
       *   - Source filter pills above the grid filter by `source`. Choice
       *     persists in localStorage under `analyzer.timings.sourceFilter`.
       *   - aria-live summary line announces matchup + filter changes.
       */
      function MedianTimingsGrid({
        timings,
        order,
        matchupLabel,
        opponentName,
        matchupCounts,
        matchupTimings,
        onOpenGame,
      }) {
        // Source filter ('both' | 'opp' | 'self'), persisted in localStorage.
        const SF_KEY = "analyzer.timings.sourceFilter";
        const [sourceFilter, setSourceFilter] = useState(() => {
          try {
            const v =
              window.localStorage && window.localStorage.getItem(SF_KEY);
            return v === "opp" || v === "self" ? v : "both";
          } catch (_) {
            return "both";
          }
        });
        useEffect(() => {
          try {
            window.localStorage &&
              window.localStorage.setItem(SF_KEY, sourceFilter);
          } catch (_) {
            /* private mode: just live with in-memory state */
          }
        }, [sourceFilter]);

        // Per-matchup selector ('All' | matchup label, e.g. 'PvZ').
        // Persisted per-opponent under analyzer.timings.matchup[<opp_name>]
        // so each opponent remembers the last matchup the user inspected.
        const MS_KEY = "analyzer.timings.matchup";
        const opponentKey = opponentName || matchupLabel || "__none__";
        const matchupChips =
          matchupCounts && Object.keys(matchupCounts).length > 0
            ? Object.entries(matchupCounts).sort((a, b) => b[1] - a[1])
            : [];
        const [activeMatchup, setActiveMatchup] = useState(() => {
          try {
            const v =
              window.localStorage && window.localStorage.getItem(MS_KEY);
            const obj = v ? JSON.parse(v) : null;
            const stored = obj && obj[opponentKey];
            // Validate: only honor the saved value if it's still a real chip.
            if (stored === "All" || stored == null) return "All";
            if (matchupCounts && matchupCounts[stored]) return stored;
            return "All";
          } catch (_) {
            return "All";
          }
        });
        useEffect(() => {
          try {
            if (!window.localStorage) return;
            const v = window.localStorage.getItem(MS_KEY);
            const obj = (v ? JSON.parse(v) : null) || {};
            obj[opponentKey] = activeMatchup;
            window.localStorage.setItem(MS_KEY, JSON.stringify(obj));
          } catch (_) {
            /* private mode: just live with in-memory state */
          }
        }, [activeMatchup, opponentKey]);

        // Pick the timings/order/label that match the active matchup chip.
        // 'All' = the unfiltered backend payload; per-matchup = the
        // backend-precomputed `matchupTimings[label]` blob.
        let activeTimings = timings;
        let activeOrder = order;
        let activeLabel = matchupLabel;
        if (
          activeMatchup !== "All" &&
          matchupTimings &&
          matchupTimings[activeMatchup]
        ) {
          activeTimings = matchupTimings[activeMatchup].timings;
          activeOrder = matchupTimings[activeMatchup].order;
          activeLabel = activeMatchup;
        }

        // Drilldown state.
        const [drillToken, setDrillToken] = useState(null);

        if (!activeTimings || !activeOrder || activeOrder.length === 0) {
          return (
            <EmptyState
              title="No matchup-relevant timings"
              sub="This opponent has no games with both build logs parsed yet."
            />
          );
        }

        // Apply source filter to the canonical order. Tokens not in `activeTimings`
        // are silently dropped, so we never render a building outside the
        // backend's matchup-relevant list.
        const visibleTokens = activeOrder.filter((tok) => {
          const info = activeTimings[tok];
          if (!info) return false;
          if (sourceFilter === "opp") return info.source === "opp_build_log";
          if (sourceFilter === "self") return info.source === "build_log";
          return true;
        });

        const total = activeOrder.length;
        const filterSuffix =
          sourceFilter === "opp"
            ? " — opponent tech only"
            : sourceFilter === "self"
              ? " — your tech only"
              : "";
        const matchupSuffix =
          activeMatchup === "All"
            ? ""
            : ` (${(matchupCounts && matchupCounts[activeMatchup]) || 0} game${
                (matchupCounts && matchupCounts[activeMatchup]) === 1 ? "" : "s"
              })`;
        const summary = activeLabel
          ? `Showing ${visibleTokens.length} of ${total} timings for ${activeLabel}${matchupSuffix}${filterSuffix}`
          : `Showing ${visibleTokens.length} of ${total} timings${filterSuffix}`;

        const filterBtn = (key, label) => {
          const active = sourceFilter === key;
          return (
            <button
              key={key}
              type="button"
              onClick={() => setSourceFilter(key)}
              aria-pressed={active}
              className={
                "px-3 py-1 rounded-full text-xs ring-soft transition-colors " +
                (active
                  ? "bg-accent-500/20 text-accent-400"
                  : "bg-base-700 text-neutral-400 hover:text-neutral-200")
              }
            >
              {label}
            </button>
          );
        };

        // Per-matchup chip ("All" + one per matchup the opponent has
        // played). Same pill chrome as the source filter so the two rows
        // read as a coherent control bar.
        const matchupBtn = (key, label, count) => {
          const active = activeMatchup === key;
          return (
            <button
              key={key}
              type="button"
              onClick={() => setActiveMatchup(key)}
              aria-pressed={active}
              className={
                "px-3 py-1 rounded-full text-xs ring-soft transition-colors " +
                (active
                  ? "bg-accent-500/20 text-accent-400"
                  : "bg-base-700 text-neutral-400 hover:text-neutral-200")
              }
            >
              {count == null ? label : `${label} (${count})`}
            </button>
          );
        };

        return (
          <div data-testid="median-timings-grid">
            {matchupChips.length > 0 ? (
              <div
                className="flex flex-wrap items-center gap-2 mb-2"
                data-testid="median-timings-matchup-chips"
              >
                {matchupBtn("All", "All", null)}
                {matchupChips.map(([ml, n]) => matchupBtn(ml, ml, n))}
              </div>
            ) : null}
            <div className="flex flex-wrap items-center gap-2 mb-3">
              {filterBtn("both", "Both")}
              {filterBtn("opp", "Opponent's tech")}
              {filterBtn("self", "Your tech")}
            </div>
            <div
              aria-live="polite"
              className="text-[11px] text-neutral-500 mb-2"
              data-testid="median-timings-summary"
            >
              {summary}
            </div>
            {visibleTokens.length === 0 ? (
              <EmptyState
                title="No timings for this filter"
                sub="Try the other source pill or 'Both'."
              />
            ) : (
              <div
                className="grid gap-2"
                style={{
                  gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))",
                }}
              >
                {visibleTokens.map((tok) => (
                  <TimingCard
                    key={tok}
                    token={tok}
                    info={activeTimings[tok]}
                    onClick={() => {
                      // Don't open the drawer on empty cards.
                      if ((activeTimings[tok] || {}).sampleCount > 0)
                        setDrillToken(tok);
                    }}
                  />
                ))}
              </div>
            )}
            <TimingsDrilldownDrawer
              open={!!drillToken}
              onClose={() => setDrillToken(null)}
              token={drillToken}
              info={drillToken ? activeTimings[drillToken] : null}
              matchupLabel={activeLabel}
              onOpenGame={onOpenGame}
            />
          </div>
        );
      }

      /**
       * One card in the grid. Renders the icon + median + metadata.
       * Empty cards (sampleCount === 0) get dimmed styling and are still
       * Tab-focusable but never open the drilldown.
       */
      function TimingCard({ token, info, onClick }) {
        info = info || {};
        const empty = !info.sampleCount;
        const iconUrl = buildingIconUrl(token);
        const display = buildingDisplayName(token, token);
        const trend = TREND_GLYPHS[info.trend] || TREND_GLYPHS.unknown;
        const wrPctStr =
          info.winRateWhenBuilt == null
            ? "—"
            : Math.round(info.winRateWhenBuilt * 100) + "%";
        const wrPillBg = wrPillColor(info.winRateWhenBuilt, info.sampleCount);
        const sourceLabel =
          info.source === "opp_build_log"
            ? "opponent's structures (sc2reader)"
            : "your build (proxy for matchup tendencies)";

        // Tooltip content. Composed once so hover/focus produce the same text.
        const tipLines = [];
        if (info.sampleCount) {
          if (info.minDisplay && info.maxDisplay)
            tipLines.push(`range ${info.minDisplay}–${info.maxDisplay}`);
          if (info.lastSeenDisplay && info.lastSeenDisplay !== "-")
            tipLines.push(`last seen at ${info.lastSeenDisplay}`);
          tipLines.push(sourceLabel);
          tipLines.push(`n=${info.sampleCount} matchup samples`);
        } else {
          tipLines.push("No samples in this matchup");
          tipLines.push(sourceLabel);
        }
        const tipTitle = tipLines.join("\n");

        const ariaLabel = empty
          ? `${display} — no samples`
          : `${display}, median ${info.medianDisplay}, n=${info.sampleCount}, ` +
            `win rate ${wrPctStr}, ${trend.label}`;

        return (
          <div
            role={empty ? undefined : "button"}
            tabIndex={empty ? -1 : 0}
            aria-label={ariaLabel}
            aria-disabled={empty || undefined}
            onClick={empty ? undefined : onClick}
            onKeyDown={
              empty
                ? undefined
                : (e) => {
                    if (e.key === "Enter" || e.key === " ") {
                      e.preventDefault();
                      onClick && onClick();
                    }
                  }
            }
            title={tipTitle}
            className={
              "bg-base-700 ring-soft rounded-lg px-3 py-2 " +
              "focus:outline-none focus-visible:ring-2 focus-visible:ring-accent-500 " +
              (empty
                ? "opacity-60 cursor-default"
                : "cursor-pointer hover:bg-base-700/80 focus:ring-2 focus:ring-accent-500")
            }
            data-testid="timing-card"
            data-token={token}
            data-empty={empty ? "1" : "0"}
            data-empty-card={empty ? "1" : "0"}
            data-source={info.source || ""}
          >
            <div className="flex items-start gap-2">
              {iconUrl ? (
                <img
                  src={iconUrl}
                  alt=""
                  width={28}
                  height={28}
                  className={
                    "w-7 h-7 object-contain flex-none " +
                    (empty ? "opacity-50" : "")
                  }
                  onError={(e) => {
                    e.currentTarget.style.visibility = "hidden";
                  }}
                />
              ) : (
                <div
                  className="w-7 h-7 rounded bg-base-800 flex-none"
                  aria-hidden="true"
                />
              )}
              <div className="min-w-0 flex-1">
                <div className="text-[11px] uppercase tracking-wider text-neutral-500 truncate">
                  {display}
                </div>
                <div
                  className={
                    "mt-0.5 text-xl font-semibold tabular-nums " +
                    (empty ? "text-neutral-600" : "text-neutral-100")
                  }
                >
                  {info.medianDisplay || "-"}
                </div>
                {!empty &&
                info.p25Display &&
                info.p75Display &&
                info.sampleCount >= 2 ? (
                  <div className="text-[10px] text-neutral-500 tabular-nums">
                    {info.p25Display} — {info.p75Display}
                  </div>
                ) : empty ? (
                  <div className="text-[10px] text-neutral-600">no samples</div>
                ) : (
                  <div className="text-[10px] text-neutral-600">
                    single sample
                  </div>
                )}
              </div>
            </div>
            <div className="mt-1 flex items-center gap-1 text-[10px]">
              <span className="text-neutral-500 tabular-nums">
                n={info.sampleCount}
              </span>
              {!empty ? (
                <span
                  className="px-1.5 py-0.5 rounded text-[10px] font-semibold"
                  style={{ background: wrPillBg + "22", color: wrPillBg }}
                  title={`win rate when built: ${wrPctStr}`}
                >
                  {wrPctStr}
                </span>
              ) : null}
              <span
                className="ml-auto"
                aria-label={trend.label}
                title={trend.label}
                style={{ color: trend.color }}
              >
                {trend.glyph}
              </span>
            </div>
          </div>
        );
      }

      function Last5GamesTimeline({ games }) {
        if (!games || games.length === 0)
          return <EmptyState sub="No recent games" />;
        return (
          <div className="space-y-2">
            {games.map((g, i) => {
              const result = g.result || g.Result || "";
              const isWin = result === "Win" || result === "Victory";
              const isLoss = result === "Loss" || result === "Defeat";
              const color = isWin ? "#3ddc97" : isLoss ? "#ef476f" : "#9aa3b2";
              const date = g.date || g.Date || "";
              const map = g.map || g.Map || "";
              const len = g.game_length || g.GameLength || 0;
              const lenStr = len
                ? ` (${Math.floor(len / 60)}:${String(len % 60).padStart(2, "0")})`
                : "";
              return (
                <div
                  key={i}
                  className="bg-base-700 ring-soft rounded-lg px-3 py-2"
                >
                  <div className="flex justify-between items-center">
                    <span className="font-semibold text-sm" style={{ color }}>
                      {fmtDate(date)} · {result || "—"}
                      {lenStr}
                    </span>
                    <span
                      className="text-xs text-neutral-500 truncate ml-3 max-w-[40%]"
                      title={map}
                    >
                      {map || "—"}
                    </span>
                  </div>
                  <div className="text-xs text-neutral-400 mt-0.5">
                    opp:{" "}
                    <span className="text-neutral-300">
                      {g.opp_strategy || "—"}
                    </span>
                  </div>
                  <div className="text-xs text-neutral-400 mt-0.5">
                    me:{" "}
                    <span className="text-neutral-300">
                      {g.my_build || "—"}
                    </span>
                  </div>
                </div>
              );
            })}
          </div>
        );
      }

      function PredictedStrategiesList({ predictions }) {
        if (!predictions || predictions.length === 0)
          return <EmptyState sub="Not enough games to predict" />;
        return (
          <div className="space-y-1.5">
            {predictions.slice(0, 8).map((p, i) => (
              <div key={i} className="flex items-center gap-3">
                <div className="w-12 text-right tabular-nums text-sm font-semibold text-accent-400">
                  {pct(p.probability)}
                </div>
                <div className="flex-1 bg-base-700 rounded-full h-2 overflow-hidden">
                  <div
                    className="h-full bg-accent-500"
                    style={{ width: `${(p.probability * 100).toFixed(1)}%` }}
                  />
                </div>
                <div className="text-sm text-neutral-300 flex-1 min-w-[40%]">
                  {p.strategy}
                </div>
              </div>
            ))}
            <div className="text-[10px] text-neutral-600 mt-2">
              recency-weighted: last 10 games count 2× · all others 1×
            </div>
          </div>
        );
      }

      function StrategiesTab({ filters, dbRev }) {
        const { data, loading } = useApi("opp-strategies", filters, [
          JSON.stringify(filters),
          dbRev,
        ]);
        if (loading) return <Skeleton rows={6} />;
        const items = data || [];
        return (
          <div className="space-y-4">
            <div className="flex items-center justify-between">
              <h2 className="text-base font-semibold text-neutral-200">
                Win rate vs opponent strategies
              </h2>
              <CsvButton kind="opp-strategies" filters={filters} />
            </div>
            {items.length === 0 ? (
              <EmptyState />
            ) : (
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
                {items.map((s) => (
                  <div
                    key={s.name}
                    className="bg-base-800 ring-soft rounded-lg p-4"
                  >
                    <div
                      className="text-sm font-medium text-neutral-200 truncate"
                      title={s.name}
                    >
                      {s.name}
                    </div>
                    <div className="mt-2 flex items-baseline justify-between">
                      <span
                        className="text-2xl font-semibold tabular-nums"
                        style={{ color: wrColor(s.winRate, s.total) }}
                      >
                        {pct1(s.winRate)}
                      </span>
                      <span className="text-xs text-neutral-500 tabular-nums">
                        {s.wins}W - {s.losses}L
                      </span>
                    </div>
                    <WrBar wins={s.wins} losses={s.losses} />
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      }

      function BuildVsStrategyTab({ filters, dbRev }) {
        const [search, setSearch] = useState("");
        const sort = useSort("total", "desc");
        const { data, loading } = useApi("build-vs-strategy", filters, [
          JSON.stringify(filters),
          dbRev,
        ]);
        const rows = useMemo(() => {
          let r = data || [];
          if (search) {
            const s = search.toLowerCase();
            r = r.filter(
              (x) =>
                x.my_build.toLowerCase().includes(s) ||
                x.opp_strat.toLowerCase().includes(s),
            );
          }
          return sort.sortRows(r, (row, col) => row[col]);
        }, [data, search, sort.sortBy, sort.sortDir]);
        if (loading) return <Skeleton rows={10} />;
        return (
          <div className="space-y-4">
            <div className="flex items-center gap-3">
              <input
                type="text"
                value={search}
                onChange={(e) => setSearch(e.target.value)}
                placeholder="search build or strategy…"
                className="bg-base-700 ring-soft rounded px-3 py-1.5 text-sm w-72"
              />
              <span className="text-xs text-neutral-500 ml-2">
                click any column header to sort
              </span>
              <CsvButton kind="build-vs-strategy" filters={filters} />
            </div>
            <div className="bg-base-800 ring-soft rounded-xl overflow-hidden">
              <table className="w-full text-sm">
                <thead className="bg-base-700 text-[11px] uppercase text-neutral-400">
                  <tr>
                    <SortableTh
                      col="my_build"
                      label="My build"
                      {...sort}
                      align="left"
                    />
                    <SortableTh
                      col="opp_strat"
                      label="vs Opponent strategy"
                      {...sort}
                      align="left"
                    />
                    <SortableTh
                      col="wins"
                      label="W"
                      {...sort}
                      align="right"
                      width="5rem"
                    />
                    <SortableTh
                      col="losses"
                      label="L"
                      {...sort}
                      align="right"
                      width="5rem"
                    />
                    <SortableTh
                      col="total"
                      label="Total"
                      {...sort}
                      align="right"
                      width="5rem"
                    />
                    <SortableTh
                      col="winRate"
                      label="Win rate"
                      {...sort}
                      align="right"
                      width="6rem"
                    />
                  </tr>
                </thead>
                <tbody>
                  {rows.length === 0 ? (
                    <tr>
                      <td colSpan="6">
                        <EmptyState />
                      </td>
                    </tr>
                  ) : (
                    rows.map((r) => (

                {/* Reuse the build-deep-dive games table so opponent games get
                the same row-click → build order + macro-click → breakdown
                affordances as everywhere else. We pre-normalise field
                casing (Date/date, Map/map, Result/result) so the shared
                table doesn't have to handle the Black-Book schema. */}
                <GamesTableWithBuildOrder
                  targetGameId={targetGameId}
                  targetGameSeq={targetSeq}
                  games={[...(data.games || [])]
                    .map((g) => ({
                      ...g,
                      date: g.date || g.Date,
                      map: g.map || g.Map,
                      result: g.result || g.Result,
                      opponent: g.opponent || data.name || "",
                      // Opponent race resolution -- prefer the meta-DB-enriched
                      // opp_race when present. Otherwise parse the Matchup key,
                      // which is shaped "<MY_RACE>v<OPP_RACE>" (e.g.
                      // "PROTOSSvTERRAN"). The previous version took
                      // charAt(0) of the whole string after stripping a "vs "
                      // prefix, so it returned the USER'S race ("P") instead of
                      // the opponent's ("T"). Now we explicitly take the part
                      // AFTER the "v" separator.
                      opp_race:
                        g.opp_race ||
                        (function () {
                          const mu = g.Matchup || "";
                          if (!mu) return "";
                          const stripped = String(mu).replace(/^vs\s*/i, "");
                          // Split on "v" / " v " / "vs" so both
                          // "PROTOSSvTERRAN" and "PROTOSS vs TERRAN"
                          // resolve to the trailing race.
                          const parts = stripped.split(/\s*v(?:s)?\s*/i);
                          const oppPart =
                            parts.length > 1
                              ? parts[parts.length - 1]
                              : parts[0];
                          return (oppPart || "").charAt(0).toUpperCase();
                        })() ||
                        "",
                      // game id is essential for the /games/:id/build-order
                      // and /games/:id/macro-breakdown endpoints. Enrichment
                      // now copies the meta-DB id; fall back to alt names.
                      id: g.id || g.game_id || g.GameId || g.gameId,
                    }))
                    .sort(
                      (a, b) =>
                        Date.parse(String(b.date || "").replace(" ", "T")) -
                        Date.parse(String(a.date || "").replace(" ", "T")),
                    )}
                  perspective="opponent"
                />
              </div>
            </Card>
          </div>
        );
