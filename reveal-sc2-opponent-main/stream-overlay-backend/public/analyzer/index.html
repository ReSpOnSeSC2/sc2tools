<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <title>SC2 Meta Analyzer</title>
    <!-- patch-marker:dna-v1 -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind play CDN: zero-build dev/prod styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              base: {
                900: "#0b0d11",
                800: "#11141a",
                700: "#181c24",
                600: "#222732",
              },
              accent: { 400: "#7aa2ff", 500: "#5b8def", 600: "#3f6fdd" },
              win: { 500: "#3ddc97" },
              loss: { 500: "#ef476f" },
              neutral: { 500: "#9aa3b2" },
              gold: { 500: "#f4c95d" },
            },
            fontFamily: {
              sans: [
                "Inter",
                "system-ui",
                "-apple-system",
                "Segoe UI",
                "Roboto",
                "sans-serif",
              ],
              mono: ["JetBrains Mono", "SF Mono", "Consolas", "monospace"],
            },
            boxShadow: {
              soft: "0 1px 2px rgba(0,0,0,.30), 0 4px 12px rgba(0,0,0,.20)",
            },
          },
        },
      };
    </script>

    <!-- React + Recharts UMD (must load BEFORE the JSX script below
       so the `React` / `Recharts` globals are defined when Babel
       evaluates our code). Recharts 2.x ships `umd/Recharts.js`
       (not `.min.js`) so use that exact filename. -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

    <!-- Shared key-timing taxonomy. UMD module that exposes
       `window.TimingCatalog`. Mirrors `analytics/timing_catalog.py`
       byte-for-byte (in spirit) so the SPA, the Node API, and the
       desktop GUI all share one source of truth for which buildings
       are matchup-relevant and what their icons / display names are. -->
    <script src="/static/analyzer/timing_catalog.js"></script>

    <!-- Stage 7.5: Build editor modal split out of this file. The
         helpers file is plain JS (UMD-lite) and exposes
         `window.BuildEditorHelpers`. The modal file uses
         React.createElement directly (no JSX, so no babel-standalone
         compile step) and exposes `window.BuildEditorModal`. Both
         must load AFTER React UMD (loaded earlier) and BEFORE the
         <script type="text/babel"> block below that mounts the
         <BuildEditorModal /> JSX into the timeline drawer. -->
    <script src="/static/analyzer/components/build-editor-helpers.js"></script>
    <script src="/static/analyzer/components/build-editor-modal.js"></script>
    <script src="/static/analyzer/components/build-editor-match-list.js"></script>

    <!-- Charts are now hand-rolled SVG inside the JSX block below --
       no Recharts/Chart.js CDN required. This makes the analyzer
       work even on locked-down networks where third-party CDNs are
       blocked, and removes a class of "stuck loading" failures. -->

    <!-- Babel standalone so we can write JSX directly in the page.
       Note: keep this script as a classic script (no `type=module`)
       so the JSX block below can read the UMD globals above. -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Socket.io client served by the backend itself -->
    <script src="/socket.io/socket.io.js"></script>

    <!-- Surface any boot-time failures into the page so the user can
       see WHY the SPA didn't render instead of just a stuck spinner. -->
    <script>
      window.addEventListener("error", (e) => {
        const root = document.getElementById("root");
        if (!root) return;
        root.innerHTML = "";

        const container = document.createElement("div");
        container.style.padding = "24px";
        container.style.fontFamily = "monospace";
        container.style.color = "#ef476f";
        container.style.background = "#11141a";
        container.style.minHeight = "100vh";
        container.style.lineHeight = "1.5";

        const title = document.createElement("div");
        title.style.fontSize = "18px";
        title.style.marginBottom = "8px";
        title.textContent = "Analyzer failed to boot";

        const details = document.createElement("div");
        details.style.color = "#9aa3b2";
        details.style.fontSize = "13px";
        details.style.whiteSpace = "pre-wrap";
        details.textContent =
          (e.message || "unknown error") +
          "\n" +
          (e.filename || "") +
          ":" +
          (e.lineno || "?");

        const footer = document.createElement("div");
        footer.style.marginTop = "16px";
        footer.style.color = "#5d6677";
        footer.style.fontSize = "12px";
        footer.textContent =
          "Open DevTools (F12) → Console for the full stack trace.";

        container.appendChild(title);
        container.appendChild(details);
        container.appendChild(footer);
        root.appendChild(container);
      });
    </script>

    <!-- ====================================================================
         Design tokens — single source of truth for color, typography,
         spacing, radii, shadow, motion. Mirrors:
             SC2-Overlay/design-tokens.css   (web canonical)
             SC2-Overlay/design-tokens.json  (Style Dictionary v4)
             gui/design_tokens.py            (Python frozen dataclasses)
         The SPA is single-file (no external CSS link), so the tokens are
         inlined here. Keep these in sync with the CSS twin above when you
         change a value. See docs/design-system.md.
         ==================================================================== -->
    <style id="sc2-design-tokens">
      :root {
        /* Surfaces */
        --color-bg-primary:    #0A0E1A;
        --color-bg-surface:    #111827;
        --color-bg-elevated:   #1F2937;
        /* Race accents */
        --color-race-terran:   #3B82F6;
        --color-race-zerg:     #A855F7;
        --color-race-protoss:  #F59E0B;
        --color-race-random:   #94A3B8;
        /* Semantic state */
        --color-success:       #10B981;
        --color-danger:        #EF4444;
        --color-warning:       #F59E0B;
        --color-info:          #3B82F6;
        /* Text */
        --color-text-primary:    #F1F5F9;
        --color-text-secondary:  #94A3B8;
        --color-text-muted:      #64748B;
        --color-text-on-accent:  #0A0E1A;
        /* Borders */
        --color-border-subtle:   rgba(255, 255, 255, 0.05);
        --color-border-default:  rgba(255, 255, 255, 0.10);
        --color-border-strong:   rgba(255, 255, 255, 0.20);
        --color-divider:         rgba(255, 255, 255, 0.08);
        /* Chrono Boost target palette — SC2 race-tech-tier
           conventions. Used by ChronoAllocationPanel donut + table
           swatches. Probe (Nexus) = primary income blue; Gateway = 
           tier-1 green; Robotics = tier-2 ground purple; Stargate = 
           tier-2 air cyan; Forge/Cyber = tech-support amber; 
           Twilight/Templar/Dark = high-tech magenta. Other/Unknown 
           are neutral greys so they read as residual. */
        --color-chrono-probe:     #3B82F6;
        --color-chrono-gateway:   #10B981;
        --color-chrono-robo:      #A855F7;
        --color-chrono-stargate:  #06B6D4;
        --color-chrono-forge:     #F59E0B;
        --color-chrono-tech:      #EC4899;
        --color-chrono-other:     #64748B;
        --color-chrono-unknown:   #475569;
        /* Typography */
        --font-family-ui:    "Inter", system-ui, -apple-system, "Segoe UI",
                             Roboto, Helvetica, Arial, sans-serif;
        --font-family-mono:  "JetBrains Mono", "SF Mono", "Cascadia Code",
                             Consolas, "Liberation Mono", monospace;
        --font-size-xs:    11px;
        --font-size-sm:    13px;
        --font-size-base:  15px;
        --font-size-lg:    18px;
        --font-size-xl:    22px;
        --font-size-2xl:   28px;
        --font-size-3xl:   36px;
        --line-height-tight:    1.2;
        --line-height-normal:   1.5;
        --line-height-relaxed:  1.75;
        /* Spacing — 4px base unit */
        --space-0:  0;
        --space-1:  4px;
        --space-2:  8px;
        --space-3:  12px;
        --space-4:  16px;
        --space-6:  24px;
        --space-8:  32px;
        --space-12: 48px;
        --space-16: 64px;
        --space-24: 96px;
        /* Radii */
        --radius-sm:   4px;
        --radius-md:   8px;
        --radius-lg:   12px;
        --radius-xl:   16px;
        --radius-full: 9999px;
        /* Shadows */
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.50);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.40),
                     0 2px 4px -2px rgba(0, 0, 0, 0.40);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.50),
                     0 4px 6px -4px rgba(0, 0, 0, 0.50);
        --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.50),
                     0 8px 10px -6px rgba(0, 0, 0, 0.50);
        /* Motion */
        --duration-state:     200ms;
        --duration-entrance:  400ms;
        --duration-celebrate: 600ms;
        --ease-out:       cubic-bezier(0, 0, 0.2, 1);
        --ease-in-out:    cubic-bezier(0.4, 0, 0.2, 1);
        --ease-spring:    cubic-bezier(0.2, 1.4, 0.4, 1);
        --ease-overshoot: cubic-bezier(0.25, 1, 0.5, 1);
      }
      @media (prefers-reduced-motion: reduce) {
        :root {
          --duration-state:     0ms;
          --duration-entrance:  0ms;
          --duration-celebrate: 0ms;
        }
      }
    </style>

    <style>
      html,
      body {
        background: #0b0d11;
        color: #e7eaf0;
        min-height: 100vh;
      }
      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
      }
      /* Tame scrollbar in dark UI */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #11141a;
      }
      ::-webkit-scrollbar-thumb {
        background: #2a3140;
        border-radius: 6px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3a4458;
      }
      .ring-soft {
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      }
      .table-striped tr:nth-child(even) td {
        background: rgba(255, 255, 255, 0.02);
      }
      .skeleton {
        background: linear-gradient(
          90deg,
          #181c24 25%,
          #222732 37%,
          #181c24 63%
        );
        background-size: 400% 100%;
        animation: skeleton 1.4s ease infinite;
      }
      @keyframes skeleton {
        0% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0 50%;
        }
      }
      /* Race accent text colors — pull from design tokens so the SPA,
         the OBS overlay, and the Tkinter GUI all agree on what
         "Zerg purple" means. See docs/design-system.md for the
         WCAG AA pairs each accent passes. */
      .race-Z {
        color: var(--color-race-zerg);
      }
      .race-P {
        color: var(--color-race-protoss);
      }
      .race-T {
        color: var(--color-race-terran);
      }
      .race-R {
        color: var(--color-race-random);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="flex items-center justify-center min-h-screen">
        <div class="text-neutral-500 font-mono">loading analyzer…</div>
      </div>
    </div>

    <script type="text/babel" data-presets="react">
      // ============================================================
      // SC2 META ANALYZER — single-file React SPA
      // ============================================================
      const { useState, useEffect, useMemo, useCallback, useRef, Fragment } =
        React;
      // Charts are SVG-native (see HBarChart / StackedBars / LinePath
      // below). No external charting library => no CDN dependency =>
      // no "stuck loading" failures. HAS_RECHARTS kept as a constant
      // for backward-compat with code paths that branched on it.
      const HAS_RECHARTS = true;

      // ---------- API helpers --------------------------------------
      const API = "/api/analyzer";

      function buildQuery(params) {
        const q = new URLSearchParams();
        Object.entries(params || {}).forEach(([k, v]) => {
          if (v === "" || v === null || v === undefined) return;
          // Underscore-prefixed keys are client-only (e.g. _season is just a
          // shorthand for setting since/until and shouldn't reach the API).
          if (k.startsWith("_")) return;
          q.set(k, v);
        });
        const s = q.toString();
        return s ? `?${s}` : "";
      }

      async function api(endpoint, params) {
        const r = await fetch(`${API}/${endpoint}${buildQuery(params)}`);
        if (!r.ok) throw new Error(`${endpoint} ${r.status}`);
        return r.json();
      }

      // ---------- Stage 6.2: Random race per-race split --------
      const RACES_SPLIT = [
        { key: 'Protoss', letter: 'P' },
        { key: 'Terran',  letter: 'T' },
        { key: 'Zerg',    letter: 'Z' },
      ];

      // RaceSplitView -- renders the SAME tab content three times,
      // each with `filters.race` locked to P/T/Z. Used for Random
      // users so every aggregated widget produces a per-race column.
      // When `isRandom` is false this is just a passthrough wrapper
      // so we can keep the call site uniform across modes.
      function RaceSplitView({ filters, isRandom, render }) {
        if (!isRandom) return render(filters || {});
        return (
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            {RACES_SPLIT.map(({ key, letter }) => (
              <section key={key} aria-label={`${key} per-race split`}
                       className="min-w-0">
                <h3 className="text-xs uppercase tracking-wider
                               text-neutral-500 mb-2">{key}</h3>
                {render({ ...(filters || {}), race: letter })}
              </section>
            ))}
          </div>
        );
      }

      // ---------- Formatting ---------------------------------------
      const pct = (n) => `${Math.round((n || 0) * 100)}%`;
      const pct1 = (n) => `${((n || 0) * 100).toFixed(1)}%`;
      const fmtDate = (s) => {
        if (!s) return "—";
        const t = Date.parse(String(s).replace(" ", "T"));
        if (!Number.isFinite(t)) return s;
        const d = new Date(t);
        return d.toISOString().slice(0, 10);
      };
      const fmtAgo = (ms) => {
        if (!ms) return "—";
        const s = Math.max(0, (Date.now() - ms) / 1000);
        if (s < 60) return "just now";
        if (s < 3600) return `${Math.floor(s / 60)}m ago`;
        if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
        return `${Math.floor(s / 86400)}d ago`;
      };
      const wrColor = (winRate, total) => {
        if (!total) return "#5d6677";
        if (winRate >= 0.65) return "#3ddc97";
        if (winRate >= 0.55) return "#94d68a";
        if (winRate >= 0.45) return "#f4c95d";
        if (winRate >= 0.35) return "#f79e6c";
        return "#ef476f";
      };
      const raceClass = (race) => {
        const r = (race || "").charAt(0).toUpperCase();
        return ["Z", "P", "T", "R"].includes(r)
          ? `race-${r}`
          : "text-neutral-400";
      };
      // Building-icon URL resolver.
      // Source of truth lives in `analytics/timing_catalog.py`; the JS twin
      // is loaded as a `<script src="/static/analyzer/timing_catalog.js">`
      // tag at the top of this page and exposed as `window.TimingCatalog`.
      // The Express server (index.js) mounts the SC2-Overlay/icons folder
      // at `/static/icons/...`. Reuse this resolver everywhere a building
      // icon is rendered so the URL pattern is defined exactly once.
      const _BUILDING_ICON_FALLBACK = "/static/icons/buildings/";
      function buildingIconUrl(internalName) {
        if (!internalName) return null;
        const TC = window.TimingCatalog;
        if (TC && typeof TC.tokenByInternalName === "function") {
          const t = TC.tokenByInternalName(internalName);
          if (t && t.iconFile) return _BUILDING_ICON_FALLBACK + t.iconFile;
        }
        // Fallback: lowercase the internal name. Keeps the page from showing
        // a broken image if the catalog script hasn't loaded for any reason.
        return (
          _BUILDING_ICON_FALLBACK + String(internalName).toLowerCase() + ".png"
        );
      }
      function buildingDisplayName(internalName, fallback) {
        const TC = window.TimingCatalog;
        if (TC && typeof TC.tokenByInternalName === "function") {
          const t = TC.tokenByInternalName(internalName);
          if (t && t.displayName) return t.displayName;
        }
        return fallback || internalName || "";
      }
      // Win-rate-when-built pill color. Mirrors `wrColor` but uses softer
      // tones for the "n=1" / no-confidence edge case.
      function wrPillColor(rate, n) {
        if (rate == null || !n) return "#5d6677";
        if (rate >= 0.6) return "#3ddc97";
        if (rate >= 0.4) return "#f4c95d";
        return "#ef476f";
      }
      // Trend arrow + aria-label for a given trend string.
      const TREND_GLYPHS = {
        later: { glyph: "▲", label: "trending later", color: "#f79e6c" },
        earlier: { glyph: "▼", label: "trending earlier", color: "#3ddc97" },
        stable: { glyph: "–", label: "stable", color: "#9aa3b2" },
        unknown: { glyph: "·", label: "not enough data", color: "#5d6677" },
      };
      function fmtRelDate(s) {
        if (!s) return "";
        const t = Date.parse(String(s).replace(" ", "T"));
        if (!Number.isFinite(t)) return String(s).slice(0, 10);
        const days = Math.floor((Date.now() - t) / 86400000);
        if (days <= 0) return "today";
        if (days === 1) return "yesterday";
        if (days < 30) return days + "d ago";
        if (days < 365) return Math.floor(days / 30) + "mo ago";
        return Math.floor(days / 365) + "y ago";
      }

      // ---------- Reusable bits ------------------------------------
      function Card({ title, right, children, className = "" }) {
        return (
          <section
            className={`bg-base-800 ring-soft rounded-xl shadow-soft p-5 ${className}`}
          >
            {(title || right) && (
              <header className="flex items-center justify-between mb-4">
                {title && (
                  <h2 className="text-sm font-semibold tracking-wide text-neutral-300 uppercase">
                    {title}
                  </h2>
                )}
                {right}
              </header>
            )}
            {children}
          </section>
        );
      }

      function Stat({ label, value, sub, color }) {
        return (
          <div className="bg-base-700 ring-soft rounded-lg px-4 py-3">
            <div className="text-[11px] uppercase tracking-wider text-neutral-500">
              {label}
            </div>
            <div
              className="mt-1 text-2xl font-semibold tabular-nums"
              style={color ? { color } : null}
            >
              {value}
            </div>
            {sub && (
              <div className="text-xs text-neutral-500 mt-0.5">{sub}</div>
            )}
          </div>
        );
      }

      function WrBar({ wins = 0, losses = 0, height = 6 }) {
        const total = wins + losses;
        const wr = total ? wins / total : 0;
        return (
          <div
            className="w-full bg-base-700 rounded-full overflow-hidden"
            style={{ height }}
          >
            <div
              className="h-full transition-all"
              style={{ width: `${pct(wr)}`, background: wrColor(wr, total) }}
            />
          </div>
        );
      }

      function EmptyState({ title = "No data", sub }) {
        return (
          <div className="text-center py-16 text-neutral-500">
            <div className="text-base">{title}</div>
            {sub && <div className="text-xs mt-1 text-neutral-600">{sub}</div>}
          </div>
        );
      }

      // ============================================================
      // INLINE SVG CHARTS (production-grade, no external deps)
      // ------------------------------------------------------------
      // Features common to all charts:
      //   - Crosshair guide that snaps to the nearest data point
      //   - Floating tooltip with the hovered datum
      //   - Mouse-wheel zoom (Ctrl/Cmd-wheel zooms; plain wheel pans)
      //   - Click-and-drag rectangle to zoom into a region
      //   - Double-click to reset zoom
      //   - "Reset zoom" pill appears when zoomed
      //   - Crisp typography, clean axes, large dot/line widths
      // ============================================================
      const CHART_W = 1000; // logical viewBox width
      const CHART_GRID = "#1e2330";
      const CHART_AXIS = "#cdd5e0";

      // Hook: shared zoom + pan state for index-domain charts.
      // `count` is total items in the dataset; viewport is [start, end].
      function useZoomDomain(count) {
        const [view, setView] = useState({ start: 0, end: count });
        // Reset view when the dataset size actually changes.
        useEffect(() => {
          setView({ start: 0, end: count });
        }, [count]);
        const zoomed = !(view.start === 0 && view.end === count);
        const zoomTo = useCallback(
          (s, e) => {
            const a = Math.max(0, Math.min(s, e));
            const b = Math.min(count, Math.max(s, e));
            if (b - a >= 1)
              setView({ start: Math.floor(a), end: Math.ceil(b) });
          },
          [count],
        );
        const reset = useCallback(
          () => setView({ start: 0, end: count }),
          [count],
        );
        return { view, zoomTo, reset, zoomed };
      }

      // Toolbar pill -- "zoomed: 12 / 47 · reset"
      function ZoomBadge({ view, count, onReset }) {
        if (view.start === 0 && view.end === count) return null;
        const span = view.end - view.start;
        return (
          <button
            onClick={onReset}
            className="absolute top-2 right-2 z-10 text-[10px] uppercase tracking-wider
                   bg-accent-500/20 text-accent-400 hover:bg-accent-500/30
                   ring-soft rounded px-2 py-1"
          >
            zoomed: {span}/{count} · reset ↺
          </button>
        );
      }

      // Tooltip + drag-rectangle overlay shared by line/bar charts.
      function ChartOverlay({ wrapRef, drag, tooltip }) {
        // Resolve clamps without optional-chaining so the in-browser Babel
        // doesn't have to handle ?. inside JSX attribute expressions.
        const wrapW =
          (wrapRef && wrapRef.current && wrapRef.current.clientWidth) || 9999;
        const wrapH =
          (wrapRef && wrapRef.current && wrapRef.current.clientHeight) || 9999;
        return (
          <Fragment>
            {drag && (
              <div
                className="absolute pointer-events-none bg-accent-500/15 border border-accent-500/60"
                style={{
                  left: drag.x1,
                  top: 0,
                  width: drag.x2 - drag.x1,
                  height: "100%",
                }}
              />
            )}
            {tooltip && (
              <div
                className="pointer-events-none absolute z-20 bg-base-900 ring-soft rounded px-3 py-2 text-xs text-neutral-100 shadow-soft"
                style={{
                  left: Math.min(tooltip.x + 14, wrapW - 220),
                  top: Math.min(tooltip.y + 14, wrapH - 80),
                  minWidth: 160,
                }}
              >
                {tooltip.content}
              </div>
            )}
          </Fragment>
        );
      }

      // -------- HORIZONTAL BAR CHART (Maps tab) --------------------
      function HBarChart({
        data,
        height = 360,
        valueKey = "winRate",
        maxValue = 100,
        format = (v) => `${v.toFixed(1)}%`,
        colorFor,
      }) {
        const wrapRef = useRef(null);
        const [tip, setTip] = useState(null);
        if (!data || data.length === 0)
          return <EmptyState sub="No data to chart" />;
        const padL = 180,
          padR = 28,
          padT = 12,
          padB = 32;
        const innerH = Math.max(60, height - padT - padB);
        const rowH = innerH / data.length;
        const xScale = (v) => padL + (v / maxValue) * (CHART_W - padL - padR);
        const ticks = [0, 25, 50, 75, 100];
        return (
          <div
            ref={wrapRef}
            className="relative w-full"
            style={{ height }}
            onMouseLeave={() => setTip(null)}
          >
            <svg
              viewBox={`0 0 ${CHART_W} ${height}`}
              preserveAspectRatio="none"
              style={{ width: "100%", height: "100%" }}
            >
              {ticks.map((t) => (
                <g key={t}>
                  <line
                    x1={xScale(t)}
                    x2={xScale(t)}
                    y1={padT}
                    y2={padT + innerH}
                    stroke={CHART_GRID}
                    strokeDasharray="3 3"
                  />
                  <text
                    x={xScale(t)}
                    y={padT + innerH + 18}
                    fill={CHART_AXIS}
                    fontSize="12"
                    textAnchor="middle"
                  >
                    {t}%
                  </text>
                </g>
              ))}
              {data.map((d, i) => {
                const v = Number(d[valueKey]) || 0;
                const y = padT + i * rowH;
                const barH = Math.max(4, rowH - 6);
                const w = Math.max(0, xScale(v) - padL);
                const fill = colorFor ? colorFor(d) : "#5b8def";
                return (
                  <g
                    key={d.name + i}
                    onMouseMove={(e) => {
                      const rect = wrapRef.current.getBoundingClientRect();
                      setTip({
                        x: e.clientX - rect.left,
                        y: e.clientY - rect.top,
                        content: (
                          <div>
                            <div className="font-semibold text-neutral-100">
                              {d.name}
                            </div>
                            <div className="text-neutral-400">
                              {format(v)}
                              {d.games != null ? ` · ${d.games} games` : ""}
                            </div>
                          </div>
                        ),
                      });
                    }}
                  >
                    <text
                      x={padL - 12}
                      y={y + barH / 2 + 4}
                      fill={CHART_AXIS}
                      fontSize="13"
                      textAnchor="end"
                    >
                      {d.name}
                    </text>
                    <rect
                      x={padL}
                      y={y + 3}
                      width={w}
                      height={barH}
                      fill={fill}
                      rx="3"
                    />
                    {/* Value label inside bar if there's room, else outside */}
                    {w > 60 ? (
                      <text
                        x={padL + w - 8}
                        y={y + barH / 2 + 4}
                        fill="#0b0d11"
                        fontSize="12"
                        fontWeight="600"
                        textAnchor="end"
                      >
                        {format(v)}
                      </text>
                    ) : (
                      <text
                        x={padL + w + 6}
                        y={y + barH / 2 + 4}
                        fill={CHART_AXIS}
                        fontSize="12"
                        textAnchor="start"
                      >
                        {format(v)}
                      </text>
                    )}
                  </g>
                );
              })}
            </svg>
            <ChartOverlay wrapRef={wrapRef} drag={null} tooltip={tip} />
          </div>
        );
      }

      // Shared X-domain chart (line + bars). Handles zoom / pan / drag /
      // crosshair / tooltip in one place. The `series` prop is an array
      // of { key, color, type: 'line'|'bar', accessor }.
      function XDomainChart({
        data,
        height = 280,
        series,
        formatX = (d) => d.date,
        formatY = (v) => String(v),
        yMax,
      }) {
        const wrapRef = useRef(null);
        const svgRef = useRef(null);
        const [tip, setTip] = useState(null);
        const [drag, setDrag] = useState(null);
        const zoom = useZoomDomain(data ? data.length : 0);
        if (!data || data.length === 0)
          return <EmptyState sub="No data to chart" />;
        const padL = 56,
          padR = 20,
          padT = 12,
          padB = 36;
        const innerH = Math.max(60, height - padT - padB);
        const innerW = CHART_W - padL - padR;
        const view = data.slice(zoom.view.start, zoom.view.end);
        const n = Math.max(1, view.length);
        // y-domain: max of all series values in the visible window.
        // Stacked series sum their layers per datum; line/bar series use
        // their accessor directly. Falls back to 1 to avoid divide-by-0.
        function valueFor(s, d) {
          if (s.type === "stack" && Array.isArray(s.stack)) {
            let sum = 0;
            for (const layer of s.stack) {
              const v =
                layer && typeof layer.accessor === "function"
                  ? layer.accessor(d)
                  : 0;
              sum += Number(v) || 0;
            }
            return sum;
          }
          return typeof s.accessor === "function"
            ? Number(s.accessor(d)) || 0
            : 0;
        }
        const yMaxComputed =
          yMax != null
            ? yMax
            : Math.max(
                1,
                ...view.flatMap((d) => series.map((s) => valueFor(s, d))),
              );
        const yScale = (v) =>
          padT +
          innerH -
          (Math.min(yMaxComputed, Math.max(0, v)) / yMaxComputed) * innerH;
        // For bar charts we slot bars within their column; for lines we
        // anchor to the column center.
        const colW = innerW / n;
        const xCenter = (i) => padL + i * colW + colW / 2;

        // Pixel position to data index (clamped).
        function pxToIndex(pxFromLeft) {
          const localX = pxFromLeft - padL;
          const idx = Math.floor(localX / colW);
          return Math.max(0, Math.min(view.length - 1, idx));
        }

        // Convert client coords to logical SVG coords for hit-testing.
        function clientToLogical(clientX, clientY) {
          const rect = svgRef.current.getBoundingClientRect();
          const sx = ((clientX - rect.left) / rect.width) * CHART_W;
          const sy = ((clientY - rect.top) / rect.height) * height;
          return { sx, sy };
        }

        function onMouseMove(e) {
          const { sx } = clientToLogical(e.clientX, e.clientY);
          const i = pxToIndex(sx);
          const d = view[i];
          const xPix = xCenter(i);
          const wrapRect = wrapRef.current.getBoundingClientRect();
          setTip({
            x: e.clientX - wrapRect.left,
            y: e.clientY - wrapRect.top,
            snapX: xPix,
            i,
            content: (
              <div>
                <div className="font-semibold text-neutral-100">
                  {formatX(d)}
                </div>
                {series.flatMap((s) => {
                  // Stacked series: render one row per layer (e.g., wins / losses)
                  if (s.type === "stack" && Array.isArray(s.stack)) {
                    return s.stack.map((layer) => (
                      <div
                        key={s.key + ":" + layer.key}
                        className="flex items-center gap-1.5 mt-0.5"
                      >
                        <span
                          className="inline-block w-2 h-2 rounded-sm"
                          style={{ background: layer.color }}
                        />
                        <span className="text-neutral-400">
                          {layer.label || layer.key}:{" "}
                          <span className="text-neutral-200">
                            {formatY(layer.accessor(d), layer.key)}
                          </span>
                        </span>
                      </div>
                    ));
                  }
                  // Plain line / bar
                  const v =
                    typeof s.accessor === "function" ? s.accessor(d) : null;
                  return [
                    <div
                      key={s.key}
                      className="flex items-center gap-1.5 mt-0.5"
                    >
                      <span
                        className="inline-block w-2 h-2 rounded-sm"
                        style={{ background: s.color }}
                      />
                      <span className="text-neutral-400">
                        {s.label}:{" "}
                        <span className="text-neutral-200">
                          {formatY(v, s.key)}
                        </span>
                      </span>
                    </div>,
                  ];
                })}
              </div>
            ),
          });
          if (drag) setDrag({ ...drag, x2: e.clientX - wrapRect.left });
        }
        function onMouseDown(e) {
          const wrapRect = wrapRef.current.getBoundingClientRect();
          const x = e.clientX - wrapRect.left;
          setDrag({ x1: x, x2: x });
        }
        function onMouseUp(e) {
          if (!drag) return;
          const wrapRect = wrapRef.current.getBoundingClientRect();
          const a = Math.min(drag.x1, drag.x2);
          const b = Math.max(drag.x1, drag.x2);
          setDrag(null);
          if (b - a < 8) return; // treat as click
          // Convert pixel range to logical -> slice of `view` -> absolute slice
          const ratioA = a / wrapRect.width;
          const ratioB = b / wrapRect.width;
          const localA = ratioA * CHART_W;
          const localB = ratioB * CHART_W;
          const iA = pxToIndex(localA);
          const iB = pxToIndex(localB) + 1;
          zoom.zoomTo(zoom.view.start + iA, zoom.view.start + iB);
        }
        function onDoubleClick() {
          zoom.reset();
        }
        function onWheel(e) {
          // Wheel zoom: positive deltaY = zoom out, negative = zoom in.
          // Centered on mouse position.
          e.preventDefault();
          const wrapRect = wrapRef.current.getBoundingClientRect();
          const ratio = (e.clientX - wrapRect.left) / wrapRect.width;
          const i = pxToIndex(ratio * CHART_W);
          const absoluteCenter = zoom.view.start + i;
          const span = zoom.view.end - zoom.view.start;
          const factor = e.deltaY > 0 ? 1.25 : 0.8;
          const newSpan = Math.max(
            2,
            Math.min(data.length, Math.round(span * factor)),
          );
          const newStart = Math.max(
            0,
            absoluteCenter -
              Math.floor(newSpan * (i / Math.max(1, view.length - 1))),
          );
          const newEnd = Math.min(data.length, newStart + newSpan);
          zoom.zoomTo(newStart, newEnd);
        }

        // Y-axis ticks (4-5 nice ones)
        const niceTicks = (max) => {
          if (max <= 1) return [0, 0.25, 0.5, 0.75, 1];
          const step = Math.pow(10, Math.floor(Math.log10(max)));
          const norm = max / step;
          const niceStep = (norm < 2 ? 0.5 : norm < 5 ? 1 : 2) * step;
          const out = [];
          for (let v = 0; v <= max + 1e-9; v += niceStep) out.push(v);
          return out;
        };
        const yTicks = niceTicks(yMaxComputed);
        const everyN = Math.max(1, Math.ceil(view.length / 10));

        return (
          <div
            ref={wrapRef}
            className="relative w-full select-none"
            style={{ height }}
            onMouseLeave={() => {
              setTip(null);
              setDrag(null);
            }}
          >
            <ZoomBadge
              view={zoom.view}
              count={data.length}
              onReset={zoom.reset}
            />
            <svg
              ref={svgRef}
              viewBox={`0 0 ${CHART_W} ${height}`}
              preserveAspectRatio="none"
              style={{
                width: "100%",
                height: "100%",
                cursor: drag ? "crosshair" : "crosshair",
              }}
              onMouseMove={onMouseMove}
              onMouseDown={onMouseDown}
              onMouseUp={onMouseUp}
              onDoubleClick={onDoubleClick}
              onWheel={onWheel}
            >
              {/* Y gridlines + ticks */}
              {yTicks.map((t) => (
                <g key={t}>
                  <line
                    x1={padL}
                    x2={CHART_W - padR}
                    y1={yScale(t)}
                    y2={yScale(t)}
                    stroke={CHART_GRID}
                    strokeDasharray="3 3"
                  />
                  <text
                    x={padL - 8}
                    y={yScale(t) + 4}
                    fill={CHART_AXIS}
                    fontSize="12"
                    textAnchor="end"
                  >
                    {formatY(t, "__yaxis")}
                  </text>
                </g>
              ))}
              {/* X axis line */}
              <line
                x1={padL}
                x2={CHART_W - padR}
                y1={padT + innerH}
                y2={padT + innerH}
                stroke="#2a3140"
              />
              {/* X tick labels */}
              {view.map((d, i) =>
                i % everyN === 0 ? (
                  <text
                    key={i}
                    x={xCenter(i)}
                    y={padT + innerH + 20}
                    fill={CHART_AXIS}
                    fontSize="11"
                    textAnchor="middle"
                  >
                    {formatX(d).slice(-5)}
                  </text>
                ) : null,
              )}

              {/* Series rendering */}
              {series.map((s) => {
                if (s.type === "bar") {
                  return view.map((d, i) => {
                    const v = s.accessor(d) || 0;
                    const h = (v / yMaxComputed) * innerH;
                    const x = padL + i * colW + colW * 0.12;
                    const w = colW * 0.76;
                    return (
                      <rect
                        key={`${s.key}-${i}`}
                        x={x}
                        y={padT + innerH - h}
                        width={w}
                        height={h}
                        fill={s.color}
                        opacity={s.opacity || 0.9}
                      />
                    );
                  });
                }
                if (s.type === "stack") {
                  // s.stack = [{ key, color, accessor }]
                  return view.map((d, i) => {
                    let acc = 0;
                    const x = padL + i * colW + colW * 0.12;
                    const w = colW * 0.76;
                    return (
                      <g key={`${s.key}-${i}`}>
                        {s.stack.map((layer) => {
                          const v = layer.accessor(d) || 0;
                          const h = (v / yMaxComputed) * innerH;
                          const y = padT + innerH - acc - h;
                          acc += h;
                          return (
                            <rect
                              key={layer.key}
                              x={x}
                              y={y}
                              width={w}
                              height={h}
                              fill={layer.color}
                            />
                          );
                        })}
                      </g>
                    );
                  });
                }
                // line
                const pts = view.map((d, i) => ({
                  x: xCenter(i),
                  y: yScale(s.accessor(d) || 0),
                }));
                const path = pts
                  .map(
                    (p, i) =>
                      `${i === 0 ? "M" : "L"} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`,
                  )
                  .join(" ");
                return (
                  <g key={s.key}>
                    <path
                      d={path}
                      fill="none"
                      stroke={s.color}
                      strokeWidth="2.5"
                      strokeLinecap="round"
                      strokeLinejoin="round"
                    />
                    {pts.map((p, i) => (
                      <circle
                        key={i}
                        cx={p.x}
                        cy={p.y}
                        r="3.5"
                        fill="#11141a"
                        stroke={s.color}
                        strokeWidth="2"
                      />
                    ))}
                  </g>
                );
              })}

              {/* Crosshair */}
              {tip && (
                <line
                  x1={tip.snapX}
                  x2={tip.snapX}
                  y1={padT}
                  y2={padT + innerH}
                  stroke="#5b8def"
                  strokeOpacity="0.6"
                  strokeDasharray="4 4"
                />
              )}
            </svg>
            <ChartOverlay wrapRef={wrapRef} drag={drag} tooltip={tip} />
            <div className="absolute bottom-1 left-3 text-[10px] text-neutral-600 font-mono pointer-events-none">
              drag to zoom · wheel to zoom · double-click to reset
            </div>
          </div>
        );
      }

      // Convenience wrappers so the call sites stay tidy.
      function StackedBars({ data, height = 280 }) {
        return (
          <XDomainChart
            data={data}
            height={height}
            series={[
              {
                key: "wl",
                type: "stack",
                label: "Games",
                color: "#3ddc97",
                stack: [
                  {
                    key: "wins",
                    label: "Wins",
                    color: "#3ddc97",
                    accessor: (d) => d.wins || 0,
                  },
                  {
                    key: "losses",
                    label: "Losses",
                    color: "#ef476f",
                    accessor: (d) => d.losses || 0,
                  },
                ],
              },
            ]}
            formatX={(d) => d.date}
            formatY={(v) => Math.round(v == null ? 0 : v)}
          />
        );
      }

      function LinePath({ data, height = 280, valueKey = "winRate" }) {
        return (
          <XDomainChart
            data={data}
            height={height}
            yMax={1}
            series={[
              {
                key: valueKey,
                type: "line",
                label: "Win rate",
                color: "#5b8def",
                accessor: (d) => d[valueKey] || 0,
              },
            ]}
            formatX={(d) => d.date}
            formatY={(v, k) =>
              k === valueKey || k === "__yaxis" ? `${Math.round(v * 100)}%` : v
            }
          />
        );
      }

      // Error boundary wrapper -- catches a child render error and shows
      // a small panel inline instead of bringing down the whole SPA.
      // Used around each tab so a bug in one tab doesn't blank the rest.
      class ErrorBoundary extends React.Component {
        constructor(props) {
          super(props);
          this.state = { error: null };
        }
        static getDerivedStateFromError(error) {
          return { error };
        }
        componentDidCatch(error, info) {
          console.error("[Analyzer] component error:", error, info);
        }
        render() {
          if (!this.state.error) return this.props.children;
          const e = this.state.error;
          return (
            <div className="bg-loss-500/10 border border-loss-500/40 rounded p-4 text-sm">
              <div className="font-semibold text-loss-500 mb-1">
                {this.props.label || "Component"} failed to render
              </div>
              <pre className="text-xs text-neutral-300 whitespace-pre-wrap">
                {String(e && (e.stack || e.message || e))}
              </pre>
              <button
                onClick={() => this.setState({ error: null })}
                className="mt-3 text-xs bg-base-700 hover:bg-base-600 ring-soft rounded px-3 py-1 text-neutral-300"
              >
                try again
              </button>
            </div>
          );
        }
      }

      function Skeleton({ rows = 6 }) {
        return (
          <div className="space-y-2">
            {Array.from({ length: rows }).map((_, i) => (
              <div key={i} className="h-9 rounded skeleton" />
            ))}
          </div>
        );
      }

      // ---------- Sortable column header --------------------------
      // Click to toggle ascending/descending; click a different column
      // to sort by it. Used by every data table in the SPA so columns
      // behave consistently. The parent component owns the sort state
      // and passes (sortBy, sortDir, onSort) -- this header is purely
      // presentational + click-target.
      function SortableTh({
        col,
        label,
        sortBy,
        sortDir,
        onSort,
        align = "left",
        width,
      }) {
        const active = sortBy === col;
        const arrow = !active ? "⇅" : sortDir === "asc" ? "▲" : "▼";
        const alignClass =
          align === "right"
            ? "text-right"
            : align === "center"
              ? "text-center"
              : "text-left";
        const widthStyle = width ? { width } : null;
        return (
          <th
            onClick={() => onSort(col)}
            style={widthStyle}
            className={`select-none cursor-pointer py-2 px-3 ${alignClass} hover:bg-base-600 transition`}
          >
            <span className="inline-flex items-center gap-1">
              {label}
              <span
                className={`text-[9px] ${active ? "text-accent-400" : "text-neutral-600"}`}
              >
                {arrow}
              </span>
            </span>
          </th>
        );
      }

      // Hook: simple sort state + comparator factory.
      // `defaultDir` is 'asc' or 'desc' for the *initial* click on a column.
      function useSort(defaultCol, defaultDir = "desc") {
        const [sortBy, setSortBy] = useState(defaultCol);
        const [sortDir, setSortDir] = useState(defaultDir);
        const onSort = useCallback(
          (col) => {
            setSortBy((prev) => {
              if (prev === col) {
                // Toggle direction on same column.
                setSortDir((d) => (d === "asc" ? "desc" : "asc"));
                return prev;
              }
              // New column: reset to default direction.
              setSortDir(defaultDir);
              return col;
            });
          },
          [defaultDir],
        );
        const sortRows = useCallback(
          (rows, accessor) => {
            const arr = [...(rows || [])];
            arr.sort((a, b) => {
              const av = accessor(a, sortBy);
              const bv = accessor(b, sortBy);
              if (av == null && bv == null) return 0;
              if (av == null) return 1;
              if (bv == null) return -1;
              let cmp;
              if (typeof av === "number" && typeof bv === "number")
                cmp = av - bv;
              else
                cmp = String(av).localeCompare(String(bv), undefined, {
                  numeric: true,
                  sensitivity: "base",
                });
              return sortDir === "asc" ? cmp : -cmp;
            });
            return arr;
          },
          [sortBy, sortDir],
        );
        return { sortBy, sortDir, onSort, sortRows };
      }

      // ---------- Season helpers ----------------------------------
      // Quick-set the since/until filters from a coarse "Last 30 days /
      // 90 days / etc." dropdown. Mirrors the season selector the old
      // Flask web_analyzer.py exposed so users keep the same shorthand.
      const SEASONS = [
        { id: "", label: "All time", days: null },
        { id: "7", label: "Last 7 days", days: 7 },
        { id: "30", label: "Last 30 days", days: 30 },
        { id: "90", label: "Last 90 days", days: 90 },
        { id: "183", label: "Last 6 months", days: 183 },
        { id: "365", label: "Last year", days: 365 },
      ];
      function isoDaysAgo(days) {
        const d = new Date();
        d.setDate(d.getDate() - days);
        return d.toISOString().slice(0, 10);
      }
      function isoToday() {
        return new Date().toISOString().slice(0, 10);
      }

      // ---------- Global Filters -----------------------------------
      function FilterBar({ filters, onChange, onReset }) {
        const set = (k, v) => onChange({ ...filters, [k]: v });
        const setSeason = (id) => {
          const s = SEASONS.find((x) => x.id === id) || SEASONS[0];
          const next = { ...filters, _season: s.id };
          if (s.days == null) {
            delete next.since;
            delete next.until;
          } else {
            next.since = isoDaysAgo(s.days);
            next.until = isoToday();
          }
          onChange(next);
        };
        return (
          <div className="flex flex-wrap items-end gap-3 bg-base-800 ring-soft rounded-xl p-3">
            <div>
              <label className="block text-[10px] uppercase tracking-wider text-neutral-500 mb-1">
                Season
              </label>
              <select
                value={filters._season || ""}
                onChange={(e) => setSeason(e.target.value)}
                className="bg-base-700 ring-soft rounded px-2 py-1 text-sm"
              >
                {SEASONS.map((s) => (
                  <option key={s.id} value={s.id}>
                    {s.label}
                  </option>
                ))}
              </select>
            </div>
            <div>
              <label className="block text-[10px] uppercase tracking-wider text-neutral-500 mb-1">
                Since
              </label>
              <input
                type="date"
                value={filters.since || ""}
                onChange={(e) => set("since", e.target.value)}
                className="bg-base-700 ring-soft rounded px-2 py-1 text-sm"
              />
            </div>
            <div>
              <label className="block text-[10px] uppercase tracking-wider text-neutral-500 mb-1">
                Until
              </label>
              <input
                type="date"
                value={filters.until || ""}
                onChange={(e) => set("until", e.target.value)}
                className="bg-base-700 ring-soft rounded px-2 py-1 text-sm"
              />
            </div>
            <div>
              <label className="block text-[10px] uppercase tracking-wider text-neutral-500 mb-1">
                My race
              </label>
              <select
                value={filters.race || ""}
                onChange={(e) => set("race", e.target.value)}
                className="bg-base-700 ring-soft rounded px-2 py-1 text-sm"
              >
                <option value="">all</option>
                <option value="Z">Zerg</option>
                <option value="P">Protoss</option>
                <option value="T">Terran</option>
                <option value="R">Random</option>
              </select>
            </div>
            <div>
              <label className="block text-[10px] uppercase tracking-wider text-neutral-500 mb-1">

      // ---------- Data hook ----------------------------------------
      function useApi(endpoint, params, deps = []) {
        const [state, setState] = useState({
          data: null,
          loading: true,
          error: null,
        });
        const ctrl = useRef(null);
        useEffect(() => {
          if (ctrl.current) ctrl.current.abort();
          ctrl.current = new AbortController();
          setState({ data: null, loading: true, error: null });
          fetch(`${API}/${endpoint}${buildQuery(params)}`, {
            signal: ctrl.current.signal,
          })
            .then((r) =>
              r.ok ? r.json() : Promise.reject(new Error(`${r.status}`)),
            )
            .then((data) => setState({ data, loading: false, error: null }))
            .catch((err) => {
              if (err.name === "AbortError") return;
              setState({ data: null, loading: false, error: err.message });
            });
          return () => ctrl.current && ctrl.current.abort();
          // eslint-disable-next-line react-hooks/exhaustive-deps
        }, deps);
        return state;
      }

      const RACE_DOT_CLASS = {
        Protoss: "bg-amber-400",
        Terran: "bg-blue-400",
        Zerg: "bg-purple-400",
        Neutral: "bg-neutral-500",
      };
      const CATEGORY_BADGE_CLASS = {
        townhall: "bg-yellow-700/60 text-yellow-200",
        builder: "bg-blue-700/60 text-blue-200",
        tech: "bg-purple-700/60 text-purple-200",
        defense: "bg-red-700/60 text-red-200",
        supply: "bg-cyan-700/60 text-cyan-200",
        worker: "bg-neutral-700/60 text-neutral-300",
        army: "bg-orange-700/60 text-orange-200",
        caster: "bg-fuchsia-700/60 text-fuchsia-200",
        air: "bg-sky-700/60 text-sky-200",
        detector: "bg-emerald-700/60 text-emerald-200",
        transport: "bg-teal-700/60 text-teal-200",
        hero: "bg-rose-700/60 text-rose-200",

      // =====================================================================
      // Activity-over-time chart used inside BuildOrderTimeline.
      //
      // Two stacked area charts (APM above, SPM below), x-axis = game
      // seconds, sourced from /games/:id/apm-curve. Both players are
      // overlaid at 0.5 opacity, colored by race using the design-token
      // accents (Protoss=amber, Zerg=purple, Terran=blue, fallback grey).
      //
      // Pure-SVG, no chart library. If the endpoint reports has_data=false
      // (corrupt replay, no command/selection events) we render the
      // "Activity data unavailable" notice instead of empty axes.
      // =====================================================================
      const ACTIVITY_RACE_COLOR = {
        Protoss: "var(--color-race-protoss)",
        Terran: "var(--color-race-terran)",
        Zerg: "var(--color-race-zerg)",
      };
      const ACTIVITY_FALLBACK_COLOR = "var(--color-race-random)";
      const ACTIVITY_VIEW_W = 800;
      const ACTIVITY_VIEW_H = 140;
      const ACTIVITY_PAD_LEFT = 36;
      const ACTIVITY_PAD_RIGHT = 12;
      const ACTIVITY_PAD_TOP = 8;
      const ACTIVITY_PAD_BOTTOM = 22;
      const ACTIVITY_AREA_OPACITY = 0.5;
      const ACTIVITY_LINE_OPACITY = 0.9;
      const ACTIVITY_X_TICK_SEC = 60;
      const ACTIVITY_Y_TICK_FRACTIONS = [0, 0.5, 1];

      function _activityFmtClock(totalSeconds) {
        const s = Math.max(0, Math.floor(totalSeconds || 0));
        const m = Math.floor(s / 60);
        const ss = (s % 60).toString().padStart(2, "0");
        return `${m}:${ss}`;
      }

      function _activityRaceColor(race) {
        return ACTIVITY_RACE_COLOR[race] || ACTIVITY_FALLBACK_COLOR;
      }

      function _activityBuildAreaPath(values, plotW, plotH, padLeft, padTop, yMax) {
        if (!values || values.length === 0 || yMax <= 0) return "";
        const last = values.length - 1;
        if (last === 0) return "";
        const xAt = (i) => padLeft + (i / last) * plotW;
        const yAt = (v) => padTop + plotH - (Math.min(v, yMax) / yMax) * plotH;
        let d = `M ${xAt(0).toFixed(2)} ${(padTop + plotH).toFixed(2)}`;
        for (let i = 0; i < values.length; i += 1) {
          d += ` L ${xAt(i).toFixed(2)} ${yAt(values[i]).toFixed(2)}`;
        }
        d += ` L ${xAt(last).toFixed(2)} ${(padTop + plotH).toFixed(2)} Z`;
        return d;
      }

      function _activityBuildLinePath(values, plotW, plotH, padLeft, padTop, yMax) {
        if (!values || values.length === 0 || yMax <= 0) return "";
        const last = values.length - 1;
        if (last === 0) return "";
        const xAt = (i) => padLeft + (i / last) * plotW;
        const yAt = (v) => padTop + plotH - (Math.min(v, yMax) / yMax) * plotH;
        let d = `M ${xAt(0).toFixed(2)} ${yAt(values[0]).toFixed(2)}`;
        for (let i = 1; i < values.length; i += 1) {
          d += ` L ${xAt(i).toFixed(2)} ${yAt(values[i]).toFixed(2)}`;
        }
        return d;
      }

      function _activityYAxisMax(playerSeries) {
        let m = 0;
        for (const series of playerSeries) {
          for (const v of series || []) if (v > m) m = v;
        }
        if (m <= 0) return 100;
        // Round up to a friendly tick (50, 100, 150, 200, 250, 300, 400, 600...).
        const steps = [50, 100, 150, 200, 250, 300, 400, 500, 600, 800, 1000];
        for (const s of steps) if (m <= s) return s;
        return Math.ceil(m / 100) * 100;
      }

      function ActivityChartPanel({ title, players, valueKey, gameLengthSec }) {
        const plotW = ACTIVITY_VIEW_W - ACTIVITY_PAD_LEFT - ACTIVITY_PAD_RIGHT;
        const plotH = ACTIVITY_VIEW_H - ACTIVITY_PAD_TOP - ACTIVITY_PAD_BOTTOM;
        const series = players.map((p) => p[valueKey] || []);
        const yMax = _activityYAxisMax(series);
        const xTicks = [];
        const totalSec = gameLengthSec || 0;
        for (let t = 0; t <= totalSec; t += ACTIVITY_X_TICK_SEC) xTicks.push(t);
        return (
          <div className="bg-base-900/40 rounded p-2">
            <div className="flex items-center justify-between mb-1 px-1">
              <div className="text-[11px] uppercase tracking-wide text-neutral-400">
                {title}
              </div>
              <div className="flex items-center gap-3">
                {players.map((p, i) => (
                  <div key={i} className="flex items-center gap-1.5">
                    <span
                      className="inline-block w-3 h-2 rounded-sm"
                      style={{
                        background: _activityRaceColor(p.race),
                        opacity: ACTIVITY_AREA_OPACITY,
                      }}
                    />
                    <span className="text-[10px] text-neutral-300">
                      {p.name || `P${p.pid}`}
                      {p.race ? ` (${p.race[0]})` : ""}
                    </span>
                  </div>
                ))}
              </div>
            </div>
            <svg
              viewBox={`0 0 ${ACTIVITY_VIEW_W} ${ACTIVITY_VIEW_H}`}
              preserveAspectRatio="none"
              className="w-full h-[140px]"
              role="img"
              aria-label={`${title} chart`}
            >
              {ACTIVITY_Y_TICK_FRACTIONS.map((frac, i) => {
                const y = ACTIVITY_PAD_TOP + plotH - frac * plotH;
                const v = Math.round(yMax * frac);
                return (
                  <g key={`y${i}`}>
                    <line
                      x1={ACTIVITY_PAD_LEFT}
                      y1={y}
                      x2={ACTIVITY_VIEW_W - ACTIVITY_PAD_RIGHT}
                      y2={y}
                      stroke="var(--color-border-subtle)"
                      strokeWidth="1"
                    />
                    <text
                      x={ACTIVITY_PAD_LEFT - 4}
                      y={y + 3}
                      textAnchor="end"
                      fontSize="9"
                      fill="var(--color-text-secondary)"
                    >
                      {v}
                    </text>
                  </g>
                );
              })}
              {xTicks.map((t, i) => {
                const x = ACTIVITY_PAD_LEFT + (totalSec > 0 ? (t / totalSec) * plotW : 0);
                return (
                  <g key={`x${i}`}>
                    <line
                      x1={x}
                      y1={ACTIVITY_PAD_TOP + plotH}
                      x2={x}
                      y2={ACTIVITY_PAD_TOP + plotH + 3}
                      stroke="var(--color-text-secondary)"
                      strokeWidth="1"
                    />
                    <text
                      x={x}
                      y={ACTIVITY_PAD_TOP + plotH + 14}
                      textAnchor="middle"
                      fontSize="9"
                      fill="var(--color-text-secondary)"
                    >
                      {_activityFmtClock(t)}
                    </text>
                  </g>
                );
              })}
              {players.map((p, i) => {
                const color = _activityRaceColor(p.race);
                const values = p[valueKey] || [];
                const areaD = _activityBuildAreaPath(
                  values, plotW, plotH,
                  ACTIVITY_PAD_LEFT, ACTIVITY_PAD_TOP, yMax,
                );
                const lineD = _activityBuildLinePath(
                  values, plotW, plotH,
                  ACTIVITY_PAD_LEFT, ACTIVITY_PAD_TOP, yMax,
                );
                return (
                  <g key={`p${i}`}>
                    {areaD && (
                      <path
                        d={areaD}
                        fill={color}
                        opacity={ACTIVITY_AREA_OPACITY}
                      />
                    )}
                    {lineD && (
                      <path
                        d={lineD}
                        fill="none"
                        stroke={color}
                        strokeWidth="1.25"
                        opacity={ACTIVITY_LINE_OPACITY}
                      />
                    )}
                  </g>
                );
              })}
            </svg>
          </div>
        );
      }

      function ActivityOverTimeChart({ gameId, myRaceHint, oppRaceHint }) {
        const [data, setData] = useState(null);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);

        useEffect(() => {
          let cancelled = false;
          setLoading(true);
          setError(null);
          fetch(`${API}/games/${encodeURIComponent(gameId)}/apm-curve`)
            .then((r) =>
              r.ok ? r.json() : r.json().then((j) => Promise.reject(j)),
            )
            .then((j) => {
              if (!cancelled) {
                setData(j);
                setLoading(false);
              }
            })
            .catch((e) => {
              if (!cancelled) {
                setError((e && e.error) || "fetch failed");
                setLoading(false);
              }
            });
          return () => {
            cancelled = true;
          };
        }, [gameId]);

        if (loading) {
          return (
            <div className="text-xs text-neutral-500 px-3 py-2">
              loading activity…
            </div>
          );
        }
        if (error) {
          return (
            <div className="text-xs text-loss-500 px-3 py-2">
              activity unavailable: {error}
            </div>
          );
        }
        if (!data || !data.has_data || !Array.isArray(data.players)
            || data.players.length === 0) {
          return (
            <div className="text-xs text-neutral-500 px-3 py-3 italic">
              Activity data unavailable
            </div>
          );
        }
        // Hint races onto players that came back without one (older
        // replays where sc2reader couldn't resolve play_race for the
        // observer slot). Best-effort; defaults to the neutral fallback
        // color downstream.
        const players = data.players.map((p, i) => {
          if (p.race) return p;
          if (i === 0 && myRaceHint) return Object.assign({}, p, { race: myRaceHint });
          if (i === 1 && oppRaceHint) return Object.assign({}, p, { race: oppRaceHint });
          return p;
        });
        return (
          <div className="mt-3 border-t border-base-700 pt-3">
            <div className="text-[11px] text-neutral-500 mb-2 px-1">
              Activity over time — {data.window_sec || 30}s sliding window.
              Both players overlaid; color = race.
            </div>
            <div className="space-y-2">
              <ActivityChartPanel
                title="APM (actions per minute)"
                players={players}
                valueKey="apm"
                gameLengthSec={data.game_length_sec || 0}
              />
              <ActivityChartPanel
                title="SPM (selections per minute)"
                players={players}
                valueKey="spm"
                gameLengthSec={data.game_length_sec || 0}
              />
            </div>
          </div>
        );
      }


      function BuildOrderTimeline({ gameId, perspective: perspectiveProp }) {
        const [data, setData] = useState(null);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [showAll, setShowAll] = useState(false);
        const [filter, setFilter] = useState("all");
        // 'opponent' shows the opponent's build, 'me' shows the user's. The
        // OpponentProfile passes perspective="opponent" so that drawer
        // defaults to the OPPONENT'S build (which is the entire point of
        // viewing an opponent card). Other surfaces default to "me".
        const [perspective, setPerspective] = useState(perspectiveProp || "me");
        // Tracks the on-demand opponent-build extraction state. Older games
        // don't have opp_build_log persisted yet; clicking "Extract" POSTs
        // to /games/:id/opp-build-order, which re-parses the replay and
        // writes opp_build_log + opp_early_build_log back to meta_database.
        const [extracting, setExtracting] = useState(false);
        const [extractError, setExtractError] = useState(null);
        // Stage 7.5: build-editor modal state. The editor is opened
        // lazily via POST /api/custom-builds/from-game; we keep its
        // state local to this component so each opened drawer has
        // its own independent editor instance.
        const [editorOpen, setEditorOpen] = useState(false);
        const [editorDraft, setEditorDraft] = useState(null);
        const [editorLoading, setEditorLoading] = useState(false);
        const [editorProfileReady, setEditorProfileReady] = useState(true);
        const [editorError, setEditorError] = useState(null);
        // Stage 6.5: leak-window focus state. When the spending efficiency
        // chart fires sc2:focus-build-order with a {start, end} window, we
        // store it here so the events list highlights everything inside
        // [start, end] and scrolls the first matching event into view.
        // Auto-clears after BUILD_ORDER_FOCUS_HOLD_MS so the highlight is
        // transient and doesn't persist across game switches.
        const [focusRange, setFocusRange] = useState(null);
        const eventsContainerRef = useRef(null);

        useEffect(() => {
          let cancelled = false;
          setLoading(true);
          setError(null);
          fetch(`${API}/games/${encodeURIComponent(gameId)}/build-order`)
            .then((r) =>
              r.ok ? r.json() : r.json().then((j) => Promise.reject(j)),
            )
            .then((j) => {
              if (!cancelled) {
                setData(j);
                setLoading(false);
              }
            })
            .catch((e) => {
              if (!cancelled) {
                setError(e.error || "fetch failed");
                setLoading(false);
              }
            });
          return () => {
            cancelled = true;
          };
        }, [gameId]);

        // Stage 6.5: subscribe to the leak-band click event from the
        // SpendingEfficiencyChart. Filter by gameId so multiple
        // BuildOrderTimeline instances (e.g. user vs opponent drawers)
        // don't all react to the same click.
        useEffect(() => {
          const BUILD_ORDER_FOCUS_HOLD_MS = 4000;
          const SCROLL_AFTER_PAINT_MS = 60;
          let clearTimer = null;
          const handler = (ev) => {
            const detail = ev && ev.detail;
            if (!detail || detail.gameId !== gameId) return;
            const startSec = Number(detail.start) || 0;
            const endSec = Number(detail.end) || 0;
            if (endSec <= startSec) return;
            setFocusRange({ start: startSec, end: endSec });
            // Defer the scroll to next paint so React has flushed the
            // data-leak-focused attribute onto the matching rows.
            setTimeout(() => {
              const container = eventsContainerRef.current;
              if (!container) return;
              const target = container.querySelector(
                '[data-leak-focused="true"]',
              );
              if (target && target.scrollIntoView) {
                target.scrollIntoView({ behavior: "smooth", block: "center" });
              }
            }, SCROLL_AFTER_PAINT_MS);
            if (clearTimer) clearTimeout(clearTimer);
            clearTimer = setTimeout(
              () => setFocusRange(null),
              BUILD_ORDER_FOCUS_HOLD_MS,
            );
          };
          window.addEventListener("sc2:focus-build-order", handler);
          return () => {
            window.removeEventListener("sc2:focus-build-order", handler);
            if (clearTimer) clearTimeout(clearTimer);
          };
        }, [gameId]);

        if (loading)
          return (
            <div className="text-xs text-neutral-500 px-3 py-2">
              loading build order…
            </div>
          );
        if (error)
          return (
            <div className="text-xs text-loss-500 px-3 py-2">
              build-order unavailable: {error}
            </div>
          );
        if (!data) return null;

        const myAllEvents = data.events || [];
        const myEarlyEvents = data.early_events || [];
        const oppAllEvents = data.opp_events || [];
        const oppEarlyEvents = data.opp_early_events || [];
        const oppAvailable =
          !!data.opp_build_available && oppAllEvents.length > 0;

        // Effective perspective: if the caller asked for the opponent's
        // build but we don't have it yet, surface the extract affordance
        // instead of silently flipping back to the user's build.
        const wantOpp = perspective === "opponent";
        const allEvents = wantOpp ? oppAllEvents : myAllEvents;
        const earlyEvents = wantOpp ? oppEarlyEvents : myEarlyEvents;
        const events = showAll ? allEvents : earlyEvents;
        const filtered =
          filter === "all"
            ? events
            : filter === "buildings"
              ? events.filter((e) => e.is_building)
              : filter === "units"
                ? events.filter(
                    (e) => !e.is_building && e.category !== "upgrade",
                  )
                : events.filter((e) => e.category === "upgrade");

        const myRace = data.my_race || data.myRace || "";
        const oppName = data.opponent || "";
        const oppRace = (data.opp_race || "").toString();
        const headerLabel = wantOpp
          ? `${oppName || "Opponent"}'s Build${oppRace ? ` (${oppRace})` : ""}`
          : `Your Build${myRace ? ` (${myRace})` : ""}${oppName ? ` vs ${oppName}` : ""}${oppRace ? ` [${oppRace.charAt(0).toUpperCase()}]` : ""}`;

        const extractOppBuild = () => {
          setExtracting(true);
          setExtractError(null);
          fetch(`${API}/games/${encodeURIComponent(gameId)}/opp-build-order`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({}),
          })
            .then((r) =>
              r.ok ? r.json() : r.json().then((j) => Promise.reject(j)),
            )
            .then((j) => {
              // Merge the freshly-extracted events into local state so the
              // timeline rerenders without a full refetch.
              setData((d) =>
                Object.assign({}, d, {
                  opp_events: j.opp_events || [],
                  opp_early_events: j.opp_early_events || [],
                  opp_build_available: (j.opp_events || []).length > 0,
                  opp_race: j.opp_race || (d && d.opp_race),
                }),
              );
              setExtracting(false);
              setPerspective("opponent");
            })
            .catch((e) => {
              setExtractError(e.error || String(e));
              setExtracting(false);
            });
        };

        // Stage 7.5: open the build editor with a server-derived
        // draft. Probes /api/profile/exists first so the editor knows
        // whether to disable the Save button (profile.json is required
        // for community attribution). Errors are surfaced inline rather
        // than thrown so the timeline stays responsive.
        const openBuildEditor = () => {
          setEditorLoading(true);
          setEditorError(null);
          const sourceEvents = wantOpp ? oppAllEvents : myAllEvents;
          const draftBody = {
            // Pass events directly so the backend skips a meta DB
            // lookup. Each event maps {time,name,...} -> {t,what} on
            // the server side via parseLogLine.
            events: (sourceEvents || []).map((e) => ({
              t: Number(e && e.time) || 0,
              what: (window.BuildEditorHelpers ? window.BuildEditorHelpers.spaEventToWhat(e) : null) || (e && e.name) || "",
            })).filter((ev) => ev.what && /^[A-Za-z][A-Za-z0-9]*$/.test(ev.what)),
            name: window.BuildEditorHelpers ? window.BuildEditorHelpers.deriveDefaultName(data) : "Custom build",
            race: wantOpp ? (data && data.opp_race) || "Protoss" : (data && data.my_race) || "Protoss",
            vs_race: wantOpp ? (data && data.my_race) || "Random" : (data && data.opp_race) || "Random",
            source_replay_id: gameId,
            game_id: gameId,
          };
          const probeProfile = fetch("/api/profile/exists")
            .then((r) => (r.ok ? r.json() : { exists: false }))
            .then((j) => setEditorProfileReady(!!(j && (j.exists || j.profile_exists))))
            .catch(() => setEditorProfileReady(false));
          const fromGame = fetch("/api/custom-builds/from-game", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(draftBody),
          })
            .then((r) => (r.ok ? r.json() : r.json().then((j) => Promise.reject(j))))
            .then((j) => {
              setEditorDraft(j.draft || null);
              setEditorOpen(true);
            })
            .catch((e) => {
              setEditorError((e && e.error) || "Could not derive a draft from this game.");
            });
          Promise.all([probeProfile, fromGame]).finally(() => setEditorLoading(false));
        };

        // Empty-state branches.
        if (wantOpp && !oppAvailable) {
          return (
            <div className="bg-base-900 ring-soft rounded-lg p-3 my-2 border border-base-700">
              <div className="flex items-center gap-2 mb-2 flex-wrap">
                <span className="text-[11px] uppercase tracking-wider text-neutral-500">
                  {oppName || "Opponent"}'s Build
                  {oppRace ? ` (${oppRace})` : ""}
                </span>
                <div className="ml-auto flex items-center gap-1 text-xs">
                  <button
                    className="px-2 py-0.5 rounded bg-base-700 text-neutral-300"
                    onClick={() => setPerspective("me")}
                  >
                    Show your build
                  </button>
                </div>
              </div>
              <div className="text-xs text-neutral-400 px-1 py-2">
                {extracting
                  ? "Re-parsing the replay file to pull the opponent’s build order…"
                  : "Opponent’s build order is not stored for this game yet."}
              </div>
              {extractError && (
                <div className="text-xs text-loss-500 px-1 pb-2">
                  Extract failed: {extractError}
                </div>
              )}
              <div className="flex items-center gap-2">
                <button
                  onClick={extractOppBuild}
                  disabled={extracting}
                  className="px-2.5 py-1 text-xs rounded bg-accent-500 text-white hover:opacity-90 disabled:opacity-50"
                  title="Re-parse the replay file to extract the opponent's build order."
                >
                  {extracting ? "Extracting…" : "Extract opponent build"}
                </button>
                <span className="text-[10px] text-neutral-500">
                  Requires the original .SC2Replay file to still be on disk (
                  {data.game_id ? `id ${data.game_id}` : "this game"}).
                </span>
              </div>
            </div>
          );
        }

        if (allEvents.length === 0) {
          return (
            <div className="text-xs text-neutral-500 px-3 py-2">
              No build_log on this game.
            </div>
          );
        }

        return (
          <div className="bg-base-900 ring-soft rounded-lg p-3 my-2 border border-base-700">
            <div className="flex items-center gap-2 mb-2 flex-wrap">
              <span className="text-[11px] uppercase tracking-wider text-neutral-500">
                {headerLabel}
              </span>
              <span className="text-xs text-neutral-400">
                {showAll
                  ? `full · ${allEvents.length} events`
                  : `first 5 min · ${earlyEvents.length} events`}
              </span>
              {/* Perspective toggle -- shown whenever we have at least one
              of the two timelines. "Opponent" is highlighted by default
              when this drawer is opened from the opponent profile. */}
              <div className="flex items-center gap-1 text-xs">
                <button
