            return;
          }
          setProfile(p.body); setPendingProfile(p.body);
          setConfig(c.body); setPendingConfig(c.body);
          setLoading(false);
        };
        useEffect(() => { loadAll(); }, []);
        return { profile, config, pendingProfile, pendingConfig,
                 loading, loadError, loadAll,
                 setPendingProfile, setPendingConfig };
      }

      function useSettingsBuildDefinitions() {
        const [definitions, setDefinitions] = useState([]);
        const [defLoading, setDefLoading] = useState(true);
        const [defError, setDefError] = useState(null);
        useEffect(() => {
          let cancelled = false;
          (async () => {
            setDefLoading(true); setDefError(null);
            const r = await settingsFetchJson("/api/analyzer/definitions");
            if (cancelled) return;
            setDefLoading(false);
            if (!r.ok) {
              setDefError((r.body && r.body.error) || "load failed");
              return;
            }
            setDefinitions(Array.isArray(r.body.items) ? r.body.items : []);
          })();
          return () => { cancelled = true; };
        }, []);
        return { definitions, defLoading, defError };
      }

      function settingsBuildSaveTasks(dirtyProfile, dirtyConfig,
                                      pendingProfile, pendingConfig) {
        const tasks = [];
        if (dirtyProfile.length) {
          tasks.push(settingsFetchJson("/api/profile", {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(pendingProfile),
          }).then(r => ({ kind: "profile", r })));
        }
        if (dirtyConfig.length) {
          tasks.push(settingsFetchJson("/api/config", {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(pendingConfig),
          }).then(r => ({ kind: "config", r })));
        }
        return tasks;
      }

      function settingsExtractSaveErrors(results) {
        let pErrs = null, cErrs = null, anyFailed = false;
        results.forEach(({ kind, r }) => {
          if (r.ok) return;
          anyFailed = true;
          if (Array.isArray(r.body && r.body.errors)) {
            if (kind === "profile") pErrs = r.body.errors;
            else cErrs = r.body.errors;
          }
        });
        return { anyFailed, pErrs, cErrs };
      }


      // ============================================================
      // SETTINGS — IMPORT HISTORICAL REPLAYS (Stage 7-ish)
      //
      // Bulk-imports a folder of .SC2Replay files via the
      // /api/analyzer/import/* endpoints. Lets the user dial worker
      // count from 1 → cpu_count (default min(8, cpu_count)). Shows
      // live progress, supports cancel, and surfaces interrupted
      // jobs (server-killed mid-import) so the user can resume.
      //
      // Used in two places:
      //   - This Settings panel (any-time use)
      //   - The wizard (optional onboarding step) — same component
      // ============================================================
      const IMPORT_DATE_PRESETS = [
        { id: "30d",  label: "Last 30 days",   days: 30   },
        { id: "90d",  label: "Last 90 days",   days: 90   },
        { id: "1y",   label: "Last year",      days: 365  },
        { id: "all",  label: "All time",       days: null },
        { id: "custom", label: "Custom range", days: null },
      ];
      const IMPORT_DEFAULT_RECOMMENDED_CAP = 8;
      const IMPORT_PROGRESS_POLL_MS = 1000;

      function _importFmtDate(dt) {
        if (!dt) return "";
        const d = (dt instanceof Date) ? dt : new Date(dt);
        if (isNaN(d.getTime())) return "";
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const dd = String(d.getDate()).padStart(2, "0");
        return `${y}-${m}-${dd}`;
      }

      function _importComputeSinceIso(presetId, customSince) {
        if (presetId === "all") return "";
        if (presetId === "custom") return customSince || "";
        const preset = IMPORT_DATE_PRESETS.find(p => p.id === presetId);
        if (!preset || !preset.days) return "";
        const d = new Date();
        d.setDate(d.getDate() - preset.days);
        return _importFmtDate(d);
      }

      function _importComputeUntilIso(presetId, customUntil) {
        if (presetId === "custom") return customUntil || "";
        return "";
      }

      function _importEtaSec(completed, total, startedAt, workers) {
        if (!startedAt || completed <= 0 || total <= 0) return null;
        const elapsedMs = Date.now() - new Date(startedAt).getTime();
        if (elapsedMs <= 0) return null;
        const rate = completed / (elapsedMs / 1000);
        const remaining = total - completed;
        if (remaining <= 0 || rate <= 0) return 0;
        return Math.round(remaining / rate);
      }

      function _importFmtDuration(sec) {
        if (sec == null) return "—";
        if (sec < 60) return `${sec}s`;
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        if (m < 60) return `${m}m ${s}s`;
        const h = Math.floor(m / 60);
        return `${h}h ${m % 60}m`;
      }

      function ImportWorkerSlider({ value, cores, recommended, onChange,
                                    disabled }) {
        const overRecommended = value > recommended;
        return (
          <div className="space-y-1">
            <div className="flex items-center justify-between">
              <label htmlFor="import-workers"
                className="text-xs text-neutral-300">
                Worker count
              </label>
              <span className="text-xs tabular-nums text-neutral-200">
                {value} / {cores}
              </span>
            </div>
            <input id="import-workers" type="range"
              min={1} max={Math.max(1, cores)} step={1}
              value={value} disabled={disabled}
              onChange={(e) => onChange(parseInt(e.target.value, 10) || 1)}
              className="w-full accent-accent-500" />
            <div className="flex items-center justify-between text-[10px] text-neutral-500">
              <span>1</span>
              <span>Recommended: {recommended}</span>
              <span>{cores}</span>
            </div>
            {overRecommended && (
              <div className="text-[11px] text-gold-500" role="alert">
                ⚠ Using more than {recommended} cores can slow other apps
                and use significantly more RAM. Each worker holds ~250 MB
                while parsing.
              </div>
            )}
            <button type="button" onClick={() => onChange(cores)}
              disabled={disabled || value === cores}
              className="text-[11px] text-accent-500 hover:underline
                         disabled:opacity-50">
              Use all {cores} cores
            </button>
          </div>
        );
      }

      function ImportProgressBar({ completed, total }) {
        const pct = total > 0 ? Math.min(100, (100 * completed) / total) : 0;
        return (
          <div className="w-full bg-base-700 rounded h-2 overflow-hidden"
            role="progressbar"
            aria-valuenow={Math.round(pct)} aria-valuemin={0}
            aria-valuemax={100} aria-label="Import progress">
            <div className="h-full bg-accent-500 transition-all"
              style={{ width: `${pct}%` }} />
          </div>
        );
      }

      function _importDefaultFolder(pendingConfig) {
        const list = pendingConfig
          && pendingConfig.paths
          && pendingConfig.paths.replay_folders;
        return Array.isArray(list) && list.length > 0 ? list[0] : "";
      }

      function _useImportCores() {
        const [cores, setCores] = useState(1);
        const [recommended, setRecommended] = useState(1);
        useEffect(() => {
          let cancelled = false;
          fetch(`${API}/import/cores`)
            .then((r) => r.ok ? r.json() : Promise.reject())
            .then((j) => {
              if (cancelled) return;
              setCores(Number(j.cores) || 1);
              setRecommended(Number(j.recommended)
                || Math.min(IMPORT_DEFAULT_RECOMMENDED_CAP,
                            Number(j.cores) || 1));
            })
            .catch(() => { /* fall through with defaults */ });
          return () => { cancelled = true; };
        }, []);
        return { cores, recommended };
      }

      function _useImportStatus() {
        // Polls /import/status continuously while the panel is mounted.
        // The previous version stopped polling on phase=idle, which
        // meant a Start click after the panel had been open for a
        // while showed no progress until next mount. We always poll
        // now so transitions idle -> starting -> running -> complete
        // are picked up immediately.
        const [status, setStatus] = useState(null);
        useEffect(() => {
          let cancelled = false;
          let timer = null;
          const poll = () => {
            fetch(`${API}/import/status`)
              .then((r) => r.ok ? r.json() : Promise.reject())
              .then((j) => {
                if (cancelled) return;
                setStatus(j);
                timer = setTimeout(poll, IMPORT_PROGRESS_POLL_MS);
              })
              .catch(() => {
                if (!cancelled) timer = setTimeout(poll, 3000);
              });
          };
          poll();
          return () => {
            cancelled = true;
            if (timer) clearTimeout(timer);
          };
        }, []);
        return status;
      }

      const IMPORT_REASON_LABEL = {
        player_not_found:
          "Couldn't find your handle in the replay. The replay's player "
          + "name may have a clan tag or different display name.",
        no_opponent:
          "Solo or vs-AI replay (no human opponent in the lobby).",
        parse_failed:
          "Replay file is corrupt or unreadable by sc2reader.",
        worker_crash:
          "Worker process crashed while parsing this replay.",
        ambiguous_name:
          "Two or more players in the replay matched your name; "
          + "we couldn't tell which is you. Add your account ID "
          + "in Settings → Profile to disambiguate.",
        unknown:
          "Unspecified error. Check the sample message below.",
      };

      const REGION_LABEL = {
        us: "Americas (US)",
        eu: "Europe (EU)",
        kr: "Korea (KR)",
        cn: "China (CN)",
        sea: "South-East Asia",
      };

      function _identityKey(identity) {
        return (identity && identity.character_id)
          ? `cid:${identity.character_id}`
          : `name:${(identity && identity.name) || ""}`;
      }

      function _isAlreadyConfigured(discovered, configured) {
        if (!discovered || !discovered.character_id) return false;
        return (configured || []).some(
          (c) => c && c.character_id === discovered.character_id);
      }

      function ImportDiscoveredIdentitiesList({
        discovered, configured, picked, onTogglePick,
      }) {
        return (
          <ul className="space-y-1.5 max-h-64 overflow-y-auto">
            {discovered.map((row, i) => {
              const already = _isAlreadyConfigured(row, configured);
              const isPicked = picked.has(_identityKey(row));
              const cls = "flex items-center gap-2 p-2 rounded text-xs "
                + (already
                  ? "bg-base-900/40 opacity-60"
                  : isPicked
                    ? "bg-accent-500/20 border border-accent-500"
                    : "bg-base-800 hover:bg-base-700 cursor-pointer");
              return (
                <li key={i} className={cls}
                  onClick={() => !already && onTogglePick(row)}>
                  <input type="checkbox" disabled={already}
                    checked={already || isPicked}
                    onChange={() => !already && onTogglePick(row)}
                    className="accent-accent-500" />
                  <div className="flex-1 min-w-0">
                    <div className="text-neutral-100 font-medium truncate">
                      {row.name || "(no name)"}
                    </div>
                    <div className="text-[10px] text-neutral-500
                                    font-mono truncate">
                      {row.character_id || "(no character_id)"}
                      {row.region
                        ? " · " + (REGION_LABEL[row.region] || row.region)
                        : ""}
                      {" · seen in " + (row.count || 1) + " replay(s)"}
                    </div>
                  </div>
                  {already && (
                    <span className="text-[10px] text-neutral-500 ml-2">
                      already added
                    </span>
                  )}
                </li>
              );
            })}
          </ul>
        );
      }

      function ImportErrorBreakdown({ breakdown, samples }) {
        if (!breakdown || typeof breakdown !== "object") return null;
        const entries = Object.entries(breakdown)
          .filter(([, n]) => Number(n) > 0)
          .sort((a, b) => Number(b[1]) - Number(a[1]));
        if (entries.length === 0) return null;
        return (
          <div className="bg-base-800 rounded p-3 text-xs space-y-2">
            <div className="text-neutral-300 font-semibold">
              Why some replays were skipped
            </div>
            {entries.map(([reason, count]) => (
              <div key={reason} className="border-l-2 border-base-600 pl-2">
                <div className="text-neutral-200">
                  <span className="font-semibold tabular-nums">{count}</span>
                  {" "}
                  <span className="text-neutral-400">
                    {IMPORT_REASON_LABEL[reason]
                      || "Skipped (" + reason + ")."}
                  </span>
                </div>
                {samples && Array.isArray(samples[reason])
                  && samples[reason].length > 0 && (
                  <ul className="text-[10px] text-neutral-500 mt-1 space-y-0.5">
                    {samples[reason].slice(0, 2).map((s, i) => (
                      <li key={i} className="truncate">{s}</li>
                    ))}
                  </ul>
                )}
              </div>
            ))}
            <div className="text-[10px] text-neutral-500 pt-1">
              Tip: if many show "couldn't find your handle", set your
              in-replay name in Settings → Profile to match what your
              replays actually show (case-insensitive substring is fine).
            </div>
          </div>
        );
      }

      function SettingsImportPanel({ pendingConfig, onPatch }) {
        // Folder list comes straight from config (one or more entries).
        // We pick the first as the seed value but fall back gracefully if
        // the config arrives AFTER mount (useState only runs the
        // initializer once -- a useEffect resyncs when the list grows).
        const folderList = (pendingConfig
          && pendingConfig.paths
          && Array.isArray(pendingConfig.paths.replay_folders))
          ? pendingConfig.paths.replay_folders : [];
        // Names the wizard configured (Step 3 — Identity). Each entry
        // is { name, character_id, account_id, region }. We seed the
        // name picker with these but let the user check/uncheck and
        // add names manually for old display names / clan tags.
        const configuredIdentities = (pendingConfig
          && Array.isArray(pendingConfig.identities))
          ? pendingConfig.identities : [];
        const configuredNames = configuredIdentities.map((p) => p.name)
          .filter((n) => typeof n === "string" && n.trim().length > 0);
        const dedupedConfiguredNames = Array.from(new Set(configuredNames));
        const [folder, setFolder] = useState(folderList[0] || "");
        useEffect(() => {
          if (!folder && folderList.length > 0) setFolder(folderList[0]);
        }, [folderList.length]);
        const [selectedNames, setSelectedNames] = useState(
          dedupedConfiguredNames);
        useEffect(() => {
          // When the configured identity list grows (e.g., user
          // just ran Discover and added one), pre-check the new
          // names without dropping any user-driven selections.
          setSelectedNames((prev) => {
            const merged = new Set(prev);
            for (const n of dedupedConfiguredNames) merged.add(n);
            return Array.from(merged);
          });
        }, [dedupedConfiguredNames.length]);
        const allCandidateNames = dedupedConfiguredNames;
        // name -> [character_id, ...] (one identity may have multiple
        // accounts on different servers; each gets its own pair).
        const _nameToCharIds = configuredIdentities.reduce((acc, ident) => {
          const nm = ident && ident.name;
          const cid = ident && ident.character_id;
          if (!nm || !cid) return acc;
          if (!acc[nm]) acc[nm] = [];
          if (!acc[nm].includes(cid)) acc[nm].push(cid);
          return acc;
        }, {});
        // Build parallel arrays (players[], character_ids[]) for the
        // import endpoint. A name with two character_ids becomes two
        // entries (same name, different cid) so character_id match
        // works on either server. Custom-added names emit one entry
        // with cid="" (name-only match).
        const buildIdentityArrays = () => {
          const players = [];
          const cids = [];
          for (const nm of selectedNames) {
            const idsForName = _nameToCharIds[nm] || [""];
            for (const cid of idsForName) {
              players.push(nm);
              cids.push(cid || "");
            }
          }
          return { players, cids };
        };
        const toggleName = (name) => {
          setSelectedNames((prev) => prev.includes(name)
            ? prev.filter((n) => n !== name)
            : [...prev, name]);
        };
        // Identity discovery — scans the chosen folder and surfaces
        // every (name, character_id) tuple seen, so the user can
        // pick which are theirs without bouncing back to the wizard.
        const [discovering, setDiscovering] = useState(false);
        const [discoverError, setDiscoverError] = useState(null);
        const [discovered, setDiscovered] = useState(null);
        const [picked, setPicked] = useState(new Set());
        const [savingIdentities, setSavingIdentities] = useState(false);
        const togglePick = (row) => {
          const key = _identityKey(row);
          setPicked((prev) => {
            const next = new Set(prev);
            if (next.has(key)) next.delete(key);
            else next.add(key);
            return next;
          });
        };
        const onDiscover = () => {
          setDiscovering(true); setDiscoverError(null); setDiscovered(null);
          setPicked(new Set());
          fetch(`${API}/import/extract-identities`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              folder, since_iso: sinceIso || undefined,
              until_iso: untilIso || undefined,
              limit: 500,
            }),
          })
            .then((r) => r.ok ? r.json()
              : r.json().then(j => Promise.reject(j)))
            .then((j) => {
              setDiscovered(Array.isArray(j.identities) ? j.identities : []);
              setDiscovering(false);
            })
            .catch((e) => {
              setDiscoverError((e && e.error)
                || "couldn't scan folder for identities");
              setDiscovering(false);
            });
        };
        const onAddPicked = () => {
          if (!discovered || picked.size === 0 || !onPatch) return;
          const toAdd = discovered.filter(
            (row) => picked.has(_identityKey(row))
                     && !_isAlreadyConfigured(row, configuredIdentities));
          if (toAdd.length === 0) return;
          setSavingIdentities(true);
          const next = [...configuredIdentities, ...toAdd.map((row) => ({
            name: row.name,
            character_id: row.character_id,
            account_id: row.character_id
              ? (row.character_id.split("-")[2] || "") : "",
            region: row.region || "",
          }))];
          // Patch immediately into the dirty pendingConfig so the
          // chip list refreshes; user still has to click Save in
          // the Settings save bar to commit. Selected names list
          // is also extended so the import will use the new ones.
          onPatch(["identities"], next);
          const newSelected = Array.from(new Set([
            ...selectedNames,
            ...toAdd.map((row) => row.name).filter(Boolean),
          ]));
          setSelectedNames(newSelected);
          setPicked(new Set());
          setSavingIdentities(false);
        };
        const [presetId, setPresetId] = useState("90d");
        const [customSince, setCustomSince] = useState("");
        const [customUntil, setCustomUntil] = useState("");
        const [scanning, setScanning] = useState(false);
        const [scanResult, setScanResult] = useState(null);
        const [scanError, setScanError] = useState(null);
        const [starting, setStarting] = useState(false);
        const [startError, setStartError] = useState(null);
        const [browsing, setBrowsing] = useState(false);
        const [browseError, setBrowseError] = useState(null);
        const { cores, recommended } = _useImportCores();
        const [workers, setWorkers] = useState(0);
        useEffect(() => {
          if (workers === 0 && recommended > 0) setWorkers(recommended);
        }, [recommended]);
        const status = _useImportStatus();
        const running = !!(status && status.running);
        const interrupted = !running && status && status.persisted
          && status.persisted.running === true;

        const sinceIso = _importComputeSinceIso(presetId, customSince);
        const untilIso = _importComputeUntilIso(presetId, customUntil);

        const onBrowse = () => {
          setBrowsing(true); setBrowseError(null);
          fetch(`${API}/import/pick-folder`, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ initial_dir: folder || "" }),
          })
            .then((r) => r.ok ? r.json() : r.json().then(j => Promise.reject(j)))
            .then((j) => {
              setBrowsing(false);
              if (j && j.path) setFolder(j.path);
            })
            .catch((e) => {
              setBrowseError((e && e.error) || "couldn't open folder picker");
              setBrowsing(false);
            });
        };

        const onScan = () => {
          setScanning(true); setScanError(null); setScanResult(null);
          fetch(`${API}/import/scan`, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              folder, since_iso: sinceIso || undefined,
              until_iso: untilIso || undefined,
              ...buildIdentityArrays(),
            }),
          })
            .then((r) => r.ok ? r.json() : r.json().then(j => Promise.reject(j)))
            .then((j) => { setScanResult(j); setScanning(false); })
            .catch((e) => {
              setScanError((e && e.error) || "scan failed");
              setScanning(false);
            });
        };

        const onStart = (resume) => {
          setStarting(true); setStartError(null);
          fetch(`${API}/import/start`, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              folder, since_iso: sinceIso || undefined,
              until_iso: untilIso || undefined,
              workers, resume: !!resume,
              ...buildIdentityArrays(),
            }),
          })
            .then((r) => r.ok ? r.json() : r.json().then(j => Promise.reject(j)))
            .then(() => { setStarting(false); })
            .catch((e) => {
              setStartError((e && e.error) || "start failed");
              setStarting(false);
            });
        };

        const onCancel = () => {
          fetch(`${API}/import/cancel`, { method: "POST" })
            .then(() => { /* status poll picks up the change */ })
            .catch(() => { /* best-effort */ });
        };

        return (
          <div className="space-y-5 max-w-3xl">
            <div>
              <h3 className="text-base text-neutral-100">
                Import past replays
              </h3>
              <p className="text-sm text-neutral-400 mt-1">
                Bring your old StarCraft games into the dashboard so they
                show up in your stats. We'll scan a folder of replays and
                add anything we don't already have. Games you've imported
                before are skipped automatically.
              </p>
              <p className="text-xs text-neutral-500 mt-1">
                You can keep playing — the live game tracker keeps working
                while this runs.
              </p>
            </div>
            {interrupted && (
              <div className="bg-gold-900/40 border border-gold-700 rounded p-3 text-xs">
                <div className="text-gold-300 font-semibold">
                  An earlier import was stopped before it finished.
                </div>
                <div className="text-neutral-300 mt-1">
                  {status.persisted.completed || 0} of{" "}
                  {status.persisted.total || 0} replays were already imported.
                </div>
                <button onClick={() => onStart(true)} disabled={starting}
                  className="mt-2 px-3 py-1 text-xs rounded
                             bg-accent-500 text-base-900 hover:opacity-90">
                  Pick up where it stopped
                </button>
              </div>
            )}
            <div className="space-y-2">
              <SettingsLabel htmlFor="import-folder">
                Where are your replays?
              </SettingsLabel>
              <div className="flex gap-2">
                <SettingsInput id="import-folder" type="text"
                  value={folder}
                  onChange={(e) => setFolder(e.target.value)}
                  disabled={running}
                  placeholder="Click Browse... or paste a folder path" />
                <button type="button" onClick={onBrowse}
                  disabled={running || browsing}
                  className="px-3 py-1.5 text-xs rounded
                             bg-base-700 hover:bg-base-600 text-neutral-100
                             disabled:opacity-50 whitespace-nowrap">
                  {browsing ? "Opening…" : "Browse…"}
                </button>
              </div>
              {browseError && (
                <div className="text-[11px] text-loss-500">{browseError}</div>
              )}
              {folderList.length > 1 ? (
                <div className="flex flex-wrap items-center gap-2 pt-1">
                  <span className="text-[11px] text-neutral-500">
                    Or pick a folder you've already configured:
                  </span>
                  {folderList.map((f, i) => (
                    <button key={f} type="button"
                      onClick={() => setFolder(f)}
                      disabled={running || folder === f}
                      title={f}
                      className={"px-2 py-1 text-[11px] rounded "
                        + (folder === f
                          ? "bg-accent-500 text-base-900"
                          : "bg-base-700 text-neutral-300 hover:bg-base-600")
                        + " disabled:opacity-50"}>
                      Folder {i + 1} · {f.split(/[/\\]/).slice(-3, -1).join("/")

                    </button>

              ) : folderList.length === 1 ? (
                <button type="button"
                  onClick={() => setFolder(folderList[0])}

            <div className="space-y-2">
              <div className="text-xs text-neutral-300">
                How far back should we look?

              <div className="flex flex-wrap gap-1">
                {IMPORT_DATE_PRESETS.map(p => (

                    className={"px-2 py-1 text-xs rounded transition "

              {presetId === "custom" && (
                <div className="flex gap-3 pt-1">
                  <div className="flex-1">
                    <SettingsLabel htmlFor="import-since">From</SettingsLabel>
                    <SettingsInput id="import-since" type="date"
                      value={customSince} disabled={running}
                      onChange={(e) => setCustomSince(e.target.value)} />
                  </div>
                  <div className="flex-1">
                    <SettingsLabel htmlFor="import-until">To</SettingsLabel>
                    <SettingsInput id="import-until" type="date"
                      value={customUntil} disabled={running}
                      onChange={(e) => setCustomUntil(e.target.value)} />
                  </div>
                </div>

            </div>
            <div className="space-y-2">
              <div className="text-xs text-neutral-300">
                Which accounts are yours?
              </div>
              <p className="text-[11px] text-neutral-500">
                We import any replay where one of your account IDs
                shows up. Clan tags and minor name differences are
                handled automatically. To add a new account, click
                <span className="font-medium text-neutral-300">
                  {" "}Discover identities from this folder{" "}
                </span>
                below — it scans the chosen folder and lets you
                pick which detected players are you.
              </p>
              {allCandidateNames.length === 0 ? (
                <div className="bg-base-900/40 rounded p-3 text-xs
                                text-neutral-300">
                  No accounts configured yet. Pick a replay folder
                  above, then click&nbsp;<span className="font-medium">
                  Discover identities from this folder</span> to add
                  yours.
                </div>
              ) : (
                <div className="flex flex-wrap gap-1.5">
                  {allCandidateNames.map((name) => {
                    const checked = selectedNames.includes(name);
                    return (
                      <label key={name}
                        className={"px-2 py-1 text-xs rounded cursor-pointer "
                          + (checked
                            ? "bg-accent-500 text-base-900"
                            : "bg-base-700 text-neutral-300 hover:bg-base-600")
                          + (running ? " opacity-50 cursor-not-allowed" : "")}>
                        <input type="checkbox"
                          className="sr-only"
                          checked={checked} disabled={running}
                          onChange={() => toggleName(name)} />
                        {checked ? "✓ " : ""}{name}
                      </label>
                    );
                  })}
                </div>
              )}
              {allCandidateNames.length > 0 && selectedNames.length === 0 && (
                <div className="text-[11px] text-loss-500">
                  Check at least one account before starting.
                </div>
              )}
              <div className="pt-2">
                <button type="button" onClick={onDiscover}
                  disabled={running || discovering || !folder}
                  className="px-3 py-1.5 text-xs rounded
                             bg-base-700 hover:bg-base-600
                             text-neutral-100 disabled:opacity-50">
                  {discovering ? "Scanning folder…"
                    : "Discover identities from this folder"}
                </button>
                <p className="text-[10px] text-neutral-500 mt-1">
                  Walks the chosen folder and lists every account ID
                  found. Pick the ones that are you — they&apos;ll
                  be saved to your profile so future imports just work.
                </p>
              </div>
              {discoverError && (
                <div className="text-xs text-loss-500">
                  {discoverError}
                </div>
              )}
              {discovered && discovered.length === 0 && (
                <div className="text-xs text-neutral-500">
                  No identities found in that folder.
                </div>
              )}
              {discovered && discovered.length > 0 && (
                <div className="bg-base-900/40 rounded p-2 space-y-2">
                  <div className="text-[11px] text-neutral-400">
                    Found {discovered.length} unique player
                    identity(ies). Pick the ones that are you:
                  </div>
                  <ImportDiscoveredIdentitiesList
                    discovered={discovered}
                    configured={configuredIdentities}
                    picked={picked} onTogglePick={togglePick} />
                  <div className="flex gap-2 pt-1">
                    <button type="button" onClick={onAddPicked}
                      disabled={picked.size === 0 || !onPatch
                                || savingIdentities}
                      className="px-3 py-1.5 text-xs rounded
                                 bg-accent-500 text-base-900
                                 hover:opacity-90 disabled:opacity-50">
                      {savingIdentities ? "Adding…"
                        : "Add " + picked.size + " to my profile"}
                    </button>
                    <span className="text-[10px] text-neutral-500
                                      self-center">
                      Don&apos;t forget to click Save in the bar at
                      the top to commit the change.
                    </span>
                  </div>
                </div>
              )}
            </div>
            <div className="space-y-1">
              <div className="text-xs text-neutral-300">
                How fast should we go?
              </div>
              <p className="text-[11px] text-neutral-500">
                More CPU cores means faster import, but uses more RAM and
                can slow other apps. The recommended setting is safe for
                everyday use.
              </p>
              <ImportWorkerSlider value={workers} cores={cores}
                recommended={recommended} onChange={setWorkers}
                disabled={running} />
            </div>
            <div className="flex flex-wrap gap-2">
              <button type="button" onClick={onScan}
                disabled={running || scanning || !folder
                          || selectedNames.length === 0}
                className="px-3 py-1.5 text-xs rounded bg-base-700
                           hover:bg-base-600 text-neutral-200
                           disabled:opacity-50">
                {scanning ? "Counting…" : "How many will we import?"}
              </button>
              <button type="button" onClick={() => onStart(false)}
                disabled={running || starting || !folder
                          || selectedNames.length === 0}
                className="px-3 py-1.5 text-xs rounded bg-accent-500
                           text-base-900 hover:opacity-90
                           disabled:opacity-50">
                {starting ? "Starting…" : "Start import"}
              </button>
              {running && (
                <button type="button" onClick={onCancel}
                  className="px-3 py-1.5 text-xs rounded bg-loss-700
                             hover:bg-loss-600 text-neutral-100">
                  Stop
                </button>
              )}
            </div>
            {scanError && (
              <div className="text-xs text-loss-500">{scanError}</div>
            )}
            {scanResult && scanResult.ok && (
              <div className="bg-base-800 rounded p-3 text-xs space-y-1">
                <div className="text-neutral-200">
                  Found{" "}
                  <span className="font-semibold tabular-nums">
                    {scanResult.candidate_count}
                  </span>{" "}
                  replay file(s) in the chosen scope.
                </div>
                {scanResult.new_count != null && (
                  <div className="text-neutral-300">
                    {scanResult.new_count > 0 ? (
                      <>
                        <span className="font-semibold text-win-500 tabular-nums">
                          {scanResult.new_count}
                        </span>
                        {" new, "}
                        <span className="text-neutral-500 tabular-nums">
                          {scanResult.already_imported_count || 0}
                        </span>
                        {" already in your database."}
                      </>
                    ) : (
                      <span className="text-neutral-400">
                        All {scanResult.already_imported_count || 0} are
                        already in your database — nothing new to import
                        from this folder.
                      </span>
                    )}
                  </div>
                )}
                {scanResult.new_count > 0 && (
                  <div className="text-neutral-500">
                    Estimated time at {workers} cores:{" "}
                    ~{_importFmtDuration(
                        Math.ceil((scanResult.new_count * 3) /
                                  Math.max(1, workers)))}.
                  </div>
                )}
              </div>
            )}
            {startError && (
              <div className="text-xs text-loss-500">{startError}</div>
            )}
            {status && (running || status.phase === "complete"
                        || status.phase === "cancelled") && (
              <div aria-live="polite" className="space-y-2">
                {running && status.total === 0 ? (
                  <div className="flex items-center gap-2 text-xs text-neutral-300">
                    <span className="inline-block w-2 h-2 rounded-full
                                       bg-accent-500 animate-pulse" />
                    Scanning your folder for replays… (this can take
                    a few seconds for large folders)
                  </div>
                ) : (!running && status.phase === "complete"
                     && status.total === 0) ? (
                  <div className="text-xs text-neutral-300
                                  bg-base-800 rounded p-3">
                    Nothing new to import — every replay in that folder
                    is already in your database.
                  </div>
                ) : (
                  <>
                    <div className="flex items-center justify-between text-xs">
                      <span className="text-neutral-300">
                        {status.phase === "running" ? "Importing"
                          : status.phase === "complete" ? "Done"
                          : status.phase === "cancelled" ? "Stopped"
                          : status.phase === "starting" ? "Starting up"
                          : status.phase}
                        : {status.completed} / {status.total}
                        {status.errors > 0 && ` (${status.errors} couldn't be parsed)`}
                      </span>
                      <span className="text-neutral-500 tabular-nums">
                        Time left: {_importFmtDuration(
                          _importEtaSec(status.completed, status.total,
                                        status.startedAt, status.workers))}
                      </span>
                    </div>
                    <ImportProgressBar completed={status.completed}
                      total={status.total} />
                    {status.lastMessage && (
                      <div className="text-[10px] text-neutral-500 truncate">
                        {status.lastMessage}
                      </div>
                    )}
                    {!running && status.errors > 0 && (
                      <ImportErrorBreakdown
                        breakdown={status.error_breakdown}
                        samples={status.error_samples} />
                    )}
                  </>
                )}
              </div>
            )}
          </div>
        );
      }

      function SettingsActivePanel({ tab, pendingProfile, pendingConfig,
                                     errors, patchProfile, patchConfig,
                                     defs }) {
        if (!pendingProfile || !pendingConfig) return null;
        switch (tab) {
          case "profile":
            return <SettingsProfilePanel profile={pendingProfile}
              errors={errors} onPatch={patchProfile} />;
          case "folders":
            return <SettingsFoldersPanel paths={pendingConfig.paths}
              errors={errors} onPatch={patchConfig} />;
          case "import":
            return <SettingsImportPanel
              pendingConfig={pendingConfig} onPatch={patchConfig} />;
          case "macro":
            return <SettingsMacroPanel
              macroEngine={pendingConfig.macro_engine}
              errors={errors} onPatch={patchConfig} />;
          case "builds":
            return <SettingsBuildsPanel
              classifier={pendingConfig.build_classifier}
              errors={errors} onPatch={patchConfig}
              definitions={defs.definitions} defLoading={defs.defLoading}
              defError={defs.defError} />;
          case "overlay":
            return <SettingsOverlayPanel
              overlay={pendingConfig.stream_overlay}
              errors={errors} onPatch={patchConfig} />;
          case "backups": return <SettingsBackupsPanel />;
          case "diagnostics": return <SettingsDiagnosticsPanel />;
          case "privacy":
            return <SettingsPrivacyPanel
              telemetry={pendingConfig.telemetry}
              errors={errors} onPatch={patchConfig} />;
          case "about":
            return <SettingsAboutPanel ui={pendingConfig.ui}
              errors={errors} onPatch={patchConfig} />;
          default: return null;
        }
      }

      function SettingsLoadFailure({ message, onRetry }) {
        return (
          <div className="space-y-2">
            <p className="text-sm text-loss-500">{message}</p>
            <SettingsButton kind="secondary" onClick={onRetry}>
              Retry
            </SettingsButton>
          </div>
        );
      }

      function settingsComputeDirty(docs) {
        const dirtyProfile = (docs.profile && docs.pendingProfile)
          ? settingsDiffPaths(docs.profile, docs.pendingProfile, []) : [];
        const dirtyConfig = (docs.config && docs.pendingConfig)
          ? settingsDiffPaths(docs.config, docs.pendingConfig, []) : [];
        return { dirtyProfile, dirtyConfig,
                 dirtyCount: dirtyProfile.length + dirtyConfig.length };
      }

      function settingsMakePatchers(docs) {
        return {
          patchProfile: (segs, value) => docs.setPendingProfile(
            prev => settingsSetByPath(prev || {}, segs, value)),
          patchConfig: (segs, value) => docs.setPendingConfig(
            prev => settingsSetByPath(prev || {}, segs, value)),
        };
      }

      // ============================================================
      // DIAGNOSTICS VIEW (Stage 4)
      //
      // Fetches /api/diagnostics, renders a grid of status cards (one
      // per check) and offers two actions: "Re-run all checks" (forces
      // ?refresh=1) and "Copy diagnostic bundle" (downloads a redacted
      // .zip from /api/diagnostics/bundle).
      //
      // Color tokens come from the Tailwind extend block at the top of
      // this page (win-500 / loss-500 / amber-300 / neutral-500); no
      // hard-coded hex values. Every interactive element gets a
      // focus-visible ring; status dots get aria-labels; the live-region
      // <div aria-live="polite"> announces refresh completion.
      // ============================================================

      const DIAG_STATUS_TOKENS = {
        ok:      { dot: "bg-win-500",    text: "text-win-500",
                   ring: "ring-win-500/40",    label: "OK" },
        warn:    { dot: "bg-amber-400",  text: "text-amber-300",
                   ring: "ring-amber-400/40",  label: "Warning" },
        err:     { dot: "bg-loss-500",   text: "text-loss-500",
                   ring: "ring-loss-500/40",   label: "Error" },
        pending: { dot: "bg-neutral-500/60", text: "text-neutral-500",
                   ring: "ring-neutral-500/40", label: "Pending" },
      };

      function diagStatusTokens(status) {
        return DIAG_STATUS_TOKENS[status] || DIAG_STATUS_TOKENS.pending;
      }

      function DiagnosticsStatusDot({ status }) {
        const t = diagStatusTokens(status);
        return (
          <span aria-label={t.label} role="img"
                className={"inline-block w-2.5 h-2.5 rounded-full " + t.dot} />
        );
      }

      function DiagnosticsFixButton({ fix }) {
        if (!fix) return null;
        if (fix.kind === "link") {
          return (
            <a href={fix.target} target="_blank" rel="noopener noreferrer"
               className="text-xs px-2 py-1 rounded bg-base-700
                          hover:bg-base-600 text-accent-400 underline-offset-2
                          hover:underline focus:outline-none
                          focus-visible:ring-2 focus-visible:ring-accent-500">
              {fix.label}
            </a>
          );
        }
        if (fix.kind === "cmd") {
          const onCopy = async () => {
            try { await navigator.clipboard.writeText(fix.target); }
            catch (_e) { /* clipboard not granted -- silent fallback */ }
          };
          return (
            <button onClick={onCopy} type="button"
                    title={"Copy command: " + fix.target}
                    className="text-xs px-2 py-1 rounded bg-base-700
                               hover:bg-base-600 text-accent-400
                               focus:outline-none focus-visible:ring-2
                               focus-visible:ring-accent-500">
              {fix.label}
            </button>
          );
        }
        return (
          <button type="button"
                  className="text-xs px-2 py-1 rounded bg-base-700 text-neutral-400
                             cursor-not-allowed opacity-70" disabled>
            {fix.label}
          </button>
        );
      }

      function DiagnosticsCardDetail({ detail }) {
        if (!detail) return null;
        return (
          <details className="mt-2">
            <summary className="text-[11px] uppercase tracking-wider
                                text-neutral-500 cursor-pointer
                                focus:outline-none focus-visible:ring-2
                                focus-visible:ring-accent-500 rounded px-1">
              Details
            </summary>
            <pre className="mt-1 text-[11px] text-neutral-400
                            bg-base-900/60 border border-base-700 rounded
                            p-2 overflow-auto max-h-56 whitespace-pre-wrap
                            break-all">
              {JSON.stringify(detail, null, 2)}
            </pre>
          </details>
        );
      }

      function DiagnosticsCard({ check }) {
        const t = diagStatusTokens(check.status);
        return (
          <article role="status"
                   className={"bg-base-800 border border-base-700 rounded-lg "
                              + "p-3 ring-1 " + t.ring}>
            <header className="flex items-center gap-2">
              <DiagnosticsStatusDot status={check.status} />
              <h3 className="text-sm font-medium text-neutral-100 truncate"
                  title={check.title}>{check.title}</h3>
              <span className={"ml-auto text-[10px] uppercase tracking-wider "
                               + t.text}>{check.status}</span>
            </header>
            <p className="mt-1 text-xs text-neutral-300">{check.summary}</p>
            {check.fix_action && (
              <div className="mt-2">
                <DiagnosticsFixButton fix={check.fix_action} />
              </div>
            )}
            <DiagnosticsCardDetail detail={check.detail} />
          </article>
        );
      }

      function diagSummaryCounts(checks) {
        const counts = { ok: 0, warn: 0, err: 0, pending: 0 };
        for (const c of (checks || [])) {
          if (counts[c.status] === undefined) counts[c.status] = 0;
          counts[c.status] += 1;
        }
        return counts;
      }

      function DiagnosticsToolbar({ counts, busy, onRefresh, onBundle,
                                    generatedAt, error }) {
        return (
          <div className="flex flex-wrap items-center gap-2 mb-3">
            <h2 className="text-base font-semibold text-neutral-100">
              Diagnostics
            </h2>
            <span className="text-xs text-neutral-500"
                  title="Updated when you press Re-run all checks">
              {generatedAt
                ? "Generated " + new Date(generatedAt).toLocaleTimeString()
                : "Loading…"}
            </span>
            <DiagnosticsCountChip status="ok"      n={counts.ok} />
            <DiagnosticsCountChip status="warn"    n={counts.warn} />
            <DiagnosticsCountChip status="err"     n={counts.err} />
            <DiagnosticsCountChip status="pending" n={counts.pending} />
            <div className="ml-auto flex gap-2">
              <button type="button" onClick={onRefresh} disabled={busy}
                      className="text-xs px-2.5 py-1.5 rounded bg-accent-500
                                 hover:bg-accent-600 disabled:opacity-50
                                 disabled:cursor-not-allowed text-white
                                 focus:outline-none focus-visible:ring-2
                                 focus-visible:ring-accent-400">
                {busy ? "Running…" : "Re-run all checks"}
              </button>
              <button type="button" onClick={onBundle} disabled={busy}
                      title="Downloads a redacted .zip for support tickets"
                      className="text-xs px-2.5 py-1.5 rounded bg-base-700
                                 hover:bg-base-600 disabled:opacity-50
                                 disabled:cursor-not-allowed text-neutral-200
                                 focus:outline-none focus-visible:ring-2
                                 focus-visible:ring-accent-400">
                Copy diagnostic bundle
              </button>
            </div>
            {error && (
              <span role="alert" className="basis-full text-xs text-loss-500">
                {error}
              </span>
            )}
          </div>
        );
      }

      function DiagnosticsCountChip({ status, n }) {
        const t = diagStatusTokens(status);
        return (
          <span title={t.label + ": " + n}
                className={"text-[10px] uppercase tracking-wider px-2 py-0.5 "
                           + "rounded bg-base-700 " + t.text}>
            {status}: {n}
          </span>
        );
      }

      async function diagFetchChecks(refresh) {
        const url = "/api/diagnostics" + (refresh ? "?refresh=1" : "");
        const r = await fetch(url, { credentials: "same-origin" });
        if (!r.ok) {
          throw new Error("HTTP " + r.status + " from /api/diagnostics");
        }
        return r.json();
      }

      function diagDownloadBundle() {
        // Trigger the browser's native download via a hidden anchor.
        // The endpoint sets Content-Disposition; the browser saves the
        // file and pops it open in the OS shell.
        const a = document.createElement("a");
        a.href = "/api/diagnostics/bundle";
        a.download = "sc2tools-diagnostics.zip";
        a.rel = "noopener";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }

      function DiagnosticsView() {
        const [data, setData] = useState(null);
        const [busy, setBusy] = useState(false);
        const [error, setError] = useState(null);

        const refresh = async (force) => {
          setBusy(true); setError(null);
          try {
            const body = await diagFetchChecks(!!force);
            setData(body);
          } catch (err) {
            setError(String((err && err.message) || err));
          } finally {
            setBusy(false);
          }
        };

        useEffect(() => { refresh(false); }, []);

        const counts = diagSummaryCounts(data && data.checks);
        return (
          <section aria-label="Diagnostics" className="space-y-3">
            <DiagnosticsToolbar counts={counts} busy={busy}
              onRefresh={() => refresh(true)} onBundle={diagDownloadBundle}
              generatedAt={data && data.generated_at} error={error} />
            <div aria-live="polite" className="sr-only">
              {busy ? "Running diagnostics" : data
                ? "Diagnostics complete: " + counts.ok + " ok, "
                  + counts.warn + " warnings, " + counts.err + " errors"
                : ""}
            </div>
            {!data && !error && (
              <div className="text-sm text-neutral-500">Loading…</div>
            )}
            {data && (
              <div className="grid grid-cols-1 md:grid-cols-2
                              lg:grid-cols-3 gap-3">
                {data.checks.map((c) => (
                  <DiagnosticsCard key={c.id} check={c} />
                ))}
              </div>
            )}
          </section>
        );
      }

      function SettingsView({ dbRev: _dbRev }) {
        const [tab, setTab] = useState("profile");
        const docs = useSettingsDocuments();
        const defs = useSettingsBuildDefinitions();
        const [errors, setErrors] = useState({});
        const [saving, setSaving] = useState(false);
        const [saveError, setSaveError] = useState(null);
        const dirty = settingsComputeDirty(docs);
        const patchers = settingsMakePatchers(docs);
        const onDiscard = () => {
          docs.setPendingProfile(docs.profile);
          docs.setPendingConfig(docs.config);
          setErrors({}); setSaveError(null);
        };
        const onSave = async () => {
          setSaving(true); setSaveError(null); setErrors({});
          const tasks = settingsBuildSaveTasks(
            dirty.dirtyProfile, dirty.dirtyConfig,
            docs.pendingProfile, docs.pendingConfig);
          const verdict = settingsExtractSaveErrors(
            await Promise.all(tasks));
          if (verdict.anyFailed) {
            setSaving(false);
            setErrors(settingsCollectErrors(verdict.pErrs, verdict.cErrs));
            setSaveError("Some changes were rejected. See inline errors.");
            return;
          }
          await docs.loadAll(); setSaving(false);
        };
        if (docs.loading) {
          return <p className="text-sm text-neutral-500">Loading settings…</p>;
        }
        if (docs.loadError) {
          return <SettingsLoadFailure message={docs.loadError}
            onRetry={docs.loadAll} />;
        }
        return (
          <div className="space-y-4">
            <SettingsSaveBar dirtyCount={dirty.dirtyCount} saving={saving}
              error={saveError} onSave={onSave} onDiscard={onDiscard} />
            <div className="flex flex-col md:flex-row gap-6">
              <SettingsTabRail tab={tab} onChange={setTab} />
              <section className="flex-1 min-w-0"
                       aria-label={tab + " settings"}>
                <SettingsActivePanel tab={tab}
                  pendingProfile={docs.pendingProfile}
                  pendingConfig={docs.pendingConfig}
                  errors={errors}
                  patchProfile={patchers.patchProfile}
                  patchConfig={patchers.patchConfig}
                  defs={defs} />
              </section>
            </div>
          </div>
        );
      }


      function App() {
        const [tab, setTab] = useState("dashboard");
        const [filters, setFilters] = useState({});
        const [dbRev, setDbRev] = useState(0);
        const [openPulseId, setOpenPulseId] = useState(null);
        const [openBuildName, setOpenBuildName] = useState(null);
        const [openReplay, setOpenReplay] = useState(null);
        const [conn, setConn] = useState({ status: "connecting" });
        // Stage 2.2 first-run wizard. profileExists tri-state:
        // null = unknown, false = wizard needed, true = main app.
        const [profileExists, setProfileExists] = useState(null);
        const [showWizard, setShowWizard] = useState(false);
        // Stage 6.2: full profile body so we can read profile.races
        // and gate per-race rendering for Random users.
        const [profile, setProfile] = useState(null);

        useEffect(() => {
          try {
            const sock = io({ transports: ["websocket", "polling"] });
            sock.on("connect", () => setConn({ status: "live" }));
            sock.on("disconnect", () => setConn({ status: "offline" }));
            sock.on("analyzer_db_changed", (msg) => {
              setDbRev((r) => r + 1);
            });
            return () => sock.disconnect();
          } catch (err) {
            console.warn("socket.io unavailable:", err);
            setConn({ status: "offline" });
          }
        }, []);

        // Probe whether the user has run the wizard before. 200 -> exists,
        // 404/error -> show wizard. We default to "show" on net failure so
        // a non-running backend never silently traps the user in the SPA.
        useEffect(() => {
          let cancelled = false;
          (async () => {
            try {
              const res = await fetch("/api/profile/exists");
              if (cancelled) return;
              if (!res.ok) {
                setProfileExists(false); setShowWizard(true);
                return;
              }
              const j = await res.json();
              const exists = !!(j && j.exists);
              setProfileExists(exists);
              setShowWizard(!exists);
            } catch (_e) {
              if (!cancelled) {
                setProfileExists(false); setShowWizard(true);
              }
            }
          })();
          return () => { cancelled = true; };
        }, []);

        // Stage 6.2: once the wizard has run, pull the profile body
        // so we can read profile.races and gate per-race rendering.
        // We deliberately don't block render on this -- isRandom
        // defaults to false until the body arrives.
        useEffect(() => {
          if (profileExists !== true) return;
          let cancelled = false;
          (async () => {
            try {
              const res = await fetch('/api/profile');
              if (cancelled || !res.ok) return;
              const j = await res.json();
              if (!cancelled) setProfile(j || null);
            } catch (_e) { /* non-fatal */ }
          })();
          return () => { cancelled = true; };
        }, [profileExists]);

        const isRandom = !!(
          profile && Array.isArray(profile.races)
            && profile.races.includes('Random')
        );

        const renderBody = () => {
          if (openBuildName) {
            return (
              <BuildDeepDive
                buildName={openBuildName}
                filters={filters}
                onBack={() => setOpenBuildName(null)}
                dbRev={dbRev}
              />
            );
          }
          if (openReplay) {
            return (
              <MapIntelViewer
                replayPath={openReplay.path}
                playerName={openReplay.player}
                onBack={() => setOpenReplay(null)}
              />
            );
          }
          if (openPulseId) {
            return (
              <OpponentProfile
                pulseId={openPulseId}
                onBack={() => setOpenPulseId(null)}
                dbRev={dbRev}
              />
            );
          }
          switch (tab) {
            case "dashboard":
              return <DashboardTab filters={filters} dbRev={dbRev}
                                   isRandom={isRandom} />;
            case "builds":
              return (
                <RaceSplitView filters={filters} isRandom={isRandom}
                  render={(f) => (
                    <BuildsTab filters={f} dbRev={dbRev}
                               onOpen={setOpenBuildName} />
                  )} />
              );
            case "strategies":
              return (
                <RaceSplitView filters={filters} isRandom={isRandom}
                  render={(f) => (
                    <StrategiesTab filters={f} dbRev={dbRev} />
                  )} />
              );
            case "bvs":
              return (
                <RaceSplitView filters={filters} isRandom={isRandom}
                  render={(f) => (
                    <BuildVsStrategyTab filters={f} dbRev={dbRev} />
                  )} />
              );
            case "maps":
              return (
                <RaceSplitView filters={filters} isRandom={isRandom}
                  render={(f) => (
                    <MapsTab filters={f} dbRev={dbRev} />
                  )} />
              );
            case "matchups":
              return (
                <RaceSplitView filters={filters} isRandom={isRandom}
                  render={(f) => (
                    <MatchupsTab filters={f} dbRev={dbRev} />
                  )} />
              );
            case "opponents":
              return (
                <RaceSplitView filters={filters} isRandom={isRandom}
                  render={(f) => (
                    <OpponentsTab filters={f} dbRev={dbRev}
                                  onOpen={setOpenPulseId} />
                  )} />
              );
            case "trends":
              return <TrendsTab filters={filters} dbRev={dbRev} />;
            case "ml":
              return <MlTab dbRev={dbRev} />;
            case "mapintel":
              return <MapIntelTab dbRev={dbRev} onOpenReplay={setOpenReplay} />;
            case "widgets":
              return <WidgetsTab />;
            case "definitions":
              return <DefinitionsTab />;
            case "diagnostics":
              return <DiagnosticsView />;
            case "settings":
              return <SettingsView dbRev={dbRev} />;
            default:
              return <EmptyState title="Unknown tab" />;
          }
        };

        // First-run wizard short-circuit. While profileExists is
        // unknown we render nothing to prevent a flash of empty UI.
        if (profileExists === null) return null;
        if (showWizard) {
          return (
            <Wizard onComplete={() => {
              setShowWizard(false);
              setProfileExists(true);
            }} />
          );
        }

        return (
          <div className="min-h-screen flex flex-col">
            <header className="border-b border-base-700 bg-base-800/60 backdrop-blur sticky top-0 z-10">
              <div className="max-w-7xl mx-auto px-4 py-3 flex items-center gap-3">
                <div className="text-lg font-semibold text-neutral-100">
                  SC2 Meta Analyzer
                </div>
                <span
                  className={
                    "text-[10px] uppercase tracking-wider px-2 py-0.5 rounded " +
                    (conn.status === "live"
                      ? "bg-win-500/20 text-win-500"
                      : conn.status === "offline"
                        ? "bg-loss-500/20 text-loss-500"
                        : "bg-base-700 text-neutral-500")
                  }
                >
                  {conn.status}
                </span>
                <span
                  className="text-[10px] uppercase tracking-wider px-2 py-0.5 rounded bg-base-700 text-neutral-500"
                  title="Charts are rendered inline via SVG -- no external dependency"
                >
                  charts: built-in
                </span>
                <nav className="ml-auto flex flex-wrap gap-1">
                  {TABS.map((t) => (
                    <button
                      key={t.id}
                      onClick={() => {
                        setOpenPulseId(null);
                        setOpenBuildName(null);
                        setTab(t.id);
                      }}
                      className={
                        "px-3 py-1.5 text-sm rounded transition " +
                        (tab === t.id && !openPulseId && !openBuildName
                          ? "bg-accent-500 text-white"
                          : "text-neutral-400 hover:bg-base-700 hover:text-neutral-200")
                      }
                    >
                      {t.label}
                    </button>
                  ))}
                </nav>
              </div>
            </header>

            {!openPulseId && !openBuildName && (
              <div className="max-w-7xl mx-auto w-full px-4 pt-4">
                <FilterBar
                  filters={filters}
                  onChange={setFilters}
                  onReset={() => setFilters({})}
                />
              </div>
            )}

            <main className="max-w-7xl mx-auto w-full px-4 py-4 flex-1">
              <ErrorBoundary
                label={
                  openBuildName
                    ? `Build "${openBuildName}"`
                    : openPulseId
                      ? "Opponent profile"
                      : `Tab "${tab}"`
                }
              >
                {renderBody()}
              </ErrorBoundary>
            </main>

            <footer className="border-t border-base-700 text-[11px] text-neutral-600 py-3 px-4 text-center">
              Data refreshes automatically when new replays land &middot;
              backend `/api/analyzer`
            </footer>
          </div>
        );
      }

      try {
        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
      } catch (err) {
        const root = document.getElementById("root");
        const pre = document.createElement("pre");
        pre.style.padding = "24px";
        pre.style.color = "#ef476f";
        pre.style.fontFamily = "monospace";
        pre.style.whiteSpace = "pre-wrap";
        pre.textContent = String((err && err.stack) || err);
        root.innerHTML = "";
        root.appendChild(pre);
      }
    </script>
  </body>
</html>
