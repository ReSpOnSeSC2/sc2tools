<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <title>SC2 Meta Analyzer</title>
    <!-- patch-marker:dna-v1 -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind play CDN: zero-build dev/prod styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              base: {
                900: "#0b0d11",
                800: "#11141a",
                700: "#181c24",
                600: "#222732",
              },
              accent: { 400: "#7aa2ff", 500: "#5b8def", 600: "#3f6fdd" },
              win: { 500: "#3ddc97" },
              loss: { 500: "#ef476f" },
              neutral: { 500: "#9aa3b2" },
              gold: { 500: "#f4c95d" },
            },
            fontFamily: {
              sans: [
                "Inter",
                "system-ui",
                "-apple-system",
                "Segoe UI",
                "Roboto",
                "sans-serif",
              ],
              mono: ["JetBrains Mono", "SF Mono", "Consolas", "monospace"],
            },
            boxShadow: {
              soft: "0 1px 2px rgba(0,0,0,.30), 0 4px 12px rgba(0,0,0,.20)",
            },
          },
        },
      };
    </script>

    <!-- React + Recharts UMD (must load BEFORE the JSX script below
       so the `React` / `Recharts` globals are defined when Babel
       evaluates our code). Recharts 2.x ships `umd/Recharts.js`
       (not `.min.js`) so use that exact filename. -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

    <!-- Shared key-timing taxonomy. UMD module that exposes
       `window.TimingCatalog`. Mirrors `analytics/timing_catalog.py`
       byte-for-byte (in spirit) so the SPA, the Node API, and the
       desktop GUI all share one source of truth for which buildings
       are matchup-relevant and what their icons / display names are. -->
    <script src="/static/analyzer/timing_catalog.js"></script>

    <!-- Charts are now hand-rolled SVG inside the JSX block below --
       no Recharts/Chart.js CDN required. This makes the analyzer
       work even on locked-down networks where third-party CDNs are
       blocked, and removes a class of "stuck loading" failures. -->

    <!-- Babel standalone so we can write JSX directly in the page.
       Note: keep this script as a classic script (no `type=module`)
       so the JSX block below can read the UMD globals above. -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Socket.io client served by the backend itself -->
    <script src="/socket.io/socket.io.js"></script>

    <!-- Surface any boot-time failures into the page so the user can
       see WHY the SPA didn't render instead of just a stuck spinner. -->
    <script>
      window.addEventListener("error", (e) => {
        const root = document.getElementById("root");
        if (!root) return;
        root.innerHTML = "";

        const container = document.createElement("div");
        container.style.padding = "24px";
        container.style.fontFamily = "monospace";
        container.style.color = "#ef476f";
        container.style.background = "#11141a";
        container.style.minHeight = "100vh";
        container.style.lineHeight = "1.5";

        const title = document.createElement("div");
        title.style.fontSize = "18px";
        title.style.marginBottom = "8px";
        title.textContent = "Analyzer failed to boot";

        const details = document.createElement("div");
        details.style.color = "#9aa3b2";
        details.style.fontSize = "13px";
        details.style.whiteSpace = "pre-wrap";
        details.textContent =
          (e.message || "unknown error") +
          "\n" +
          (e.filename || "") +
          ":" +
          (e.lineno || "?");

        const footer = document.createElement("div");
        footer.style.marginTop = "16px";
        footer.style.color = "#5d6677";
        footer.style.fontSize = "12px";
        footer.textContent =
          "Open DevTools (F12) → Console for the full stack trace.";

        container.appendChild(title);
        container.appendChild(details);
        container.appendChild(footer);
        root.appendChild(container);
      });
    </script>

    <style>
      html,
      body {
        background: #0b0d11;
        color: #e7eaf0;
        min-height: 100vh;
      }
      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
      }
      /* Tame scrollbar in dark UI */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #11141a;
      }
      ::-webkit-scrollbar-thumb {
        background: #2a3140;
        border-radius: 6px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3a4458;
      }
      .ring-soft {
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      }
      .table-striped tr:nth-child(even) td {
        background: rgba(255, 255, 255, 0.02);
      }
      .skeleton {
        background: linear-gradient(
          90deg,
          #181c24 25%,
          #222732 37%,
          #181c24 63%
        );
        background-size: 400% 100%;
        animation: skeleton 1.4s ease infinite;
      }
      @keyframes skeleton {
        0% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0 50%;
        }
      }
      .race-Z {
        color: #c084fc;
      }
      .race-P {
        color: #fbbf24;
      }
      .race-T {
        color: #60a5fa;
      }
      .race-R {
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="flex items-center justify-center min-h-screen">
        <div class="text-neutral-500 font-mono">loading analyzer…</div>
      </div>
    </div>

    <script type="text/babel" data-presets="react">
      // ============================================================
      // SC2 META ANALYZER — single-file React SPA
      // ============================================================
      const { useState, useEffect, useMemo, useCallback, useRef, Fragment } =
        React;
      // Charts are SVG-native (see HBarChart / StackedBars / LinePath
      // below). No external charting library => no CDN dependency =>
      // no "stuck loading" failures. HAS_RECHARTS kept as a constant
      // for backward-compat with code paths that branched on it.
      const HAS_RECHARTS = true;

      // ---------- API helpers --------------------------------------
      const API = "/api/analyzer";

      function buildQuery(params) {
        const q = new URLSearchParams();
        Object.entries(params || {}).forEach(([k, v]) => {
          if (v === "" || v === null || v === undefined) return;
          // Underscore-prefixed keys are client-only (e.g. _season is just a
          // shorthand for setting since/until and shouldn't reach the API).
          if (k.startsWith("_")) return;
          q.set(k, v);
        });
        const s = q.toString();
        return s ? `?${s}` : "";
      }

      async function api(endpoint, params) {
        const r = await fetch(`${API}/${endpoint}${buildQuery(params)}`);
        if (!r.ok) throw new Error(`${endpoint} ${r.status}`);
        return r.json();
      }

      // ---------- Formatting ---------------------------------------
      const pct = (n) => `${Math.round((n || 0) * 100)}%`;
      const pct1 = (n) => `${((n || 0) * 100).toFixed(1)}%`;
      const fmtDate = (s) => {
        if (!s) return "—";
        const t = Date.parse(String(s).replace(" ", "T"));
        if (!Number.isFinite(t)) return s;
        const d = new Date(t);
        return d.toISOString().slice(0, 10);
      };
      const fmtAgo = (ms) => {
        if (!ms) return "—";
        const s = Math.max(0, (Date.now() - ms) / 1000);
        if (s < 60) return "just now";
        if (s < 3600) return `${Math.floor(s / 60)}m ago`;
        if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
        return `${Math.floor(s / 86400)}d ago`;
      };
      const wrColor = (winRate, total) => {
        if (!total) return "#5d6677";
        if (winRate >= 0.65) return "#3ddc97";
        if (winRate >= 0.55) return "#94d68a";
        if (winRate >= 0.45) return "#f4c95d";
        if (winRate >= 0.35) return "#f79e6c";
        return "#ef476f";
      };
      const raceClass = (race) => {
        const r = (race || "").charAt(0).toUpperCase();
        return ["Z", "P", "T", "R"].includes(r)
          ? `race-${r}`
          : "text-neutral-400";
      };
      // Building-icon URL resolver.
      // Source of truth lives in `analytics/timing_catalog.py`; the JS twin
      // is loaded as a `<script src="/static/analyzer/timing_catalog.js">`
      // tag at the top of this page and exposed as `window.TimingCatalog`.
      // The Express server (index.js) mounts the SC2-Overlay/icons folder
      // at `/static/icons/...`. Reuse this resolver everywhere a building
      // icon is rendered so the URL pattern is defined exactly once.
      const _BUILDING_ICON_FALLBACK = "/static/icons/buildings/";
      function buildingIconUrl(internalName) {
        if (!internalName) return null;
        const TC = window.TimingCatalog;
        if (TC && typeof TC.tokenByInternalName === "function") {
          const t = TC.tokenByInternalName(internalName);
          if (t && t.iconFile) return _BUILDING_ICON_FALLBACK + t.iconFile;
        }
        // Fallback: lowercase the internal name. Keeps the page from showing
        // a broken image if the catalog script hasn't loaded for any reason.
        return (
          _BUILDING_ICON_FALLBACK + String(internalName).toLowerCase() + ".png"
        );
      }
      function buildingDisplayName(internalName, fallback) {
        const TC = window.TimingCatalog;
        if (TC && typeof TC.tokenByInternalName === "function") {
          const t = TC.tokenByInternalName(internalName);
          if (t && t.displayName) return t.displayName;
        }
        return fallback || internalName || "";
      }
      // Win-rate-when-built pill color. Mirrors `wrColor` but uses softer
      // tones for the "n=1" / no-confidence edge case.
      function wrPillColor(rate, n) {
        if (rate == null || !n) return "#5d6677";
        if (rate >= 0.6) return "#3ddc97";
        if (rate >= 0.4) return "#f4c95d";
        return "#ef476f";
      }
      // Trend arrow + aria-label for a given trend string.
      const TREND_GLYPHS = {
        later: { glyph: "▲", label: "trending later", color: "#f79e6c" },
        earlier: { glyph: "▼", label: "trending earlier", color: "#3ddc97" },
        stable: { glyph: "–", label: "stable", color: "#9aa3b2" },
        unknown: { glyph: "·", label: "not enough data", color: "#5d6677" },
      };
      function fmtRelDate(s) {
        if (!s) return "";
        const t = Date.parse(String(s).replace(" ", "T"));
        if (!Number.isFinite(t)) return String(s).slice(0, 10);
        const days = Math.floor((Date.now() - t) / 86400000);
        if (days <= 0) return "today";
        if (days === 1) return "yesterday";
        if (days < 30) return days + "d ago";
        if (days < 365) return Math.floor(days / 30) + "mo ago";
        return Math.floor(days / 365) + "y ago";
      }

      // ---------- Reusable bits ------------------------------------
      function Card({ title, right, children, className = "" }) {
        return (
          <section
            className={`bg-base-800 ring-soft rounded-xl shadow-soft p-5 ${className}`}
          >
            {(title || right) && (
              <header className="flex items-center justify-between mb-4">
                {title && (
                  <h2 className="text-sm font-semibold tracking-wide text-neutral-300 uppercase">
                    {title}
                  </h2>
                )}
                {right}
              </header>
            )}
            {children}
          </section>
        );
      }

      function Stat({ label, value, sub, color }) {
        return (
          <div className="bg-base-700 ring-soft rounded-lg px-4 py-3">
            <div className="text-[11px] uppercase tracking-wider text-neutral-500">
              {label}
            </div>
            <div
              className="mt-1 text-2xl font-semibold tabular-nums"
              style={color ? { color } : null}
            >
              {value}
            </div>
            {sub && (
              <div className="text-xs text-neutral-500 mt-0.5">{sub}</div>
            )}
          </div>
        );
      }

      function WrBar({ wins = 0, losses = 0, height = 6 }) {
        const total = wins + losses;
        const wr = total ? wins / total : 0;
        return (
          <div
            className="w-full bg-base-700 rounded-full overflow-hidden"
            style={{ height }}
          >
            <div
              className="h-full transition-all"
              style={{ width: `${pct(wr)}`, background: wrColor(wr, total) }}
            />
          </div>
        );
      }

      function EmptyState({ title = "No data", sub }) {
        return (
          <div className="text-center py-16 text-neutral-500">
            <div className="text-base">{title}</div>
            {sub && <div className="text-xs mt-1 text-neutral-600">{sub}</div>}
          </div>
        );
      }

      // ============================================================
      // INLINE SVG CHARTS (production-grade, no external deps)
      // ------------------------------------------------------------
      // Features common to all charts:
      //   - Crosshair guide that snaps to the nearest data point
      //   - Floating tooltip with the hovered datum
      //   - Mouse-wheel zoom (Ctrl/Cmd-wheel zooms; plain wheel pans)
      //   - Click-and-drag rectangle to zoom into a region
      //   - Double-click to reset zoom
      //   - "Reset zoom" pill appears when zoomed
      //   - Crisp typography, clean axes, large dot/line widths
      // ============================================================
      const CHART_W = 1000; // logical viewBox width
      const CHART_GRID = "#1e2330";
      const CHART_AXIS = "#cdd5e0";

      // Hook: shared zoom + pan state for index-domain charts.
      // `count` is total items in the dataset; viewport is [start, end].
      function useZoomDomain(count) {
        const [view, setView] = useState({ start: 0, end: count });
        // Reset view when the dataset size actually changes.
        useEffect(() => {
          setView({ start: 0, end: count });
        }, [count]);
        const zoomed = !(view.start === 0 && view.end === count);
        const zoomTo = useCallback(
          (s, e) => {
            const a = Math.max(0, Math.min(s, e));
            const b = Math.min(count, Math.max(s, e));
            if (b - a >= 1)
              setView({ start: Math.floor(a), end: Math.ceil(b) });
          },
          [count],
        );
        const reset = useCallback(
          () => setView({ start: 0, end: count }),
          [count],
        );
        return { view, zoomTo, reset, zoomed };
      }

      // Toolbar pill -- "zoomed: 12 / 47 · reset"
      function ZoomBadge({ view, count, onReset }) {
        if (view.start === 0 && view.end === count) return null;
        const span = view.end - view.start;
        return (
          <button
            onClick={onReset}
            className="absolute top-2 right-2 z-10 text-[10px] uppercase tracking-wider
                   bg-accent-500/20 text-accent-400 hover:bg-accent-500/30
                   ring-soft rounded px-2 py-1"
          >
            zoomed: {span}/{count} · reset ↺
          </button>
        );
      }

      // Tooltip + drag-rectangle overlay shared by line/bar charts.
      function ChartOverlay({ wrapRef, drag, tooltip }) {
        // Resolve clamps without optional-chaining so the in-browser Babel
        // doesn't have to handle ?. inside JSX attribute expressions.
        const wrapW =
          (wrapRef && wrapRef.current && wrapRef.current.clientWidth) || 9999;
        const wrapH =
          (wrapRef && wrapRef.current && wrapRef.current.clientHeight) || 9999;
        return (
          <Fragment>
            {drag && (
              <div
                className="absolute pointer-events-none bg-accent-500/15 border border-accent-500/60"
                style={{
                  left: drag.x1,
                  top: 0,
                  width: drag.x2 - drag.x1,
                  height: "100%",
                }}
              />
            )}
            {tooltip && (
              <div
                className="pointer-events-none absolute z-20 bg-base-900 ring-soft rounded px-3 py-2 text-xs text-neutral-100 shadow-soft"
                style={{
                  left: Math.min(tooltip.x + 14, wrapW - 220),
                  top: Math.min(tooltip.y + 14, wrapH - 80),
                  minWidth: 160,
                }}
              >
                {tooltip.content}
              </div>
            )}
          </Fragment>
        );
      }

      // -------- HORIZONTAL BAR CHART (Maps tab) --------------------
      function HBarChart({
        data,
        height = 360,
        valueKey = "winRate",
        maxValue = 100,
        format = (v) => `${v.toFixed(1)}%`,
        colorFor,
      }) {
        const wrapRef = useRef(null);
        const [tip, setTip] = useState(null);
        if (!data || data.length === 0)
          return <EmptyState sub="No data to chart" />;
        const padL = 180,
          padR = 28,
          padT = 12,
          padB = 32;
        const innerH = Math.max(60, height - padT - padB);
        const rowH = innerH / data.length;
        const xScale = (v) => padL + (v / maxValue) * (CHART_W - padL - padR);
        const ticks = [0, 25, 50, 75, 100];
        return (
          <div
            ref={wrapRef}
            className="relative w-full"
            style={{ height }}
            onMouseLeave={() => setTip(null)}
          >
            <svg
              viewBox={`0 0 ${CHART_W} ${height}`}
              preserveAspectRatio="none"
              style={{ width: "100%", height: "100%" }}
            >
              {ticks.map((t) => (
                <g key={t}>
                  <line
                    x1={xScale(t)}
                    x2={xScale(t)}
                    y1={padT}
                    y2={padT + innerH}
                    stroke={CHART_GRID}
                    strokeDasharray="3 3"
                  />
                  <text
                    x={xScale(t)}
                    y={padT + innerH + 18}
                    fill={CHART_AXIS}
                    fontSize="12"
                    textAnchor="middle"
                  >
                    {t}%
                  </text>
                </g>
              ))}
              {data.map((d, i) => {
                const v = Number(d[valueKey]) || 0;
                const y = padT + i * rowH;
                const barH = Math.max(4, rowH - 6);
                const w = Math.max(0, xScale(v) - padL);
                const fill = colorFor ? colorFor(d) : "#5b8def";
                return (
                  <g
                    key={d.name + i}
                    onMouseMove={(e) => {
                      const rect = wrapRef.current.getBoundingClientRect();
                      setTip({
                        x: e.clientX - rect.left,
                        y: e.clientY - rect.top,
                        content: (
                          <div>
                            <div className="font-semibold text-neutral-100">
                              {d.name}
                            </div>
                            <div className="text-neutral-400">
                              {format(v)}
                              {d.games != null ? ` · ${d.games} games` : ""}
                            </div>
                          </div>
                        ),
                      });
                    }}
                  >
                    <text
                      x={padL - 12}
                      y={y + barH / 2 + 4}
                      fill={CHART_AXIS}
                      fontSize="13"
                      textAnchor="end"
                    >
                      {d.name}
                    </text>
                    <rect
                      x={padL}
                      y={y + 3}
                      width={w}
                      height={barH}
                      fill={fill}
                      rx="3"
                    />
                    {/* Value label inside bar if there's room, else outside */}
                    {w > 60 ? (
                      <text
                        x={padL + w - 8}
                        y={y + barH / 2 + 4}
                        fill="#0b0d11"
                        fontSize="12"
                        fontWeight="600"
                        textAnchor="end"
                      >
                        {format(v)}
                      </text>
                    ) : (
                      <text
                        x={padL + w + 6}
                        y={y + barH / 2 + 4}
                        fill={CHART_AXIS}
                        fontSize="12"
                        textAnchor="start"
                      >
                        {format(v)}
                      </text>
                    )}
                  </g>
                );
              })}
            </svg>
            <ChartOverlay wrapRef={wrapRef} drag={null} tooltip={tip} />
          </div>
        );
      }

      // Shared X-domain chart (line + bars). Handles zoom / pan / drag /
      // crosshair / tooltip in one place. The `series` prop is an array
      // of { key, color, type: 'line'|'bar', accessor }.
      function XDomainChart({
        data,
        height = 280,
        series,
        formatX = (d) => d.date,
        formatY = (v) => String(v),
        yMax,
      }) {
        const wrapRef = useRef(null);
        const svgRef = useRef(null);
        const [tip, setTip] = useState(null);
        const [drag, setDrag] = useState(null);
        const zoom = useZoomDomain(data ? data.length : 0);
        if (!data || data.length === 0)
          return <EmptyState sub="No data to chart" />;
        const padL = 56,
          padR = 20,
          padT = 12,
          padB = 36;
        const innerH = Math.max(60, height - padT - padB);
        const innerW = CHART_W - padL - padR;
        const view = data.slice(zoom.view.start, zoom.view.end);
        const n = Math.max(1, view.length);
        // y-domain: max of all series values in the visible window.
        // Stacked series sum their layers per datum; line/bar series use
        // their accessor directly. Falls back to 1 to avoid divide-by-0.
        function valueFor(s, d) {
          if (s.type === "stack" && Array.isArray(s.stack)) {
            let sum = 0;
            for (const layer of s.stack) {
              const v =
                layer && typeof layer.accessor === "function"
                  ? layer.accessor(d)
                  : 0;
              sum += Number(v) || 0;
            }
            return sum;
          }
          return typeof s.accessor === "function"
            ? Number(s.accessor(d)) || 0
            : 0;
        }
        const yMaxComputed =
          yMax != null
            ? yMax
            : Math.max(
                1,
                ...view.flatMap((d) => series.map((s) => valueFor(s, d))),
              );
        const yScale = (v) =>
          padT +
          innerH -
          (Math.min(yMaxComputed, Math.max(0, v)) / yMaxComputed) * innerH;
        // For bar charts we slot bars within their column; for lines we
        // anchor to the column center.
        const colW = innerW / n;
        const xCenter = (i) => padL + i * colW + colW / 2;

        // Pixel position to data index (clamped).
        function pxToIndex(pxFromLeft) {
          const localX = pxFromLeft - padL;
          const idx = Math.floor(localX / colW);
          return Math.max(0, Math.min(view.length - 1, idx));
        }

        // Convert client coords to logical SVG coords for hit-testing.
        function clientToLogical(clientX, clientY) {
          const rect = svgRef.current.getBoundingClientRect();
          const sx = ((clientX - rect.left) / rect.width) * CHART_W;
          const sy = ((clientY - rect.top) / rect.height) * height;
          return { sx, sy };
        }

        function onMouseMove(e) {
          const { sx } = clientToLogical(e.clientX, e.clientY);
          const i = pxToIndex(sx);
          const d = view[i];
          const xPix = xCenter(i);
          const wrapRect = wrapRef.current.getBoundingClientRect();
          setTip({
            x: e.clientX - wrapRect.left,
            y: e.clientY - wrapRect.top,
            snapX: xPix,
            i,
            content: (
              <div>
                <div className="font-semibold text-neutral-100">
                  {formatX(d)}
                </div>
                {series.flatMap((s) => {
                  // Stacked series: render one row per layer (e.g., wins / losses)
                  if (s.type === "stack" && Array.isArray(s.stack)) {
                    return s.stack.map((layer) => (
                      <div
                        key={s.key + ":" + layer.key}
                        className="flex items-center gap-1.5 mt-0.5"
                      >
                        <span
                          className="inline-block w-2 h-2 rounded-sm"
                          style={{ background: layer.color }}
                        />
                        <span className="text-neutral-400">
                          {layer.label || layer.key}:{" "}
                          <span className="text-neutral-200">
                            {formatY(layer.accessor(d), layer.key)}
                          </span>
                        </span>
                      </div>
                    ));
                  }
                  // Plain line / bar
                  const v =
                    typeof s.accessor === "function" ? s.accessor(d) : null;
                  return [
                    <div
                      key={s.key}
                      className="flex items-center gap-1.5 mt-0.5"
                    >
                      <span
                        className="inline-block w-2 h-2 rounded-sm"
                        style={{ background: s.color }}
                      />
                      <span className="text-neutral-400">
                        {s.label}:{" "}
                        <span className="text-neutral-200">
                          {formatY(v, s.key)}
                        </span>
                      </span>
                    </div>,
                  ];
                })}
              </div>
            ),
          });
          if (drag) setDrag({ ...drag, x2: e.clientX - wrapRect.left });
        }
        function onMouseDown(e) {
          const wrapRect = wrapRef.current.getBoundingClientRect();
          const x = e.clientX - wrapRect.left;
          setDrag({ x1: x, x2: x });
        }
        function onMouseUp(e) {
          if (!drag) return;
          const wrapRect = wrapRef.current.getBoundingClientRect();
          const a = Math.min(drag.x1, drag.x2);
          const b = Math.max(drag.x1, drag.x2);
          setDrag(null);
          if (b - a < 8) return; // treat as click
          // Convert pixel range to logical -> slice of `view` -> absolute slice
          const ratioA = a / wrapRect.width;
          const ratioB = b / wrapRect.width;
          const localA = ratioA * CHART_W;
          const localB = ratioB * CHART_W;
          const iA = pxToIndex(localA);
          const iB = pxToIndex(localB) + 1;
          zoom.zoomTo(zoom.view.start + iA, zoom.view.start + iB);
        }
        function onDoubleClick() {
          zoom.reset();
        }
        function onWheel(e) {
          // Wheel zoom: positive deltaY = zoom out, negative = zoom in.
          // Centered on mouse position.
          e.preventDefault();
          const wrapRect = wrapRef.current.getBoundingClientRect();
          const ratio = (e.clientX - wrapRect.left) / wrapRect.width;
          const i = pxToIndex(ratio * CHART_W);
          const absoluteCenter = zoom.view.start + i;
          const span = zoom.view.end - zoom.view.start;
          const factor = e.deltaY > 0 ? 1.25 : 0.8;
          const newSpan = Math.max(
            2,
            Math.min(data.length, Math.round(span * factor)),
          );
          const newStart = Math.max(
            0,
            absoluteCenter -
              Math.floor(newSpan * (i / Math.max(1, view.length - 1))),
          );
          const newEnd = Math.min(data.length, newStart + newSpan);
          zoom.zoomTo(newStart, newEnd);
        }

        // Y-axis ticks (4-5 nice ones)
        const niceTicks = (max) => {
          if (max <= 1) return [0, 0.25, 0.5, 0.75, 1];
          const step = Math.pow(10, Math.floor(Math.log10(max)));
          const norm = max / step;
          const niceStep = (norm < 2 ? 0.5 : norm < 5 ? 1 : 2) * step;
          const out = [];
          for (let v = 0; v <= max + 1e-9; v += niceStep) out.push(v);
          return out;
        };
        const yTicks = niceTicks(yMaxComputed);
        const everyN = Math.max(1, Math.ceil(view.length / 10));

        return (
          <div
            ref={wrapRef}
            className="relative w-full select-none"
            style={{ height }}
            onMouseLeave={() => {
              setTip(null);
              setDrag(null);
            }}
          >
            <ZoomBadge
              view={zoom.view}
              count={data.length}
              onReset={zoom.reset}
            />
            <svg
              ref={svgRef}
              viewBox={`0 0 ${CHART_W} ${height}`}
              preserveAspectRatio="none"
              style={{
                width: "100%",
                height: "100%",
                cursor: drag ? "crosshair" : "crosshair",
              }}
              onMouseMove={onMouseMove}
              onMouseDown={onMouseDown}
              onMouseUp={onMouseUp}
              onDoubleClick={onDoubleClick}
              onWheel={onWheel}
            >
              {/* Y gridlines + ticks */}
              {yTicks.map((t) => (
                <g key={t}>
                  <line
                    x1={padL}
                    x2={CHART_W - padR}
                    y1={yScale(t)}
                    y2={yScale(t)}
                    stroke={CHART_GRID}
                    strokeDasharray="3 3"
                  />
                  <text
                    x={padL - 8}
                    y={yScale(t) + 4}
                    fill={CHART_AXIS}
                    fontSize="12"
                    textAnchor="end"
                  >
                    {formatY(t, "__yaxis")}
                  </text>
                </g>
              ))}
              {/* X axis line */}
              <line
                x1={padL}
                x2={CHART_W - padR}
                y1={padT + innerH}
                y2={padT + innerH}
                stroke="#2a3140"
              />
              {/* X tick labels */}
              {view.map((d, i) =>
                i % everyN === 0 ? (
                  <text
                    key={i}
                    x={xCenter(i)}
                    y={padT + innerH + 20}
                    fill={CHART_AXIS}
                    fontSize="11"
                    textAnchor="middle"
                  >
                    {formatX(d).slice(-5)}
                  </text>
                ) : null,
              )}

              {/* Series rendering */}
              {series.map((s) => {
                if (s.type === "bar") {
                  return view.map((d, i) => {
                    const v = s.accessor(d) || 0;
                    const h = (v / yMaxComputed) * innerH;
                    const x = padL + i * colW + colW * 0.12;
                    const w = colW * 0.76;
                    return (
                      <rect
                        key={`${s.key}-${i}`}
                        x={x}
                        y={padT + innerH - h}
                        width={w}
                        height={h}
                        fill={s.color}
                        opacity={s.opacity || 0.9}
                      />
                    );
                  });
                }
                if (s.type === "stack") {
                  // s.stack = [{ key, color, accessor }]
                  return view.map((d, i) => {
                    let acc = 0;
                    const x = padL + i * colW + colW * 0.12;
                    const w = colW * 0.76;
                    return (
                      <g key={`${s.key}-${i}`}>
                        {s.stack.map((layer) => {
                          const v = layer.accessor(d) || 0;
                          const h = (v / yMaxComputed) * innerH;
                          const y = padT + innerH - acc - h;
                          acc += h;
                          return (
                            <rect
                              key={layer.key}
                              x={x}
                              y={y}
                              width={w}
                              height={h}
                              fill={layer.color}
                            />
                          );
                        })}
                      </g>
                    );
                  });
                }
                // line
                const pts = view.map((d, i) => ({
                  x: xCenter(i),
                  y: yScale(s.accessor(d) || 0),
                }));
                const path = pts
                  .map(
                    (p, i) =>
                      `${i === 0 ? "M" : "L"} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`,
                  )
                  .join(" ");
                return (
                  <g key={s.key}>
                    <path
                      d={path}
                      fill="none"
                      stroke={s.color}
                      strokeWidth="2.5"
                      strokeLinecap="round"
                      strokeLinejoin="round"
                    />
                    {pts.map((p, i) => (
                      <circle
                        key={i}
                        cx={p.x}
                        cy={p.y}
                        r="3.5"
                        fill="#11141a"
                        stroke={s.color}
                        strokeWidth="2"
                      />
                    ))}
                  </g>
                );
              })}

              {/* Crosshair */}
              {tip && (
                <line
                  x1={tip.snapX}
                  x2={tip.snapX}
                  y1={padT}
                  y2={padT + innerH}
                  stroke="#5b8def"
                  strokeOpacity="0.6"
                  strokeDasharray="4 4"
                />
              )}
            </svg>
            <ChartOverlay wrapRef={wrapRef} drag={drag} tooltip={tip} />
            <div className="absolute bottom-1 left-3 text-[10px] text-neutral-600 font-mono pointer-events-none">
              drag to zoom · wheel to zoom · double-click to reset
            </div>
          </div>
        );
      }

      // Error boundary wrapper -- catches a child render error and shows
      // a small panel inline instead of bringing down the whole SPA.
      // Used around each tab so a bug in one tab doesn't blank the rest.
      class ErrorBoundary extends React.Component {
        constructor(props) {
          super(props);
          this.state = { error: null };
        }
        static getDerivedStateFromError(error) {
          return { error };
        }
        componentDidCatch(error, info) {
          console.error("[Analyzer] component error:", error, info);
        }
        render() {
          if (!this.state.error) return this.props.children;
          const e = this.state.error;
          return (
            <div className="bg-loss-500/10 border border-loss-500/40 rounded p-4 text-sm">
              <div className="font-semibold text-loss-500 mb-1">
                {this.props.label || "Component"} failed to render

              <pre className="text-xs text-neutral-300 whitespace-pre-wrap">
                {String(e && (e.stack || e.message || e))}

              <button
                onClick={() => this.setState({ error: null })}
                className="mt-3 text-xs bg-base-700 hover:bg-base-600 ring-soft rounded px-3 py-1 text-neutral-300"
              >
                try again
              </button>
            </div>
          );
        }
      }

      // ---------- Sortable column header --------------------------
      // Click to toggle ascending/descending; click a different column
      // to sort by it. Used by every data table in the SPA so columns
      // behave consistently. The parent component owns the sort state
      // and passes (sortBy, sortDir, onSort) -- this header is purely
      // presentational + click-target.
      function SortableTh({
        col,
        label,
        sortBy,
        sortDir,
        onSort,
        align = "left",
        width,
      }) {
        const active = sortBy === col;
        const arrow = !active ? "⇅" : sortDir === "asc" ? "▲" : "▼";
        const alignClass =
          align === "right"
            ? "text-right"
            : align === "center"
              ? "text-center"
              : "text-left";
        const widthStyle = width ? { width } : null;
        return (
          <th
            onClick={() => onSort(col)}
            style={widthStyle}
            className={`select-none cursor-pointer py-2 px-3 ${alignClass} hover:bg-base-600 transition`}
          >
            <span className="inline-flex items-center gap-1">
              {label}
              <span
                className={`text-[9px] ${active ? "text-accent-400" : "text-neutral-600"}`}
              >
                {arrow}
              </span>
            </span>
          </th>
        );
      }

      // Hook: simple sort state + comparator factory.
      // `defaultDir` is 'asc' or 'desc' for the *initial* click on a column.
      function useSort(defaultCol, defaultDir = "desc") {
        const [sortBy, setSortBy] = useState(defaultCol);
        const [sortDir, setSortDir] = useState(defaultDir);
        const onSort = useCallback(
          (col) => {
            setSortBy((prev) => {
              if (prev === col) {
                // Toggle direction on same column.
                setSortDir((d) => (d === "asc" ? "desc" : "asc"));
                return prev;
              }
              // New column: reset to default direction.
              setSortDir(defaultDir);
              return col;
            });
          },
          [defaultDir],
        );
        const sortRows = useCallback(
          (rows, accessor) => {
            const arr = [...(rows || [])];
            arr.sort((a, b) => {
              const av = accessor(a, sortBy);
              const bv = accessor(b, sortBy);
              if (av == null && bv == null) return 0;
              if (av == null) return 1;
              if (bv == null) return -1;
              let cmp;
              if (typeof av === "number" && typeof bv === "number")
                cmp = av - bv;
              else
                cmp = String(av).localeCompare(String(bv), undefined, {
                  numeric: true,
                  sensitivity: "base",
                });
              return sortDir === "asc" ? cmp : -cmp;
            });
            return arr;
          },
          [sortBy, sortDir],
        );
        return { sortBy, sortDir, onSort, sortRows };
      }

      // ---------- Season helpers ----------------------------------
      // Quick-set the since/until filters from a coarse "Last 30 days /
      // 90 days / etc." dropdown. Mirrors the season selector the old
      // Flask web_analyzer.py exposed so users keep the same shorthand.
      const SEASONS = [
        { id: "", label: "All time", days: null },
        { id: "7", label: "Last 7 days", days: 7 },
        { id: "30", label: "Last 30 days", days: 30 },
        { id: "90", label: "Last 90 days", days: 90 },
        { id: "183", label: "Last 6 months", days: 183 },
        { id: "365", label: "Last year", days: 365 },
      ];
      function isoDaysAgo(days) {
        const d = new Date();
        d.setDate(d.getDate() - days);
        return d.toISOString().slice(0, 10);
      }
      function isoToday() {
        return new Date().toISOString().slice(0, 10);
      }

      // ---------- Data hook ----------------------------------------
      function useApi(endpoint, params, deps = []) {
        const [state, setState] = useState({
          data: null,
          loading: true,
          error: null,
        });
        const ctrl = useRef(null);
        useEffect(() => {
          if (ctrl.current) ctrl.current.abort();
          ctrl.current = new AbortController();
          setState({ data: null, loading: true, error: null });
          fetch(`${API}/${endpoint}${buildQuery(params)}`, {
            signal: ctrl.current.signal,
          })
            .then((r) =>
              r.ok ? r.json() : Promise.reject(new Error(`${r.status}`)),
            )
            .then((data) => setState({ data, loading: false, error: null }))
            .catch((err) => {
              if (err.name === "AbortError") return;
              setState({ data: null, loading: false, error: err.message });
            });
          return () => ctrl.current && ctrl.current.abort();
          // eslint-disable-next-line react-hooks/exhaustive-deps
        }, deps);
        return state;
      }

          if (hideEmpty) r = r.filter((b) => b.total > 0);
          if (search)
            r = r.filter((b) =>
              b.name.toLowerCase().includes(search.toLowerCase()),
            );
          return sort.sortRows(r, (row, col) => row[col]);
        }, [data, sort.sortBy, sort.sortDir, hideEmpty, search]);
        if (loading) return <Skeleton rows={10} />;
        return (
          <div className="space-y-4">
            <div className="flex flex-wrap items-center gap-3">
              <input
                type="text"
                value={search}
                onChange={(e) => setSearch(e.target.value)}
                placeholder="search builds…"
                className="bg-base-700 ring-soft rounded px-3 py-1.5 text-sm w-64"
              />
              <label className="text-xs flex items-center gap-1.5 text-neutral-400">
                <input
                  type="checkbox"
                  checked={hideEmpty}
                  onChange={(e) => setHideEmpty(e.target.checked)}
                  className="accent-accent-500"
                />{" "}
                Hide empty
              </label>
              <span className="text-xs text-neutral-500 ml-2">
                click any column to sort · click a row to open deep dive →
              </span>
              <CsvButton kind="builds" filters={filters} />
            </div>
            <div className="bg-base-800 ring-soft rounded-xl overflow-hidden">
              <table className="w-full text-sm">
                <thead className="bg-base-700 text-[11px] uppercase text-neutral-400">
                  <tr>
                    <SortableTh
                      col="name"
                      label="Build"
                      {...sort}
                      align="left"
                    />
                    <SortableTh
                      col="wins"
                      label="Wins"
                      {...sort}
                      align="right"
                      width="5rem"
                    />
                    <SortableTh
                      col="losses"
                      label="Losses"
                      {...sort}
                      align="right"
                      width="5rem"
                    />
                    <SortableTh
                      col="total"
                      label="Total"
                      {...sort}
                      align="right"
                      width="5rem"
                    />
                    <SortableTh
                      col="winRate"
                      label="Win rate"
                      {...sort}
                      align="right"
                      width="6rem"
                    />
                    <th className="px-3 w-48">&nbsp;</th>
                    <SortableTh
                      col="lastPlayed"
                      label="Last"
                      {...sort}
                      align="right"
                      width="7rem"
                    />
                    <th className="text-right py-2 px-3 w-12 text-neutral-500">
                      →
                    </th>
                  </tr>
                </thead>
                <tbody>
                  {items.length === 0 ? (
                    <tr>
                      <td colSpan="8">
                        <EmptyState />
                      </td>
                    </tr>
                  ) : (
                    items.map((b) => (
                      <tr
                        key={b.name}
                        onClick={() => onOpen && onOpen(b.name)}
                        className="border-t border-base-700 hover:bg-accent-500/10 cursor-pointer group"
                      >
                        <td className="py-1.5 px-3 text-neutral-200 group-hover:text-accent-400">
                          {b.name}
                        </td>
                        <td className="py-1.5 px-3 text-right tabular-nums text-win-500">
                          {b.wins}
                        </td>
                        <td className="py-1.5 px-3 text-right tabular-nums text-loss-500">
                          {b.losses}
                        </td>
                        <td className="py-1.5 px-3 text-right tabular-nums text-neutral-300">
                          {b.total}
                        </td>
                        <td
                          className="py-1.5 px-3 text-right tabular-nums"
                          style={{ color: wrColor(b.winRate, b.total) }}
                        >
                          {pct1(b.winRate)}
                        </td>
                        <td className="py-1.5 px-3">
                          <WrBar wins={b.wins} losses={b.losses} />
                        </td>
                        <td className="py-1.5 px-3 text-right text-xs text-neutral-500">
                          {b.lastPlayed ? fmtAgo(b.lastPlayed) : "—"}
                        </td>
                        <td className="py-1.5 px-3 text-right text-neutral-600 group-hover:text-accent-400">
                          →
                        </td>
                      </tr>
                    ))
                  )}
                </tbody>
              </table>
            </div>
          </div>
        );
      }

      // ============================================================

      // ============================================================
      // BUILD DEEP DIVE  (drill-down from My Builds tab)
      // Server returns games newest-first; we render that order verbatim.
      // ============================================================
      function BuildDeepDive({ buildName, filters, onBack, dbRev }) {
        const { data, loading, error } = useApi(
          `builds/${encodeURIComponent(buildName)}`,
          filters,
          [buildName, JSON.stringify(filters || {}), dbRev],
        );
        if (loading) return <Skeleton rows={6} />;
        if (error || !data)
          return (
            <div>
              <BackBtn onClick={onBack} />
              <EmptyState title="Build not found" sub={buildName} />
            </div>
          );
        const t = data.totals || {};
        const byStrat = Object.entries(data.byOppStrategy || {})
          .map(([name, v]) => ({
            name,
            ...v,
            total: v.wins + v.losses,
            winRate: v.wins + v.losses ? v.wins / (v.wins + v.losses) : 0,
          }))
          .sort((a, b) => b.total - a.total);
        const byMap = Object.entries(data.byMap || {})
          .map(([name, v]) => ({
            name,
            ...v,
            total: v.wins + v.losses,
            winRate: v.wins + v.losses ? v.wins / (v.wins + v.losses) : 0,
          }))
          .sort((a, b) => b.total - a.total);
        const byOpp = Object.entries(data.byOpponent || {})
          .map(([name, v]) => ({
            name,
            ...v,
            total: v.wins + v.losses,
            winRate: v.wins + v.losses ? v.wins / (v.wins + v.losses) : 0,
          }))
          .sort((a, b) => b.total - a.total)
          .slice(0, 12);
        const games = data.games || [];
        return (
          <div className="space-y-5">
            <BackBtn onClick={onBack} />
            <div className="flex items-end justify-between flex-wrap gap-4">
              <div>
                <h1 className="text-2xl font-semibold text-neutral-100">
                  {data.name}
                </h1>
                <div className="text-xs text-neutral-500">
                  Deep dive · {games.length} games (newest first)
                </div>
              </div>
              <div className="grid grid-cols-4 gap-3">
                <Stat label="Games" value={t.total || 0} />
                <Stat label="W" value={t.wins || 0} color="#3ddc97" />
                <Stat label="L" value={t.losses || 0} color="#ef476f" />
                <Stat
                  label="WR"
                  value={pct1(t.winRate)}
                  color={wrColor(t.winRate, t.total)}
                />
              </div>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
              <Card title="Vs opponent strategy">
                {byStrat.length === 0 ? (
                  <EmptyState sub="No strategies tagged" />
                ) : (
                  <div className="space-y-2">
                    {byStrat.slice(0, 12).map((s) => (
                      <div key={s.name}>
                        <div className="flex justify-between text-sm">
                          <span className="text-neutral-300">{s.name}</span>
                          <span className="tabular-nums text-neutral-400">
                            {s.wins}-{s.losses} ·{" "}
                            <span
                              style={{ color: wrColor(s.winRate, s.total) }}
                            >
                              {pct(s.winRate)}
                            </span>
                          </span>
                        </div>
                        <WrBar wins={s.wins} losses={s.losses} />
                      </div>
                    ))}
                  </div>
                )}
              </Card>
              <Card title="Vs map">
                {byMap.length === 0 ? (
                  <EmptyState sub="No map data" />
                ) : (
                  <div className="space-y-2">
                    {byMap.slice(0, 12).map((m) => (
                      <div key={m.name}>
                        <div className="flex justify-between text-sm">
                          <span className="text-neutral-300">{m.name}</span>
                          <span className="tabular-nums text-neutral-400">
                            {m.wins}-{m.losses} ·{" "}
                            <span
                              style={{ color: wrColor(m.winRate, m.total) }}
                            >
                              {pct(m.winRate)}
                            </span>
                          </span>
                        </div>
                        <WrBar wins={m.wins} losses={m.losses} />
                      </div>
                    ))}
                  </div>
                )}
              </Card>
            </div>
            <Card title="Top opponents on this build">
              {byOpp.length === 0 ? (
                <EmptyState sub="No opponent data" />
              ) : (
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2">
                  {byOpp.map((o) => (
                    <div
                      key={o.name}
                      className="bg-base-700 ring-soft rounded px-3 py-2 flex items-center justify-between"
                    >
                      <span
                        className="text-sm text-neutral-300 truncate"
                        title={o.name}
                      >
                        {o.name}
                      </span>
                      <span className="tabular-nums text-xs text-neutral-400 ml-3 whitespace-nowrap">
                        {o.wins}-{o.losses} ·{" "}
                        <span style={{ color: wrColor(o.winRate, o.total) }}>
                          {pct(o.winRate)}
                        </span>
                      </span>
                    </div>
                  ))}
                </div>
              )}
            </Card>
            <Card title={`All games · ${games.length} (newest first)`}>
              <div className="overflow-x-auto -mx-2 max-h-[560px]">
                <GamesTableWithBuildOrder games={games} />
              </div>
            </Card>
          </div>
        );
      }

      // ============================================================
      // BUILD-ORDER TIMELINE  (per-game, click-to-expand)
      // ============================================================
      // Color-classify build-order events by race so the timeline reads at a
      // glance. Tailwind classes are duplicated from the .race-X CSS at top
      // of the file but applied per-event.
      const RACE_DOT_CLASS = {
        Protoss: "bg-amber-400",
        Terran: "bg-blue-400",
        Zerg: "bg-purple-400",
        Neutral: "bg-neutral-500",
      };
      const CATEGORY_BADGE_CLASS = {
        townhall: "bg-yellow-700/60 text-yellow-200",
        builder: "bg-blue-700/60 text-blue-200",
        tech: "bg-purple-700/60 text-purple-200",
        defense: "bg-red-700/60 text-red-200",
        supply: "bg-cyan-700/60 text-cyan-200",
        worker: "bg-neutral-700/60 text-neutral-300",
        army: "bg-orange-700/60 text-orange-200",
        caster: "bg-fuchsia-700/60 text-fuchsia-200",
        air: "bg-sky-700/60 text-sky-200",
        detector: "bg-emerald-700/60 text-emerald-200",
        transport: "bg-teal-700/60 text-teal-200",
        hero: "bg-rose-700/60 text-rose-200",
        spawn: "bg-neutral-700/40 text-neutral-400",
        upgrade: "bg-indigo-700/60 text-indigo-200",
        unknown: "bg-neutral-700/40 text-neutral-500",
      };

      function BuildOrderTimeline({ gameId, perspective: perspectiveProp }) {
        const [data, setData] = useState(null);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [showAll, setShowAll] = useState(false);
        const [filter, setFilter] = useState("all");
        // 'opponent' shows the opponent's build, 'me' shows the user's. The
        // OpponentProfile passes perspective="opponent" so that drawer
        // defaults to the OPPONENT'S build (which is the entire point of
        // viewing an opponent card). Other surfaces default to "me".
        const [perspective, setPerspective] = useState(perspectiveProp || "me");
        // Tracks the on-demand opponent-build extraction state. Older games
        // don't have opp_build_log persisted yet; clicking "Extract" POSTs
        // to /games/:id/opp-build-order, which re-parses the replay and
        // writes opp_build_log + opp_early_build_log back to meta_database.
        const [extracting, setExtracting] = useState(false);
        const [extractError, setExtractError] = useState(null);

        useEffect(() => {
          let cancelled = false;
          setLoading(true);
          setError(null);
          fetch(`${API}/games/${encodeURIComponent(gameId)}/build-order`)
            .then((r) =>
              r.ok ? r.json() : r.json().then((j) => Promise.reject(j)),
            )
            .then((j) => {
              if (!cancelled) {
                setData(j);
                setLoading(false);
              }
            })
            .catch((e) => {
              if (!cancelled) {
                setError(e.error || "fetch failed");
                setLoading(false);
              }
            });
          return () => {
            cancelled = true;
          };
        }, [gameId]);

        if (loading)
          return (
            <div className="text-xs text-neutral-500 px-3 py-2">
              loading build order…
            </div>
          );
        if (error)
          return (
            <div className="text-xs text-loss-500 px-3 py-2">
              build-order unavailable: {error}
            </div>
          );
        if (!data) return null;

        const myAllEvents = data.events || [];
        const myEarlyEvents = data.early_events || [];
        const oppAllEvents = data.opp_events || [];
        const oppEarlyEvents = data.opp_early_events || [];
        const oppAvailable =
          !!data.opp_build_available && oppAllEvents.length > 0;

        // Effective perspective: if the caller asked for the opponent's
        // build but we don't have it yet, surface the extract affordance
        // instead of silently flipping back to the user's build.
        const wantOpp = perspective === "opponent";
        const allEvents = wantOpp ? oppAllEvents : myAllEvents;
        const earlyEvents = wantOpp ? oppEarlyEvents : myEarlyEvents;
        const events = showAll ? allEvents : earlyEvents;
        const filtered =
          filter === "all"
            ? events
            : filter === "buildings"
              ? events.filter((e) => e.is_building)
              : filter === "units"
                ? events.filter(
                    (e) => !e.is_building && e.category !== "upgrade",
                  )
                : events.filter((e) => e.category === "upgrade");

        const myRace = data.my_race || data.myRace || "";
        const oppName = data.opponent || "";
        const oppRace = (data.opp_race || "").toString();
        const headerLabel = wantOpp
          ? `${oppName || "Opponent"}'s Build${oppRace ? ` (${oppRace})` : ""}`
          : `Your Build${myRace ? ` (${myRace})` : ""}${oppName ? ` vs ${oppName}` : ""}${oppRace ? ` [${oppRace.charAt(0).toUpperCase()}]` : ""}`;

        const extractOppBuild = () => {
          setExtracting(true);
          setExtractError(null);
          fetch(`${API}/games/${encodeURIComponent(gameId)}/opp-build-order`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({}),
          })
            .then((r) =>
              r.ok ? r.json() : r.json().then((j) => Promise.reject(j)),
            )
            .then((j) => {
              // Merge the freshly-extracted events into local state so the
              // timeline rerenders without a full refetch.
              setData((d) =>
                Object.assign({}, d, {
                  opp_events: j.opp_events || [],
                  opp_early_events: j.opp_early_events || [],
                  opp_build_available: (j.opp_events || []).length > 0,
                  opp_race: j.opp_race || (d && d.opp_race),
                }),
              );
              setExtracting(false);
              setPerspective("opponent");
            })
            .catch((e) => {
              setExtractError(e.error || String(e));
              setExtracting(false);
            });
        };

        // Empty-state branches.
        if (wantOpp && !oppAvailable) {
          return (
            <div className="bg-base-900 ring-soft rounded-lg p-3 my-2 border border-base-700">
              <div className="flex items-center gap-2 mb-2 flex-wrap">
                <span className="text-[11px] uppercase tracking-wider text-neutral-500">
                  {oppName || "Opponent"}'s Build
                  {oppRace ? ` (${oppRace})` : ""}
                </span>
                <div className="ml-auto flex items-center gap-1 text-xs">
                  <button
                    className="px-2 py-0.5 rounded bg-base-700 text-neutral-300"
                    onClick={() => setPerspective("me")}
                  >
                    Show your build
                  </button>
                </div>
              </div>
              <div className="text-xs text-neutral-400 px-1 py-2">
                {extracting
                  ? "Re-parsing the replay file to pull the opponent’s build order…"
                  : "Opponent’s build order is not stored for this game yet."}
              </div>
              {extractError && (
                <div className="text-xs text-loss-500 px-1 pb-2">
                  Extract failed: {extractError}
                </div>
              )}
              <div className="flex items-center gap-2">
                <button
                  onClick={extractOppBuild}
                  disabled={extracting}
                  className="px-2.5 py-1 text-xs rounded bg-accent-500 text-white hover:opacity-90 disabled:opacity-50"
                  title="Re-parse the replay file to extract the opponent's build order."
                >
                  {extracting ? "Extracting…" : "Extract opponent build"}
                </button>
                <span className="text-[10px] text-neutral-500">
                  Requires the original .SC2Replay file to still be on disk (
                  {data.game_id ? `id ${data.game_id}` : "this game"}).
                </span>
              </div>
            </div>
          );
        }

        if (allEvents.length === 0) {
          return (
            <div className="text-xs text-neutral-500 px-3 py-2">
              No build_log on this game.
            </div>
          );
        }

        return (
          <div className="bg-base-900 ring-soft rounded-lg p-3 my-2 border border-base-700">
            <div className="flex items-center gap-2 mb-2 flex-wrap">
              <span className="text-[11px] uppercase tracking-wider text-neutral-500">
                {headerLabel}
              </span>
              <span className="text-xs text-neutral-400">
                {showAll
                  ? `full · ${allEvents.length} events`
                  : `first 5 min · ${earlyEvents.length} events`}
              </span>
              {/* Perspective toggle -- shown whenever we have at least one
              of the two timelines. "Opponent" is highlighted by default
              when this drawer is opened from the opponent profile. */}
              <div className="flex items-center gap-1 text-xs">
                <button
                  className={`px-2 py-0.5 rounded ${wantOpp ? "bg-accent-500 text-white" : "bg-base-700 text-neutral-300"}`}
                  onClick={() => setPerspective("opponent")}
                  disabled={!oppAvailable}
                  title={
                    oppAvailable
                      ? ""
                      : "Opponent build not extracted for this game yet"
                  }
                >
                  Opponent
                </button>
                <button
                  className={`px-2 py-0.5 rounded ${!wantOpp ? "bg-accent-500 text-white" : "bg-base-700 text-neutral-300"}`}
                  onClick={() => setPerspective("me")}
                >
                  You
                </button>
              </div>
              <div className="ml-auto flex items-center gap-1 text-xs">
                <button
                  className={`px-2 py-0.5 rounded ${filter === "all" ? "bg-accent-500 text-white" : "bg-base-700 text-neutral-300"}`}
                  onClick={() => setFilter("all")}
                >
                  All
                </button>
                <button
                  className={`px-2 py-0.5 rounded ${filter === "buildings" ? "bg-accent-500 text-white" : "bg-base-700 text-neutral-300"}`}
                  onClick={() => setFilter("buildings")}
                >
                  Buildings
                </button>
                <button
                  className={`px-2 py-0.5 rounded ${filter === "units" ? "bg-accent-500 text-white" : "bg-base-700 text-neutral-300"}`}
                  onClick={() => setFilter("units")}
                >
                  Units
                </button>
                <button
                  className={`px-2 py-0.5 rounded ${filter === "upgrades" ? "bg-accent-500 text-white" : "bg-base-700 text-neutral-300"}`}
                  onClick={() => setFilter("upgrades")}
                >
                  Upgrades
                </button>
                <button
                  className="px-2 py-0.5 rounded bg-base-700 text-neutral-300 ml-2"
                  onClick={() => setShowAll((s) => !s)}
                >
                  {showAll ? "Show 5 min" : "Show all"}
                </button>
              </div>
            </div>
            {!wantOpp && (
              <div className="text-[10px] text-neutral-500 mb-2">
                This is YOUR build (captured from the replay). Switch to
                "Opponent" to see {oppName || "their"} build.
                {oppName
                  ? ` Detected strategy: "${data.opp_strategy || "—"}".`
                  : ""}
              </div>
            )}
            {wantOpp && (
              <div className="text-[10px] text-neutral-500 mb-2">
                {oppName || "Opponent"}'s deduped first-5-min milestones.
                Detected strategy: "{data.opp_strategy || "—"}".
              </div>
            )}
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-1.5 max-h-[420px] overflow-y-auto">
              {filtered.map((e, i) => (
                <div
                  key={i}
                  className="flex items-center gap-2 bg-base-800 rounded px-2 py-1"
                >
                  <span className="font-mono text-[11px] text-neutral-400 w-10 tabular-nums">
                    {e.time_display}
                  </span>
                  <span
                    className={`inline-block w-2 h-2 rounded-full ${RACE_DOT_CLASS[e.race] || RACE_DOT_CLASS.Neutral}`}
                  />
                  <span
                    className="text-sm text-neutral-200 flex-1 truncate"
                    title={e.name}
                  >
                    {e.display}
                  </span>
                  <span
                    className={`text-[10px] px-1.5 py-0.5 rounded ${CATEGORY_BADGE_CLASS[e.category] || CATEGORY_BADGE_CLASS.unknown}`}
                  >
                    {e.category}
                  </span>
                </div>
              ))}
            </div>
            {filtered.length === 0 && (
              <div className="text-xs text-neutral-500 px-2 py-3">
                No events match this filter.
              </div>
            )}
          </div>
        );
      }

      // Renders a click-to-expand macro breakdown panel for one game. Reuses
      // the /games/:id/build-order payload (which now includes top_3_leaks and
      // macro_breakdown). For games without a stored breakdown, offers a
      // "Recompute" button that POSTs to /games/:id/macro-breakdown to re-parse
      // the replay file.
      function MacroBreakdownPanel({ gameId, initialMacro }) {
        const [data, setData] = useState(null);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [recomputing, setRecomputing] = useState(false);

        useEffect(() => {
          let cancelled = false;
          setLoading(true);
          setError(null);
          fetch(`${API}/games/${encodeURIComponent(gameId)}/build-order`)
            .then((r) =>
              r.ok ? r.json() : r.json().then((j) => Promise.reject(j)),
            )
            .then((j) => {
              if (!cancelled) {
                setData(j);
                setLoading(false);
              }
            })
            .catch((e) => {
              if (!cancelled) {
                setError(e.error || "fetch failed");
                setLoading(false);
              }
            });
          return () => {
            cancelled = true;
          };
        }, [gameId]);

        const recompute = () => {
          setRecomputing(true);
          setError(null);
          fetch(`${API}/games/${encodeURIComponent(gameId)}/macro-breakdown`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({}),
          })
            .then((r) =>
              r.ok ? r.json() : r.json().then((j) => Promise.reject(j)),
            )
            .then((j) => {
              // Merge fresh breakdown into local data for instant rerender.
              setData((d) =>
                Object.assign({}, d, {
                  macro_score: j.macro_score,
                  top_3_leaks: j.top_3_leaks || [],
                  macro_breakdown: {
                    score: j.score,
                    race: j.race,
                    game_length_sec: j.game_length_sec,
                    raw: j.raw || {},
                    all_leaks: j.all_leaks || [],
                    top_3_leaks: j.top_3_leaks || [],
                  },
                }),
              );
              setRecomputing(false);
            })
            .catch((e) => {
              setError(e.error || "recompute failed");
              setRecomputing(false);
            });
        };

        if (loading)
          return (
            <div className="text-xs text-neutral-500 px-3 py-2">
              loading macro breakdown…
            </div>
          );
        if (error)
          return (
            <div className="text-xs text-loss-500 px-3 py-2">
              macro unavailable: {error}
            </div>
          );
        if (!data) return null;

        const score =
          typeof data.macro_score === "number"
            ? data.macro_score
            : initialMacro;
        const breakdown = data.macro_breakdown || null;
        const raw = (breakdown && breakdown.raw) || {};
        const leaks =
          breakdown &&
          Array.isArray(breakdown.all_leaks) &&
          breakdown.all_leaks.length > 0
            ? breakdown.all_leaks
            : Array.isArray(data.top_3_leaks)
              ? data.top_3_leaks
              : [];
        const race = (breakdown && breakdown.race) || "";

        const headlineColor =
          typeof score !== "number"
            ? "text-neutral-500"
            : score >= 75
              ? "text-win-500"
              : score >= 50
                ? "text-gold-500"
                : "text-loss-500";

        const wins = [];
        if (raw && (raw.supply_block_penalty || 0) <= 0)
          wins.push("No meaningful supply block - production never stalled.");
        if (raw && (raw.race_penalty || 0) <= 0) {
          if (race === "Zerg")
            wins.push("Inject cadence kept up with hatchery uptime.");
          else if (race === "Protoss")
            wins.push("Chrono usage matched nexus uptime.");
          else if (race === "Terran")
            wins.push("MULE drops kept pace with orbital energy.");
        }
        if (raw && (raw.float_penalty || 0) <= 0)
          wins.push("Bank stayed under control - no sustained float.");
        if (typeof raw.sq === "number" && raw.sq >= 80)
          wins.push(
            `Spending Quotient ${raw.sq.toFixed(0)} - Master/Pro-tier macro pacing.`,
          );
        else if (typeof raw.sq === "number" && raw.sq >= 70)
          wins.push(
            `Spending Quotient ${raw.sq.toFixed(0)} - solid Diamond-tier macro pacing.`,
          );

        const racePenaltyLabel =
          race === "Zerg"
            ? "Inject penalty"
            : race === "Protoss"
              ? "Chrono penalty"
              : race === "Terran"
                ? "MULE penalty"
                : "Race-mechanic penalty";

        return (
          <div className="bg-base-900 ring-soft rounded-lg p-3 my-2 border border-base-700">
            <div className="flex items-center gap-3 mb-3 flex-wrap">
              <span className="text-[11px] uppercase tracking-wider text-neutral-500">
                Macro Breakdown
              </span>
              <span
                className={`text-2xl font-bold tabular-nums ${headlineColor}`}
              >
                {typeof score === "number" ? score : "—"}
                <span className="text-sm text-neutral-500 font-normal">
                  {" "}
                  / 100
                </span>
              </span>
              <div className="ml-auto">
                <button
                  onClick={recompute}
                  disabled={recomputing}
                  className="px-2.5 py-1 text-xs rounded bg-base-700 hover:bg-base-600 text-neutral-200 disabled:opacity-50"
                  title="Re-parse the replay file to (re)compute the macro breakdown."
                >
                  {recomputing ? "Recomputing…" : "Recompute"}
                </button>
              </div>
            </div>

            {breakdown ? (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                {/* How it was calculated */}
                <div className="bg-base-800 rounded p-3">
                  <div className="text-[11px] uppercase tracking-wider text-neutral-500 mb-2">
                    How this number was calculated
                  </div>
                  <div className="text-xs text-neutral-400 mb-2">
                    Headline = Spending Quotient (SQ) - 5, then small penalties
                    for the SC2-specific macro disciplines (clamped 0..100).
                  </div>
                  <table className="w-full text-xs">
                    <tbody className="divide-y divide-base-700">
                      {typeof raw.sq === "number" && (
                        <tr>
                          <td className="py-1 text-neutral-300">
                            Spending Quotient (SQ)
                          </td>
                          <td className="py-1 text-right tabular-nums text-neutral-200">
                            {raw.sq.toFixed(1)}
                          </td>
                        </tr>
                      )}
                      {typeof raw.base_score === "number" && (
                        <tr>
                          <td className="py-1 text-neutral-300">
                            Base score (SQ - 5)
                          </td>
                          <td className="py-1 text-right tabular-nums text-neutral-200">
                            {raw.base_score.toFixed(1)}
                          </td>
                        </tr>
                      )}
                      <tr>
                        <td className="py-1 text-neutral-300">
                          Supply-block penalty
                        </td>
                        <td
                          className={`py-1 text-right tabular-nums ${(raw.supply_block_penalty || 0) > 0 ? "text-loss-500" : "text-win-500"}`}
                        >
                          -{Number(raw.supply_block_penalty || 0).toFixed(1)}
                        </td>
                      </tr>
                      <tr>
                        <td className="py-1 text-neutral-300">
                          {racePenaltyLabel}
                        </td>
                        <td
                          className={`py-1 text-right tabular-nums ${(raw.race_penalty || 0) > 0 ? "text-loss-500" : "text-win-500"}`}
                        >
                          -{Number(raw.race_penalty || 0).toFixed(1)}
                        </td>
                      </tr>
                      <tr>
                        <td className="py-1 text-neutral-300">
                          Mineral-float penalty
                        </td>
                        <td
                          className={`py-1 text-right tabular-nums ${(raw.float_penalty || 0) > 0 ? "text-loss-500" : "text-win-500"}`}
                        >
                          -{Number(raw.float_penalty || 0).toFixed(1)}
                        </td>
                      </tr>
                      <tr className="font-semibold">
                        <td className="py-1 text-neutral-200">
                          Final score (clamped)
                        </td>
                        <td
                          className={`py-1 text-right tabular-nums ${headlineColor}`}
                        >
                          {typeof score === "number" ? score : "—"}
                        </td>
                      </tr>
                    </tbody>
                  </table>

                  {/* Discipline metrics */}
                  {(raw.injects_actual != null ||
                    raw.chronos_actual != null ||
                    raw.mules_actual != null ||
                    raw.supply_blocked_seconds != null ||
                    raw.mineral_float_spikes != null) && (
                    <div className="mt-3 text-xs text-accent-400">
                      <div className="text-[10px] uppercase tracking-wider text-neutral-500 mb-1">
                        Discipline metrics
                      </div>
                      {raw.injects_actual != null &&
                        raw.injects_expected != null && (
                          <div>
                            Injects: {raw.injects_actual} of ~
                            {raw.injects_expected} expected (
                            {Math.round(
                              (100 * raw.injects_actual) /
                                Math.max(1, raw.injects_expected),
                            )}
                            %)

                      {raw.chronos_actual != null &&
                        raw.chronos_expected != null && (
                          <div>
                            Chronos: {raw.chronos_actual} of ~
                            {raw.chronos_expected} expected (
                            {Math.round(
                              (100 * raw.chronos_actual) /

                            %)

                      {raw.mules_actual != null &&

                      {raw.supply_blocked_seconds != null && (
