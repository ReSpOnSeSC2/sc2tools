      // ============================================================
      // BUILD-ORDER TIMELINE  (per-game, click-to-expand)
      // ============================================================
      // Color-classify build-order events by race so the timeline reads at a
      // glance. Tailwind classes are duplicated from the .race-X CSS at top
      // of the file but applied per-event.
      const RACE_DOT_CLASS = {
        Protoss: "bg-amber-400",
        Terran: "bg-blue-400",
        Zerg: "bg-purple-400",
        Neutral: "bg-neutral-500",
      };
      const CATEGORY_BADGE_CLASS = {
        townhall: "bg-yellow-700/60 text-yellow-200",
        builder: "bg-blue-700/60 text-blue-200",
        tech: "bg-purple-700/60 text-purple-200",
        defense: "bg-red-700/60 text-red-200",
        supply: "bg-cyan-700/60 text-cyan-200",
        worker: "bg-neutral-700/60 text-neutral-300",
        army: "bg-orange-700/60 text-orange-200",
        caster: "bg-fuchsia-700/60 text-fuchsia-200",
        air: "bg-sky-700/60 text-sky-200",
        detector: "bg-emerald-700/60 text-emerald-200",
        transport: "bg-teal-700/60 text-teal-200",
        hero: "bg-rose-700/60 text-rose-200",
        spawn: "bg-neutral-700/40 text-neutral-400",
        upgrade: "bg-indigo-700/60 text-indigo-200",
        unknown: "bg-neutral-700/40 text-neutral-500",
      };

      function BuildOrderTimeline({ gameId, perspective: perspectiveProp }) {
        const [data, setData] = useState(null);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [showAll, setShowAll] = useState(false);
        const [filter, setFilter] = useState("all");
        // 'opponent' shows the opponent's build, 'me' shows the user's. The
        // OpponentProfile passes perspective="opponent" so that drawer
        // defaults to the OPPONENT'S build (which is the entire point of
        // viewing an opponent card). Other surfaces default to "me".
        const [perspective, setPerspective] = useState(perspectiveProp || "me");
        // Tracks the on-demand opponent-build extraction state. Older games
        // don't have opp_build_log persisted yet; clicking "Extract" POSTs
        // to /games/:id/opp-build-order, which re-parses the replay and
        // writes opp_build_log + opp_early_build_log back to meta_database.
        const [extracting, setExtracting] = useState(false);
        const [extractError, setExtractError] = useState(null);

        useEffect(() => {
          let cancelled = false;
          setLoading(true);
          setError(null);
          fetch(`${API}/games/${encodeURIComponent(gameId)}/build-order`)
            .then((r) =>
              r.ok ? r.json() : r.json().then((j) => Promise.reject(j)),
            )
            .then((j) => {
              if (!cancelled) {
                setData(j);
                setLoading(false);
              }
            })
            .catch((e) => {
              if (!cancelled) {
                setError(e.error || "fetch failed");
                setLoading(false);
              }
            });
          return () => {
            cancelled = true;
          };
        }, [gameId]);

        if (loading)
          return (
            <div className="text-xs text-neutral-500 px-3 py-2">
              loading build order…
            </div>
          );
        if (error)
          return (
            <div className="text-xs text-loss-500 px-3 py-2">
              build-order unavailable: {error}
            </div>
          );
        if (!data) return null;

        const myAllEvents = data.events || [];
        const myEarlyEvents = data.early_events || [];
        const oppAllEvents = data.opp_events || [];
        const oppEarlyEvents = data.opp_early_events || [];
        const oppAvailable =
          !!data.opp_build_available && oppAllEvents.length > 0;

        // Effective perspective: if the caller asked for the opponent's
        // build but we don't have it yet, surface the extract affordance
        // instead of silently flipping back to the user's build.
        const wantOpp = perspective === "opponent";
        const allEvents = wantOpp ? oppAllEvents : myAllEvents;
        const earlyEvents = wantOpp ? oppEarlyEvents : myEarlyEvents;
        const events = showAll ? allEvents : earlyEvents;
        const filtered =
          filter === "all"
            ? events
            : filter === "buildings"
              ? events.filter((e) => e.is_building)
              : filter === "units"
                ? events.filter(
                    (e) => !e.is_building && e.category !== "upgrade",
                  )
                : events.filter((e) => e.category === "upgrade");

        const myRace = data.my_race || data.myRace || "";
        const oppName = data.opponent || "";
        const oppRace = (data.opp_race || "").toString();
        const headerLabel = wantOpp
          ? `${oppName || "Opponent"}'s Build${oppRace ? ` (${oppRace})` : ""}`
          : `Your Build${myRace ? ` (${myRace})` : ""}${oppName ? ` vs ${oppName}` : ""}${oppRace ? ` [${oppRace.charAt(0).toUpperCase()}]` : ""}`;

        const extractOppBuild = () => {
          setExtracting(true);
          setExtractError(null);
          fetch(`${API}/games/${encodeURIComponent(gameId)}/opp-build-order`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({}),
          })
            .then((r) =>
              r.ok ? r.json() : r.json().then((j) => Promise.reject(j)),
            )
            .then((j) => {
              // Merge the freshly-extracted events into local state so the
              // timeline rerenders without a full refetch.
              setData((d) =>
                Object.assign({}, d, {
                  opp_events: j.opp_events || [],
                  opp_early_events: j.opp_early_events || [],
                  opp_build_available: (j.opp_events || []).length > 0,
                  opp_race: j.opp_race || (d && d.opp_race),
                }),
              );
              setExtracting(false);
              setPerspective("opponent");
            })
            .catch((e) => {
              setExtractError(e.error || String(e));
              setExtracting(false);
            });
        };

        // Empty-state branches.
        if (wantOpp && !oppAvailable) {
          return (
            <div className="bg-base-900 ring-soft rounded-lg p-3 my-2 border border-base-700">
              <div className="flex items-center gap-2 mb-2 flex-wrap">
                <span className="text-[11px] uppercase tracking-wider text-neutral-500">
                  {oppName || "Opponent"}'s Build
                  {oppRace ? ` (${oppRace})` : ""}
                </span>
                <div className="ml-auto flex items-center gap-1 text-xs">
                  <button
                    className="px-2 py-0.5 rounded bg-base-700 text-neutral-300"
                    onClick={() => setPerspective("me")}
                  >
                    Show your build
                  </button>
                </div>
              </div>
              <div className="text-xs text-neutral-400 px-1 py-2">
                {extracting
                  ? "Re-parsing the replay file to pull the opponent’s build order…"
                  : "Opponent’s build order is not stored for this game yet."}
              </div>
              {extractError && (
                <div className="text-xs text-loss-500 px-1 pb-2">
                  Extract failed: {extractError}
                </div>
              )}
              <div className="flex items-center gap-2">
                <button
                  onClick={extractOppBuild}
                  disabled={extracting}
                  className="px-2.5 py-1 text-xs rounded bg-accent-500 text-white hover:opacity-90 disabled:opacity-50"
                  title="Re-parse the replay file to extract the opponent's build order."
                >
                  {extracting ? "Extracting…" : "Extract opponent build"}
                </button>
                <span className="text-[10px] text-neutral-500">
                  Requires the original .SC2Replay file to still be on disk (
                  {data.game_id ? `id ${data.game_id}` : "this game"}).
                </span>
              </div>
            </div>
          );
        }

        if (allEvents.length === 0) {
          return (
            <div className="text-xs text-neutral-500 px-3 py-2">
              No build_log on this game.
            </div>
          );
        }

        return (
          <div className="bg-base-900 ring-soft rounded-lg p-3 my-2 border border-base-700">
            <div className="flex items-center gap-2 mb-2 flex-wrap">
              <span className="text-[11px] uppercase tracking-wider text-neutral-500">
                {headerLabel}
              </span>
              <span className="text-xs text-neutral-400">
                {showAll
                  ? `full · ${allEvents.length} events`
                  : `first 5 min · ${earlyEvents.length} events`}
              </span>
              {/* Perspective toggle -- shown whenever we have at least one
              of the two timelines. "Opponent" is highlighted by default
              when this drawer is opened from the opponent profile. */}
              <div className="flex items-center gap-1 text-xs">
                <button
                  className={`px-2 py-0.5 rounded ${wantOpp ? "bg-accent-500 text-white" : "bg-base-700 text-neutral-300"}`}
                  onClick={() => setPerspective("opponent")}
                  disabled={!oppAvailable}
                  title={
                    oppAvailable
                      ? ""
                      : "Opponent build not extracted for this game yet"
                  }
                >
                  Opponent
                </button>
                <button
                  className={`px-2 py-0.5 rounded ${!wantOpp ? "bg-accent-500 text-white" : "bg-base-700 text-neutral-300"}`}
                  onClick={() => setPerspective("me")}
                >
                  You
                </button>
              </div>
              <div className="ml-auto flex items-center gap-1 text-xs">
                <button
                  className={`px-2 py-0.5 rounded ${filter === "all" ? "bg-accent-500 text-white" : "bg-base-700 text-neutral-300"}`}
                  onClick={() => setFilter("all")}
                >
                  All
                </button>
                <button
                  className={`px-2 py-0.5 rounded ${filter === "buildings" ? "bg-accent-500 text-white" : "bg-base-700 text-neutral-300"}`}
                  onClick={() => setFilter("buildings")}
                >
                  Buildings
                </button>
                <button
                  className={`px-2 py-0.5 rounded ${filter === "units" ? "bg-accent-500 text-white" : "bg-base-700 text-neutral-300"}`}
                  onClick={() => setFilter("units")}
                >
                  Units
                </button>
                <button
                  className={`px-2 py-0.5 rounded ${filter === "upgrades" ? "bg-accent-500 text-white" : "bg-base-700 text-neutral-300"}`}
                  onClick={() => setFilter("upgrades")}
                >
                  Upgrades
                </button>
                <button
                  className="px-2 py-0.5 rounded bg-base-700 text-neutral-300 ml-2"
                  onClick={() => setShowAll((s) => !s)}
                >
                  {showAll ? "Show 5 min" : "Show all"}
                </button>
              </div>
            </div>
            {!wantOpp && (
              <div className="text-[10px] text-neutral-500 mb-2">
                This is YOUR build (captured from the replay). Switch to
                "Opponent" to see {oppName || "their"} build.
                {oppName
                  ? ` Detected strategy: "${data.opp_strategy || "—"}".`
                  : ""}
              </div>
            )}
            {wantOpp && (
              <div className="text-[10px] text-neutral-500 mb-2">
                {oppName || "Opponent"}'s deduped first-5-min milestones.
                Detected strategy: "{data.opp_strategy || "—"}".
              </div>
            )}
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-1.5 max-h-[420px] overflow-y-auto">
              {filtered.map((e, i) => (
                <div
                  key={i}
                  className="flex items-center gap-2 bg-base-800 rounded px-2 py-1"
                >
                  <span className="font-mono text-[11px] text-neutral-400 w-10 tabular-nums">
                    {e.time_display}
                  </span>
                  <span
                    className={`inline-block w-2 h-2 rounded-full ${RACE_DOT_CLASS[e.race] || RACE_DOT_CLASS.Neutral}`}
                  />
                  <span
                    className="text-sm text-neutral-200 flex-1 truncate"
                    title={e.name}
                  >
                    {e.display}
                  </span>
                  <span
                    className={`text-[10px] px-1.5 py-0.5 rounded ${CATEGORY_BADGE_CLASS[e.category] || CATEGORY_BADGE_CLASS.unknown}`}
                  >
                    {e.category}
                  </span>
                </div>
              ))}
            </div>
            {filtered.length === 0 && (
              <div className="text-xs text-neutral-500 px-2 py-3">
                No events match this filter.
              </div>
            )}
          </div>
        );
      }

      // Renders a click-to-expand macro breakdown panel for one game. Reuses
      // the /games/:id/build-order payload (which now includes top_3_leaks and
      // macro_breakdown). For games without a stored breakdown, offers a
      // "Recompute" button that POSTs to /games/:id/macro-breakdown to re-parse
      // the replay file.
      function MacroBreakdownPanel({ gameId, initialMacro }) {
        const [data, setData] = useState(null);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [recomputing, setRecomputing] = useState(false);

        useEffect(() => {
          let cancelled = false;
          setLoading(true);
          setError(null);
          fetch(`${API}/games/${encodeURIComponent(gameId)}/build-order`)
            .then((r) =>
              r.ok ? r.json() : r.json().then((j) => Promise.reject(j)),
            )
            .then((j) => {
              if (!cancelled) {
                setData(j);
                setLoading(false);
              }
            })
            .catch((e) => {
              if (!cancelled) {
                setError(e.error || "fetch failed");
                setLoading(false);
              }
            });
          return () => {
            cancelled = true;
          };
        }, [gameId]);

        const recompute = () => {
          setRecomputing(true);
          setError(null);
          fetch(`${API}/games/${encodeURIComponent(gameId)}/macro-breakdown`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({}),
          })
            .then((r) =>
              r.ok ? r.json() : r.json().then((j) => Promise.reject(j)),
            )
            .then((j) => {
              // Merge fresh breakdown into local data for instant rerender.
              setData((d) =>
                Object.assign({}, d, {
                  macro_score: j.macro_score,
                  top_3_leaks: j.top_3_leaks || [],
                  macro_breakdown: {
                    score: j.score,
                    race: j.race,
                    game_length_sec: j.game_length_sec,
                    raw: j.raw || {},
                    all_leaks: j.all_leaks || [],
                    top_3_leaks: j.top_3_leaks || [],
                  },
                }),
              );
              setRecomputing(false);
            })
            .catch((e) => {
              setError(e.error || "recompute failed");
              setRecomputing(false);
            });
        };

        if (loading)
          return (
            <div className="text-xs text-neutral-500 px-3 py-2">
              loading macro breakdown…
            </div>
          );
        if (error)
          return (
            <div className="text-xs text-loss-500 px-3 py-2">
              macro unavailable: {error}
            </div>
          );
        if (!data) return null;

        const score =
          typeof data.macro_score === "number"
            ? data.macro_score
            : initialMacro;
        const breakdown = data.macro_breakdown || null;
        const raw = (breakdown && breakdown.raw) || {};
        const leaks =
          breakdown &&
          Array.isArray(breakdown.all_leaks) &&
          breakdown.all_leaks.length > 0
            ? breakdown.all_leaks
            : Array.isArray(data.top_3_leaks)
              ? data.top_3_leaks
              : [];
        const race = (breakdown && breakdown.race) || "";

        const headlineColor =
          typeof score !== "number"
            ? "text-neutral-500"
            : score >= 75
              ? "text-win-500"
              : score >= 50
                ? "text-gold-500"
                : "text-loss-500";

        const wins = [];
        if (raw && (raw.supply_block_penalty || 0) <= 0)
          wins.push("No meaningful supply block - production never stalled.");
        if (raw && (raw.race_penalty || 0) <= 0) {
          if (race === "Zerg")
            wins.push("Inject cadence kept up with hatchery uptime.");
          else if (race === "Protoss")
            wins.push("Chrono usage matched nexus uptime.");
          else if (race === "Terran")
            wins.push("MULE drops kept pace with orbital energy.");
        }
        if (raw && (raw.float_penalty || 0) <= 0)
          wins.push("Bank stayed under control - no sustained float.");
        if (typeof raw.sq === "number" && raw.sq >= 80)
          wins.push(
            `Spending Quotient ${raw.sq.toFixed(0)} - Master/Pro-tier macro pacing.`,
          );
        else if (typeof raw.sq === "number" && raw.sq >= 70)
          wins.push(
            `Spending Quotient ${raw.sq.toFixed(0)} - solid Diamond-tier macro pacing.`,
          );

        const racePenaltyLabel =
          race === "Zerg"
            ? "Inject penalty"
            : race === "Protoss"
              ? "Chrono penalty"
              : race === "Terran"
                ? "MULE penalty"
                : "Race-mechanic penalty";

        return (
          <div className="bg-base-900 ring-soft rounded-lg p-3 my-2 border border-base-700">
            <div className="flex items-center gap-3 mb-3 flex-wrap">
              <span className="text-[11px] uppercase tracking-wider text-neutral-500">
                Macro Breakdown
              </span>
              <span
                className={`text-2xl font-bold tabular-nums ${headlineColor}`}
              >
                {typeof score === "number" ? score : "—"}
                <span className="text-sm text-neutral-500 font-normal">
                  {" "}
                  / 100
                </span>
              </span>
              <div className="ml-auto">
                <button
                  onClick={recompute}
                  disabled={recomputing}
                  className="px-2.5 py-1 text-xs rounded bg-base-700 hover:bg-base-600 text-neutral-200 disabled:opacity-50"
                  title="Re-parse the replay file to (re)compute the macro breakdown."
                >
                  {recomputing ? "Recomputing…" : "Recompute"}
                </button>
              </div>
            </div>

            {breakdown ? (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                {/* How it was calculated */}
                <div className="bg-base-800 rounded p-3">
                  <div className="text-[11px] uppercase tracking-wider text-neutral-500 mb-2">
                    How this number was calculated
                  </div>
                  <div className="text-xs text-neutral-400 mb-2">
                    Headline = Spending Quotient (SQ) - 5, then small penalties
                    for the SC2-specific macro disciplines (clamped 0..100).
                  </div>
                  <table className="w-full text-xs">
                    <tbody className="divide-y divide-base-700">
                      {typeof raw.sq === "number" && (
                        <tr>
                          <td className="py-1 text-neutral-300">
                            Spending Quotient (SQ)
                          </td>
                          <td className="py-1 text-right tabular-nums text-neutral-200">
                            {raw.sq.toFixed(1)}
                          </td>
                        </tr>
                      )}
                      {typeof raw.base_score === "number" && (
                        <tr>
                          <td className="py-1 text-neutral-300">
                            Base score (SQ - 5)
                          </td>
                          <td className="py-1 text-right tabular-nums text-neutral-200">
                            {raw.base_score.toFixed(1)}
                          </td>
                        </tr>
                      )}
                      <tr>
                        <td className="py-1 text-neutral-300">
                          Supply-block penalty
                        </td>
                        <td
                          className={`py-1 text-right tabular-nums ${(raw.supply_block_penalty || 0) > 0 ? "text-loss-500" : "text-win-500"}`}
                        >
                          -{Number(raw.supply_block_penalty || 0).toFixed(1)}
                        </td>
                      </tr>
                      <tr>
                        <td className="py-1 text-neutral-300">
                          {racePenaltyLabel}
                        </td>
                        <td
                          className={`py-1 text-right tabular-nums ${(raw.race_penalty || 0) > 0 ? "text-loss-500" : "text-win-500"}`}
                        >
                          -{Number(raw.race_penalty || 0).toFixed(1)}
                        </td>
                      </tr>
                      <tr>
                        <td className="py-1 text-neutral-300">
                          Mineral-float penalty
                        </td>
                        <td
                          className={`py-1 text-right tabular-nums ${(raw.float_penalty || 0) > 0 ? "text-loss-500" : "text-win-500"}`}
                        >
                          -{Number(raw.float_penalty || 0).toFixed(1)}
                        </td>
                      </tr>
                      <tr className="font-semibold">
                        <td className="py-1 text-neutral-200">
                          Final score (clamped)
                        </td>
                        <td
                          className={`py-1 text-right tabular-nums ${headlineColor}`}
                        >
                          {typeof score === "number" ? score : "—"}
                        </td>
                      </tr>
                    </tbody>
                  </table>

                  {/* Discipline metrics */}
                  {(raw.injects_actual != null ||
                    raw.chronos_actual != null ||
                    raw.mules_actual != null ||
                    raw.supply_blocked_seconds != null ||
                    raw.mineral_float_spikes != null) && (
                    <div className="mt-3 text-xs text-accent-400">
                      <div className="text-[10px] uppercase tracking-wider text-neutral-500 mb-1">
                        Discipline metrics
                      </div>
                      {raw.injects_actual != null &&
                        raw.injects_expected != null && (
                          <div>
                            Injects: {raw.injects_actual} of ~
                            {raw.injects_expected} expected (
                            {Math.round(
                              (100 * raw.injects_actual) /
                                Math.max(1, raw.injects_expected),
                            )}
                            %)
                          </div>
                        )}
                      {raw.chronos_actual != null &&
                        raw.chronos_expected != null && (
                          <div>
                            Chronos: {raw.chronos_actual} of ~
                            {raw.chronos_expected} expected (
                            {Math.round(
                              (100 * raw.chronos_actual) /
                                Math.max(1, raw.chronos_expected),
                            )}
                            %)
                          </div>
                        )}
                      {raw.mules_actual != null &&
                        raw.mules_expected != null && (
                          <div>
                            MULEs: {raw.mules_actual} of ~{raw.mules_expected}{" "}
                            expected (
                            {Math.round(
                              (100 * raw.mules_actual) /
                                Math.max(1, raw.mules_expected),
                            )}
                            %)
                          </div>
                        )}
                      {raw.supply_blocked_seconds != null && (
                        <div>
                          Supply-blocked:{" "}
                          {Math.round(raw.supply_blocked_seconds)}s total
                        </div>
                      )}
                      {raw.mineral_float_spikes != null && (
                        <div>
                          Mineral float spikes (&gt;800 after 4:00):{" "}
                          {raw.mineral_float_spikes} sample(s)
                        </div>
                      )}
                    </div>
                  )}
                </div>

                {/* What you did well + leaks */}
                <div className="bg-base-800 rounded p-3 space-y-3">
                  {wins.length > 0 && (
                    <div>
                      <div className="text-[11px] uppercase tracking-wider text-win-500 mb-1">
                        What you did well
                      </div>
                      <ul className="text-xs text-neutral-200 space-y-1 list-disc pl-4">
                        {wins.map((w, i) => (
                          <li key={i}>{w}</li>
                        ))}
                      </ul>
                    </div>
                  )}
                  <div>
                    <div className="text-[11px] uppercase tracking-wider text-loss-500 mb-1">
                      Where you lost economy
                    </div>
                    {leaks.length === 0 ? (
                      <div className="text-xs text-neutral-500">
                        No notable leaks detected.
                      </div>
                    ) : (
                      <ul className="space-y-2">
                        {leaks.map((lk, i) => (
                          <li key={i} className="bg-base-900 rounded p-2">
                            <div className="flex items-center gap-2">
                              <span className="text-xs font-semibold text-neutral-100">
                                {lk.name}
                              </span>
                              {typeof lk.penalty === "number" &&
                                lk.penalty > 0 && (
                                  <span className="ml-auto text-[11px] font-semibold text-loss-500 tabular-nums">
                                    -{lk.penalty.toFixed(1)} pts
                                  </span>
                                )}
                            </div>
                            <div className="text-[11px] text-neutral-400 mt-0.5">
                              {lk.detail || ""}
                            </div>
                            {typeof lk.mineral_cost === "number" &&
                              lk.mineral_cost > 0 && (
                                <div className="text-[11px] text-gold-500 mt-0.5">
                                  ~{lk.mineral_cost} min lost
                                </div>
                              )}
                          </li>
                        ))}
                      </ul>
                    )}
                  </div>
                </div>
              </div>
            ) : leaks.length > 0 ? (
              /* Older games without macro_breakdown but with top_3_leaks: show summary only. */
              <div className="bg-base-800 rounded p-3">
                <div className="text-[11px] uppercase tracking-wider text-loss-500 mb-2">
                  Top leaks
                </div>
                <ul className="space-y-2">
                  {leaks.map((lk, i) => (
                    <li key={i} className="bg-base-900 rounded p-2">
                      <div className="flex items-center gap-2">
                        <span className="text-xs font-semibold text-neutral-100">
                          {lk.name}
                        </span>
                        {typeof lk.penalty === "number" && lk.penalty > 0 && (
                          <span className="ml-auto text-[11px] font-semibold text-loss-500 tabular-nums">
                            -{Number(lk.penalty).toFixed(1)} pts
                          </span>
                        )}
                      </div>
                      <div className="text-[11px] text-neutral-400 mt-0.5">
                        {lk.detail || ""}
                      </div>
                      {typeof lk.mineral_cost === "number" &&
                        lk.mineral_cost > 0 && (
                          <div className="text-[11px] text-gold-500 mt-0.5">
                            ~{lk.mineral_cost} min lost
                          </div>
                        )}
                    </li>
                  ))}
                </ul>
                <div className="text-[11px] text-neutral-500 mt-2">
                  Detailed breakdown not stored for this game. Click "Recompute"
                  to re-parse the replay.
                </div>
              </div>
            ) : (
              <div className="bg-base-800 rounded p-3 text-xs text-neutral-500">
                No macro detail stored for this game. Click "Recompute" to
                re-parse the replay.
              </div>
            )}
          </div>
        );
      }

      function GamesTableWithBuildOrder({
        games,
        perspective,
        targetGameId,
        targetGameSeq,
      }) {
        // expandedId tracks which row's drawer is open; expandedMode controls
        // whether the drawer shows the build-order timeline ('build') or the
        // macro breakdown ('macro'). Both come from clicks on the same row.
        // `perspective` is forwarded to BuildOrderTimeline so the OpponentProfile
        // can default the drawer to the opponent's build (callers that don't
        // pass it get the user's build, the historical default).
        // `targetGameId` / `targetGameSeq` are an external focus signal: the
        // timings-drilldown 'open game →' link bumps the seq with the gameId
        // it wants to bring into view. We honor it by expanding the row and
        // scrolling the row into view; the seq bump means clicking the same
        // game twice still re-fires the effect.
        const [expandedId, setExpandedId] = useState(null);
        const [expandedMode, setExpandedMode] = useState("build");
        const tableRef = useRef(null);
        useEffect(() => {
          if (!targetGameId || !tableRef.current) return;
          setExpandedId(targetGameId);
          setExpandedMode("build");
          const el = tableRef.current.querySelector(
            `[data-game-row-id="${CSS && CSS.escape ? CSS.escape(targetGameId) : targetGameId}"]`,
          );
          if (el && typeof el.scrollIntoView === "function") {
            try {
              el.scrollIntoView({ behavior: "smooth", block: "center" });
            } catch (_) {
              el.scrollIntoView();
            }
          }
        }, [targetGameId, targetGameSeq]);
        return (
          <table ref={tableRef} className="w-full text-sm">
            <thead className="text-neutral-500 text-[11px] uppercase sticky top-0 bg-base-800">
              <tr>
                <th className="text-left py-1 px-2 w-6"></th>
                <th className="text-left py-1 px-2">Date</th>
                <th className="text-left py-1 px-2">Map</th>
                <th className="text-left py-1 px-2">Opponent</th>
                <th className="text-left py-1 px-2">Race</th>
                <th className="text-left py-1 px-2">Strategy</th>
                <th className="text-left py-1 px-2">My Build</th>
                <th className="text-right py-1 px-2">Macro</th>
                <th className="text-right py-1 px-2">Result</th>
              </tr>
            </thead>
            <tbody>
              {games.map((g, i) => {
                // A "real" id is one that came off the actual game record. The
                // synthetic `_idx_N` fallback exists only as a React key; we
                // must NOT use it to fetch /games/:id/build-order or the
                // backend will return 404 "game not found". Rows without a
                // real id are rendered non-interactive (no expand caret, no
                // macro click) instead of producing a broken expand drawer.
                const realId = g.id || g.game_id || null;
                const id = realId || `_idx_${i}`;
                const expandable = !!realId;
                const isOpen = expandable && expandedId === id;
                const macro =
                  typeof g.macro_score === "number" ? g.macro_score : null;
                const macroColor =
                  macro == null
                    ? "text-neutral-500"
                    : macro >= 75
                      ? "text-win-500"
                      : macro >= 50
                        ? "text-gold-500"
                        : "text-loss-500";
                const macroOpen = isOpen && expandedMode === "macro";
                return (
                  <Fragment key={id}>
                    <tr
                      data-game-row-id={id}
                      className={
                        "border-t border-base-700 " +
                        (expandable
                          ? "cursor-pointer hover:bg-base-700/40 "
                          : "") +
                        (isOpen ? "bg-base-700/30" : "")
                      }
                      onClick={() => {
                        if (!expandable) return;
                        if (isOpen && expandedMode === "build") {
                          setExpandedId(null);
                        } else {
                          setExpandedId(id);
                          setExpandedMode("build");
                        }
                      }}
                    >
                      <td className="py-1 px-2 text-neutral-500 select-none">
                        {expandable ? (isOpen ? "▾" : "▸") : ""}
                      </td>
                      <td className="py-1 px-2 text-neutral-400 font-mono text-xs">
                        {fmtDate(g.date)}
                      </td>
                      <td className="py-1 px-2 text-neutral-300">
                        {g.map || "—"}
                      </td>
                      <td className="py-1 px-2 text-neutral-300">
                        {g.opponent || "—"}
                      </td>
                      <td className={`py-1 px-2 ${raceClass(g.opp_race)}`}>
                        {(g.opp_race || "?")[0].toUpperCase()}
                      </td>
                      <td className="py-1 px-2 text-neutral-400">
                        {g.opp_strategy || "—"}
                      </td>
                      <td
                        className="py-1 px-2 text-neutral-300"
                        title="The build I played that game"
                      >
                        {g.my_build || "—"}
                      </td>
                      <td className="py-1 px-2 text-right">
                        {macro == null ? (
                          <span className="font-semibold tabular-nums text-neutral-500">
                            —
                          </span>
                        ) : expandable ? (
                          <button
                            onClick={(e) => {
                              e.stopPropagation();
                              if (macroOpen) {
                                setExpandedId(null);
                              } else {
                                setExpandedId(id);
                                setExpandedMode("macro");
                              }
                            }}
                            className={`font-semibold tabular-nums underline decoration-dotted underline-offset-2 hover:opacity-80 ${macroColor}`}
                            title="Click to see how this score was calculated"
                          >
                            {macro}
                          </button>
                        ) : (
                          <span
                            className={`font-semibold tabular-nums ${macroColor}`}
                            title="Replay metadata missing - run the analyzer on this replay to enable click-through."
                          >
                            {macro}
                          </span>
                        )}
                      </td>
                      <td
                        className={`py-1 px-2 text-right font-semibold ${g.result === "Win" || g.result === "Victory" ? "text-win-500" : g.result === "Loss" || g.result === "Defeat" ? "text-loss-500" : "text-neutral-500"}`}
                      >
                        {g.result || "—"}
                      </td>
                    </tr>
                    {isOpen && (
                      <tr className="bg-base-800/40">
                        <td colSpan={9} className="px-2 pb-3">
                          {expandedMode === "macro" ? (
                            <MacroBreakdownPanel
                              gameId={id}
                              initialMacro={macro}
                            />
                          ) : (
                            <BuildOrderTimeline
                              gameId={id}
                              perspective={perspective}
                            />
                          )}
                        </td>
                      </tr>
                    )}
                  </Fragment>
                );
              })}
            </tbody>
          </table>
        );
      }

      // ============================================================
      // OPPONENT DNA CARDS (used inside OpponentProfile below)
      // ============================================================
      function StrategyTendencyChart({ strategies }) {
        if (!strategies || strategies.length === 0)
          return <EmptyState sub="No strategy data yet" />;
        const total = strategies.reduce((s, x) => s + (x.count || 0), 0) || 1;
        const data = strategies.map((s) => ({
          name: s.strategy,
          winRate: (100 * (s.count || 0)) / total,
          games: s.count,
          _color: wrColor(s.winRate, s.wins + s.losses),
        }));
        return (
          <HBarChart
            data={data}
            height={Math.max(160, 40 * data.length + 60)}
            valueKey="winRate"
            maxValue={100}
            format={(v) => `${v.toFixed(0)}%`}
            colorFor={(d) => d._color}
          />
        );
      }

      /**
       * Drilldown drawer - opens when a timing card is clicked, shows every
       * game that contributed a sample for that token, sorted newest first.
       *
       * Layout: right-side off-canvas panel with backdrop. Focus is trapped
       * inside the panel while open; Escape closes it. We intentionally do
       * NOT introduce a new dialog framework -- this is a small fixed-
       * position div using the same `bg-base-800 ring-soft` chrome as the
       * Cards elsewhere in the SPA.
       */
      function TimingsDrilldownDrawer({
        open,
        onClose,
        token,
        info,
        matchupLabel,
        onOpenGame,
      }) {
        const panelRef = useRef(null);
        const closeBtnRef = useRef(null);
        const copyBtnRef = useRef(null);
        const [copyState, setCopyState] = useState("idle"); // idle | copied | error
        useEffect(() => {
          if (!open) return undefined;
          // Escape closes; Tab cycles focus inside the panel only (focus
          // trap). The trap is a small handler -- we just keep tabs from
          // jumping to elements outside the panel by snapping focus back to
          // either the close button or the copy button at the boundary.
          const focusables = () => {
            if (!panelRef.current) return [];
            return Array.from(
              panelRef.current.querySelectorAll(
                'a[href], button:not([disabled]), [tabindex]:not([tabindex="-1"])',
              ),
            ).filter((el) => el.offsetParent !== null);
          };
          const onKey = (e) => {
            if (e.key === "Escape") {
              onClose();
              return;
            }
            if (e.key !== "Tab") return;
            const list = focusables();
            if (list.length === 0) return;
            const first = list[0];
            const last = list[list.length - 1];
            if (e.shiftKey && document.activeElement === first) {
              e.preventDefault();
              last.focus();
            } else if (!e.shiftKey && document.activeElement === last) {
              e.preventDefault();
              first.focus();
            }
          };
          document.addEventListener("keydown", onKey);
          // Initial focus: the Close button (pre-existing affordance).
          const t = setTimeout(() => {
            const node =
              panelRef.current &&
              panelRef.current.querySelector("[data-autofocus]");
            if (node) node.focus();
          }, 30);
          return () => {
            document.removeEventListener("keydown", onKey);
            clearTimeout(t);
          };
        }, [open, onClose]);
        // Reset the copy button label each time the drawer reopens on a new token.
        useEffect(() => {
          setCopyState("idle");
        }, [token, open]);

        if (!open || !token || !info) return null;
        const samples = Array.isArray(info.samples) ? info.samples : [];
        const display = buildingDisplayName(token, token);
        const iconUrl = buildingIconUrl(token);
        const trend = TREND_GLYPHS[info.trend] || TREND_GLYPHS.unknown;

        const sourceLabel =
          info.source === "opp_build_log"
            ? "opponent's structures (sc2reader)"
            : "your build (proxy for matchup tendencies)";

        function copyAsMarkdown() {
          const lines = [];
          const ml = matchupLabel || "(matchup unknown)";
          const n = info.sampleCount || 0;
          lines.push(`### ${display} — ${ml} (n=${n})`);
          if (n >= 2 && info.p25Display && info.p75Display) {
            lines.push(
              `median ${info.medianDisplay} (p25–p75 ${info.p25Display}–${info.p75Display}` +
                (info.minDisplay && info.maxDisplay
                  ? `, range ${info.minDisplay}–${info.maxDisplay})`
                  : ")"),
            );
          } else {
            lines.push(`median ${info.medianDisplay || "—"}`);
          }
          lines.push("");
          lines.push("| Time | Date | Map | Matchup | Result | Source |");
          lines.push("|------|------|-----|---------|--------|--------|");
          for (const s of samples) {
            const ts = s.display || _format_seconds_safe(s.seconds);
            const dt = String(s.date || "").slice(0, 10) || "—";
            const mp = String(s.map || "—").replace(/\|/g, "/");
            const mu = `${(s.myRace || "?")[0].toUpperCase()} vs ${(s.oppRace || "?")[0].toUpperCase()}`;
            const res = s.result || (s.won ? "Win" : "Loss");
            const srcShort =
              info.source === "opp_build_log" ? "opp_log" : "my_log";
            lines.push(
              `| ${ts} | ${dt} | ${mp} | ${mu} | ${res} | ${srcShort} |`,
            );
          }
          const md = lines.join("\n") + "\n";
          // Prefer the Async Clipboard API; fall back to a hidden <textarea>
          // selection if the page isn't running on https / clipboard-perms
          // are denied (which is common on some local LAN deployments).
          const done = () => {
            setCopyState("copied");
            setTimeout(() => setCopyState("idle"), 1400);
          };
          const fail = () => {
            setCopyState("error");
            setTimeout(() => setCopyState("idle"), 1800);
          };
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard
              .writeText(md)
              .then(done)
              .catch(() => {
                try {
                  const ta = document.createElement("textarea");
                  ta.value = md;
                  ta.style.position = "fixed";
                  ta.style.left = "-1000px";
                  document.body.appendChild(ta);
                  ta.select();
                  document.execCommand("copy");
                  document.body.removeChild(ta);
                  done();
                } catch (_) {
                  fail();
                }
              });
          } else {
            try {
              const ta = document.createElement("textarea");
              ta.value = md;
              ta.style.position = "fixed";
              ta.style.left = "-1000px";
              document.body.appendChild(ta);
              ta.select();
              document.execCommand("copy");
              document.body.removeChild(ta);
              done();
            } catch (_) {
              fail();
            }
          }
        }

        const copyLabel =
          copyState === "copied"
            ? "Copied!"
            : copyState === "error"
              ? "Copy failed"
              : "Copy timings to clipboard";

        return (
          <div
            className="fixed inset-0 z-50 flex"
            role="dialog"
            aria-modal="true"
            aria-label={`${display} — drilldown`}
          >
            <div
              className="flex-1 bg-black/60"
              onClick={onClose}
              aria-hidden="true"
            />
            <aside
              ref={panelRef}
              className="w-[min(560px,95vw)] h-full bg-base-800 ring-soft shadow-soft
                     flex flex-col"
            >
              <header className="flex items-center gap-3 px-5 py-4 border-b border-base-700">
                {iconUrl && (
                  <img
                    src={iconUrl}
                    alt=""
                    className="w-9 h-9 object-contain"
                    onError={(e) => {
                      e.currentTarget.style.visibility = "hidden";
                    }}
                  />
                )}
                <div className="min-w-0 flex-1">
                  <div className="text-sm font-semibold text-neutral-100 truncate">
                    {display}
                  </div>
                  <div className="text-[11px] text-neutral-500 truncate">
                    {matchupLabel ? `${matchupLabel} · ` : ""}n=
                    {info.sampleCount} · median {info.medianDisplay}
                    {info.p25Display && info.p75Display && info.sampleCount >= 2
                      ? ` (${info.p25Display}–${info.p75Display})`
                      : ""}
                    {info.minDisplay && info.maxDisplay && info.sampleCount >= 2
                      ? ` · range ${info.minDisplay}–${info.maxDisplay}`
                      : ""}
                  </div>
                </div>
                <span
                  title={trend.label}
                  aria-label={trend.label}
                  style={{ color: trend.color }}
                  className="text-base font-semibold tabular-nums"
                >
                  {trend.glyph}
                </span>
                <button
                  ref={closeBtnRef}
                  data-autofocus
                  onClick={onClose}
                  className="text-xs uppercase tracking-wider text-neutral-400
                         hover:text-neutral-100 px-2 py-1 ring-soft rounded"
                  aria-label="Close drilldown"
                >
                  Close
                </button>
              </header>
              <div className="px-5 py-3 text-[11px] text-neutral-500 border-b border-base-700">
                {sourceLabel}
                {" · "}sorted newest first
              </div>
              <div
                className="flex-1 overflow-y-auto"
                data-testid="timings-drilldown-list"
              >
                {samples.length === 0 ? (
                  <EmptyState
                    title="No contributing games"
                    sub="This token has no samples in the current games."
                  />
                ) : (
                  <VirtualizedSampleList
                    samples={samples}
                    source={info.source || ""}
                    onOpenGame={onOpenGame}
                  />
                )}
              </div>
              <footer className="flex items-center gap-2 px-5 py-3 border-t border-base-700">
                <button
                  ref={copyBtnRef}
                  type="button"
                  onClick={copyAsMarkdown}
                  className={
                    "text-xs px-3 py-1.5 rounded ring-soft transition-colors " +
                    (copyState === "copied"
                      ? "bg-win-500/20 text-win-500"
                      : copyState === "error"
                        ? "bg-loss-500/20 text-loss-500"
                        : "bg-base-700 hover:bg-base-700/70 text-neutral-300")
                  }
                  aria-label="Copy contributing games as Markdown"
                  title="Copies a Markdown table of every contributing game to your clipboard."
                >
                  {copyLabel}
                </button>
                <button
                  type="button"
                  onClick={onClose}
                  className="ml-auto text-xs px-3 py-1.5 rounded ring-soft
                         bg-base-700 hover:bg-base-700/70 text-neutral-300"
                >
                  Close
                </button>
              </footer>
            </aside>
          </div>
        );
      }
      function _format_seconds_safe(s) {
        if (s == null) return "—";
        const n = Math.max(0, Math.floor(s));
        return Math.floor(n / 60) + ":" + String(n % 60).padStart(2, "0");
      }

      /**
       * IntersectionObserver-based virtual list for the drilldown samples.
       *
       * react-window isn't a dependency of this SPA (see package.json), so
       * this is a hand-rolled windowing pattern: render lightweight
       * placeholder rows for everything outside the viewport, swap in the
       * full row template for items the IntersectionObserver flags as
       * visible. Cuts initial DOM cost on opponents with hundreds of
       * contributing games while keeping native scroll (no virtual height
       * math, no jumpy scrollbar).
       */
      function VirtualizedSampleList({ samples, source, onOpenGame }) {
        const containerRef = useRef(null);
        const [visible, setVisible] = useState(() => {
          // Pre-flag the first 30 rows visible so the user sees something
          // immediately while the observer wires up.
          const set = new Set();
          for (let i = 0; i < Math.min(30, samples.length); i++) set.add(i);
          return set;
        });
        useEffect(() => {
          // Reset when the sample set changes (e.g. switching matchup chip).
          const set = new Set();
          for (let i = 0; i < Math.min(30, samples.length); i++) set.add(i);
          setVisible(set);
        }, [samples]);
        useEffect(() => {
          const root = containerRef.current;
          if (!root) return undefined;
          // No IntersectionObserver in the (rare) ancient browser case ->
          // render everything. Better to pay the DOM cost once than to
          // silently hide rows.
          if (typeof IntersectionObserver === "undefined") {
            const all = new Set();
            for (let i = 0; i < samples.length; i++) all.add(i);
            setVisible(all);
            return undefined;
          }
          const io = new IntersectionObserver(
            (entries) => {
              setVisible((prev) => {
                let changed = false;
                const next = new Set(prev);
                for (const e of entries) {
                  const i = parseInt(e.target.dataset.idx, 10);
                  if (Number.isNaN(i)) continue;
                  if (e.isIntersecting && !next.has(i)) {
                    next.add(i);
                    changed = true;
                  }
                }
                return changed ? next : prev;
              });
            },
            { root, rootMargin: "200px 0px", threshold: 0.01 },
          );
          // Observe every placeholder once it's mounted. Querying the DOM
          // here keeps the observer in sync with React renders without
          // forcing each row to wire up its own ref.
          const stubs = root.querySelectorAll("[data-virtual-row]");
          stubs.forEach((s) => io.observe(s));
          return () => io.disconnect();
        }, [samples]);

        const srcShort = source === "opp_build_log" ? "opp_log" : "my_log";

        return (
          <ul
            ref={containerRef}
            className="divide-y divide-base-700"
            data-testid="timings-drilldown-virtual-list"
          >
            {samples.map((s, i) => {
              const key = (s.gameId || "g") + ":" + i;
              if (!visible.has(i)) {
                // Placeholder: same vertical footprint as a real row so the
                // scrollbar tracks correctly. Carries the data-idx the
                // observer needs to flip it visible.
                return (
                  <li
                    key={key}
                    data-virtual-row
                    data-idx={i}
                    className="h-[58px]"
                    aria-hidden="true"
                  />
                );
              }
              const isWin =
                s.result === "Win" || s.result === "Victory" || !!s.won;
              const isLoss =
                s.result === "Loss" ||
                s.result === "Defeat" ||
                (!isWin && s.won === false);
              const pillBg = isWin ? "#3ddc97" : isLoss ? "#ef476f" : "#9aa3b2";
              const canOpen = !!s.gameId && typeof onOpenGame === "function";
              const onRowClick = canOpen
                ? () => onOpenGame(s.gameId)
                : undefined;
              return (
                <li
                  key={key}
                  data-virtual-row
                  data-idx={i}
                  role={canOpen ? "button" : undefined}
                  tabIndex={canOpen ? 0 : -1}
                  onClick={onRowClick}
                  onKeyDown={
                    canOpen
                      ? (e) => {
                          if (e.key === "Enter" || e.key === " ") {
                            e.preventDefault();
                            onRowClick();
                          }
                        }
                      : undefined
                  }
                  className={
                    "px-5 py-3 hover:bg-base-700/40 focus-within:bg-base-700/40 " +
                    (canOpen ? "cursor-pointer" : "")
                  }
                >
                  <div className="flex items-center gap-3 text-sm">
                    <span className="font-mono tabular-nums text-neutral-200 w-12">
                      {s.display || _format_seconds_safe(s.seconds)}
                    </span>
                    <span
                      className="text-neutral-300 truncate flex-1"
                      title={s.map || ""}
                    >
                      {s.map || "—"}
                    </span>
                    <span
                      className={raceClass(s.myRace) + " text-xs font-mono"}
                    >
                      {(s.myRace || "?")[0].toUpperCase()}
                    </span>
                    <span className="text-neutral-600 text-xs">vs</span>
                    <span
                      className={raceClass(s.oppRace) + " text-xs font-mono"}
                    >
                      {(s.oppRace || "?")[0].toUpperCase()}
                    </span>
                    <span
                      className="text-[10px] font-semibold tabular-nums px-1.5 py-0.5 rounded text-white"
                      style={{ background: pillBg }}
                      title={isWin ? "Win" : isLoss ? "Loss" : "Result unknown"}
                    >
                      {isWin ? "W" : isLoss ? "L" : "?"}
                    </span>
                  </div>
                  <div
                    className="mt-1 flex items-center justify-between
                              text-[11px] text-neutral-500"
                  >
                    <span title={s.date} className="font-mono">
                      {fmtRelDate(s.date)} ·{" "}
                      {String(s.date || "").slice(0, 10) || "—"}
                    </span>
                    <span className="flex items-center gap-2">
                      <span
                        className="text-[10px] uppercase tracking-wider text-neutral-500
                               px-1.5 py-0.5 rounded bg-base-700"
                        title={
                          source === "opp_build_log"
                            ? "parsed from opponent's build log (sc2reader)"
                            : "parsed from your build log"
                        }
                      >
                        {srcShort}
                      </span>
                      {canOpen ? (
                        <span
                          className="text-accent-400 hover:text-accent-500
                                     underline decoration-dotted underline-offset-2"
                          aria-hidden="true"
                        >
                          open game →
                        </span>
                      ) : null}
                    </span>
                  </div>
                </li>
              );
            })}
          </ul>
        );
      }

      /**
       * Matchup-aware Median Timings grid.
       *
       * Source of order: `data.medianTimingsOrder` from the API payload.
       * Source of taxonomy (display name, icon, race ownership): the
       * `window.TimingCatalog` script tag loaded at the top of the page.
       *
       * UI features:
       *   - Building icon (top-left), display name, hero median, p25-p75
       *     range, sample-count badge, win-rate pill, trend arrow.
       *   - Empty cards (sampleCount === 0) render dimmed + non-clickable
       *     subline "no samples"; still keyboard-focusable so screen-reader
       *     users can scan the matchup-relevant slots.
       *   - Click opens the side drilldown drawer with the contributing games.
       *   - Source filter pills above the grid filter by `source`. Choice
       *     persists in localStorage under `analyzer.timings.sourceFilter`.
       *   - aria-live summary line announces matchup + filter changes.
       */
      function MedianTimingsGrid({
        timings,
        order,
        matchupLabel,
        opponentName,
        matchupCounts,
        matchupTimings,
        onOpenGame,
      }) {
        // Source filter ('both' | 'opp' | 'self'), persisted in localStorage.
        const SF_KEY = "analyzer.timings.sourceFilter";
        const [sourceFilter, setSourceFilter] = useState(() => {
          try {
            const v =
              window.localStorage && window.localStorage.getItem(SF_KEY);
            return v === "opp" || v === "self" ? v : "both";
          } catch (_) {
            return "both";
          }
        });
        useEffect(() => {
          try {
            window.localStorage &&
              window.localStorage.setItem(SF_KEY, sourceFilter);
          } catch (_) {
            /* private mode: just live with in-memory state */
          }
        }, [sourceFilter]);

        // Per-matchup selector ('All' | matchup label, e.g. 'PvZ').
        // Persisted per-opponent under analyzer.timings.matchup[<opp_name>]
        // so each opponent remembers the last matchup the user inspected.
        const MS_KEY = "analyzer.timings.matchup";
        const opponentKey = opponentName || matchupLabel || "__none__";
        const matchupChips =
          matchupCounts && Object.keys(matchupCounts).length > 0
            ? Object.entries(matchupCounts).sort((a, b) => b[1] - a[1])
            : [];
        const [activeMatchup, setActiveMatchup] = useState(() => {
          try {
            const v =
              window.localStorage && window.localStorage.getItem(MS_KEY);
            const obj = v ? JSON.parse(v) : null;
            const stored = obj && obj[opponentKey];
            // Validate: only honor the saved value if it's still a real chip.
            if (stored === "All" || stored == null) return "All";
            if (matchupCounts && matchupCounts[stored]) return stored;
            return "All";
          } catch (_) {
            return "All";
          }
        });
        useEffect(() => {
          try {
            if (!window.localStorage) return;
            const v = window.localStorage.getItem(MS_KEY);
            const obj = (v ? JSON.parse(v) : null) || {};
            obj[opponentKey] = activeMatchup;
            window.localStorage.setItem(MS_KEY, JSON.stringify(obj));
          } catch (_) {
            /* private mode: just live with in-memory state */
          }
        }, [activeMatchup, opponentKey]);

        // Pick the timings/order/label that match the active matchup chip.
        // 'All' = the unfiltered backend payload; per-matchup = the
        // backend-precomputed `matchupTimings[label]` blob.
        let activeTimings = timings;
        let activeOrder = order;
        let activeLabel = matchupLabel;
        if (
          activeMatchup !== "All" &&
          matchupTimings &&
          matchupTimings[activeMatchup]
        ) {
          activeTimings = matchupTimings[activeMatchup].timings;
          activeOrder = matchupTimings[activeMatchup].order;
          activeLabel = activeMatchup;
        }

        // Drilldown state.
        const [drillToken, setDrillToken] = useState(null);

        if (!activeTimings || !activeOrder || activeOrder.length === 0) {
          return (
            <EmptyState
              title="No matchup-relevant timings"
              sub="This opponent has no games with both build logs parsed yet."
            />
          );
        }

        // Apply source filter to the canonical order. Tokens not in `activeTimings`
        // are silently dropped, so we never render a building outside the
        // backend's matchup-relevant list.
        const visibleTokens = activeOrder.filter((tok) => {
          const info = activeTimings[tok];
          if (!info) return false;
          if (sourceFilter === "opp") return info.source === "opp_build_log";
          if (sourceFilter === "self") return info.source === "build_log";
          return true;
        });

        const total = activeOrder.length;
        const filterSuffix =
          sourceFilter === "opp"
            ? " — opponent tech only"
            : sourceFilter === "self"
              ? " — your tech only"
              : "";
        const matchupSuffix =
          activeMatchup === "All"
            ? ""
            : ` (${(matchupCounts && matchupCounts[activeMatchup]) || 0} game${
                (matchupCounts && matchupCounts[activeMatchup]) === 1 ? "" : "s"
              })`;
        const summary = activeLabel
          ? `Showing ${visibleTokens.length} of ${total} timings for ${activeLabel}${matchupSuffix}${filterSuffix}`
          : `Showing ${visibleTokens.length} of ${total} timings${filterSuffix}`;

        const filterBtn = (key, label) => {
          const active = sourceFilter === key;
          return (
            <button
              key={key}
              type="button"
              onClick={() => setSourceFilter(key)}
              aria-pressed={active}
              className={
                "px-3 py-1 rounded-full text-xs ring-soft transition-colors " +
                (active
                  ? "bg-accent-500/20 text-accent-400"
                  : "bg-base-700 text-neutral-400 hover:text-neutral-200")
              }
            >
              {label}
            </button>
          );
        };

        // Per-matchup chip ("All" + one per matchup the opponent has
        // played). Same pill chrome as the source filter so the two rows
        // read as a coherent control bar.
        const matchupBtn = (key, label, count) => {
          const active = activeMatchup === key;
          return (
            <button
              key={key}
              type="button"
              onClick={() => setActiveMatchup(key)}
              aria-pressed={active}
              className={
                "px-3 py-1 rounded-full text-xs ring-soft transition-colors " +
                (active
                  ? "bg-accent-500/20 text-accent-400"
                  : "bg-base-700 text-neutral-400 hover:text-neutral-200")
              }
            >
              {count == null ? label : `${label} (${count})`}
            </button>
          );
        };

        return (
          <div data-testid="median-timings-grid">
            {matchupChips.length > 0 ? (
              <div
                className="flex flex-wrap items-center gap-2 mb-2"
                data-testid="median-timings-matchup-chips"
              >
                {matchupBtn("All", "All", null)}
                {matchupChips.map(([ml, n]) => matchupBtn(ml, ml, n))}
              </div>
            ) : null}
            <div className="flex flex-wrap items-center gap-2 mb-3">
              {filterBtn("both", "Both")}
              {filterBtn("opp", "Opponent's tech")}
              {filterBtn("self", "Your tech")}
            </div>
            <div
              aria-live="polite"
              className="text-[11px] text-neutral-500 mb-2"
              data-testid="median-timings-summary"
            >
              {summary}
            </div>
            {visibleTokens.length === 0 ? (
              <EmptyState
                title="No timings for this filter"
                sub="Try the other source pill or 'Both'."
              />
            ) : (
              <div
                className="grid gap-2"
                style={{
                  gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))",
                }}
              >
                {visibleTokens.map((tok) => (
                  <TimingCard
                    key={tok}
                    token={tok}
                    info={activeTimings[tok]}
                    onClick={() => {
                      // Don't open the drawer on empty cards.
                      if ((activeTimings[tok] || {}).sampleCount > 0)
                        setDrillToken(tok);
                    }}
                  />
                ))}
              </div>
            )}
            <TimingsDrilldownDrawer
              open={!!drillToken}
              onClose={() => setDrillToken(null)}
              token={drillToken}
              info={drillToken ? activeTimings[drillToken] : null}
              matchupLabel={activeLabel}
              onOpenGame={onOpenGame}
            />
          </div>
        );
      }

      /**
       * One card in the grid. Renders the icon + median + metadata.
       * Empty cards (sampleCount === 0) get dimmed styling and are still
       * Tab-focusable but never open the drilldown.
       */
      function TimingCard({ token, info, onClick }) {
        info = info || {};
        const empty = !info.sampleCount;
        const iconUrl = buildingIconUrl(token);
        const display = buildingDisplayName(token, token);
        const trend = TREND_GLYPHS[info.trend] || TREND_GLYPHS.unknown;
        const wrPctStr =
          info.winRateWhenBuilt == null
            ? "—"
            : Math.round(info.winRateWhenBuilt * 100) + "%";
        const wrPillBg = wrPillColor(info.winRateWhenBuilt, info.sampleCount);
        const sourceLabel =
          info.source === "opp_build_log"
            ? "opponent's structures (sc2reader)"
            : "your build (proxy for matchup tendencies)";

        // Tooltip content. Composed once so hover/focus produce the same text.
        const tipLines = [];
        if (info.sampleCount) {
          if (info.minDisplay && info.maxDisplay)
            tipLines.push(`range ${info.minDisplay}–${info.maxDisplay}`);
          if (info.lastSeenDisplay && info.lastSeenDisplay !== "-")
            tipLines.push(`last seen at ${info.lastSeenDisplay}`);
          tipLines.push(sourceLabel);
          tipLines.push(`n=${info.sampleCount} matchup samples`);
        } else {
          tipLines.push("No samples in this matchup");
          tipLines.push(sourceLabel);
        }
        const tipTitle = tipLines.join("\n");

        const ariaLabel = empty
          ? `${display} — no samples`

        // ask the games table at the bottom of the page to expand a
        // specific row. Bumping `targetSeq` re-fires the effect that scrolls
        // and expands even if the user clicks the same gameId twice.
        const [targetGameId, setTargetGameId] = useState(null);
        const [targetSeq, setTargetSeq] = useState(0);

          if (!id) return;

            {/* DNA additions: build tendencies, predicted, timings, last 5. */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">

                  Opponent-tech cards are sourced from{" "}
                  <code className="font-mono">opp_build_log</code> (sc2reader);
                  your-tech cards from your{" "}
                  <code className="font-mono">build_log</code>. Click a card to

            <Card
              title={`All games (${(data.games || []).length}) · newest first`}
            >
              <div className="overflow-x-auto -mx-2 max-h-[480px]">
                {/* Reuse the build-deep-dive games table so opponent games get
                the same row-click → build order + macro-click → breakdown
                affordances as everywhere else. We pre-normalise field
                casing (Date/date, Map/map, Result/result) so the shared
                table doesn't have to handle the Black-Book schema. */}
                <GamesTableWithBuildOrder
                  targetGameId={targetGameId}
                  targetGameSeq={targetSeq}
                  games={[...(data.games || [])]
                    .map((g) => ({
                      ...g,
                      date: g.date || g.Date,
                      map: g.map || g.Map,
                      result: g.result || g.Result,
                      opponent: g.opponent || data.name || "",
                      // Opponent race resolution -- prefer the meta-DB-enriched
                      // opp_race when present. Otherwise parse the Matchup key,
                      // which is shaped "<MY_RACE>v<OPP_RACE>" (e.g.
                      // "PROTOSSvTERRAN"). The previous version took
                      // charAt(0) of the whole string after stripping a "vs "
                      // prefix, so it returned the USER'S race ("P") instead of
                      // the opponent's ("T"). Now we explicitly take the part
                      // AFTER the "v" separator.
                      opp_race:
                        g.opp_race ||
                        (function () {
                          const mu = g.Matchup || "";
                          if (!mu) return "";
                          const stripped = String(mu).replace(/^vs\s*/i, "");
                          // Split on "v" / " v " / "vs" so both
                          // "PROTOSSvTERRAN" and "PROTOSS vs TERRAN"
                          // resolve to the trailing race.
                          const parts = stripped.split(/\s*v(?:s)?\s*/i);
                          const oppPart =
                            parts.length > 1
                              ? parts[parts.length - 1]
                              : parts[0];
                          return (oppPart || "").charAt(0).toUpperCase();
                        })() ||
                        "",
                      // game id is essential for the /games/:id/build-order
                      // and /games/:id/macro-breakdown endpoints. Enrichment
                      // now copies the meta-DB id; fall back to alt names.
                      id: g.id || g.game_id || g.GameId || g.gameId,
                    }))
                    .sort(
                      (a, b) =>
                        Date.parse(String(b.date || "").replace(" ", "T")) -
                        Date.parse(String(a.date || "").replace(" ", "T")),
                    )}
                  perspective="opponent"
                />
              </div>
            </Card>
          </div>
        );
