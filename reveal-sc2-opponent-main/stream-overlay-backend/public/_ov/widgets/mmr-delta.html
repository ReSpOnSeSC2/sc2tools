<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SC2 Overlay - MMR Delta Pop-up</title>
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="../widget-mode.css">
<script src="http://localhost:3000/socket.io/socket.io.js"></script>
<script src="../icon-registry.js" defer></script>
<script>
  // Force the URL into single-widget mode even if the user opened
  // this file directly (file://...) without the ?w= query string.
  if (!new URLSearchParams(window.location.search).get('w')) {
    history.replaceState(null, '', window.location.pathname + '?w=mmr-delta');
  }
</script>
</head>
<body>

<div id="mmr-delta-widget" class="widget-container">
    <div class="accent-bar accent-gold"></div>
    <div class="content content-tight">
        <div class="header">
            <span class="dim">MMR</span>
            <span id="mmr-delta-value" class="big">+0</span>
        </div>
        <div class="footer"><span id="mmr-delta-current"></span></div>
    </div>
</div>
<script src="../app.js"></script>
</body>
</html>
