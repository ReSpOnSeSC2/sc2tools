<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SC2 Overlay - Post-Game Strategy Reveal (F3)</title>
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="../widget-mode.css">
<script src="http://localhost:3000/socket.io/socket.io.js"></script>
<script src="../icon-registry.js" defer></script>
<script src="../voice-readout.js" defer></script>
<script>
  // Force the URL into single-widget mode even if the user opened
  // this file directly (file://...) without the ?w= query string.
  if (!new URLSearchParams(window.location.search).get('w')) {
    history.replaceState(null, '', window.location.pathname + '?w=post-game');
  }
</script>
</head>
<body>

<div id="reveal-widget" class="widget-container reveal-widget">
    <div class="accent-bar accent-purple"></div>
    <div class="content">
        <div class="header">
            <span>OPP STRATEGY</span>
            <span id="reveal-strategy" class="bright"></span>
        </div>
        <div class="footer">
            <span id="reveal-icons" class="icon-row"></span>
            <span id="reveal-build"></span>
            <span id="reveal-result" class="dim"></span>
        </div>
        <div id="reveal-timeline" class="build-timeline"></div>
    </div>
</div>
<script src="../app.js"></script>
</body>
</html>
