<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SC2 Overlay - Cheese History Warning</title>
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="../widget-mode.css">
<script src="http://localhost:3000/socket.io/socket.io.js"></script>
<script src="../icon-registry.js" defer></script>
<script src="../voice-readout.js" defer></script>
<script>
  // Force the URL into single-widget mode even if the user opened
  // this file directly (file://...) without the ?w= query string.
  if (!new URLSearchParams(window.location.search).get('w')) {
    history.replaceState(null, '', window.location.pathname + '?w=cheese');
  }
</script>
</head>
<body>

<div id="cheese-widget" class="widget-container cheese-widget">
    <div class="accent-bar accent-red"></div>
    <div class="content">
        <div class="header">
            <span id="cheese-icon-img" class="sc2-icon-slot"></span>
            <span id="cheese-icon">!</span>
            <span id="cheese-title">CHEESE HISTORY</span>
        </div>
        <div class="footer"><span id="cheese-msg"></span></div>
    </div>
</div>
<script src="../app.js"></script>
</body>
</html>
