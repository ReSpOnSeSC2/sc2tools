<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SC2 Overlay - Best Answer (F2)</title>
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="../widget-mode.css">
<script src="http://localhost:3000/socket.io/socket.io.js"></script>
<script src="../icon-registry.js" defer></script>
<script>
  // Force the URL into single-widget mode even if the user opened
  // this file directly (file://...) without the ?w= query string.
  if (!new URLSearchParams(window.location.search).get('w')) {
    history.replaceState(null, '', window.location.pathname + '?w=best-answer');
  }
</script>
</head>
<body>

<div id="bestans-widget" class="widget-container">
    <div class="accent-bar accent-gold"></div>
    <div class="content">
        <div class="header">
            <span>BEST ANSWER</span>
            <span id="bestans-wr" class="bright"></span>
        </div>
        <div class="footer">
            <span id="bestans-icons" class="icon-row"></span>
            <span id="bestans-build"></span>
            <span id="bestans-record" class="dim"></span>
        </div>
    </div>
</div>
<script src="../app.js"></script>
</body>
</html>
