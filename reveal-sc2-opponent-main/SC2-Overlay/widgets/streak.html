<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SC2 Overlay - Streak Splash</title>
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="../widget-mode.css">
<script src="http://localhost:3000/socket.io/socket.io.js"></script>
<script src="../icon-registry.js" defer></script>
<script src="../voice-readout.js" defer></script>
<script>
  // Force the URL into single-widget mode even if the user opened
  // this file directly (file://...) without the ?w= query string.
  if (!new URLSearchParams(window.location.search).get('w')) {
    history.replaceState(null, '', window.location.pathname + '?w=streak');
  }
</script>
</head>
<body>

<div id="streak-widget" class="streak-widget">
    <div class="streak-inner">
        <div id="streak-text" class="streak-text">HEATING UP</div>
        <div id="streak-sub" class="streak-sub">3 wins in a row</div>
    </div>
</div>
<script src="../app.js"></script>
</body>
</html>
