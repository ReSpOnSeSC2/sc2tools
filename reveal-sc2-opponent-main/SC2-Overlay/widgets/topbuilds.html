<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SC2 Overlay - Top Builds Tile Grid</title>
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="../widget-mode.css">
<script src="http://localhost:3000/socket.io/socket.io.js"></script>
<script src="../icon-registry.js" defer></script>
<script>
  // Force the URL into single-widget mode even if the user opened
  // this file directly (file://...) without the ?w= query string.
  if (!new URLSearchParams(window.location.search).get('w')) {
    history.replaceState(null, '', window.location.pathname + '?w=topbuilds');
  }
</script>
</head>
<body>

<div id="topbuilds-widget" class="topbuilds-widget">
    <div class="topbuilds-header">
        <span class="topbuilds-title">YOUR TOP BUILDS</span>
    </div>
    <div id="topbuilds-grid" class="topbuilds-grid"></div>
</div>
<script src="../app.js"></script>
</body>
</html>
