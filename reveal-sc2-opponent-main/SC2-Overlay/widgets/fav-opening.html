<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SC2 Overlay - Favorite Opening (F1)</title>
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="../widget-mode.css">
<script src="http://localhost:3000/socket.io/socket.io.js"></script>
<script src="../icon-registry.js" defer></script>
<script src="../voice-readout.js" defer></script>
<script>
  // Force the URL into single-widget mode even if the user opened
  // this file directly (file://...) without the ?w= query string.
  if (!new URLSearchParams(window.location.search).get('w')) {
    history.replaceState(null, '', window.location.pathname + '?w=fav-opening');
  }
</script>
</head>
<body>

<div id="favopen-widget" class="widget-container">
    <div class="accent-bar accent-cyan"></div>
    <div class="content">
        <div class="header">
            <span>FAVORITE OPENING</span>
            <span id="favopen-share" class="bright"></span>
        </div>
        <div class="footer">
            <span id="favopen-icons" class="icon-row"></span>
            <span id="favopen-strategy"></span>
            <span id="favopen-name" class="dim"></span>
        </div>
    </div>
</div>
<script src="../app.js"></script>
</body>
</html>
