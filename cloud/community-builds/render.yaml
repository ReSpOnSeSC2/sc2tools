services:
  - type: web
    name: sc2-community-builds
    runtime: node
    plan: starter
    region: oregon
    branch: main
    rootDir: cloud/community-builds
    buildCommand: npm ci --omit=dev
    startCommand: node index.js
    healthCheckPath: /v1/community-builds/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: LOG_LEVEL
        value: info
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: sc2_community_builds
      - key: SERVER_PEPPER_HEX
        sync: false
      - key: TRUST_PROXY
        value: 1
      - key: CORS_ALLOWED_ORIGINS
        sync: false
