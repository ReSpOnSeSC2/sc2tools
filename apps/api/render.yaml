# Render blueprint for the SC2 Tools cloud API.
# After pushing this repo to GitHub, point Render at apps/api/render.yaml
# from "Blueprints → New Blueprint" and it provisions the service.
#
# IMPORTANT: the Docker build needs the repo ROOT as its context so it
# can COPY SC2Replay-Analyzer/ into the image. We deliberately omit
# `rootDir` (or set it to the repo root) and point dockerfilePath at
# the API's Dockerfile. Setting rootDir: apps/api would scope the
# build context to the API directory and the analyzer COPY would fail.
services:
  - type: web
    name: sc2tools-api
    runtime: docker
    plan: starter
    region: oregon
    dockerContext: .
    dockerfilePath: ./apps/api/Dockerfile
    healthCheckPath: /v1/health
    autoDeploy: true
    # Autoscaling: scale 1→3 instances based on CPU. /v1/health is a
    # cheap Mongo ping so it's safe as a load probe. Combined with
    # sessionAffinity below, a sudden burst (50 agents reconnect after
    # a deploy) doesn't 503.
    numInstances: 1
    scaling:
      minInstances: 1
      maxInstances: 3
      targetCPUPercent: 70
    # Sticky sessions are required for Socket.io once we scale beyond a
    # single instance: the client opens an XHR-poll handshake against
    # one node, then upgrades to WebSocket — both legs must hit the
    # same node or the upgrade fails. Render's "Session Affinity"
    # routes by cookie, which is exactly what `socket.io-client` uses
    # in fallback transports. Leave on even at one instance — it's a
    # no-op and makes scale-up safe.
    sessionAffinity: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: sc2tools_saas
      - key: CLERK_SECRET_KEY
        sync: false
      - key: SERVER_PEPPER_HEX
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: RATE_LIMIT_PER_MINUTE
        value: "120"
      - key: AGENT_RELEASE_ADMIN_TOKEN
        sync: false
      # Optional. Set to enable Sentry error reporting; leave unset for
      # local builds. Pair with `npm install @sentry/node` in apps/api.
      - key: SENTRY_DSN
        sync: false
      # The Dockerfile pre-installs the analyzer + venv at these paths.
      # Override only if you've re-staged them somewhere else.
      - key: SC2_PY_PYTHON
        value: /opt/sc2-py/bin/python
      - key: SC2_PY_ANALYZER_DIR
        value: /opt/sc2-analyzer
